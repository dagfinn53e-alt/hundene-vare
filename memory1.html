<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶 Hundeparken IMAGE EDITION</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#dbeafe,#bfdbfe);
text-align:center;
overflow:hidden;
color:#123c73;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
position:relative;
z-index:2;
}

h1{
font-size:52px;
margin-top:10px;
text-shadow:0 0 15px #60a5fa;
}

.stats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.stat{
background:white;
padding:14px 20px;
border-radius:18px;
font-size:20px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

#message{
font-size:30px;
font-weight:bold;
color:#2563eb;
margin:20px;
min-height:40px;
transition:.3s;
}

.comboText{
animation:comboPop .6s;
color:#ef4444!important;
}

@keyframes comboPop{
0%{transform:scale(.5)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}
}

#gameBoard{
display:grid;
gap:15px;
justify-content:center;
margin-top:20px;
}

.card{
width:120px;
height:120px;
perspective:1000px;
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:scale(1.05);
}

.inner{
position:relative;
width:100%;
height:100%;
transition:transform .6s;
transform-style:preserve-3d;
}

.card.flipped .inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:20px;
overflow:hidden;
box-shadow:0 6px 14px rgba(0,0,0,.18);
}

.front{
background:linear-gradient(135deg,#2563eb,#60a5fa);
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
color:white;
}

.back{
background:white;
transform:rotateY(180deg);
}

.back img{
width:100%;
height:100%;
object-fit:cover;
}

.correct .back{
box-shadow:0 0 35px #60a5fa;
animation:dogGlow .8s infinite alternate;
}

@keyframes dogGlow{
from{
transform:rotateY(180deg) scale(1);
}
to{
transform:rotateY(180deg) scale(1.08);
}
}

.wrong{
animation:shake .25s 2;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

.dog{
position:fixed;
font-size:30px;
opacity:.14;
animation:dogFloat 14s linear infinite;
pointer-events:none;
}

@keyframes dogFloat{
from{
transform:translateY(110vh);
}
to{
transform:translateY(-120vh);
}
}

.flash{
position:fixed;
inset:0;
background:white;
opacity:0;
pointer-events:none;
z-index:9999;
}

.flash.active{
animation:flashScreen .6s;
}

@keyframes flashScreen{
0%{opacity:.8}
100%{opacity:0}
}

.confetti{
position:fixed;
width:12px;
height:12px;
top:-20px;
animation:fall linear forwards;
z-index:999;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}

#winBox{
display:none;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,.18);
max-width:500px;
margin:30px auto;
animation:winPop .7s;
}

@keyframes winPop{
0%{
transform:scale(.4);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

#winBox h2{
font-size:44px;
color:#2563eb;
}

button{
margin-top:20px;
padding:16px 28px;
border:none;
border-radius:18px;
background:#2563eb;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.backBtn{
background:#123c73;
}

</style>
</head>

<body>

<div class="flash" id="flash"></div>

<div class="dog" style="left:10%;">🐶</div>
<div class="dog" style="left:35%;animation-delay:3s;">🐾</div>
<div class="dog" style="left:60%;animation-delay:5s;">🦴</div>
<div class="dog" style="left:85%;animation-delay:8s;">🐕</div>

<div class="container">

<h1>🐶 Hundeparken IMAGE EDITION</h1>

<div class="stats">

<div class="stat">
🗺️ Nivå:
<span id="level">1</span>
</div>

<div class="stat">
⭐ Poeng:
<span id="score">0</span>
</div>

<div class="stat">
🔥 Combo:
<span id="combo">0</span>
</div>

</div>

<div id="message">
🐶 Finn hundebildene!
</div>

<div id="gameBoard"></div>

<div id="winBox">

<h2>🏆 LEVEL COMPLETE!</h2>

<div style="font-size:60px;">
🐶🎉🐶
</div>

<p id="finalScore"></p>

<button onclick="nextLevel()">
➡️ Neste nivå
</button>

</div>

<button class="backBtn"
onclick="location.href='memorymap.html'">

⬅️ Tilbake til kart

</button>

</div>

<script>

const flipSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"
);

const correctSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"
);

const wrongSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"
);

const winSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"
);

const allImages=[
"images/dog1.jpg",
"images/dog2.jpg",
"images/dog3.jpg",
"images/dog4.jpg",
"images/dog5.jpg",
"images/dog6.jpg"
];

let level=1;
let score=0;
let combo=0;

let cards=[];
let flipped=[];
let matched=0;
let lock=false;

function startLevel(){

let pairs=3+level;

if(pairs>6){
pairs=6;
}

let selected=
allImages.slice(0,pairs);

cards=[...selected,...selected];

cards.sort(()=>Math.random()-0.5);

flipped=[];
matched=0;
combo=0;
lock=false;

updateStats();

document.getElementById(
"winBox"
).style.display="none";

const board=
document.getElementById(
"gameBoard"
);

board.innerHTML="";

let columns=4;

board.style.gridTemplateColumns=
`repeat(${columns},120px)`;

cards.forEach(image=>{

const card=
document.createElement("div");

card.className="card";

card.dataset.image=image;

card.innerHTML=`

<div class="inner">

<div class="front">
🐶
</div>

<div class="back">
<img src="${image}">
</div>

</div>

`;

card.onclick=
()=>flipCard(card);

board.appendChild(card);

});

}

function flipCard(card){

if(lock)return;

if(flipped.length>=2)return;

if(card.classList.contains("flipped"))return;

if(card.classList.contains("correct"))return;

card.classList.add("flipped");

flipSound.currentTime=0;
flipSound.play();

flipped.push(card);

if(flipped.length===2){

checkMatch();

}

}

function checkMatch(){

lock=true;

const a=flipped[0];
const b=flipped[1];

if(a.dataset.image===b.dataset.image){

a.classList.add("correct");
b.classList.add("correct");

matched+=2;

combo++;

score+=10+(combo*4);

correctSound.currentTime=0;
correctSound.play();

const msg=
document.getElementById(
"message"
);

msg.innerHTML=
"🐶 Hundepar funnet!";

if(combo>=3){

msg.innerHTML=
"🔥 SUPER COMBO x"+combo;

msg.classList.add(
"comboText"
);

setTimeout(()=>{

msg.classList.remove(
"comboText"
);

},600);

}

flipped=[];

lock=false;

updateStats();

if(matched===cards.length){

winLevel();

}

}else{

combo=0;

score=Math.max(0,score-3);

wrongSound.currentTime=0;
wrongSound.play();

a.classList.add("wrong");
b.classList.add("wrong");

document.getElementById(
"message"
).innerHTML=
"❌ Feil hund";

updateStats();

setTimeout(()=>{

a.classList.remove(
"flipped",
"wrong"
);

b.classList.remove(
"flipped",
"wrong"
);

flipped=[];

lock=false;

},900);

}

}

function updateStats(){

document.getElementById(
"level"
).innerHTML=level;

document.getElementById(
"score"
).innerHTML=score;

document.getElementById(
"combo"
).innerHTML=combo;

}

function flashScreen(){

const flash=
document.getElementById(
"flash"
);

flash.classList.add(
"active"
);

setTimeout(()=>{

flash.classList.remove(
"active"
);

},600);

}

function createConfetti(){

for(let i=0;i<80;i++){

const conf=
document.createElement("div");

conf.className="confetti";

conf.style.left=
Math.random()*100+"vw";

conf.style.background=
`hsl(${Math.random()*360},
100%,50%)`;

conf.style.animationDuration=
(3+Math.random()*3)+"s";

document.body.appendChild(conf);

setTimeout(()=>{

conf.remove();

},6000);

}

}

function winLevel(){

winSound.currentTime=0;
winSound.play();

flashScreen();

createConfetti();

document.getElementById(
"winBox"
).style.display="block";

document.getElementById(
"finalScore"
).innerHTML=
`⭐ Poeng: ${score}`;

document.getElementById(
"message"
).innerHTML=
"🏆 LEVEL COMPLETE!";

}

function nextLevel(){

level++;

if(level>3){

alert(
"🐶 Du fullførte Hundeparken!"
);

level=1;
score=0;

}

startLevel();

}

startLevel();

</script>

</body>
</html>
