<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Katt Admin – Hundene våre</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;color:#3b1f4f;min-height:100vh;background:linear-gradient(180deg,#fdf2f8,#eef6ff,#fff7ed)}
.wrap{max-width:1220px;margin:auto;padding:16px 10px 70px}
.top,.panel{background:#fff;border:1px solid #fbcfe8;border-radius:28px;padding:16px;box-shadow:0 14px 34px rgba(15,23,42,.10);margin-bottom:16px}
.top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.logo{font-size:24px;font-weight:900;color:#be185d}.nav{display:flex;gap:8px;flex-wrap:wrap}
.nav a{background:#fdf2f8;color:#be185d;text-decoration:none;border:1px solid #fbcfe8;border-radius:999px;padding:10px 13px;font-weight:900;font-size:14px}
.hero{background:linear-gradient(135deg,#4a044e,#be185d,#7c3aed);color:#fff;border-radius:36px;padding:34px 18px;text-align:center;margin-bottom:16px}
.hero h1{font-size:clamp(2.3rem,7vw,4.6rem)}.hero p{font-weight:800;line-height:1.5;max-width:820px;margin:10px auto 0;color:#fff1f7}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:#fff;border:1px solid #fbcfe8;border-radius:22px;padding:14px;text-align:center;font-weight:900}.stat b{display:block;font-size:28px;color:#be185d}
.controls{display:grid;grid-template-columns:1.4fr 1fr 1fr auto;gap:10px}
input,select{width:100%;border:1px solid #fbcfe8;border-radius:999px;padding:13px 15px;font-weight:800}
button,.btn{border:none;border-radius:999px;padding:12px 14px;color:#fff;font-weight:900;background:linear-gradient(135deg,#be185d,#7c3aed);cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;text-align:center}
.green{background:linear-gradient(135deg,#22c55e,#16a34a)}.red{background:linear-gradient(135deg,#ef4444,#b91c1c)}.orange{background:linear-gradient(135deg,#f97316,#db2777)}.dark{background:#111827}.blue{background:linear-gradient(135deg,#0b5cff,#2563eb)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.card{background:#fff;border:1px solid #fbcfe8;border-radius:28px;overflow:hidden;box-shadow:0 14px 30px rgba(15,23,42,.10)}
.cover{height:200px;background:linear-gradient(135deg,#be185d,#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-size:72px;cursor:pointer}.cover img{width:100%;height:100%;object-fit:cover}
.content{padding:18px}.content h2{font-size:25px;color:#9d174d;margin-bottom:8px}.meta{color:#475569;font-weight:700;line-height:1.55;white-space:pre-wrap}
.chip{display:inline-block;background:#fdf2f8;color:#be185d;border:1px solid #fbcfe8;border-radius:999px;padding:7px 10px;font-size:13px;font-weight:900;margin:4px 4px 10px 0}.ok{background:#dcfce7;color:#166534;border-color:#86efac}.wait{background:#fef3c7;color:#92400e;border-color:#f59e0b}.no{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.actions{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px}.empty{grid-column:1/-1;background:#fff;border:2px dashed #f9a8d4;border-radius:26px;padding:26px;text-align:center;color:#831843;font-weight:900}
.status{text-align:center;font-weight:900;color:#831843;margin:10px 0}.modal{position:fixed;inset:0;background:rgba(15,23,42,.76);display:none;align-items:center;justify-content:center;z-index:999}.modal.open{display:flex}.modal img{max-width:95vw;max-height:90vh;border-radius:24px}
@media(max-width:1000px){.stats{grid-template-columns:repeat(2,1fr)}.controls,.grid{grid-template-columns:1fr}.actions{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.top{justify-content:center}.logo{width:100%;text-align:center}.nav a{flex:1 1 42%;text-align:center;font-size:12px}.stats,.actions{grid-template-columns:1fr}.cover{height:180px}button,.btn,input,select{width:100%}}
</style>
</head>
<body>
<div class="wrap">
<div class="top"><div class="logo">🔐 Katt Admin</div><div class="nav"><a href="katt-oppdretterportal.html">Portal</a><a href="katt-registrering.html">Registrering</a><a href="katt-oppdrettere.html">Oppdrettere</a></div></div>
<section class="hero"><h1>Katt Admin</h1><p>Ekte admin koblet til Supabase-tabellen cat_breeders.</p></section>
<section class="stats"><div class="stat"><b id="sTotal">0</b>Totalt</div><div class="stat"><b id="sWaiting">0</b>Venter</div><div class="stat"><b id="sApproved">0</b>Godkjente</div><div class="stat"><b id="sPremium">0</b>Premium</div></section>
<section class="panel controls"><input id="search" placeholder="Søk navn, rase, sted eller e-post" oninput="render()"><select id="statusFilter" onchange="render()"><option value="">Alle statuser</option><option value="venter">Venter</option><option value="godkjent">Godkjent</option><option value="avvist">Avvist</option></select><select id="premiumFilter" onchange="render()"><option value="">Alle</option><option value="premium">Premium</option><option value="standard">Standard</option></select><button onclick="loadData()">Oppdater</button></section>
<div id="status" class="status">Laster...</div><section class="grid" id="list"></section>
</div>
<div id="imgModal" class="modal" onclick="this.classList.remove('open')"><img id="bigImg"></div>
<script>
const supabaseClient=window.supabase.createClient("https://kxudiviidwwwclbzgdyx.supabase.co","sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH");
let rows=[];
function esc(v){return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function st(x){if(x.approved||x.status==="godkjent")return"godkjent";if(x.status==="avvist")return"avvist";return"venter"}
function cls(s){return s==="godkjent"?"ok":s==="avvist"?"no":"wait"}
function openImage(url){if(!url)return;bigImg.src=url;imgModal.classList.add("open")}
async function loadData(){status.textContent="Laster fra Supabase...";const {data,error}=await supabaseClient.from("cat_breeders").select("*").order("created_at",{ascending:false});if(error){status.textContent="Feil: "+error.message;return}rows=data||[];status.textContent=rows.length+" registreringer funnet";render()}
function updateStats(){sTotal.textContent=rows.length;sWaiting.textContent=rows.filter(x=>st(x)==="venter").length;sApproved.textContent=rows.filter(x=>st(x)==="godkjent").length;sPremium.textContent=rows.filter(x=>x.premium).length}
function render(){updateStats();const q=search.value.toLowerCase().trim(),sf=statusFilter.value,pf=premiumFilter.value;const data=rows.filter(x=>{const s=st(x),text=(x.name+" "+x.breed+" "+x.place+" "+x.area+" "+x.email+" "+x.about+" "+x.health).toLowerCase();return(!q||text.includes(q))&&(!sf||s===sf)&&(!pf||(pf==="premium"?x.premium:!x.premium))});if(!data.length){list.innerHTML='<div class="empty">Ingen treff.</div>';return}list.innerHTML=data.map(x=>{const s=st(x),img=x.image_url||"";return `<article class="card"><div class="cover" onclick="openImage('${esc(img)}')">${img?`<img src="${esc(img)}">`:"🐱"}</div><div class="content"><h2>${esc(x.name)}</h2><span class="chip ${cls(s)}">${s==="godkjent"?"✅":s==="avvist"?"❌":"🟡"} ${esc(s)}</span>${x.premium?'<span class="chip ok">⭐ Premium</span>':'<span class="chip">Standard</span>'}<span class="chip">🐱 ${esc(x.breed||"Rase ikke oppgitt")}</span><span class="chip">📍 ${esc(x.place||x.area||"Sted ikke oppgitt")}</span><div class="meta"><b>E-post:</b> ${esc(x.email||"Ikke oppgitt")}<br><b>Telefon:</b> ${esc(x.phone||"Ikke oppgitt")}<br><b>Kontakt:</b> ${esc(x.contact_name||"Ikke oppgitt")}<br><b>Nettside:</b> ${esc(x.website||"Ikke oppgitt")}<br><br><b>Om:</b><br>${esc(x.about||"Ikke oppgitt")}<br><br><b>Helse:</b><br>${esc(x.health||"Ikke oppgitt")}</div><div class="actions"><button class="green" onclick="approveItem('${x.id}')">Godkjenn</button><button class="red" onclick="rejectItem('${x.id}')">Avvis</button><button class="orange" onclick="togglePremium('${x.id}',${x.premium?'false':'true'})">Premium</button><a class="btn blue" href="katt-oppdretter-profil.html?id=${encodeURIComponent(x.id)}">Profil</a><button class="dark" onclick="deleteItem('${x.id}')">Slett</button></div></div></article>`}).join("")}
async function approveItem(id){const {error}=await supabaseClient.from("cat_breeders").update({approved:true,status:"godkjent"}).eq("id",id);if(error){alert("Feil: "+error.message);return}await loadData()}
async function rejectItem(id){const {error}=await supabaseClient.from("cat_breeders").update({approved:false,status:"avvist"}).eq("id",id);if(error){alert("Feil: "+error.message);return}await loadData()}
async function togglePremium(id,value){const {error}=await supabaseClient.from("cat_breeders").update({premium:value}).eq("id",id);if(error){alert("Feil: "+error.message);return}await loadData()}
async function deleteItem(id){if(!confirm("Slette denne oppdretteren?"))return;const {error}=await supabaseClient.from("cat_breeders").delete().eq("id",id);if(error){alert("Feil: "+error.message);return}await loadData()}
loadData();
</script>
</body></html>
