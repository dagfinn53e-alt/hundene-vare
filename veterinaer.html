<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐕 Hundetrener Simulator PRO</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eef6ff;
  color:#123c73;
  text-align:center;
}

.container{
  max-width:1200px;
  margin:20px auto;
  background:white;
  padding:25px;
  border-radius:25px;
  box-shadow:0 10px 25px rgba(0,0,0,.12);
}

input,select,button{
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:14px;
  font-size:18px;
}

button{
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:12px;
  margin:20px 0;
}

.stat{
  background:#f1f5ff;
  padding:14px;
  border-radius:18px;
  font-weight:bold;
}

#shop,
#log{
  background:#f8fafc;
  border-radius:18px;
  padding:20px;
  margin-top:20px;
  text-align:left;
}

#log{
  min-height:120px;
  line-height:1.5;
}

.shopItem{
  background:#eef6ff;
  padding:15px;
  border-radius:14px;
  margin-bottom:12px;
}

.hidden{
  display:none;
}

.back{
  display:inline-block;
  margin-top:25px;
  text-decoration:none;
  color:#2563eb;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🐕 Hundetrener Simulator PRO</h1>

<div id="setup">

<h2>Start trenerkarriere</h2>

<input type="text"
id="dogName"
placeholder="Hundens navn">

<select id="breed">

<option>Border Collie</option>
<option>Golden Retriever</option>
<option>Bichon Frise</option>
<option>Dobermann</option>
<option>Labrador</option>
<option>Puddel</option>
<option>Schæfer</option>

</select>

<button onclick="startGame()">
🚀 Start Simulator
</button>

</div>

<div id="game" class="hidden">

<h2 id="dogInfo"></h2>

<div class="stats">

<div class="stat">
📅 Dag: <span id="day">1</span>
</div>

<div class="stat">
🎯 Lydighet: <span id="obedience">20</span>
</div>

<div class="stat">
❤️ Tillit: <span id="trust">50</span>
</div>

<div class="stat">
⚡ Energi: <span id="energy">80</span>
</div>

<div class="stat">
😰 Stress: <span id="stress">10</span>
</div>

<div class="stat">
🏆 Nivå: <span id="level">
Nybegynner
</span>
</div>

<div class="stat">
💰 Konto: <span id="money">
5000
</span> kr
</div>

<div class="stat">
📜 Sertifikater: <span id="certificates">
0
</span>
</div>

</div>

<h2>🐾 Kommando-trening</h2>

<button onclick="action('sit')">
🪑 Tren SITT
</button>

<button onclick="action('stay')">
✋ Tren BLI
</button>

<button onclick="action('come')">
📣 Tren INNKALLING
</button>

<button onclick="action('heel')">
🐕 Tren GÅ PENT I BÅND
</button>

<button onclick="action('search')">
🦴 Tren SØK
</button>

<h2>❤️ Hverdag</h2>

<button onclick="action('walk')">
🚶 Gå tur
</button>

<button onclick="action('play')">
🎾 Lek og kos
</button>

<button onclick="action('rest')">
😴 Hvile
</button>

<h2>🏆 Konkurranser</h2>

<button onclick="action('competition')">
🏅 Lydighetsprøve - 300 kr
</button>

<button onclick="action('advancedCompetition')">
🌍 Elite-konkurranse - 1000 kr
</button>

<h2>🛒 Treningsbutikk</h2>

<div id="shop"></div>

<div id="log">
Velkommen til Hundetrener Simulator PRO 🐕
</div>

<button onclick="resetGame()">
🔄 Start nytt spill
</button>

</div>

<a class="back" href="hundespill.html">
← Tilbake til spill
</a>

</div>

<script>

let dogName="";
let breed="";

let day=1;

let obedience=20;
let trust=50;
let energy=80;
let stress=10;

let money=5000;

let certificates=0;

let level="🙂 Nybegynner";

let ownedItems=[];

const shopItems=[

{
name:"🎾 Treningsball",
price:500,
bonus:10
},

{
name:"🦴 Godbitpose",
price:800,
bonus:15
},

{
name:"🐕 Proff bånd",
price:1200,
bonus:20
},

{
name:"📣 Klikker",
price:1800,
bonus:25
},

{
name:"🏆 Elite utstyr",
price:3500,
bonus:40
}

];

function startGame(){

dogName=
document.getElementById(
"dogName"
).value;

breed=
document.getElementById(
"breed"
).value;

if(dogName.trim()===""){

alert("Gi hunden navn 🙂");

return;

}

document.getElementById(
"setup"
).classList.add("hidden");

document.getElementById(
"game"
).classList.remove("hidden");

update();

saveGame();

}

function updateLevel(){

if(obedience>=500){

level="🌍 Elite Trener";

}else if(obedience>=320){

level="🏆 Konkurranseklar";

}else if(obedience>=180){

level="⭐ Viderekommen";

}else if(obedience>=80){

level="🐶 Unghund";

}else{

level="🙂 Nybegynner";

}

}

function update(){

updateLevel();

document.getElementById(
"dogInfo"
).innerHTML=
"🐶 "+dogName+
" - "+breed;

document.getElementById(
"day"
).innerHTML=day;

document.getElementById(
"obedience"
).innerHTML=obedience;

document.getElementById(
"trust"
).innerHTML=trust;

document.getElementById(
"energy"
).innerHTML=energy;

document.getElementById(
"stress"
).innerHTML=stress;

document.getElementById(
"level"
).innerHTML=level;

document.getElementById(
"money"
).innerHTML=money;

document.getElementById(
"certificates"
).innerHTML=certificates;

document.getElementById(
"shop"
).innerHTML=

shopItems.map(item=>{

const owned=
ownedItems.includes(item.name);

return`

<div class="shopItem">

<b>${item.name}</b><br>
Pris: ${item.price} kr<br>
Bonus: +${item.bonus}

<button
onclick="buyItem(
'${item.name}',
${item.price}
)"

${owned ? "disabled" : ""}

>

${owned ? "✅ Kjøpt" : "Kjøp"}

</button>

</div>

`;

}).join("");

}

function log(text){

document.getElementById(
"log"
).innerHTML=text;

}

function nextDay(){

day++;

energy-=5;

if(energy<0)
energy=0;

stress+=2;

if(stress>100)
stress=100;

randomEvent();

saveGame();

update();

}

function randomEvent(){

const events=[

"⭐ Hunden lærte raskere i dag.",
"🐕 Folk roste treningen din.",
"🎾 Hunden virker glad.",
"🏆 Treningen gir resultater.",
"❤️ Hunden virker tryggere."

];

if(Math.random()<0.35){

const e=
events[Math.floor(
Math.random()*events.length
)];

log(
document.getElementById(
"log"
).innerHTML+
"<br><br>🎲 "+e
);

}

}

function getBonus(){

let bonus=0;

ownedItems.forEach(name=>{

const item=
shopItems.find(
i=>i.name===name
);

if(item){

bonus+=item.bonus;

}

});

return bonus;

}

function pay(amount){

if(money<amount){

log("❌ Ikke nok penger.");

return false;

}

money-=amount;

return true;

}

function earn(amount){

money+=amount;

}

function action(type){

if(type==="sit"){

obedience+=8;
trust+=2;
energy-=8;
stress+=3;

log("🪑 Du trente SITT.");

}

if(type==="stay"){

obedience+=10;
trust+=3;
energy-=10;
stress+=4;

log("✋ Du trente BLI.");

}

if(type==="come"){

obedience+=14;
trust+=5;
energy-=12;
stress+=5;

log("📣 Du trente INNKALLING.");

}

if(type==="heel"){

obedience+=12;
trust+=3;
energy-=10;
stress+=4;

log("🐕 Du trente GÅ PENT I BÅND.");

}

if(type==="search"){

obedience+=16;
trust+=5;
energy-=15;
stress+=2;

log("🦴 Du trente SØK.");

}

if(type==="walk"){

trust+=6;
stress-=8;
energy-=4;

if(stress<0)
stress=0;

log("🚶 Rolig tur ga bedre kontakt.");

}

if(type==="play"){

trust+=10;
stress-=10;
energy-=5;

if(stress<0)
stress=0;

log("🎾 Lek og kos gjorde hunden glad.");

}

if(type==="rest"){

energy+=20;
stress-=6;

if(energy>100)
energy=100;

if(stress<0)
stress=0;

log("😴 Hunden fikk hvile.");

}

if(type==="competition"){

if(!pay(300)) return;

let result=
obedience+
trust+
energy-
stress+
getBonus();

if(result>240){

obedience+=35;
trust+=10;

earn(800);

certificates++;

log(
"🥇 Hunden besto lydighetsprøven!"
);

}else if(result>180){

obedience+=18;

earn(400);

log(
"🥈 God innsats på prøven."
);

}else{

obedience+=5;
stress+=6;

earn(100);

log(
"🙂 Dere fikk erfaring."
);

}

energy-=20;

}

if(type==="advancedCompetition"){

if(!pay(1000)) return;

let result=
obedience+
trust+
energy-
stress+
getBonus()-40;

if(result>260){

obedience+=50;
trust+=15;

earn(2500);

certificates+=2;

log(
"🌍 Elite-konkurransen ble vunnet!"
);

}else if(result>210){

obedience+=25;

earn(1200);

certificates++;

log(
"🏆 Flott elite-resultat!"
);

}else{

obedience+=8;
stress+=8;

earn(300);

log(
"🙂 Elite-nivået var krevende."
);

}

energy-=30;

}

if(trust>100)
trust=100;

if(energy>100)
energy=100;

if(stress>100)
stress=100;

if(stress<0)
stress=0;

nextDay();

}

function buyItem(name,price){

if(ownedItems.includes(name)){

log("✅ Du har allerede dette.");

return;

}

if(!pay(price)) return;

ownedItems.push(name);

log(
"🛒 Du kjøpte "+
name+"!"
);

saveGame();

update();

}

function saveGame(){

const data={

dogName,
breed,
day,
obedience,
trust,
energy,
stress,
level,
money,
certificates,
ownedItems

};

localStorage.setItem(
"dogTrainerSave",
JSON.stringify(data)
);

}

function loadGame(){

const save=
localStorage.getItem(
"dogTrainerSave"
);

if(save){

const data=
JSON.parse(save);

dogName=data.dogName;
breed=data.breed;

day=data.day;

obedience=data.obedience;
trust=data.trust;
energy=data.energy;
stress=data.stress;

level=data.level;

money=data.money;

certificates=
data.certificates;

ownedItems=
data.ownedItems || [];

document.getElementById(
"setup"
).classList.add("hidden");

document.getElementById(
"game"
).classList.remove("hidden");

log(
"💾 Lagret trening lastet!"
);

}

}

function resetGame(){

localStorage.removeItem(
"dogTrainerSave"
);

location.reload();

}

loadGame();

update();

</script>

</body>
</html>
