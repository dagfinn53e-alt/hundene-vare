<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶🐱 Hunde / Kattespill</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#fdf2f8,#eef6ff);
text-align:center;
}

h1{
font-size:42px;
margin-top:30px;
margin-bottom:10px;
color:#7a284f;
}

.subtitle{
font-size:20px;
margin-bottom:35px;
color:#444;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:20px;
max-width:1100px;
margin:auto;
}

.game-btn{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

min-height:180px;

padding:25px;

border:none;
border-radius:28px;

font-size:28px;
font-weight:bold;

cursor:pointer;

color:white;

box-shadow:0 8px 20px rgba(0,0,0,.15);

transition:.2s;
}

.game-btn:hover{
transform:translateY(-5px) scale(1.02);
}

.game-btn span{
font-size:16px;
font-weight:normal;
margin-top:12px;
line-height:1.4;
}

.quiz{
background:linear-gradient(135deg,#60a5fa,#2563eb);
}

.catquiz{
background:linear-gradient(135deg,#f472b6,#db2777);
}

.puzzle{
background:linear-gradient(135deg,#34d399,#059669);
}

.catpuzzle{
background:linear-gradient(135deg,#fb7185,#e11d48);
}

.lab{
background:linear-gradient(135deg,#fbbf24,#f59e0b);
}

.sim{
background:linear-gradient(135deg,#a78bfa,#7c3aed);
}

.footer{
margin-top:40px;
margin-bottom:30px;
font-size:15px;
color:#666;
}

</style>
</head>

<body>

<h1>🐶🐱 Hunde / Kattespill</h1>

<div class="subtitle">
Velg et spill 🎮
</div>

<div class="menu-grid">

<button class="game-btn quiz"
onclick="location.href='hundelandquiz.html'">

🐶 Hundeland Quiz

<span>
Gjett hvilket land hunderasen kommer fra
</span>

</button>

<button class="game-btn catquiz"
onclick="location.href='kattelandquiz.html'">

🐱 Katteland Quiz

<span>
Gjett hvilket land katterasen kommer fra
</span>

</button>

<button class="game-btn puzzle"
onclick="location.href='puslespill.html'">

🐶🧩 Hundepuslespill

<span>
Bygg hundebilder i flere nivåer
</span>

</button>
<button class="game-btn sim"
onclick="location.href='byggeverden.html'">

🧱 Byggeverden

<span>
Bygg hundehus, kattehus og små bygg med klosser
</span>



</button>



</button>

<button class="game-btn catpuzzle"
onclick="location.href='kattepuslespill.html'">

🐱🧩 Kattepuslespill

<span>
Puslespill med fine kattebilder
</span>

</button>

<button class="game-btn sim"
onclick="location.href='dyresimulator4.html'">

🌍 Dyresimulator 4.0

<span>
Levende hund og katt i eget miljø
</span>

</button>




<span>
Finn veien gjennom labyrinten
</span>

</button>

<button class="game-btn sim"

onclick="location.href='dyresimulator2.html'"
🎮 Dyresimulator

<span>
Utforsk dyreverdenen
</span>

</button>

</div>

<div class="footer">

🐶🐱 Spillportal laget med GitHub Pages

</div>

</body>
</html>
