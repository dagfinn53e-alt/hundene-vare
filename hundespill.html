<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶🐱 Hunde / Kattespill</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#dbeafe,#f0f9ff);
text-align:center;
color:#123c73;
}

h1{
font-size:52px;
margin-top:20px;
}

.subtitle{
font-size:28px;
margin-bottom:30px;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
padding:20px;
}

.game-btn{
border:none;
border-radius:28px;
padding:35px 20px;
color:white;
font-size:34px;
font-weight:bold;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,.15);
transition:.2s;
min-height:220px;
}

.game-btn:hover{
transform:scale(1.04);
}

.game-btn span{
display:block;
font-size:20px;
margin-top:18px;
font-weight:normal;
line-height:1.5;
}

/* COLORS */

.blue{
background:linear-gradient(135deg,#2563eb,#60a5fa);
}

.purple{
background:linear-gradient(135deg,#c026d3,#ec4899);
}

.green{
background:linear-gradient(135deg,#10b981,#34d399);
}

.orange{
background:linear-gradient(135deg,#f59e0b,#fbbf24);
}

.red{
background:linear-gradient(135deg,#ef4444,#fb7185);
}

.dark{
background:linear-gradient(135deg,#1e293b,#334155);
}

</style>
</head>

<body>

<h1>🐶🐱 Hunde / Kattespill</h1>

<div class="subtitle">

Velg et spill 🎮

</div>

<div class="games">

<!-- HUNDELAND -->

<button class="game-btn blue"
onclick="location.href='hundelandquiz.html'">

🐶 Hundeland Quiz

<span>
Gjett hvilket land hunderasen kommer fra
</span>

</button>

<!-- KATTELAND -->

<button class="game-btn purple"
onclick="location.href='kattelandquiz.html'">

🐱 Katteland Quiz

<span>
Gjett hvilket land katterasen kommer fra
</span>

</button>

<!-- HUNDEPUSLESPILL -->

<button class="game-btn green"
onclick="location.href='puslespill.html'">

🧩 Hundepuslespill

<span>
Bygg hundebilder i flere nivåer
</span>



</button>

<!-- KATTEPUSLESPILL -->

<button class="game-btn red"
onclick="location.href='kattepuslespill.html'">

🐱🧩 Kattepuslespill

<span>
Puslespill med fine kattebilder
</span>

</button>

<!-- BYGGEVERDEN -->

<button class="game-btn orange"
onclick="location.href='byggeverden.html'">

🧱 Byggeverden

<span>
Bygg hundehus, kennel og kreative bygg
</span>

</button>

<!-- KENNEL BUILDER -->

<button class="game-btn blue"
onclick="location.href='kennelbuilder.html'">

🏡 Kennel Builder

<span>
Bygg kennel med hus, gjerder, trær og hunder
</span>

</button>

<!-- MEMORY -->

<button class="game-btn dark"
onclick="location.href='memorymap.html'">

🗺️ Memory Adventure MAP

<span>
Alle memoryspill samlet i én stor adventure-verden
</span>

</button>
<!-- MUSIKK QUIZ -->

<button class="game-btn orange"
onclick="location.href='musikkquiz.html'">

🎵 Musikk Quiz

<span>
60-, 70-, 80- og 90-tallet • Country • Soul • Pop • Rock
</span>

</button>
</div>

</body>
</html>
