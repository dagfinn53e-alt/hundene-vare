<div class="game" id="game"></div>

<button onclick="startGame()">
    Start på nytt
</button>

<script>

const game = document.getElementById("game");
const message = document.getElementById("message");

let boneIndex = 0;

function startGame(){

    game.innerHTML="";

    boneIndex = Math.floor(Math.random()*6);

    for(let i=0;i<6;i++){

        const card = document.createElement("div");
        card.className="card";
        card.innerHTML="🐾";

        card.onclick=()=>{

            if(i===boneIndex){
                card.innerHTML="🦴";
                message.innerHTML="🎉 Du fant hundebeinet!";
            }else{
                card.innerHTML="🐶";
                message.innerHTML="Prøv igjen 🙂";
            }

        };

        game.appendChild(card);
    }

}

startGame();

</script>
