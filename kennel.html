<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;color:#123c73;min-height:100vh;background:radial-gradient(circle at 8% 5%,rgba(255,220,130,.55),transparent 30%),radial-gradient(circle at 93% 6%,rgba(126,200,255,.48),transparent 34%),linear-gradient(180deg,#dbeafe,#eef6ff 48%,#fff7ed)}

.cover{height:245px;background:linear-gradient(135deg,#1f8fff,#004cff);display:flex;align-items:center;justify-content:center;color:white;font-size:82px;overflow:hidden}

.content{padding:20px}

.tag{display:inline-block;background:#eaf2ff;color:#004cff;border:1px solid #b8ddff;border-radius:999px;padding:7px 10px;font-size:13px;font-weight:900;margin:3px}
.statusLedig{background:#dcfce7;color:#166534;border-color:#86efac}.statusRes{background:#fef3c7;color:#92400e;border-color:#f59e0b}.statusSolgt{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.gallery{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px}
.gallery img{width:100%;height:190px;object-fit:cover;border-radius:20px;border:3px solid #eaf2ff;cursor:pointer;box-shadow:0 10px 22px #0002}

.contactBox{background:linear-gradient(135deg,#051849,#0b5cff);color:white;border-radius:34px;padding:26px;box-shadow:0 18px 42px #0003}
.contactBox h2{color:white}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.84);display:none;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal img{max-width:95vw;max-height:90vh;border-radius:18px}

.premiumPanel{
  margin-top:24px;

  padding:24px;

}
.premiumBadge span{display:block;font-size:36px;margin-bottom:7px}

.breedItem span{display:block;font-size:30px;margin-bottom:5px}

.smartGuide{
  margin-top:24px;
  background:white;
  border:1px solid #dbeafe;
  border-radius:34px;
  padding:24px;
  box-shadow:0 18px 42px rgba(15,23,42,.12);
}
.smartGuide h2{
  text-align:center;
  color:#001d4a;
  font-size:clamp(2rem,5vw,3.1rem);
  margin-bottom:14px;
}
.smartGrid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;
}
.smartCard{
  background:linear-gradient(180deg,#ffffff,#f8fbff);
  border:1px solid #dbeafe;
  border-radius:22px;
  padding:16px 10px;
  text-align:center;
  font-weight:900;
  color:#123c73;
  text-decoration:none;
  box-shadow:0 10px 22px rgba(30,64,175,.08);
  transition:.18s;
}
.smartCard:hover{
  transform:translateY(-3px);
  box-shadow:0 16px 30px rgba(30,64,175,.16);
}
.smartCard span{
  display:block;
  font-size:36px;
  margin-bottom:7px;
}
.learnBox{
  margin-top:24px;
}
.learnGrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}
.learnCard{
  background:white;
  border:1px solid #dbeafe;
  border-radius:28px;
  padding:22px;
  text-align:center;
  text-decoration:none;
  color:#123c73;
  font-weight:900;
  box-shadow:0 14px 30px rgba(15,23,42,.10);
  transition:.18s;
}
.learnCard:hover{
  transform:translateY(-4px);
  box-shadow:0 22px 42px rgba(15,23,42,.16);
}
.learnCard span{
  display:block;
  font-size:48px;
  margin-bottom:10px;
}
.learnCard p{
  color:#334155;
  font-weight:700;

.mobileJump{
  display:none;
}
.mobileToggle{
  display:none;
}

  .mobileJump{
    position:sticky;

  }

}

@media(max-width:950px){.smartGrid{grid-template-columns:1fr 1fr 1fr}.learnGrid{grid-template-columns:1fr 1fr}}

@media(max-width:700px){.wrap{padding:9px 8px 50px}.top{justify-content:center}.logo{width:100%;text-align:center;font-size:20px}.nav{width:100%;justify-content:center}.nav a{flex:1 1 42%;text-align:center;font-size:12px;padding:9px 7px}.hero{border-radius:28px;padding:18px;min-height:0}.logoBox{height:230px;border-radius:26px}.quick,.qualityGrid,.infoGrid{grid-template-columns:1fr}.gallery{grid-template-columns:1fr 1fr}.gallery img,.gallery img:first-child{height:135px;grid-row:auto}.card{padding:17px}}
</style>

<body>
<div class="wrap">
<div class="top">
  <div class="logo">🏆 Kennel Mobile 9.0</div>
  <div class="nav">
    <a href="index.html">🏠 Forside</a>
    <a href="oppdretterportal.html">🐶 Portal</a>

</div>

<div id="app"><div class="msg">Laster kennelprofil...</div></div>

</div>
<div class="modal" id="modal" onclick="this.style.display='none'"><img id="modalImg"></div>
<script>
const client=window.supabase.createClient("https://kxudiviidwwwclbzgdyx.supabase.co","sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH");
const id=new URLSearchParams(location.search).get("id");
function first(){for(const v of arguments){if(v!==null&&v!==undefined&&String(v).trim())return String(v).trim();}return "";}
function t(v,f="Ikke oppgitt"){return v&&String(v).trim()?String(v).trim():f}
function link(v){if(!v||!String(v).trim())return "#";let x=String(v).trim();return x.startsWith("http")?x:"https://"+x}
function openImg(u){modalImg.src=u;modal.style.display="flex"}

function setupMobileCollapsibles(){
  if(window.innerWidth > 700) return;
  const items = [
    {selector:".smartGuide", title:"🐶 Hurtigguide om rasen"},
    {selector:".premiumPanel", title:"🏆 Premium-merker"},
    {selector:"#omkennel", title:"🐶 Om kennelen"},
    {selector:"#kvalitet", title:"⭐ Kvalitetsprofil"},
    {selector:"#helse", title:"🩺 Helse og oppfølging"},
    {selector:"#galleri", title:"📷 Galleri"},
    {selector:".learnBox", title:"📚 Lær mer om rasen"}
  ];
  items.forEach(item=>{
    const el=document.querySelector(item.selector);
    if(!el || el.dataset.mobileReady==="1") return;
    el.dataset.mobileReady="1";
    el.classList.add("mobileCollapsible","mobileCollapsed");
    const content=document.createElement("div");
    content.className="mobileContent";
    while(el.firstChild){
      content.appendChild(el.firstChild);
    }
    const btn=document.createElement("button");
    btn.className="mobileToggle";
    btn.type="button";
    btn.textContent=item.title+"  ▾";
    btn.addEventListener("click",()=>{
      el.classList.toggle("mobileCollapsed");
      btn.textContent=item.title+(el.classList.contains("mobileCollapsed") ? "  ▾" : "  ▴");
    });
    el.appendChild(btn);
    el.appendChild(content);
  });
}

function statusClass(s){s=(s||"").toLowerCase();if(s.includes("solgt"))return"statusSolgt";if(s.includes("reservert"))return"statusRes";return"statusLedig"}
async function load(){
 let r;
 if(id) r=await client.from("breeders").select("*").eq("id",id).maybeSingle();
 if(!id||r.error||!r.data) r=await client.from("breeders").select("*").eq("status","godkjent").order("created_at",{ascending:false}).limit(1).single();
 if(r.error||!r.data){app.innerHTML='<div class="card">Ingen kennel funnet.</div>';return}
 const b=r.data;
 const name=t(first(b.kennel_name,b.name,b.owner_name),"Kennel");
 const breed=t(first(b.breed,b.rase),"Rase");
 const area=t(first(b.area,b.fylke),"");
 const mun=t(first(b.municipality,b.kommune,b.city,b.sted),"");
 const place=t((mun+" "+area).trim(),"Norge");
 const about=t(first(b.about,b.description,b.om,b.presentation),"Godkjent kennelprofil på Hundenevåre.com.");
 const email=first(b.email,b.epost,b.mail);
 const phone=first(b.phone,b.telefon,b.mobile);
 const website=first(b.website,b.nettside,b.facebook,b.facebook_url);
 const logo=first(b.logo_url,b.logo,b.image_url,(b.image_urls&&b.image_urls[0])||"");
 const logoHtml=logo?'<img src="'+logo+'">':'<div class="noLogo">🐶</div>';
 const imgs=(b.image_urls||[]).filter(Boolean);
 const gallery=imgs.map(u=>'<img src="'+u+'" onclick="openImg(\''+u+'\')">').join("");
 const lit=await client.from("puppy_litters").select("*").eq("status","godkjent").eq("breeder_id",b.id).order("created_at",{ascending:false});
 const litters=(lit.data||[]).map(x=>{
   const main=(x.image_urls||[])[0]||"";
   return '<article class="litter"><div class="cover">'+(main?'<img src="'+main+'">':'🐶')+'</div><div class="content"><h3>'+t(x.title,x.breed)+'</h3><span class="tag '+statusClass(x.litter_status)+'">'+t(x.litter_status,"Ledig")+'</span><span class="tag">🐾 '+t(x.breed)+'</span><span class="tag">💚 Ledige: '+t(x.available_count,0)+'</span><span class="tag">🎒 '+t(x.ready_date)+'</span><div class="infoGrid"><div class="info">📅 <b>Født</b><br>'+t(x.born_date)+'</div><div class="info">💰 <b>Pris</b><br>'+t(x.price)+'</div><div class="info">👦 <b>Hanner</b><br>'+t(x.males,0)+'</div><div class="info">👧 <b>Tisper</b><br>'+t(x.females,0)+'</div></div><p style="margin-top:12px;color:#334155;font-weight:700;line-height:1.55">'+t(x.about,"")+'</p><div class="actions"><a class="btn green" href="'+(x.email?'mailto:'+x.email:(email?'mailto:'+email:'#'))+'">📩 Kontakt om kullet</a></div></div></article>';
 }).join("");
 app.innerHTML='<section class="hero"><div class="logoBox">'+logoHtml+'</div><div class="heroText"><div class="badges"><span class="badge gold">🏆 Hundenevåre Kennel Mobile 9.0</span><span class="badge">✅ Godkjent oppdretter</span>'+(b.founder?'<span class="badge gold">🏅 Grunnlegger</span>':'')+'<span class="badge">🐾 '+breed+'</span></div><h1>'+name+'</h1><p>'+about+'</p><div class="actions"><a class="btn green" href="'+(email?'mailto:'+email:'#')+'">📩 Kontakt</a><a class="btn orange" href="'+link(website)+'" target="_blank">🌐 Nettside/Facebook</a><a class="btn dark" href="#valpekull">🐾 Valpekull</a></div></div></section>'+
 '<section class="quick"><div class="quickCard"><b>'+breed+'</b>Rase</div><div class="quickCard"><b>'+place+'</b>Sted</div><div class="quickCard"><b>'+t(first(b.puppies_available,b.ledige_valper),"Info")+'</b>Valper</div><div class="quickCard"><b>'+(b.founder?'Grunnlegger':'Godkjent')+'</b>Status</div></section>'+
 '<section class="smartGuide"><h2>🐶 Hurtigguide om rasen</h2><div class="smartGrid"><a class="smartCard" href="hunderaser.html"><span>🐾</span>'+breed+'</a><a class="smartCard" href="hunderaser.html"><span>🏡</span>Familiehund</a><a class="smartCard" href="helse-3-0.html"><span>🩺</span>Helse</a><a class="smartCard" href="pelsstell.html"><span>✂️</span>Pelsstell</a><a class="smartCard" href="trening.html"><span>🎓</span>Trening</a><a class="smartCard" href="#kontakt"><span>📩</span>Kontakt</a></div></section>'+
 '<section class="section grid" id="omkennel"><div class="card"><h3>🐶 Om kennelen</h3><p>'+about+'</p></div><div class="card"><h3>📌 Kort info</h3><div class="infoGrid"><div class="info">🐾 <b>Rase</b><br>'+breed+'</div><div class="info">📍 <b>Sted</b><br>'+place+'</div><div class="info">☎️ <b>Telefon</b><br>'+t(phone)+'</div><div class="info">📧 <b>E-post</b><br>'+t(email)+'</div></div></div></section>'+
