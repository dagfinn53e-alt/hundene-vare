<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 Kennel-simulator</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eef6ff;
  color:#123c73;
  text-align:center;
}

.box{
  max-width:900px;
  margin:20px auto;
  background:white;
  padding:25px;
  border-radius:25px;
  box-shadow:0 10px 25px rgba(0,0,0,.12);
}

h1{
  margin-bottom:10px;
}

input,select{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:14px;
  border:1px solid #ccc;
  font-size:18px;
}

button{
  display:block;
  width:100%;
  margin:10px 0;
  padding:15px;
  border:none;
  border-radius:16px;
  background:#2563eb;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  margin:20px 0;
}

.stat{
  background:#f1f5ff;
  padding:14px;
  border-radius:18px;
  font-weight:bold;
}

#log{
  background:#f8fafc;
  border-radius:18px;
  padding:15px;
  margin-top:20px;
  min-height:120px;
  text-align:left;
  line-height:1.5;
}

.back{
  display:inline-block;
  margin-top:20px;
  color:#2563eb;
  font-weight:bold;
  text-decoration:none;
}

.hidden{
  display:none;
}

</style>
</head>

<body>

<div class="box">

<h1>🐾 Kennel-simulator</h1>

<div id="setup">

<h2>Start din kennel</h2>

<input type="text" id="kennelName" placeholder="Skriv kennelnavn">

<select id="starterDog">
<option value="Golden Retriever">Golden Retriever</option>
<option value="Bichon Frise">Bichon Frise</option>
<option value="Dobermann">Dobermann</option>
<option value="Pomeranian">Pomeranian</option>
<option value="Boxer">Boxer</option>
</select>

<button onclick="startGame()">
🚀 Start Kennel
</button>

</div>

<div id="game" class="hidden">

<h2 id="kennelTitle"></h2>

<div class="stats">

<div class="stat">
📅 Dag: <span id="day">1</span>
</div>

<div class="stat">
💰 Penger: <span id="money">1000</span> kr
</div>

<div class="stat">
🐶 Hunder: <span id="dogs">1</span>
</div>

<div class="stat">
⭐ Rykte: <span id="reputation">10</span>
</div>

<div class="stat">
❤️ Hundelykke: <span id="happiness">70</span>
</div>

<div class="stat">
🏠 Kennel nivå: <span id="level">1</span>
</div>

</div>

<h3 id="mainDog"></h3>

<button onclick="action('train')">
🐕 Tren hundene
</button>

<button onclick="action('care')">
🛁 Stell og kos
</button>

<button onclick="action('customer')">
👥 Ta imot kunde
</button>

<button onclick="action('show')">
🏆 Hundeshow
</button>

<button onclick="action('upgrade')">
🏠 Oppgrader kennel
</button>

<button onclick="action('buydog')">
🐶 Kjøp ny hund
</button>

<button onclick="resetGame()">
🔄 Start nytt spill
</button>

<div id="log">
Velkommen til kennelen 🐾
</div>

</div>

<a class="back" href="hundespill.html">
← Tilbake til spill
</a>

</div>

<script>

let kennelName = "";
let mainDog = "";

let day = 1;
let money = 1000;
let dogs = 1;
let reputation = 10;
let happiness = 70;
let level = 1;

function startGame(){

  kennelName =
  document.getElementById("kennelName").value;

  mainDog =
  document.getElementById("starterDog").value;

  if(kennelName.trim() === ""){

    alert("Skriv kennelnavn 🙂");

    return;

  }

  document.getElementById("setup")
  .classList.add("hidden");

  document.getElementById("game")
  .classList.remove("hidden");

  updateTitles();

  saveGame();

}

function updateTitles(){

  document.getElementById("kennelTitle")
  .innerHTML =
  "🏠 " + kennelName;

  document.getElementById("mainDog")
  .innerHTML =
  "🐶 Første hund: " + mainDog;

}

function update(){

  document.getElementById("day").innerHTML =
  day;

  document.getElementById("money").innerHTML =
  money;

  document.getElementById("dogs").innerHTML =
  dogs;

  document.getElementById("reputation").innerHTML =
  reputation;

  document.getElementById("happiness").innerHTML =
  happiness;

  document.getElementById("level").innerHTML =
  level;

}

function log(text){

  document.getElementById("log").innerHTML =
  text;

}

function saveGame(){

  const data = {

    kennelName,
    mainDog,
    day,
    money,
    dogs,
    reputation,
    happiness,
    level

  };

  localStorage.setItem(
    "kennelSave",
    JSON.stringify(data)
  );

}

function loadGame(){

  const save =
  localStorage.getItem("kennelSave");

  if(save){

    const data = JSON.parse(save);

    kennelName = data.kennelName;
    mainDog = data.mainDog;

    day = data.day;
    money = data.money;
    dogs = data.dogs;
    reputation = data.reputation;
    happiness = data.happiness;
    level = data.level;

    document.getElementById("setup")
    .classList.add("hidden");

    document.getElementById("game")
    .classList.remove("hidden");

    updateTitles();

    log("💾 Lagret kennel lastet!");

  }

}

function resetGame(){

  localStorage.removeItem("kennelSave");

  location.reload();

}

function nextDay(){

  day++;

  happiness -= 3;

  if(happiness < 0){
    happiness = 0;
  }

  if(day % 7 === 0){

    money -= dogs * 80;

    log(
      "📅 Ny uke! Du betalte drift for hundene."
    );

  }

  randomEvent();

  saveGame();

  update();

}

function randomEvent(){

  const events = [

    "⭐ En kunde anbefalte kennelen videre.",
    "🐕 Hundene lærte nye triks.",
    "📞 Flere kunder tok kontakt.",
    "🌧️ Dårlig vær gjorde hundene rastløse.",
    "🏆 Kennelen fikk ros for godt arbeid.",
    "🐶 En hund imponerte på trening.",
    "❤️ Hundene virker ekstra glade i dag."

  ];

  if(Math.random() < 0.35){

    const e =
    events[Math.floor(Math.random()*events.length)];

    log(
      document.getElementById("log").innerHTML +
      "<br><br>🎲 " + e
    );

    reputation += 1;

  }

}

function action(type){

  if(type === "train"){

    reputation += 3;

    happiness -= 4;

    log("🐕 Du trente hundene.");

  }

  if(type === "care"){

    happiness += 10;

    if(happiness > 100){
      happiness = 100;
    }

    reputation += 1;

    log("🛁 Hundene fikk stell og kos.");

  }

  if(type === "customer"){

    let earned =
    150 + (level * 50) + (reputation * 3);

    money += earned;

    happiness -= 5;

    reputation += 2;

    log(
      "👥 Kunde besøkte kennelen. +" +
      earned + " kr."
    );

  }

  if(type === "show"){

    let chance =
    reputation + happiness;

    if(chance > 100){

      money += 600;

      reputation += 8;

      log(
        "🏆 Du vant hundeshow!"
      );

    }else{

      reputation += 2;

      money -= 100;

      log(
        "🙂 Du fikk erfaring fra show."
      );

    }

  }

  if(type === "upgrade"){

    let cost =
    level * 700;

    if(money >= cost){

      money -= cost;

      level++;

      reputation += 5;

      log(
        "🏠 Kennelen ble oppgradert!"
      );

    }else{

      log(
        "❌ Du trenger " +
        cost + " kr."
      );

      update();

      return;

    }

  }

  if(type === "buydog"){

    let cost =
    900 + (dogs * 200);

    if(money >= cost){

      money -= cost;

      dogs++;

      happiness -= 5;

      reputation += 3;

      log(
        "🐶 Du kjøpte ny hund!"
      );

    }else{

      log(
        "❌ Ny hund koster " +
        cost + " kr."
      );

      update();

      return;

    }

  }

  nextDay();

}

loadGame();

update();

</script>

</body>
</html>
