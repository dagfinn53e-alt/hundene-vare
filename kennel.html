<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kennelside 2.0 – Hundene våre</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial,sans-serif;
  color:#123c73;
  min-height:100vh;
  background:radial-gradient(circle at 10% 5%,rgba(255,220,130,.42),transparent 30%),
             radial-gradient(circle at 92% 8%,rgba(126,200,255,.42),transparent 33%),
             linear-gradient(180deg,#dbeafe,#eef6ff 48%,#fff7ed);
}
.wrap{max-width:1220px;margin:auto;padding:14px 10px 60px}
.top{
  display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
  background:white;border-radius:26px;padding:13px 15px;box-shadow:0 12px 28px rgba(0,45,110,.12);margin-bottom:15px
}
.logo{font-size:23px;font-weight:900;color:#004cff}
.nav{display:flex;gap:8px;flex-wrap:wrap}
.nav a{background:#eaf2ff;color:#004cff;text-decoration:none;border:1px solid #b8ddff;border-radius:999px;padding:10px 13px;font-weight:900;font-size:14px}
.hero{
  display:grid;grid-template-columns:.9fr 1.1fr;gap:24px;align-items:center;
  background:linear-gradient(135deg,#1f8fff,#004cff,#7c3aed);
  color:white;border-radius:40px;padding:30px;box-shadow:0 24px 58px rgba(0,45,110,.25);overflow:hidden
}
.logoBox{
  background:white;border-radius:34px;height:300px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;box-shadow:0 18px 42px rgba(0,0,0,.22)
}
.logoBox img{width:100%;height:100%;object-fit:contain;padding:14px}
.noLogo{font-size:120px}
.badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.badge{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.32);border-radius:999px;padding:8px 12px;font-weight:900;font-size:13px}
.hero h1{font-size:clamp(2.4rem,7vw,5rem);line-height:1.02;margin-bottom:12px;text-shadow:0 0 12px rgba(255,255,255,.65)}
.hero p{font-size:18px;line-height:1.6;font-weight:700;color:#eef6ff}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border-radius:999px;padding:13px 18px;color:white;background:linear-gradient(135deg,#1f8fff,#004cff);font-weight:900;min-width:130px;border:none;cursor:pointer}
.btn.green{background:linear-gradient(135deg,#22c55e,#16a34a)}
.btn.orange{background:linear-gradient(135deg,#ff8a3d,#f59e0b)}
.btn.dark{background:#111827}
.section{margin-top:24px}
.section h2{text-align:center;color:#001d4a;font-size:clamp(2rem,5vw,3.1rem);margin-bottom:12px}
.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}
.card{background:white;border-radius:30px;padding:22px;box-shadow:0 16px 34px rgba(15,23,42,.12);border:1px solid #dbeafe}
.card h3{color:#001d4a;font-size:25px;margin-bottom:10px}
.card p{color:#334155;font-weight:700;line-height:1.6;font-size:16px}
.infoGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.info{background:#f8fbff;border:1px solid #e0edff;border-radius:18px;padding:13px;font-weight:800;line-height:1.45}
.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.gallery img{width:100%;height:150px;object-fit:cover;border-radius:18px;border:2px solid #eaf2ff;cursor:pointer}
.litters{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.litter{background:white;border-radius:30px;overflow:hidden;box-shadow:0 16px 34px rgba(15,23,42,.12);border:1px solid #dbeafe}
.litterCover{height:220px;background:linear-gradient(135deg,#1f8fff,#004cff);display:flex;align-items:center;justify-content:center;color:white;font-size:80px;overflow:hidden}
.litterCover img{width:100%;height:100%;object-fit:cover}
.litterContent{padding:20px}
.litterContent h3{font-size:25px;color:#001d4a;margin-bottom:8px}
.tagRow{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0}
.tag{background:#eaf2ff;color:#004cff;border:1px solid #b8ddff;border-radius:999px;padding:7px 10px;font-size:13px;font-weight:900}
.statusLedig{background:#dcfce7;color:#166534;border-color:#86efac}
.statusRes{background:#fef3c7;color:#92400e;border-color:#f59e0b}
.statusSolgt{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.msg{text-align:center;font-size:18px;font-weight:900;margin-top:20px;color:#334155}
.footer{text-align:center;font-weight:900;color:#14346d;margin-top:35px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal img{max-width:95vw;max-height:90vh;border-radius:18px}
@media(max-width:900px){.hero,.grid{grid-template-columns:1fr;text-align:center}.actions{justify-content:center}.litters{grid-template-columns:1fr}.infoGrid{grid-template-columns:1fr}}
@media(max-width:700px){.wrap{padding:9px 8px 50px}.top{justify-content:center}.logo{width:100%;text-align:center;font-size:20px}.nav{width:100%;justify-content:center}.nav a{flex:1 1 42%;text-align:center;font-size:12px;padding:9px 7px}.hero{border-radius:28px;padding:18px}.logoBox{height:220px}.gallery{grid-template-columns:repeat(2,1fr)}.gallery img{height:120px}.card{padding:17px}}
</style>
</head>
<body>
<div class="wrap">
<div class="top">
  <div class="logo">🏡 Kennelside 2.0</div>
  <div class="nav">
    <a href="index.html">🏠 Forside</a>
    <a href="oppdretterportal.html">🐶 Portal</a>
    <a href="oppdrettere.html">🔎 Oppdrettere</a>
    <a href="valpekull.html">🐾 Valpekull</a>
  </div>
</div>

<div id="app"><div class="msg">Laster kennel...</div></div>

<div class="footer">Hundenevåre.com – Kennelside 🐶</div>
</div>

<div class="modal" id="modal" onclick="this.style.display='none'"><img id="modalImg"></div>

<script>
const client = window.supabase.createClient("https://kxudiviidwwwclbzgdyx.supabase.co","sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH");
const params = new URLSearchParams(location.search);
const id = params.get("id");

function t(v,f="Ikke oppgitt"){return v && String(v).trim() ? String(v).trim() : f}
function link(v){if(!v||!String(v).trim())return "#";let x=String(v).trim();return x.startsWith("http")?x:"https://"+x}
function statusClass(s){s=(s||"").toLowerCase(); if(s.includes("solgt"))return "statusSolgt"; if(s.includes("reservert"))return "statusRes"; return "statusLedig";}
function openImg(u){modalImg.src=u; modal.style.display="flex";}

async function load(){
  const app=document.getElementById("app");
  let breeder=null;

  if(id){
    const r=await client.from("breeders").select("*").eq("id",id).single();
    if(!r.error) breeder=r.data;
  }

  if(!breeder){
    const r=await client.from("breeders").select("*").eq("status","godkjent").order("created_at",{ascending:false}).limit(1);
    if(r.error || !r.data.length){
      app.innerHTML='<div class="card"><h2>Ingen kennel funnet</h2><p>Ingen godkjente oppdrettere er publisert ennå.</p></div>';
      return;
    }
    breeder=r.data[0];
  }

  const logo=breeder.logo_url||"";
  const logoHtml=logo?'<img src="'+logo+'">':'<div class="noLogo">🐶</div>';
  const images=(breeder.image_urls||[]).filter(Boolean);
  const gallery=images.map(u=>'<img src="'+u+'" onclick="openImg(\''+u+'\')">').join("");

  const lit=await client
    .from("puppy_litters")
    .select("*")
    .eq("status","godkjent")
    .ilike("kennel_name", breeder.kennel_name || "")
    .order("created_at",{ascending:false});

  const litters=(lit.data||[]).map(x=>{
    const main=(x.image_urls||[])[0]||"";
    return '<article class="litter">'+
      '<div class="litterCover">'+(main?'<img src="'+main+'">':'🐶')+'</div>'+
      '<div class="litterContent">'+
        '<h3>'+t(x.title,x.breed)+'</h3>'+
        '<div class="tagRow"><span class="tag '+statusClass(x.litter_status)+'">'+t(x.litter_status,"Ledig")+'</span><span class="tag">🐾 '+t(x.breed)+'</span><span class="tag">💚 Ledige: '+t(x.available_count,0)+'</span></div>'+
        '<div class="infoGrid"><div class="info">📅 <b>Født</b><br>'+t(x.born_date)+'</div><div class="info">🎒 <b>Leveringsklar</b><br>'+t(x.ready_date)+'</div><div class="info">👦 <b>Hanner</b><br>'+t(x.males,0)+'</div><div class="info">👧 <b>Tisper</b><br>'+t(x.females,0)+'</div></div>'+
        '<p style="margin-top:10px;color:#334155;font-weight:700;line-height:1.5">'+t(x.about,"")+'</p>'+
        '<div class="actions"><a class="btn green" href="'+(x.email?'mailto:'+x.email:(breeder.email?'mailto:'+breeder.email:'#'))+'">📩 Kontakt</a></div>'+
      '</div></article>';
  }).join("");

  app.innerHTML =
    '<section class="hero">'+
      '<div class="logoBox">'+logoHtml+'</div>'+
      '<div>'+
        '<div class="badges"><span class="badge">✅ Godkjent oppdretter</span>'+(breeder.founder?'<span class="badge">🏅 Grunnlegger</span>':'')+'<span class="badge">🐾 '+t(breeder.breed,"Rase")+'</span></div>'+
        '<h1>'+t(breeder.kennel_name,"Kennel")+'</h1>'+
        '<p>'+t(breeder.about,"Godkjent kennelprofil på Hundenevåre.com.")+'</p>'+
        '<div class="actions"><a class="btn green" href="'+(breeder.email?'mailto:'+breeder.email:'#')+'">📩 Kontakt</a><a class="btn orange" target="_blank" href="'+link(breeder.website||breeder.facebook)+'">🌐 Nettside/Facebook</a></div>'+
      '</div>'+
    '</section>'+

    '<section class="section grid">'+
      '<div class="card"><h3>🐶 Om kennelen</h3><p>'+t(breeder.about,"Ingen beskrivelse lagt inn ennå.")+'</p></div>'+
      '<div class="card"><h3>📌 Kort info</h3><div class="infoGrid"><div class="info">🐾 <b>Rase</b><br>'+t(breeder.breed)+'</div><div class="info">📍 <b>Sted</b><br>'+t(breeder.municipality,"")+' '+t(breeder.area,"")+'</div><div class="info">❤️ <b>Valper</b><br>'+t(breeder.puppies_available)+'</div><div class="info">🩺 <b>Helse</b><br>'+t(breeder.health_tests)+'</div></div></div>'+
    '</section>'+

    '<section class="section"><h2>🐾 Aktive valpekull</h2><div class="litters">'+(litters || '<div class="card"><h3>Ingen aktive valpekull</h3><p>Denne kennelen har ingen godkjente valpekull publisert akkurat nå.</p></div>')+'</div></section>'+

    '<section class="section"><h2>📷 Galleri</h2><div class="card">'+(gallery?'<div class="gallery">'+gallery+'</div>':'<p>Ingen bilder lagt inn ennå.</p>')+'</div></section>'+

    '<section class="section"><h2>📩 Kontakt</h2><div class="card"><div class="infoGrid"><div class="info">👤 <b>Kontaktperson</b><br>'+t(breeder.owner_name)+'</div><div class="info">☎️ <b>Telefon</b><br>'+t(breeder.phone)+'</div><div class="info">📧 <b>E-post</b><br>'+t(breeder.email)+'</div><div class="info">🌐 <b>Nettside/Facebook</b><br>'+t(breeder.website||breeder.facebook)+'</div></div></div></section>';
}
load();
</script>
</body>
</html>
