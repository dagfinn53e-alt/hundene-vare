<!DOCTYPE html>
<html lang="no"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrer oppdretter 4.0</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;color:#123c73;background:radial-gradient(circle at 8% 6%,rgba(255,211,138,.55),transparent 28%),radial-gradient(circle at 92% 8%,rgba(126,200,255,.55),transparent 32%),linear-gradient(180deg,#dbeafe 0%,#eef6ff 45%,#fff7ed 100%);min-height:100vh}
.wrap{max-width:1250px;margin:auto;padding:20px 14px 70px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;background:rgba(255,255,255,.9);border-radius:28px;padding:14px 18px;box-shadow:0 12px 28px rgba(0,45,110,.14);margin-bottom:22px}
.logo{display:flex;gap:10px;align-items:center;font-size:24px;font-weight:900;color:#004cff}.logo-badge{width:48px;height:48px;border-radius:17px;background:linear-gradient(145deg,#1f8fff,#004cff);color:white;display:flex;align-items:center;justify-content:center}
.nav{display:flex;gap:9px;flex-wrap:wrap}.nav a{text-decoration:none;background:#eaf2ff;color:#004cff;border-radius:999px;padding:10px 14px;font-weight:900}
.hero{border-radius:38px;padding:38px 22px;text-align:center;color:white;background:linear-gradient(145deg,#1f8fff,#004cff 46%,#7c3aed);box-shadow:0 22px 52px rgba(0,45,110,.28);margin-bottom:22px}
.hero h1{font-size:clamp(2.2rem,6vw,4.4rem);margin-bottom:12px}.hero p{max-width:850px;margin:auto;font-size:18px;line-height:1.6;font-weight:700;color:#eef6ff}
.card{background:white;border-radius:30px;padding:22px;box-shadow:0 14px 28px rgba(0,0,0,.12);margin-top:18px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}
label{display:block;font-weight:900;margin-bottom:6px;color:#123c73}
input,select,textarea{width:100%;padding:13px 14px;border:1px solid #cfe3ff;border-radius:15px;font-size:16px;font-family:Arial,sans-serif}
textarea{min-height:120px}
button,.btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border:none;border-radius:999px;padding:14px 18px;font-size:16px;font-weight:900;cursor:pointer;color:white;background:linear-gradient(145deg,#1f8fff,#004cff)}
.green{background:linear-gradient(145deg,#22c55e,#16a34a)!important}.red{background:linear-gradient(145deg,#ef4444,#b91c1c)!important}.orange{background:linear-gradient(145deg,#f59e0b,#f97316)!important}
.notice{background:#fff7ed;border:1px solid #fed7aa;border-radius:22px;padding:16px;color:#92400e;font-weight:800;line-height:1.55;margin-top:14px}
.msg{text-align:center;margin-top:16px;font-size:19px;font-weight:900}
@media(max-width:760px){.grid{grid-template-columns:1fr}.nav a{flex:1 1 42%;text-align:center}.topbar{justify-content:center}}
</style></head>
<body><div class="wrap">
<header class="topbar"><div class="logo"><div class="logo-badge">🐾</div><span>Hundene våre</span></div><nav class="nav"><a href="oppdrettere.html">🐶 Oppdrettere</a><a href="index.html">🏠 Forside</a></nav></header>
<section class="hero"><h1>🐶 Registrer kennel</h1><p>Oppdretter sender inn profil, bilder og informasjon. Profilen vises ikke før den er godkjent i Admin.</p></section>
<form class="card" id="breederForm">
<div class="grid">
<div><label>Kennelnavn *</label><input id="kennel_name" required></div>
<div><label>Kontaktperson</label><input id="owner_name"></div>
<div><label>Rase *</label><input id="breed" required></div>
<div><label>Område</label><input id="area" placeholder="Haugalandet"></div>
<div><label>Kommune</label><input id="municipality" placeholder="Karmøy"></div>
<div><label>Fylke</label><select id="county"><option>Velg fylke</option><option>Rogaland</option><option>Vestland</option><option>Agder</option><option>Oslo</option><option>Akershus</option><option>Innlandet</option><option>Trøndelag</option><option>Nordland</option><option>Troms</option><option>Finnmark</option></select></div>
<div><label>Telefon</label><input id="phone"></div><div><label>E-post</label><input id="email" type="email"></div>
<div><label>Facebook</label><input id="facebook"></div><div><label>Nettside</label><input id="website"></div>
<div><label>Kennelnavn / registrering *</label><input id="kennel_registration" required></div>
<div><label>Pakke</label><select id="package_type"><option value="basis">Basis</option><option value="premium">Premium</option><option value="gull">Gull</option></select></div>
<div><label>Planlagt kull</label><input id="planned_litter"></div>
<div><label>Ledige valper</label><select id="puppies_available"><option>Ikke oppgitt</option><option>Ja</option><option>Nei</option><option>Valpeliste åpen</option></select></div>
<div class="full"><label>Helse / tester</label><input id="health_tests"></div>
<div class="full"><label>Om oppdretteren</label><textarea id="about"></textarea></div>
<div class="full"><label>Notat for kontroll</label><textarea id="registration_notes"></textarea></div>
<div><label>Logo</label><input id="logo_file" type="file" accept="image/*"></div>
<div><label>Forsidebilde</label><input id="cover_file" type="file" accept="image/*"></div>
<div class="full"><label>Galleri bilder</label><input id="gallery_files" type="file" accept="image/*" multiple></div>
<div class="full notice">Profilen får status “venter”. Du godkjenner den i Admin før den blir synlig.</div>
<div class="full"><button type="submit">📩 Send inn til godkjenning</button></div>
</div><div id="msg" class="msg"></div></form></div>
<script>

const SUPABASE_URL = "https://kxudiviidwwwclbzgdyx.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const BUCKET = "breeder-images";

async function uploadFile(file, folder) {
  if(!file) return "";
  const ext = file.name.split(".").pop();
  const path = folder + "/" + Date.now() + "-" + Math.random().toString(36).slice(2) + "." + ext;
  const { error } = await supabase.storage.from(BUCKET).upload(path, file);
  if(error) throw error;
  const { data } = supabase.storage.from(BUCKET).getPublicUrl(path);
  return data.publicUrl;
}
document.getElementById("breederForm").addEventListener("submit", async e => {
  e.preventDefault();
  msg.style.color="#004cff"; msg.textContent="Laster opp bilder og sender inn...";
  try {
    const logoUrl = await uploadFile(logo_file.files[0], "logos");
    const coverUrl = await uploadFile(cover_file.files[0], "covers");
    const gallery = [];
    for(const file of gallery_files.files) gallery.push(await uploadFile(file, "gallery"));
    const row = {
      status:"venter", verified:false,
      kennel_name:kennel_name.value.trim(), owner_name:owner_name.value.trim(), breed:breed.value.trim(),
      area:area.value.trim(), municipality:municipality.value.trim(), county:county.value,
      phone:phone.value.trim(), email:email.value.trim(), facebook:facebook.value.trim(), website:website.value.trim(),
      kennel_registration:kennel_registration.value.trim(), registration_notes:registration_notes.value.trim(),
      about:about.value.trim(), planned_litter:planned_litter.value.trim(), puppies_available:puppies_available.value,
      health_tests:health_tests.value.trim(), logo_url:logoUrl, cover_url:coverUrl, image_urls:gallery, package_type:package_type.value
    };
    const { error } = await supabase.from("breeders").insert([row]);
    if(error) throw error;
    msg.style.color="green"; msg.textContent="✅ Takk! Profilen er sendt inn og venter på godkjenning.";
    e.target.reset();
  } catch(err) {
    msg.style.color="crimson"; msg.textContent="Feil: " + err.message;
  }
});
</script></body></html>
