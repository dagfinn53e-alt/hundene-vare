<!doctype html><html lang="no"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Registrer oppdretter</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:linear-gradient(180deg,#dbeafe,#fff7ed);color:#123c73}.wrap{max-width:1150px;margin:auto;padding:16px 10px 55px}.top{background:white;border-radius:24px;padding:14px;box-shadow:0 10px 22px #0002;margin-bottom:14px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.logo{font-size:23px;font-weight:900;color:#004cff}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav a,.btn{background:#eaf2ff;color:#004cff;text-decoration:none;border-radius:999px;padding:10px 13px;font-weight:900}.hero{background:linear-gradient(135deg,#1f8fff,#004cff,#7c3aed);color:white;border-radius:30px;padding:28px 15px;text-align:center;box-shadow:0 18px 40px #0003;margin-bottom:16px}.hero h1{font-size:clamp(2rem,7vw,4rem);margin-bottom:8px}.hero p{font-size:17px;line-height:1.5;font-weight:700}.card{background:white;border-radius:25px;padding:17px;box-shadow:0 12px 25px #0002;margin-bottom:15px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}label{font-weight:900;display:block;margin-bottom:5px}input,select,textarea{width:100%;padding:12px;border:1px solid #cfe3ff;border-radius:14px;font-size:16px}textarea{min-height:105px}button{border:none;border-radius:999px;padding:13px 18px;background:#2563eb;color:white;font-weight:900;cursor:pointer;font-size:16px}.green{background:#16a34a}.red{background:#dc2626}.orange{background:#f59e0b}.msg{font-weight:900;text-align:center;margin-top:12px;font-size:18px;white-space:pre-wrap}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:18px}.bcard{background:white;border-radius:25px;overflow:hidden;box-shadow:0 12px 25px #0002}.photo{height:190px;background:#2563eb;display:flex;align-items:center;justify-content:center;font-size:70px;color:white;background-size:cover;background-position:center}.content{padding:16px}.content h2{color:#001d4a;margin-bottom:8px}.tag{display:inline-block;background:#eaf2ff;color:#004cff;border-radius:999px;padding:6px 9px;font-weight:900;font-size:12px;margin:3px}.verify{display:inline-block;background:#dcfce7;color:#166534;border-radius:999px;padding:7px 10px;font-weight:900;font-size:13px;margin:5px 0}.info{background:#f8fbff;border-radius:16px;padding:11px;line-height:1.55;font-weight:700;margin:10px 0}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.thumb{width:120px;height:80px;object-fit:cover;border-radius:12px;margin:6px}@media(max-width:850px){.grid,.cards{grid-template-columns:1fr}.top{justify-content:center}.nav{justify-content:center}.nav a{flex:1 1 42%;text-align:center;font-size:12px}}</style></head><body><div class="wrap"><div class="top"><div class="logo">🐾 Hundene våre</div><div class="nav"><a href="index.html">Forside</a><a href="oppdrettere.html">Oppdrettere</a></div></div><div class="hero"><h1>🐶 Registrer kennel</h1><p>Send inn oppdretterprofil med logo og bilder. Profilen blir ikke synlig før den er godkjent.</p></div><form class="card" id="form"><div class="grid"><div><label>Kennelnavn *</label><input id="kennel_name" required></div><div><label>Kontaktperson</label><input id="owner_name"></div><div><label>Rase *</label><input id="breed" required></div><div><label>Fylke/område</label><input id="area"></div><div><label>Kommune</label><input id="municipality"></div><div><label>Pakke</label><select id="package_type"><option>Gratis grunnleggerkampanje – 0 kr første år</option><option>Grunnleggerkampanje</option><option>Basis</option><option>Pluss</option><option>Premium</option></select></div><div><label>Telefon</label><input id="phone"></div><div><label>E-post</label><input id="email" type="email"></div><div><label>Facebook</label><input id="facebook"></div><div><label>Nettside</label><input id="website"></div><div><label>Kennelnavn / registrering</label><input id="kennel_registration"></div><div><label>Planlagt kull</label><input id="planned_litter"></div><div><label>Ledige valper</label><select id="puppies_available"><option>Ikke oppgitt</option><option>Ja</option><option>Nei</option><option>Valpeliste åpen</option></select></div><div><label>Helse / tester</label><input id="health_tests"></div><div class="full"><label>Om oppdretteren</label><textarea id="about"></textarea></div><div><label>Logo</label><input id="logo_file" type="file" accept="image/*"></div><div><label>Bilder av rase/kennel/valper</label><input id="image_files" type="file" accept="image/*" multiple></div><div class="full"><button>📨 Send inn til godkjenning</button></div></div><div id="msg" class="msg"></div></form></div><script>
const client=window.supabase.createClient("https://kxudiviidwwwclbzgdyx.supabase.co","sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH");const BUCKET="breeder-images";
async function upload(file,folder){if(!file)return "";const ext=file.name.split(".").pop();const path=folder+"/"+Date.now()+"-"+Math.random().toString(36).slice(2)+"."+ext;const r=await client.storage.from(BUCKET).upload(path,file);if(r.error)throw r.error;return client.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;}
document.getElementById("form").addEventListener("submit",async e=>{e.preventDefault();msg.style.color="#004cff";msg.textContent="Sender inn og laster opp bilder...";try{const logo=await upload(logo_file.files[0],"logo");const imgs=[];for(const f of image_files.files)imgs.push(await upload(f,"bilder"));const row={status:"venter",verified:false,founder:false,kennel_name:kennel_name.value,owner_name:owner_name.value,breed:breed.value,area:area.value,municipality:municipality.value,phone:phone.value,email:email.value,facebook:facebook.value,website:website.value,kennel_registration:kennel_registration.value,planned_litter:planned_litter.value,puppies_available:puppies_available.value,health_tests:health_tests.value,about:about.value,package_type:package_type.value,logo_url:logo,image_urls:imgs};const r=await client.from("breeders").insert([row]);if(r.error)throw r.error;msg.style.color="green";msg.textContent="✅ Takk! Registreringen er sendt inn og venter på godkjenning.";e.target.reset();}catch(err){msg.style.color="crimson";msg.textContent="Feil: "+err.message;}});
</script></body></html>
