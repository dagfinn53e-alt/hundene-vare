<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 Hvilket land kommer hunden fra?</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(to bottom,#dbeafe,#eef6ff);
  text-align:center;
  color:#123c73;
}

.container{
  max-width:900px;
  margin:20px auto;
  padding:20px;
}

h1{
  margin-bottom:10px;
}

.stats{
  display:flex;
  justify-content:space-between;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.stat{
  flex:1;
  min-width:150px;
  background:white;
  padding:15px;
  border-radius:18px;
  font-weight:bold;
  box-shadow:0 6px 14px rgba(0,0,0,.12);
}

.quiz-box{
  background:white;
  border-radius:28px;
  padding:25px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}

#dogImage{
  width:100%;
  max-height:450px;
  object-fit:cover;
  border-radius:22px;
  margin-bottom:20px;
}

#breed{
  font-size:40px;
  margin-bottom:10px;
}

.question{
  font-size:24px;
  margin-bottom:25px;
}

.answers{
  display:grid;
  gap:18px;
}

.answer-btn{
  border:none;
  border-radius:20px;
  padding:22px;
  font-size:28px;
  font-weight:bold;
  cursor:pointer;
  background:#eff6ff;
  color:#123c73;
  transition:.2s;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.answer-btn:hover{
  transform:scale(1.02);
  background:#dbeafe;
}

.correct{
  background:#10b981 !important;
  color:white;
}

.wrong{
  background:#ef4444 !important;
  color:white;
}

#nextBtn{
  margin-top:25px;
  padding:18px 40px;
  border:none;
  border-radius:20px;
  background:#2563eb;
  color:white;
  font-size:24px;
  font-weight:bold;
  cursor:pointer;
  display:none;
}

#nextBtn:hover{
  background:#1d4ed8;
}

.back{
  margin-top:30px;
}

.back button{
  padding:18px 35px;
  border:none;
  border-radius:18px;
  background:#123c73;
  color:white;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>🌍 Hvilket land kommer disse hundene fra?</h1>

<div class="stats">

<div class="stat">
🏆 Poeng:
<span id="score">0</span>
</div>

<div class="stat">
❤️ Liv:
<span id="lives">3</span>
</div>

<div class="stat">
❓ Spørsmål:
<span id="questionNumber">1</span>
</div>

</div>

<div class="quiz-box">

<img id="dogImage" src="bilder/kinesisk-nakenhund.png">

<div id="breed">
Kinesisk Nakenhund
</div>

<div class="question">
Hvor kommer denne hunderasen fra?
</div>

<div class="answers" id="answers"></div>

<button id="nextBtn" onclick="nextQuestion()">
Neste ➜
</button>

</div>

<div class="back">

<button onclick="location.href='hundespill.html'">

⬅️ Tilbake til spill

</button>

</div>

</div>

<script>

const questions=[

{
breed:"Kinesisk Nakenhund",
image:"bilder/kinesisk-nakenhund.png",
answers:["Kina","Japan","Mexico"],
correct:"Kina"
},

{
breed:"Chihuahua",
image:"bilder/chihuahua.png",
answers:["Mexico","Spania","Italia"],
correct:"Mexico"
},

{
breed:"Dachs",
image:"bilder/dachs.png",
answers:["Tyskland","Sveits","Frankrike"],
correct:"Tyskland"
},

{
breed:"Briard",
image:"bilder/briard.png",
answers:["Frankrike","Belgia","Italia"],
correct:"Frankrike"
},

{
breed:"Norsk Lundehund",
image:"bilder/lundehund.png",
answers:["Norge","Sverige","Finland"],
correct:"Norge"
},

{
breed:"Shar Pei",
image:"bilder/sharpei.png",
answers:["Kina","Japan","Thailand"],
correct:"Kina"
},

{
breed:"Schæfer",
image:"bilder/schafer.png",
answers:["Tyskland","Nederland","Belgia"],
correct:"Tyskland"
},

{
breed:"Engelsk Cocker Spaniel",
image:"bilder/cocker.png",
answers:["England","USA","Australia"],
correct:"England"
}

];

let currentQuestion=0;

let score=0;

let lives=3;

function loadQuestion(){

const q=questions[currentQuestion];

document.getElementById(
"dogImage"
).src=q.image;

document.getElementById(
"breed"
).innerHTML=q.breed;

document.getElementById(
"questionNumber"
).innerHTML=
(currentQuestion+1)
+"/"+questions.length;

const answers=
document.getElementById(
"answers"
);

answers.innerHTML="";

q.answers.forEach(answer=>{

const btn=
document.createElement("button");

btn.classList.add(
"answer-btn"
);

btn.innerHTML=answer;

btn.onclick=()=>checkAnswer(
btn,
answer
);

answers.appendChild(btn);

});

document.getElementById(
"nextBtn"
).style.display="none";

}

function checkAnswer(button,answer){

const q=
questions[currentQuestion];

const buttons=
document.querySelectorAll(
".answer-btn"
);

buttons.forEach(btn=>{

btn.disabled=true;

if(btn.innerHTML===q.correct){

btn.classList.add(
"correct"
);

}

});

if(answer===q.correct){

score+=10;

button.classList.add(
"correct"
);

}else{

lives--;

button.classList.add(
"wrong"
);

}

document.getElementById(
"score"
).innerHTML=score;

document.getElementById(
"lives"
).innerHTML=lives;

if(lives<=0){

setTimeout(()=>{

alert(
"😅 Game Over!"
);

location.reload();

},500);

return;

}

document.getElementById(
"nextBtn"
).style.display="inline-block";

}

function nextQuestion(){

currentQuestion++;

if(currentQuestion>=questions.length){

alert(
"🏆 Gratulerer! Du klarte quiz-spillet!"
);

location.reload();

return;

}

loadQuestion();

}

loadQuestion();

</script>

</body>
</html>
