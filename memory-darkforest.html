<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌲 Den mørke skogen</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#052e16,#14532d);
color:white;
text-align:center;
overflow-x:hidden;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{
font-size:44px;
text-shadow:2px 2px 6px black;
}

.fog{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle,rgba(255,255,255,.12),transparent 60%);
pointer-events:none;
animation:fogMove 8s infinite alternate;
}

@keyframes fogMove{
from{opacity:.2}
to{opacity:.55}
}

.stats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.stat{
background:rgba(255,255,255,.15);
padding:14px 20px;
border-radius:18px;
font-size:20px;
font-weight:bold;
box-shadow:0 4px 12px rgba(0,0,0,.3);
}

#message{
font-size:26px;
font-weight:bold;
color:#bbf7d0;
margin:20px;
min-height:40px;
}

#gameBoard{
display:grid;
grid-template-columns:repeat(4,110px);
gap:15px;
justify-content:center;
margin-top:20px;
}

.card{
width:110px;
height:110px;
perspective:1000px;
cursor:pointer;
}

.inner{
position:relative;
width:100%;
height:100%;
transition:transform .6s;
transform-style:preserve-3d;
}

.card.flipped .inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:54px;
box-shadow:0 0 18px rgba(34,197,94,.45);
}

.front{
background:linear-gradient(135deg,#064e3b,#166534);
color:white;
}

.back{
background:#ecfdf5;
color:#14532d;
transform:rotateY(180deg);
}

.correct .back{
box-shadow:0 0 30px #22c55e;
}

.wrong{
animation:shake .25s 2;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

#winBox{
display:none;
background:rgba(255,255,255,.15);
padding:30px;
border-radius:25px;
max-width:500px;
margin:30px auto;
box-shadow:0 8px 20px rgba(0,0,0,.35);
}

button{
margin-top:20px;
padding:16px 28px;
border:none;
border-radius:18px;
background:#22c55e;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.backBtn{
background:#123c73;
}

</style>
</head>

<body>

<div class="fog"></div>

<div class="container">

<h1>🌲 Den mørke skogen</h1>

<div class="stats">
<div class="stat">⭐ Poeng: <span id="score">0</span></div>
<div class="stat">🔥 Combo: <span id="combo">0</span></div>
<div class="stat">⏱️ Tid: <span id="time">0</span></div>
</div>

<div id="message">
🌙 Se nøye! Kortene skjules snart...
</div>

<div id="gameBoard"></div>

<div id="winBox">
<h2>🏆 Du klarte Den mørke skogen!</h2>
<div style="font-size:48px;">⭐⭐⭐</div>
<p id="finalScore"></p>
<button onclick="startGame()">🔄 Spill igjen</button>
</div>

<button class="backBtn" onclick="location.href='memorymap.html'">
⬅️ Tilbake til kart
</button>

</div>

<script>
const symbols=["🌲","🌳","🍄","🦊","🐿️","🦉","🦔","🍁"];

let cards=[];
let flipped=[];
let matched=0;
let score=0;
let combo=0;
let timer=0;
let interval;
let lock=false;

function startGame(){
clearInterval(interval);

cards=[...symbols,...symbols];
cards.sort(()=>Math.random()-0.5);

flipped=[];
matched=0;
score=0;
combo=0;
timer=0;
lock=true;

document.getElementById("score").innerHTML=0;
document.getElementById("combo").innerHTML=0;
document.getElementById("time").innerHTML=0;
document.getElementById("winBox").style.display="none";
document.getElementById("message").innerHTML="🌙 Se nøye! Kortene skjules snart...";

const board=document.getElementById("gameBoard");
board.innerHTML="";

cards.forEach(symbol=>{
const card=document.createElement("div");
card.className="card flipped";
card.dataset.symbol=symbol;

card.innerHTML=`
<div class="inner">
<div class="front">🌙</div>
<div class="back">${symbol}</div>
</div>
`;

card.onclick=()=>flipCard(card);
board.appendChild(card);
});

setTimeout(()=>{
document.querySelectorAll(".card").forEach(card=>{
card.classList.remove("flipped");
});
lock=false;
document.getElementById("message").innerHTML="🌲 Finn like skogskort!";
},2500);

interval=setInterval(()=>{
timer++;
document.getElementById("time").innerHTML=timer;
},1000);
}

function flipCard(card){
if(lock)return;
if(flipped.length>=2)return;
if(card.classList.contains("flipped"))return;
if(card.classList.contains("correct"))return;

card.classList.add("flipped");
flipped.push(card);

if(flipped.length===2){
checkMatch();
}
}

function checkMatch(){
lock=true;

const a=flipped[0];
const b=flipped[1];

if(a.dataset.symbol===b.dataset.symbol){
a.classList.add("correct");
b.classList.add("correct");

matched+=2;
combo++;
score+=10+(combo*3);

document.getElementById("message").innerHTML="✨ Riktig par i skogen!";
flipped=[];
lock=false;
updateStats();

if(matched===cards.length){
winGame();
}

}else{
combo=0;
score=Math.max(0,score-2);

a.classList.add("wrong");
b.classList.add("wrong");

document.getElementById("message").innerHTML="🌫️ Feil par! Prøv igjen.";

setTimeout(()=>{
a.classList.remove("flipped","wrong");
b.classList.remove("flipped","wrong");
flipped=[];
lock=false;
updateStats();
},900);
}
}

function updateStats(){
document.getElementById("score").innerHTML=score;
document.getElementById("combo").innerHTML=combo;
}

function winGame(){
clearInterval(interval);
document.getElementById("winBox").style.display="block";
document.getElementById("finalScore").innerHTML=
"⭐ Poeng: "+score+"<br>⏱️ Tid: "+timer+"s";
document.getElementById("message").innerHTML="🏆 Skogen er fullført!";
}

startGame();
</script>

</body>
</html>
