<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌲 Den mørke skogen + LYD</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:
linear-gradient(to bottom,#0f172a,#020617);
color:white;
text-align:center;
overflow-x:hidden;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{
font-size:48px;
margin-top:10px;
text-shadow:0 0 15px #22c55e;
}

.stats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.stat{
background:rgba(255,255,255,.08);
padding:14px 20px;
border-radius:18px;
font-size:20px;
font-weight:bold;
box-shadow:0 4px 12px rgba(0,0,0,.35);
}

#message{
font-size:28px;
font-weight:bold;
color:#86efac;
margin:20px;
min-height:40px;
}

#gameBoard{
display:grid;
gap:15px;
justify-content:center;
margin-top:20px;
}

.card{
width:105px;
height:105px;
perspective:1000px;
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:scale(1.05);
}

.inner{
position:relative;
width:100%;
height:100%;
transition:transform .6s;
transform-style:preserve-3d;
}

.card.flipped .inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:22px;
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
box-shadow:0 0 18px rgba(34,197,94,.25);
}

.front{
background:
linear-gradient(
135deg,
#14532d,
#166534
);
}

.back{
background:#dcfce7;
color:#052e16;
transform:rotateY(180deg);
}

.correct .back{
box-shadow:
0 0 35px #22c55e;
animation:forestGlow .8s infinite alternate;
}

@keyframes forestGlow{
from{
transform:rotateY(180deg) scale(1);
}
to{
transform:rotateY(180deg) scale(1.08);
}
}

.wrong{
animation:shake .25s 2;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

.forest{
position:fixed;
font-size:32px;
opacity:.14;
animation:forestFloat 14s linear infinite;
pointer-events:none;
}

@keyframes forestFloat{
from{
transform:translateY(110vh);
}
to{
transform:translateY(-120vh);
}
}

#winBox{
display:none;
background:rgba(255,255,255,.08);
padding:30px;
border-radius:25px;
max-width:500px;
margin:30px auto;
box-shadow:0 8px 20px rgba(0,0,0,.45);
}

#winBox h2{
font-size:42px;
color:#86efac;
}

button{
margin-top:20px;
padding:16px 28px;
border:none;
border-radius:18px;
background:#166534;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.backBtn{
background:#020617;
border:2px solid #22c55e;
}
@media(max-width:700px){

h1{
font-size:30px;
}

.stats{
gap:8px;
}

.stat{
font-size:15px;
padding:10px 12px;
}

#message{
font-size:20px;
margin:15px;
}

#gameBoard{
gap:10px !important;
}

.card{
width:85px !important;
height:85px !important;
}

.front,
.back{
font-size:34px !important;
}

button{
font-size:16px;
padding:12px 18px;
}

#winBox{
width:90%;
padding:20px;
}

}
</style>
</head>

<body>

<div class="forest" style="left:10%;">🌲</div>
<div class="forest" style="left:35%;animation-delay:3s;">👻</div>
<div class="forest" style="left:60%;animation-delay:5s;">🍄</div>
<div class="forest" style="left:85%;animation-delay:8s;">🦉</div>

<div class="container">

<h1>🌲 Den mørke skogen + LYD</h1>

<div class="stats">

<div class="stat">
🗺️ Nivå:
<span id="level">1</span>
</div>

<div class="stat">
⭐ Poeng:
<span id="score">0</span>
</div>

<div class="stat">
🔥 Combo:
<span id="combo">0</span>
</div>

<div class="stat">
⏱️ Tid:
<span id="time">0</span>
</div>

</div>

<div id="message">

🌲 Finn skogskortene...

</div>

<div id="gameBoard"></div>

<div id="winBox">

<h2>🏆 Skogen fullført!</h2>

<div style="font-size:52px;">
🌲👻🌲
</div>

<p id="finalScore"></p>

<button onclick="nextLevel()">

➡️ Neste nivå

</button>

</div>

<button class="backBtn"
onclick="location.href='memorymap.html'">

⬅️ Tilbake til kart

</button>

</div>

<script>

/* LYDER */

const flipSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"
);

const correctSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"
);

const wrongSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"
);

const winSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"
);

/* SYMBOLER */

const allSymbols=[
"🌲","👻","🍄","🦉","🌙",
"🕷️","🦇","🪵","✨","🐺"
];

let level=1;
let cards=[];
let flipped=[];
let matched=0;
let score=0;
let combo=0;
let timer=0;
let interval;
let lock=false;

function startLevel(){

clearInterval(interval);

let pairs=4+(level-1)*2;

if(pairs>10){
pairs=10;
}

let selected=
allSymbols.slice(0,pairs);

cards=[...selected,...selected];

cards.sort(()=>Math.random()-0.5);

flipped=[];
matched=0;
combo=0;
timer=0;
lock=false;

updateStats();

document.getElementById(
"winBox"
).style.display="none";

document.getElementById(
"message"
).innerHTML=
"🌲 Finn skogskortene...";

const board=
document.getElementById(
"gameBoard"
);

board.innerHTML="";

let columns=4;

if(cards.length>=20){
columns=5;
}

board.style.gridTemplateColumns=
`repeat(${columns},105px)`;

cards.forEach(symbol=>{

const card=
document.createElement("div");

card.className="card";

card.dataset.symbol=symbol;

card.innerHTML=`

<div class="inner">

<div class="front">
🌲
</div>

<div class="back">
${symbol}
</div>

</div>

`;

card.onclick=
()=>flipCard(card);

board.appendChild(card);

});

interval=setInterval(()=>{

timer++;

document.getElementById(
"time"
).innerHTML=timer;

},1000);

}

function flipCard(card){

if(lock)return;

if(flipped.length>=2)return;

if(card.classList.contains("flipped"))return;

if(card.classList.contains("correct"))return;

card.classList.add("flipped");

flipSound.currentTime=0;
flipSound.play();

flipped.push(card);

if(flipped.length===2){

checkMatch();

}

}

function checkMatch(){

lock=true;

const a=flipped[0];
const b=flipped[1];

if(a.dataset.symbol===b.dataset.symbol){

a.classList.add("correct");
b.classList.add("correct");

matched+=2;

combo++;

score+=12+(combo*4);

correctSound.currentTime=0;
correctSound.play();

document.getElementById(
"message"
).innerHTML=
"✨ Skogspar funnet!";

flipped=[];

lock=false;

updateStats();

if(matched===cards.length){

winLevel();

}

}else{

combo=0;

score=Math.max(0,score-3);

wrongSound.currentTime=0;
wrongSound.play();

a.classList.add("wrong");
b.classList.add("wrong");

document.getElementById(
"message"
).innerHTML=
"👻 Feil skogskort";

updateStats();

setTimeout(()=>{

a.classList.remove(
"flipped",
"wrong"
);

b.classList.remove(
"flipped",
"wrong"
);

flipped=[];

lock=false;

},850);

}

}

function updateStats(){

document.getElementById("level").innerHTML=level;
document.getElementById("score").innerHTML=score;
document.getElementById("combo").innerHTML=combo;
document.getElementById("time").innerHTML=timer;

}

function winLevel(){

clearInterval(interval);

winSound.currentTime=0;
winSound.play();

document.getElementById(
"winBox"
).style.display="block";

document.getElementById(
"finalScore"
).innerHTML=
`⭐ Poeng: ${score}<br>
⏱️ Tid: ${timer}s`;

document.getElementById(
"message"
).innerHTML=
"🏆 Skog nivå "+level+" fullført!";

}

function nextLevel(){

level++;

if(level>5){

alert(
"🌲 Du fullførte hele Den mørke skogen!"
);

level=1;
score=0;

}

startLevel();

}

startLevel();

</script>

</body>
</html>
