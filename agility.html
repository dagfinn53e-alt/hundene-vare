<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐕 Live Agility Simulator</title>

<style>

body{
  margin:0;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:#87ceeb;
}

#game{
  position:relative;
  width:100vw;
  height:100vh;
  background:linear-gradient(
  to bottom,
  #87ceeb 0%,
  #87ceeb 70%,
  #4ade80 70%,
  #22c55e 100%
  );
  overflow:hidden;
}

#dog{
  position:absolute;
  width:70px;
  height:70px;
  left:120px;
  top:400px;
  font-size:55px;
  transition:0.05s linear;
  z-index:5;
}

.obstacle{
  position:absolute;
  width:80px;
  height:80px;
  font-size:60px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#hud{
  position:absolute;
  top:15px;
  left:15px;
  background:rgba(255,255,255,0.9);
  padding:15px;
  border-radius:18px;
  font-weight:bold;
  z-index:10;
}

#info{
  margin-top:10px;
}

</style>
</head>

<body>

<div id="game">

<div id="hud">

🏆 Poeng:
<span id="score">0</span>

<br><br>

❤️ Liv:
<span id="lives">3</span>

<div id="info">
⬅️➡️⬆️⬇️ Bruk piltastene
</div>

</div>

<div id="dog">🐕</div>

</div>

<script>

const dog =
document.getElementById("dog");

const game =
document.getElementById("game");

let x = 120;
let y = 400;

let speed = 12;

let score = 0;

let lives = 3;

let obstacles = [];

const obstacleTypes = [

"🌀",
"⬆️",
"↔️",
"🚧"

];

document.addEventListener(
"keydown",
moveDog
);

function moveDog(e){

if(e.key==="ArrowUp"){

y -= speed;

}

if(e.key==="ArrowDown"){

y += speed;

}

if(e.key==="ArrowLeft"){

x -= speed;

}

if(e.key==="ArrowRight"){

x += speed;

}

if(x < 0) x = 0;

if(y < 80) y = 80;

if(x > window.innerWidth-80)
x = window.innerWidth-80;

if(y > window.innerHeight-90)
y = window.innerHeight-90;

dog.style.left = x + "px";

dog.style.top = y + "px";

checkCollision();

}

function createObstacle(){

const obstacle =
document.createElement("div");

obstacle.className =
"obstacle";

const type =
obstacleTypes[
Math.floor(
Math.random()*
obstacleTypes.length
)
];

obstacle.innerHTML = type;

const posY =
Math.random() *
(window.innerHeight-150)
+100;

obstacle.style.left =
window.innerWidth + "px";

obstacle.style.top =
posY + "px";

game.appendChild(obstacle);

obstacles.push(obstacle);

moveObstacle(obstacle);

}

function moveObstacle(obstacle){

let posX =
window.innerWidth;

const interval =
setInterval(()=>{

posX -= 6;

obstacle.style.left =
posX + "px";

if(posX < -100){

clearInterval(interval);

obstacle.remove();

score++;

document.getElementById(
"score"
).innerHTML = score;

}

checkHit(obstacle);

},30);

}

function checkHit(obstacle){

const dogRect =
dog.getBoundingClientRect();

const obsRect =
obstacle.getBoundingClientRect();

if(

dogRect.left <
obsRect.right &&

dogRect.right >
obsRect.left &&

dogRect.top <
obsRect.bottom &&

dogRect.bottom >
obsRect.top

){

obstacle.remove();

lives--;

document.getElementById(
"lives"
).innerHTML =
lives;

if(lives <= 0){

gameOver();

}

}

}

function checkCollision(){

obstacles.forEach(obs=>{

checkHit(obs);

});

}

function gameOver(){

alert(
"😅 Game Over! Poeng: "
+ score
);

location.reload();

}

setInterval(createObstacle,1800);

</script>

</body>
</html>
