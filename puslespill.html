<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧩 Hundepuslespill</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eef6ff;
  color:#123c73;
  text-align:center;
}

.container{
  max-width:1100px;
  margin:20px auto;
  background:white;
  padding:25px;
  border-radius:25px;
  box-shadow:0 10px 25px rgba(0,0,0,.12);
}

select,button{
  padding:14px;
  margin:10px;
  border:none;
  border-radius:14px;
  font-size:18px;
  font-weight:bold;
}

button{
  background:#2563eb;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

#puzzle{
  display:grid;
  gap:2px;
  justify-content:center;
  margin-top:25px;
}

.tile{
  width:80px;
  height:80px;
  border:1px solid #ccc;
  cursor:pointer;
  border-radius:6px;
  background-repeat:no-repeat;
}

#info{
  margin-top:20px;
  font-size:22px;
  font-weight:bold;
}

.back{
  display:inline-block;
  margin-top:25px;
  color:#2563eb;
  text-decoration:none;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🧩 Hundepuslespill</h1>

<select id="dogSelect">

<option value="bichon.png">
Bichon Frise
</option>

<option value="collie.png">
Collie
</option>

<option value="puddel.png">
Puddel
</option>

<option value="lhasa-apso.png">
Lhasa Apso
</option>

<option value="st-bernard.png">
St. Bernard
</option>

<option value="boston-terrier.png">
Boston Terrier
</option>

<option value="mops.png">
Mops
</option>

</select>

<select id="difficulty">

<option value="5">
25 brikker
</option>

<option value="7">
50 brikker
</option>

<option value="9">
75 brikker
</option>

</select>

<button onclick="startGame()">
🚀 Start puslespill
</button>

<div id="info">
Trekk: 0
</div>

<div id="puzzle"></div>

<a class="back" href="hundespill.html">
← Tilbake til spill
</a>

</div>

<script>

let size = 5;

let image = "";

let board = [];

let firstTile = null;

let moves = 0;

function startGame(){

  size =
  parseInt(
    document.getElementById(
      "difficulty"
    ).value
  );

  image =
  "bilder/" +
  document.getElementById(
    "dogSelect"
  ).value;

  moves = 0;

  document.getElementById(
    "info"
  ).innerHTML =
  "Trekk: 0";

  createBoard();

}

function createBoard(){

  const puzzle =
  document.getElementById(
    "puzzle"
  );

  puzzle.innerHTML = "";

  puzzle.style.gridTemplateColumns =
  `repeat(${size}, 80px)`;

  board = [];

  for(
    let i=0;
    i<size*size;
    i++
  ){

    board.push(i);

  }

  shuffle(board);

  board.forEach((piece,index)=>{

    const tile =
    document.createElement("div");

    tile.className = "tile";

    tile.dataset.correct = piece;

    tile.dataset.current = piece;

    tile.dataset.index = index;

    const row =
    Math.floor(piece / size);

    const col =
    piece % size;

    tile.style.backgroundImage =
    `url('${image}')`;

    tile.style.backgroundSize =
    `${size*100}% ${size*100}%`;

    tile.style.backgroundPosition =
    `${(col/(size-1))*100}% ${(row/(size-1))*100}%`;

    tile.onclick =
    ()=>selectTile(tile);

    puzzle.appendChild(tile);

  });

}

function selectTile(tile){

  if(!firstTile){

    firstTile = tile;

    tile.style.border =
    "4px solid #10b981";

    return;

  }

  swapTiles(firstTile,tile);

  firstTile.style.border =
  "1px solid #ccc";

  firstTile = null;

  moves++;

  document.getElementById(
    "info"
  ).innerHTML =
  "Trekk: " + moves;

  checkWin();

}

function swapTiles(a,b){

  const bgA =
  a.style.backgroundPosition;

  const correctA =
  a.dataset.correct;

  a.style.backgroundPosition =
  b.style.backgroundPosition;

  a.dataset.correct =
  b.dataset.correct;

  b.style.backgroundPosition =
  bgA;

  b.dataset.correct =
  correctA;

}

function checkWin(){

  const tiles =
  document.querySelectorAll(".tile");

  let correct = true;

  tiles.forEach((tile,index)=>{

    if(
      parseInt(tile.dataset.correct)
      !== index
    ){

      correct = false;

    }

  });

  if(correct){

    setTimeout(()=>{

      alert(
      "🏆 Gratulerer! Du klarte puslespillet på " +
      moves +
      " trekk!"
      );

    },300);

  }

}

function shuffle(array){

  for(
    let i=array.length-1;
    i>0;
    i--
  ){

    const j =
    Math.floor(
      Math.random()*(i+1)
    );

    [array[i],array[j]] =
    [array[j],array[i]];

  }

}

</script>

</body>
</html>
