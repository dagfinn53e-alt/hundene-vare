<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 Kattepuslespill PRO</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#fce7f3,#fdf2f8);
text-align:center;
color:#7a284f;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

h1{
margin-bottom:20px;
}

.topbar{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:20px;
}

select,button{
padding:14px 20px;
border:none;
border-radius:16px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button{
background:#db2777;
color:white;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
}

.stat{
background:white;
padding:14px 20px;
border-radius:18px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

#board{
width:90vw;
max-width:600px;
height:90vw;
max-height:600px;
margin:auto;
display:grid;
gap:2px;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.piece{
background-size:100% 100%;
cursor:pointer;
border:1px solid white;
}

.selected{
outline:5px solid #10b981;
z-index:10;
}

.back button{
margin-top:30px;
background:#7a284f;
}

</style>
</head>

<body>

<div class="container">

<h1>🐱 Kattepuslespill PRO</h1>

<div class="topbar">

<select id="catSelect">

<option value="maine-coon.jpg">Maine Coon</option>
<option value="siameser.jpg">Siameser</option>
<option value="perser.jpg">Perser</option>
<option value="bengal.jpg">Bengal</option>
<option value="abyssiner.jpg">Abyssiner</option>
<option value="birma.jpg">Birma</option>

</select>

<select id="sizeSelect">

<option value="3">9 Brikker</option>
<option value="4">16 Brikker</option>

</select>

<button onclick="startGame()">
🧩 Start Spill
</button>

</div>

<div class="stats">

<div class="stat">
🏆 Trekk:
<span id="moves">0</span>
</div>

<div class="stat">
⏱️ Tid:
<span id="time">0</span>s
</div>

</div>

<div id="board"></div>

<div class="back">

<button onclick="location.href='hundespill.html'">
⬅️ Tilbake til spill
</button>

</div>

</div>

<script>

let size=3;
let pieces=[];
let selected=null;
let moves=0;
let timer=0;
let interval;
let imageFile="maine-coon.jpg";

function startGame(){

size=parseInt(
document.getElementById(
"sizeSelect"
).value
);

imageFile=
document.getElementById(
"catSelect"
).value;

moves=0;
timer=0;

document.getElementById(
"moves"
).innerHTML=0;

document.getElementById(
"time"
).innerHTML=0;

clearInterval(interval);

interval=setInterval(()=>{

timer++;

document.getElementById(
"time"
).innerHTML=timer;

},1000);

createPuzzle();

drawBoard();

}

function createPuzzle(){

pieces=[];

for(let i=0;i<size*size;i++){

pieces.push(i);

}

pieces.sort(()=>Math.random()-0.5);

}

function drawBoard(){

const board=
document.getElementById(
"board"
);

board.innerHTML="";

board.style.gridTemplateColumns=
`repeat(${size},1fr)`;

pieces.forEach((piece,index)=>{

const div=
document.createElement("div");

div.classList.add("piece");

if(selected===index){

div.classList.add(
"selected"
);

}

const correctRow=
Math.floor(piece/size);

const correctCol=
piece%size;

div.style.backgroundImage=
`url('bilder/${imageFile}')`;

div.style.backgroundSize=
`${size*100}%`;

div.style.backgroundPosition=
`${correctCol*(100/(size-1))}% ${correctRow*(100/(size-1))}%`;

div.onclick=()=>selectPiece(index);

board.appendChild(div);

});

}

function selectPiece(index){

if(selected===null){

selected=index;

drawBoard();

return;

}

[pieces[selected],pieces[index]]=
[pieces[index],pieces[selected]];

selected=null;

moves++;

document.getElementById(
"moves"
).innerHTML=moves;

drawBoard();

checkWin();

}

function checkWin(){

let win=true;

for(let i=0;i<pieces.length;i++){

if(pieces[i]!==i){

win=false;
break;

}

}

if(win){

clearInterval(interval);

setTimeout(()=>{

alert(
"🏆 Gratulerer! Du klarte puslespillet!"
);

},300);

}

}

startGame();

</script>

</body>
</html>
