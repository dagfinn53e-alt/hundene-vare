<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 Kattepuslespill MASTER</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#fce7f3,#fdf2f8);
text-align:center;
color:#7a284f;
overflow-x:hidden;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
margin-bottom:20px;
}

.topbar{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

select,button{
padding:14px 22px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button{
background:#db2777;
color:white;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
}

.stat{
background:white;
padding:14px 22px;
border-radius:18px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

#board{
width:92vw;
max-width:650px;
height:92vw;
max-height:650px;
margin:auto;
display:grid;
gap:3px;
background:white;
padding:4px;
border-radius:18px;
box-shadow:0 8px 22px rgba(0,0,0,.15);
}

.piece{
border-radius:8px;
background-size:100% 100%;
cursor:pointer;
border:2px solid white;
transition:.15s;
}

.piece:hover{
transform:scale(.98);
}

.selected{
outline:5px solid #10b981;
z-index:10;
}

.complete{
animation:win .6s infinite alternate;
}

@keyframes win{
from{transform:scale(1)}
to{transform:scale(1.03)}
}

.back button{
margin-top:30px;
background:#7a284f;
}

#message{
font-size:24px;
font-weight:bold;
margin-top:20px;
color:#db2777;
}

</style>
</head>

<body>

<div class="container">

<h1>🐱 Kattepuslespill MASTER</h1>

<div class="topbar">

<select id="catSelect">

<option value="maine-coon-puzzle.jpg">
Maine Coon
</option>

<option value="siameser-puzzle.jpg">
Siameser
</option>

<option value="perser-puzzle.jpg">
Perser
</option>

<option value="bengal-puzzle.jpg">
Bengal
</option>

</select>

<select id="sizeSelect">

<option value="3">
🙂 Lett - 9 Brikker
</option>

<option value="4">
😎 Medium - 16 Brikker
</option>

<option value="5">
🔥 Ekspert - 25 Brikker
</option>

</select>

<button onclick="startGame()">
🧩 Start Spill
</button>

</div>

<div class="stats">

<div class="stat">
🏆 Trekk:
<span id="moves">0</span>
</div>

<div class="stat">
⏱️ Tid:
<span id="time">0</span>s
</div>

<div class="stat">
⭐ Stjerner:
<span id="stars">0</span>
</div>

</div>

<div id="board"></div>

<div id="message"></div>

<div class="back">

<button onclick="location.href='hundespill.html'">
⬅️ Tilbake til spill
</button>

</div>

</div>

<script>

let size=3;
let pieces=[];
let selected=null;
let moves=0;
let timer=0;
let stars=0;
let interval;
let imageFile="maine-coon-puzzle.jpg";

function startGame(){

size=parseInt(
document.getElementById(
"sizeSelect"
).value
);

imageFile=
document.getElementById(
"catSelect"
).value;

moves=0;
timer=0;
stars=0;

document.getElementById(
"moves"
).innerHTML=0;

document.getElementById(
"time"
).innerHTML=0;

document.getElementById(
"stars"
).innerHTML=0;

document.getElementById(
"message"
).innerHTML="";

clearInterval(interval);

interval=setInterval(()=>{

timer++;

document.getElementById(
"time"
).innerHTML=timer;

},1000);

createPuzzle();

drawBoard();

}

function createPuzzle(){

pieces=[];

for(let i=0;i<size*size;i++){

pieces.push(i);

}

pieces.sort(()=>Math.random()-0.5);

}

function drawBoard(){

const board=
document.getElementById(
"board"
);

board.innerHTML="";

board.style.gridTemplateColumns=
`repeat(${size},1fr)`;

pieces.forEach((piece,index)=>{

const div=
document.createElement("div");

div.classList.add("piece");

if(selected===index){

div.classList.add(
"selected"
);

}

const row=
Math.floor(piece/size);

const col=
piece%size;

div.style.backgroundImage=
`url('bilder/${imageFile}')`;

div.style.backgroundSize=
`${size*100}%`;

div.style.backgroundPosition=
`${col*(100/(size-1))}% ${row*(100/(size-1))}%`;

div.onclick=()=>selectPiece(index);

board.appendChild(div);

});

}

function selectPiece(index){

if(selected===null){

selected=index;

drawBoard();

return;

}

[pieces[selected],pieces[index]]=
[pieces[index],pieces[selected]];

selected=null;

moves++;

document.getElementById(
"moves"
).innerHTML=moves;

drawBoard();

checkWin();

}

function checkWin(){

let win=true;

for(let i=0;i<pieces.length;i++){

if(pieces[i]!==i){

win=false;
break;

}

}

if(win){

clearInterval(interval);

calculateStars();

document.getElementById(
"message"
).innerHTML=
"🏆 Gratulerer! Du klarte puslespillet!";

document.querySelectorAll(
".piece"
).forEach(piece=>{

piece.classList.add(
"complete"
);

});

}

}

function calculateStars(){

if(moves<25){

stars=3;

}else if(moves<50){

stars=2;

}else{

stars=1;

}

document.getElementById(
"stars"
).innerHTML=stars;

}

startGame();

</script>

</body>
</html>
