<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrer valpekull – Hundene våre</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;color:#123c73;min-height:100vh;background:linear-gradient(180deg,#dbeafe,#eef6ff,#fff7ed)}
.wrap{max-width:1100px;margin:auto;padding:14px 10px 60px}
.top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:white;border-radius:26px;padding:13px 15px;box-shadow:0 12px 28px rgba(0,45,110,.12);margin-bottom:15px}
.logo{font-size:23px;font-weight:900;color:#004cff}
.nav{display:flex;gap:8px;flex-wrap:wrap}
.nav a{background:#eaf2ff;color:#004cff;text-decoration:none;border:1px solid #b8ddff;border-radius:999px;padding:10px 13px;font-weight:900;font-size:14px}
.hero{background:linear-gradient(135deg,#1f8fff,#004cff,#7c3aed);color:white;border-radius:34px;padding:34px 16px;text-align:center;box-shadow:0 20px 45px rgba(0,45,110,.24);margin-bottom:18px}
.hero h1{font-size:clamp(2.2rem,7vw,4.4rem);margin-bottom:10px}
.hero p{font-size:17px;line-height:1.5;font-weight:700;color:#eef6ff}
.card{background:white;border-radius:28px;padding:18px;box-shadow:0 12px 26px rgba(0,0,0,.10);margin-bottom:18px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.full{grid-column:1/-1}
label{display:block;font-weight:900;margin-bottom:5px}
input,select,textarea{width:100%;padding:13px 14px;border:1px solid #cfe3ff;border-radius:14px;font-size:16px;font-family:Arial,sans-serif}
textarea{min-height:110px}
button{border:none;border-radius:999px;padding:14px 20px;background:linear-gradient(135deg,#1f8fff,#004cff);color:white;font-size:16px;font-weight:900;cursor:pointer;width:100%}
.msg{text-align:center;font-size:18px;font-weight:900;margin-top:12px;white-space:pre-wrap}
.notice{background:#fff7ed;border:1px solid #fed7aa;color:#92400e;border-radius:18px;padding:13px;font-weight:800;line-height:1.45}
@media(max-width:750px){.grid{grid-template-columns:1fr}.top{justify-content:center}.logo{width:100%;text-align:center;font-size:20px}.nav{width:100%;justify-content:center}.nav a{flex:1 1 42%;text-align:center;font-size:12px;padding:9px 7px}}
</style>
</head>
<body>
<div class="wrap">
<div class="top">
  <div class="logo">🐾 Registrer valpekull</div>
  <div class="nav">
    <a href="index.html">Forside</a>
    <a href="oppdretterportal.html">Portal</a>
    <a href="valpekull.html">Valpekull</a>
    <a href="admin-valpekull.html">Admin</a>
  </div>
</div>

<section class="hero">
  <h1>Legg inn valpekull</h1>
  <p>Velg kennel fra listen. Da kobles valpekullet automatisk til riktig kennelside.</p>
</section>

<form class="card" id="form">
  <div class="grid">
    <div class="full">
      <label>Velg godkjent kennel *</label>
      <select id="breeder_id" required>
        <option value="">Laster godkjente kenneler...</option>
      </select>
    </div>

    <div><label>Kennelnavn</label><input id="kennel_name" readonly></div>
    <div><label>Rase</label><input id="breed" readonly></div>
    <div><label>Fylke / område</label><input id="area" readonly></div>
    <div><label>Kommune</label><input id="municipality" readonly></div>

    <div><label>Tittel</label><input id="title" placeholder="F.eks. Nydelig kull leveringsklart i oktober"></div>
    <div><label>Status</label><select id="litter_status"><option>Ledig</option><option>Reservert</option><option>Solgt</option><option>Planlagt kull</option></select></div>

    <div><label>Født dato</label><input id="born_date" type="date"></div>
    <div><label>Leveringsklar dato</label><input id="ready_date" type="date"></div>

    <div><label>Hanner</label><input id="males" type="number" min="0" value="0"></div>
    <div><label>Tisper</label><input id="females" type="number" min="0" value="0"></div>
    <div><label>Ledige</label><input id="available_count" type="number" min="0" value="0"></div>
    <div><label>Reserverte</label><input id="reserved_count" type="number" min="0" value="0"></div>
    <div><label>Solgte</label><input id="sold_count" type="number" min="0" value="0"></div>
    <div><label>Pris</label><input id="price" placeholder="F.eks. 25 000 kr"></div>

    <div><label>Kontaktperson</label><input id="contact_name"></div>
    <div><label>Telefon</label><input id="phone"></div>
    <div><label>E-post</label><input id="email" type="email"></div>
    <div><label>Bilder</label><input id="image_files" type="file" accept="image/*" multiple></div>

    <div class="full"><label>Beskrivelse</label><textarea id="about" placeholder="Skriv litt om kullet, foreldredyr, levering, oppfølging og valpene."></textarea></div>
    <div class="full notice">Valpekullet blir lagret med status <b>venter</b>. Du godkjenner det i Admin Valpekull før det blir synlig.</div>
    <div class="full"><button type="submit">📨 Send valpekull til godkjenning</button></div>
  </div>
  <div id="msg" class="msg"></div>
</form>
</div>

<script>
const client=window.supabase.createClient("https://kxudiviidwwwclbzgdyx.supabase.co","sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH");
const BUCKET="puppy-images";
let breeders=[];

function val(id){return document.getElementById(id).value.trim();}

async function loadBreeders(){
  const r=await client.from("breeders").select("*").eq("status","godkjent").order("kennel_name",{ascending:true});
  const sel=document.getElementById("breeder_id");
  if(r.error){sel.innerHTML='<option value="">Feil ved lasting</option>';return;}
  breeders=r.data||[];
  if(!breeders.length){sel.innerHTML='<option value="">Ingen godkjente kenneler funnet</option>';return;}
  sel.innerHTML='<option value="">Velg kennel</option>'+breeders.map(b=>'<option value="'+b.id+'">'+(b.kennel_name||b.owner_name||"Kennel")+' – '+(b.breed||"Rase")+'</option>').join("");
}

function fillBreeder(){
  const b=breeders.find(x=>x.id===breeder_id.value);
  if(!b)return;
  kennel_name.value=b.kennel_name||"";
  breed.value=b.breed||"";
  area.value=b.area||"";
  municipality.value=b.municipality||"";
  contact_name.value=b.owner_name||"";
  phone.value=b.phone||"";
  email.value=b.email||"";
}

async function upload(file){
 if(!file)return "";
 const ext=file.name.split(".").pop();
 const path="valpekull/"+Date.now()+"-"+Math.random().toString(36).slice(2)+"."+ext;
 const r=await client.storage.from(BUCKET).upload(path,file);
 if(r.error)throw r.error;
 return client.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
}

document.getElementById("breeder_id").addEventListener("change",fillBreeder);

form.addEventListener("submit",async e=>{
 e.preventDefault();
 msg.style.color="#004cff"; msg.textContent="Sender inn og laster opp bilder...";
 try{
  const imgs=[];
  for(const f of image_files.files) imgs.push(await upload(f));
  const row={
    status:"venter",
    breeder_id:breeder_id.value,
    kennel_name:val("kennel_name"),
    breed:val("breed"),
    area:val("area"),
    municipality:val("municipality"),
    title:val("title"),
    born_date:born_date.value||null,
    ready_date:ready_date.value||null,
    males:Number(males.value||0),
    females:Number(females.value||0),
    available_count:Number(available_count.value||0),
    reserved_count:Number(reserved_count.value||0),
    sold_count:Number(sold_count.value||0),
    price:val("price"),
    litter_status:litter_status.value,
    contact_name:val("contact_name"),
    phone:val("phone"),
    email:val("email"),
    about:val("about"),
    image_urls:imgs
  };
  const r=await client.from("puppy_litters").insert([row]);
  if(r.error)throw r.error;
  msg.style.color="green"; msg.textContent="✅ Valpekullet er sendt inn og venter på godkjenning.";
  e.target.reset();
  loadBreeders();
 }catch(err){msg.style.color="crimson";msg.textContent="Feil: "+err.message;}
});

loadBreeders();
</script>
</body>
</html>
