<!DOCTYPE html>
<html lang="no"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Registrer valpekull</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;color:#123c73;min-height:100vh;background:radial-gradient(circle at 10% 5%,rgba(255,220,130,.42),transparent 30%),radial-gradient(circle at 92% 8%,rgba(126,200,255,.42),transparent 33%),linear-gradient(180deg,#dbeafe,#eef6ff 48%,#fff7ed)}
.wrap{max-width:1180px;margin:auto;padding:14px 10px 60px}
.top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:white;border-radius:26px;padding:13px 15px;box-shadow:0 12px 28px rgba(0,45,110,.12);margin-bottom:15px}
.logo{font-size:23px;font-weight:900;color:#004cff}
.nav{display:flex;gap:8px;flex-wrap:wrap}
.nav a{background:#eaf2ff;color:#004cff;text-decoration:none;border:1px solid #b8ddff;border-radius:999px;padding:10px 13px;font-weight:900;font-size:14px}
.hero{background:linear-gradient(135deg,#1f8fff,#004cff,#7c3aed);color:white;border-radius:34px;padding:36px 18px;text-align:center;box-shadow:0 20px 45px rgba(0,45,110,.24);margin-bottom:18px}
.hero h1{font-size:clamp(2.2rem,7vw,4.5rem);line-height:1.05;margin-bottom:10px}
.hero p{font-size:clamp(1rem,2.6vw,1.25rem);font-weight:700;color:#eef6ff;line-height:1.5}
.card{background:white;border-radius:28px;padding:18px;box-shadow:0 12px 26px rgba(0,0,0,.10);margin-bottom:18px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}
label{display:block;font-weight:900;margin-bottom:5px}
input,select,textarea{width:100%;padding:13px 14px;border:1px solid #cfe3ff;border-radius:14px;font-size:16px;font-family:Arial,sans-serif}
textarea{min-height:110px}
button,.btn{border:none;border-radius:999px;padding:13px 18px;background:linear-gradient(135deg,#1f8fff,#004cff);color:white;font-size:16px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
.green{background:linear-gradient(135deg,#22c55e,#16a34a)}.red{background:#dc2626}.orange{background:#f59e0b}.dark{background:#111827}
.msg{text-align:center;font-size:18px;font-weight:900;margin-top:12px;white-space:pre-wrap}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:22px}
.litter{background:white;border-radius:34px;overflow:hidden;box-shadow:0 18px 42px rgba(15,23,42,.14);border:1px solid #dbeafe}
.cover{min-height:260px;background:linear-gradient(135deg,#1f8fff,#004cff);display:flex;align-items:center;justify-content:center;overflow:hidden;color:white;font-size:90px}
.cover img{width:100%;height:260px;object-fit:cover}
.content{padding:22px}
.content h2{font-size:30px;color:#001d4a;margin-bottom:8px}
.badges{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.badge{background:#eaf2ff;color:#004cff;border:1px solid #b8ddff;border-radius:999px;padding:8px 11px;font-size:13px;font-weight:900}
.status-ledig{background:#dcfce7;color:#166534;border-color:#86efac}
.status-reservert{background:#fef3c7;color:#92400e;border-color:#f59e0b}
.status-solgt{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.info{background:#f8fbff;border:1px solid #e0edff;border-radius:18px;padding:12px;font-weight:800;line-height:1.45}
.about{color:#334155;font-weight:700;line-height:1.6;margin:12px 0}
.gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:14px 0}
.gallery img{width:100%;height:90px;object-fit:cover;border-radius:14px;border:2px solid #eaf2ff}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.thumb{width:120px;height:80px;object-fit:cover;border-radius:12px;margin:6px}
.hidden{display:none}
.warning{background:#fff7ed;border:1px solid #fed7aa;color:#92400e;border-radius:18px;padding:13px;font-weight:800;margin-top:10px}
@media(max-width:900px){.cards{grid-template-columns:1fr}.grid,.info-grid{grid-template-columns:1fr}.top{justify-content:center}.nav{justify-content:center}.nav a{flex:1 1 42%;text-align:center;font-size:12px}.gallery{grid-template-columns:repeat(2,1fr)}}
</style></head>
<body><div class="wrap">
<div class="top"><div class="logo">🐶 Registrer valpekull</div><div class="nav"><a href="index.html">Forside</a><a href="oppdretterportal.html">Oppdretterportal</a><a href="valpekull.html">Valpekull</a><a href="admin-valpekull.html">Admin</a></div></div>
<section class="hero"><h1>Legg inn valpekull</h1><p>Send inn informasjon om kull, ledige valper, leveringsdato og bilder. Annonsen blir synlig etter godkjenning.</p></section>
<form class="card" id="form"><div class="grid">
<div><label>Kennelnavn *</label><input id="kennel_name" required></div>
<div><label>Rase *</label><input id="breed" required></div>
<div><label>Fylke / område</label><input id="area"></div>
<div><label>Kommune</label><input id="municipality"></div>
<div><label>Tittel</label><input id="title" placeholder="F.eks. Nydelig kull leveringsklart i oktober"></div>
<div><label>Status</label><select id="litter_status"><option>Ledig</option><option>Reservert</option><option>Solgt</option><option>Planlagt kull</option></select></div>
<div><label>Født dato</label><input id="born_date" type="date"></div>
<div><label>Leveringsklar dato</label><input id="ready_date" type="date"></div>
<div><label>Hanner</label><input id="males" type="number" min="0" value="0"></div>
<div><label>Tisper</label><input id="females" type="number" min="0" value="0"></div>
<div><label>Ledige</label><input id="available_count" type="number" min="0" value="0"></div>
<div><label>Reserverte</label><input id="reserved_count" type="number" min="0" value="0"></div>
<div><label>Solgte</label><input id="sold_count" type="number" min="0" value="0"></div>
<div><label>Pris</label><input id="price" placeholder="F.eks. 25 000 kr"></div>
<div><label>Kontaktperson</label><input id="contact_name"></div>
<div><label>Telefon</label><input id="phone"></div>
<div><label>E-post</label><input id="email" type="email"></div>
<div><label>Bilder</label><input id="image_files" type="file" accept="image/*" multiple></div>
<div class="full"><label>Beskrivelse</label><textarea id="about" placeholder="Skriv litt om kullet, foreldredyr, levering, oppfølging og valpene."></textarea></div>
<div class="full"><button type="submit">📨 Send valpekull til godkjenning</button></div>
</div><div id="msg" class="msg"></div></form>
</div>
<script>
const client=window.supabase.createClient("https://kxudiviidwwwclbzgdyx.supabase.co","sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH");
const BUCKET="puppy-images";
async function upload(file){
 if(!file)return "";
 const ext=file.name.split(".").pop();
 const path="valpekull/"+Date.now()+"-"+Math.random().toString(36).slice(2)+"."+ext;
 const r=await client.storage.from(BUCKET).upload(path,file);
 if(r.error)throw r.error;
 return client.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
}
form.addEventListener("submit",async e=>{
 e.preventDefault();
 msg.style.color="#004cff";msg.textContent="Sender inn og laster opp bilder...";
 try{
  const imgs=[];
  for(const f of image_files.files) imgs.push(await upload(f));
  const row={status:"venter",kennel_name:kennel_name.value,breed:breed.value,area:area.value,municipality:municipality.value,title:title.value,born_date:born_date.value||null,ready_date:ready_date.value||null,males:Number(males.value||0),females:Number(females.value||0),available_count:Number(available_count.value||0),reserved_count:Number(reserved_count.value||0),sold_count:Number(sold_count.value||0),price:price.value,litter_status:litter_status.value,contact_name:contact_name.value,phone:phone.value,email:email.value,about:about.value,image_urls:imgs};
  const r=await client.from("puppy_litters").insert([row]);
  if(r.error)throw r.error;
  msg.style.color="green";msg.textContent="✅ Valpekullet er sendt inn og venter på godkjenning.";
  e.target.reset();
 }catch(err){msg.style.color="crimson";msg.textContent="Feil: "+err.message;}
});
</script></body></html>
