# Erstatt ALT i test.html med dette

```html
<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre - Markedsplass</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f8ff;
margin:0;
padding:20px;
}

.card{
max-width:700px;
margin:auto;
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h2{
color:#2563eb;
margin-bottom:20px;
}

input, textarea, select{
width:100%;
padding:14px;
margin-bottom:14px;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
background:#2563eb;
color:white;
border:none;
padding:14px 20px;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}
</style>
</head>

<body>

<div class="card">
<h2>🛒 Markedsplass</h2>

<input id="ttTitle" placeholder="Produktnavn">

<input id="ttPlace" placeholder="Område: Haugalandet - Stord - Stavanger">

<textarea id="ttDescription" placeholder="Beskrivelse av produkt"></textarea>

<input id="ttParking" placeholder="Kontaktinformasjon">

<input id="ttLength" placeholder="Pris">

<select id="ttDifficulty">
<option>Velg tilstand</option>
<option>Ny</option>
<option>Som ny</option>
<option>Brukt</option>
</select>

<input type="file">

<button>Lagre produkt</button>
</div>

</body>
</html>
```

# Slik tester du

1. Åpne `test.html`
2. Ctrl + A
3. Delete
4. Lim inn hele koden over
5. Commit changes
6. Åpne test.html igjen

Da får du en ren test-side for Markedsplass 😄
