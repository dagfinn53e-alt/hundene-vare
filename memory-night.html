<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Adventure - Night</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background:
        radial-gradient(circle at top, #243b75 0%, #0b1026 45%, #03040a 100%);
      overflow-x: hidden;
      text-align: center;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(#8ecbff 1px, transparent 1px),
        radial-gradient(#ffffff 1px, transparent 1px);
      background-size: 80px 80px, 130px 130px, 200px 200px;
      animation: twinkle 5s infinite alternate;
      opacity: 0.7;
    }

    @keyframes twinkle {
      from { opacity: 0.35; }
      to { opacity: 0.9; }
    }

    .moon {
      position: fixed;
      top: 28px;
      right: 28px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #f7f0b9;
      box-shadow: 0 0 35px #fff6a8;
      z-index: 1;
    }

    .moon::after {
      content: "";
      position: absolute;
      top: 8px;
      left: 14px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #0b1026;
    }

    .game {
      position: relative;
      z-index: 2;
      width: min(96vw, 760px);
      margin: 0 auto;
      padding: 22px 12px 35px;
    }

    h1 {
      margin: 12px 0 4px;
      font-size: clamp(2rem, 8vw, 4rem);
      text-shadow: 0 0 18px #8ecbff;
    }

    .subtitle {
      margin: 0 0 14px;
      color: #d8e7ff;
      font-size: 1rem;
    }

    .panel {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 16px auto;
      max-width: 520px;
    }

    .stat {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 0 18px rgba(142,203,255,0.18);
    }

    .stat strong {
      display: block;
      font-size: 0.8rem;
      color: #b9d8ff;
    }

    .stat span {
      font-size: 1.25rem;
      font-weight: bold;
    }

    .controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0;
    }

    button, a.button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #4f7cff, #9b5cff);
      box-shadow: 0 0 18px rgba(130,150,255,0.45);
      text-decoration: none;
    }

    button:active, a.button:active {
      transform: scale(0.96);
    }

    .sound-btn {
      background: linear-gradient(135deg, #1bbf89, #29a8ff);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 18px auto;
      max-width: 560px;
    }

    .card {
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      background: linear-gradient(145deg, #18255a, #060914);
      border: 2px solid rgba(255,255,255,0.18);
      display: grid;
      place-items: center;
      font-size: clamp(2rem, 10vw, 3.4rem);
      cursor: pointer;
      user-select: none;
      box-shadow: 0 8px 18px rgba(0,0,0,0.35);
      transition: transform 0.25s, box-shadow 0.25s, background 0.25s;
    }

    .card:hover {
      box-shadow: 0 0 22px rgba(142,203,255,0.55);
    }

    .card.flipped {
      background: linear-gradient(145deg, #fff8c6, #8ecbff);
      transform: rotateY(180deg) scale(1.04);
      color: #10173a;
    }

    .card.matched {
      background: linear-gradient(145deg, #4dffb5, #58a6ff);
      animation: matched 0.55s ease;
      pointer-events: none;
    }

    @keyframes matched {
      0% { transform: scale(1); }
      50% { transform: scale(1.18) rotate(5deg); }
      100% { transform: scale(1); }
    }

    .message {
      min-height: 32px;
      font-size: 1.15rem;
      font-weight: bold;
      color: #fff6a8;
      text-shadow: 0 0 12px #fff6a8;
    }

    .ultra {
      animation: ultraPulse 0.9s infinite alternate;
    }

    @keyframes ultraPulse {
      from { filter: drop-shadow(0 0 4px #8ecbff); }
      to { filter: drop-shadow(0 0 18px #fff6a8); }
    }

    .confetti {
      position: fixed;
      top: -20px;
      width: 10px;
      height: 16px;
      pointer-events: none;
      z-index: 10;
      animation: fall 1.8s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    @media (max-width: 480px) {
      .board {
        gap: 8px;
      }

      .card {
        border-radius: 14px;
      }

      .moon {
        width: 52px;
        height: 52px;
        right: 16px;
        top: 18px;
      }

      .moon::after {
        width: 52px;
        height: 52px;
      }
    }
  </style>
</head>

<body>
  <div class="stars"></div>
  <div class="moon"></div>

  <main class="game">
    <h1 class="ultra">🌙 Memory Night</h1>
    <p class="subtitle">Finn parene i måneskinnet!</p>

    <div class="panel">
      <div class="stat">
        <strong>Nivå</strong>
        <span id="level">1</span>
      </div>
      <div class="stat">
        <strong>Trekk</strong>
        <span id="moves">0</span>
      </div>
      <div class="stat">
        <strong>Combo</strong>
        <span id="combo">0</span>
      </div>
      <div class="stat">
        <strong>Par</strong>
        <span id="pairs">0</span>
      </div>
    </div>

    <div class="controls">
      <button onclick="restartGame()">🔄 Start på nytt</button>
      <button class="sound-btn" onclick="toggleSound()" id="soundBtn">🔊 Lyd på</button>
      <a class="button" href="memorymap.html">🗺️ Kart</a>
    </div>

    <div class="message" id="message">Trykk på to kort!</div>

    <section class="board" id="board"></section>
  </main>

  <script>
    const symbols = ["🌙", "⭐", "🦉", "🦇", "🪐", "✨", "🌌", "☁️"];

    let cards = [];
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;

    let level = 1;
    let moves = 0;
    let combo = 0;
    let pairs = 0;
    let soundOn = true;

    const board = document.getElementById("board");
    const levelEl = document.getElementById("level");
    const movesEl = document.getElementById("moves");
    const comboEl = document.getElementById("combo");
    const pairsEl = document.getElementById("pairs");
    const messageEl = document.getElementById("message");
    const soundBtn = document.getElementById("soundBtn");

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function makeSound(type) {
      if (!soundOn) return;

      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === "flip") oscillator.frequency.value = 420;
      if (type === "match") oscillator.frequency.value = 760;
      if (type === "win") oscillator.frequency.value = 980;
      if (type === "wrong") oscillator.frequency.value = 180;

      oscillator.type = "sine";
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.25);
    }

    function startGame() {
      board.innerHTML = "";
      firstCard = null;
      secondCard = null;
      lockBoard = false;
      moves = 0;
      combo = 0;
      pairs = 0;

      const pairCount = Math.min(4 + level, 8);
      const chosen = symbols.slice(0, pairCount);
      cards = shuffle([...chosen, ...chosen]);

      board.style.gridTemplateColumns = pairCount <= 6
        ? "repeat(4, 1fr)"
        : "repeat(4, 1fr)";

      cards.forEach((symbol, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.symbol = symbol;
        card.dataset.index = index;
        card.textContent = "🌑";
        card.addEventListener("click", () => flipCard(card));
        board.appendChild(card);
      });

      updateStats();
      messageEl.textContent = "Trykk på to kort!";
    }

    function flipCard(card) {
      if (lockBoard) return;
      if (card.classList.contains("flipped")) return;
      if (card.classList.contains("matched")) return;

      makeSound("flip");

      card.classList.add("flipped");
      card.textContent = card.dataset.symbol;

      if (!firstCard) {
        firstCard = card;
        return;
      }

      secondCard = card;
      moves++;
      updateStats();
      checkMatch();
    }

    function checkMatch() {
      const isMatch = firstCard.dataset.symbol === secondCard.dataset.symbol;

      if (isMatch) {
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        combo++;
        pairs++;

        makeSound("match");
        messageEl.textContent = combo >= 3
          ? "🔥 ULTRA COMBO!"
          : "Bra! Du fant et par!";

        sparkle(firstCard);
        sparkle(secondCard);

        resetTurn();
        updateStats();

        if (pairs === Math.min(4 + level, 8)) {
          winLevel();
        }
      } else {
        lockBoard = true;
        combo = 0;
        messageEl.textContent = "Ikke par. Prøv igjen!";
        makeSound("wrong");

        setTimeout(() => {
          firstCard.classList.remove("flipped");
          secondCard.classList.remove("flipped");
          firstCard.textContent = "🌑";
          secondCard.textContent = "🌑";
          resetTurn();
          updateStats();
        }, 750);
      }
    }

    function resetTurn() {
      firstCard = null;
      secondCard = null;
      lockBoard = false;
    }

    function winLevel() {
      makeSound("win");
      confetti();
      messageEl.textContent = "🌟 Nivå fullført! Neste natt starter snart...";

      setTimeout(() => {
        level++;
        if (level > 5) {
          messageEl.textContent = "🏆 Du mestret Memory Night!";
          level = 5;
          confetti();
        } else {
          startGame();
        }
        updateStats();
      }, 1800);
    }

    function restartGame() {
      startGame();
    }

    function toggleSound() {
      soundOn = !soundOn;
      soundBtn.textContent = soundOn ? "🔊 Lyd på" : "🔇 Lyd av";
    }

    function updateStats() {
      levelEl.textContent = level;
      movesEl.textContent = moves;
      comboEl.textContent = combo;
      pairsEl.textContent = pairs;
    }

    function confetti() {
      const colors = ["#fff6a8", "#8ecbff", "#9b5cff", "#4dffb5", "#ffffff"];

      for (let i = 0; i < 70; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.5 + "s";
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);

        setTimeout(() => {
          piece.remove();
        }, 2300);
      }
    }

    function sparkle(card) {
      card.style.boxShadow = "0 0 30px #fff6a8, 0 0 55px #8ecbff";

      setTimeout(() => {
        card.style.boxShadow = "";
      }, 500);
    }

    startGame();
  </script>
</body>
</html>
