<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌙 Natt-memory LEVELS + LYD</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#020617,#0f172a);
color:white;
text-align:center;
overflow-x:hidden;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{
font-size:48px;
margin-top:10px;
text-shadow:0 0 15px #60a5fa;
}

.stats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.stat{
background:rgba(255,255,255,.08);
padding:14px 20px;
border-radius:18px;
font-size:20px;
font-weight:bold;
box-shadow:0 4px 12px rgba(0,0,0,.35);
}

#message{
font-size:28px;
font-weight:bold;
color:#93c5fd;
margin:20px;
min-height:40px;
}

#gameBoard{
display:grid;
gap:15px;
justify-content:center;
margin-top:20px;
}

.card{
width:105px;
height:105px;
perspective:1000px;
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:scale(1.05);
}

.inner{
position:relative;
width:100%;
height:100%;
transition:transform .6s;
transform-style:preserve-3d;
}

.card.flipped .inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:22px;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
box-shadow:0 0 18px rgba(96,165,250,.25);
}

.front{
background:linear-gradient(135deg,#1e293b,#334155);
}

.back{
background:#e0f2fe;
color:#0f172a;
transform:rotateY(180deg);
}

.correct .back{
box-shadow:0 0 35px #60a5fa;
animation:nightGlow .8s infinite alternate;
}

@keyframes nightGlow{
from{
transform:rotateY(180deg) scale(1);
}
to{
transform:rotateY(180deg) scale(1.08);
}
}

.wrong{
animation:shake .25s 2;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

.star{
position:fixed;
font-size:28px;
opacity:.18;
animation:floatStar 12s linear infinite;
pointer-events:none;
}

@keyframes floatStar{
from{
transform:translateY(110vh);
}
to{
transform:translateY(-120vh);
}
}

#winBox{
display:none;
background:rgba(255,255,255,.08);
padding:30px;
border-radius:25px;
max-width:500px;
margin:30px auto;
box-shadow:0 8px 20px rgba(0,0,0,.4);
}

#winBox h2{
font-size:42px;
color:#93c5fd;
}

button{
margin-top:20px;
padding:16px 28px;
border:none;
border-radius:18px;
background:#2563eb;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.backBtn{
background:#0f172a;
border:2px solid #60a5fa;
}

</style>
</head>

<body>

<div class="star" style="left:10%;">✨</div>
<div class="star" style="left:30%;animation-delay:2s;">⭐</div>
<div class="star" style="left:55%;animation-delay:4s;">✨</div>
<div class="star" style="left:80%;animation-delay:7s;">⭐</div>

<div class="container">

<h1>🌙 Natt-memory LEVELS + LYD</h1>

<div class="stats">

<div class="stat">
🗺️ Nivå:
<span id="level">1</span>
</div>

<div class="stat">
⭐ Poeng:
<span id="score">0</span>
</div>

<div class="stat">
🔥 Combo:
<span id="combo">0</span>
</div>

<div class="stat">
⏱️ Tid:
<span id="time">0</span>
</div>

</div>

<div id="message">

🌙 Se nøye før kortene forsvinner...

</div>

<div id="gameBoard"></div>

<div id="winBox">

<h2>🏆 Nivå fullført!</h2>

<div style="font-size:50px;">
⭐⭐⭐
</div>

<p id="finalScore"></p>

<button onclick="nextLevel()">

➡️ Neste nivå

</button>

</div>

<button class="backBtn"
onclick="location.href='memorymap.html'">

⬅️ Tilbake til kart

</button>

</div>

<script>

/* LYDER */

const flipSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"
);

const correctSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"
);

const wrongSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"
);

const winSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"
);

/* SYMBOLER */

const allSymbols=[
"🌙","⭐","🌌","🦉","🌲",
"👻","✨","🦇","🌠","🔮"
];

let level=1;
let cards=[];
let flipped=[];
let matched=0;
let score=0;
let combo=0;
let timer=0;
let interval;
let lock=true;

function startLevel(){

clearInterval(interval);

let pairs=4+(level-1)*2;

if(pairs>10){
pairs=10;
}

let selected=
allSymbols.slice(0,pairs);

cards=[...selected,...selected];

cards.sort(()=>Math.random()-0.5);

flipped=[];
matched=0;
combo=0;
timer=0;
lock=true;

updateStats();

document.getElementById(
"winBox"
).style.display="none";

const board=
document.getElementById(
"gameBoard"
);

board.innerHTML="";

let columns=4;

if(cards.length>=20){
columns=5;
}

board.style.gridTemplateColumns=
`repeat(${columns},105px)`;

cards.forEach(symbol=>{

const card=
document.createElement("div");

card.className=
"card flipped";

card.dataset.symbol=symbol;

card.innerHTML=`

<div class="inner">

<div class="front">
🌙
</div>

<div class="back">
${symbol}
</div>

</div>

`;

card.onclick=
()=>flipCard(card);

board.appendChild(card);

});

let hideTime=2500-(level*300);

if(hideTime<700){
hideTime=700;
}

setTimeout(()=>{

document.querySelectorAll(".card")
.forEach(card=>{

card.classList.remove("flipped");

});

lock=false;

document.getElementById(
"message"
).innerHTML=
"🌌 Finn like nattkort!";

},hideTime);

interval=setInterval(()=>{

timer++;

document.getElementById(
"time"
).innerHTML=timer;

},1000);

}

function flipCard(card){

if(lock)return;

if(flipped.length>=2)return;

if(card.classList.contains("flipped"))return;

if(card.classList.contains("correct"))return;

card.classList.add("flipped");

flipSound.currentTime=0;
flipSound.play();

flipped.push(card);

if(flipped.length===2){

checkMatch();

}

}

function checkMatch(){

lock=true;

const a=flipped[0];
const b=flipped[1];

if(a.dataset.symbol===b.dataset.symbol){

a.classList.add("correct");
b.classList.add("correct");

matched+=2;

combo++;

score+=12+(combo*4);

correctSound.currentTime=0;
correctSound.play();

document.getElementById(
"message"
).innerHTML=
"✨ Nattpar funnet!";

flipped=[];

lock=false;

updateStats();

if(matched===cards.length){

winLevel();

}

}else{

combo=0;

score=Math.max(0,score-3);

wrongSound.currentTime=0;
wrongSound.play();

a.classList.add("wrong");
b.classList.add("wrong");

document.getElementById(
"message"
).innerHTML=
"👻 Feil nattkort";

updateStats();

setTimeout(()=>{

a.classList.remove(
"flipped",
"wrong"
);

b.classList.remove(
"flipped",
"wrong"
);

flipped=[];

lock=false;

},850);

}

}

function updateStats(){

document.getElementById("level").innerHTML=level;
document.getElementById("score").innerHTML=score;
document.getElementById("combo").innerHTML=combo;
document.getElementById("time").innerHTML=timer;

}

function winLevel(){

clearInterval(interval);

winSound.currentTime=0;
winSound.play();

document.getElementById(
"winBox"
).style.display="block";

document.getElementById(
"finalScore"
).innerHTML=
`⭐ Poeng: ${score}<br>
⏱️ Tid: ${timer}s`;

document.getElementById(
"message"
).innerHTML=
"🏆 Nivå "+level+" fullført!";

}

function nextLevel(){

level++;

if(level>5){

alert(
"🌙 Du fullførte hele Natt-memory!"
);

level=1;
score=0;

}

startLevel();

}

startLevel();

</script>

</body>
</html>
