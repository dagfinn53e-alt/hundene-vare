<!DOCTYPE html>
<html lang="no"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Oppdrettere 4.0</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;color:#123c73;background:radial-gradient(circle at 8% 6%,rgba(255,211,138,.55),transparent 28%),radial-gradient(circle at 92% 8%,rgba(126,200,255,.55),transparent 32%),linear-gradient(180deg,#dbeafe 0%,#eef6ff 45%,#fff7ed 100%);min-height:100vh}
.wrap{max-width:1250px;margin:auto;padding:20px 14px 70px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;background:rgba(255,255,255,.9);border-radius:28px;padding:14px 18px;box-shadow:0 12px 28px rgba(0,45,110,.14);margin-bottom:22px}
.logo{display:flex;gap:10px;align-items:center;font-size:24px;font-weight:900;color:#004cff}.logo-badge{width:48px;height:48px;border-radius:17px;background:linear-gradient(145deg,#1f8fff,#004cff);color:white;display:flex;align-items:center;justify-content:center}
.nav{display:flex;gap:9px;flex-wrap:wrap}.nav a{text-decoration:none;background:#eaf2ff;color:#004cff;border-radius:999px;padding:10px 14px;font-weight:900}
.hero{border-radius:38px;padding:38px 22px;text-align:center;color:white;background:linear-gradient(145deg,#1f8fff,#004cff 46%,#7c3aed);box-shadow:0 22px 52px rgba(0,45,110,.28);margin-bottom:22px}
.hero h1{font-size:clamp(2.2rem,6vw,4.4rem);margin-bottom:12px}.hero p{max-width:850px;margin:auto;font-size:18px;line-height:1.6;font-weight:700;color:#eef6ff}
.card{background:white;border-radius:30px;padding:22px;box-shadow:0 14px 28px rgba(0,0,0,.12);margin-top:18px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}
label{display:block;font-weight:900;margin-bottom:6px;color:#123c73}
input,select,textarea{width:100%;padding:13px 14px;border:1px solid #cfe3ff;border-radius:15px;font-size:16px;font-family:Arial,sans-serif}
textarea{min-height:120px}
button,.btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border:none;border-radius:999px;padding:14px 18px;font-size:16px;font-weight:900;cursor:pointer;color:white;background:linear-gradient(145deg,#1f8fff,#004cff)}
.green{background:linear-gradient(145deg,#22c55e,#16a34a)!important}.red{background:linear-gradient(145deg,#ef4444,#b91c1c)!important}.orange{background:linear-gradient(145deg,#f59e0b,#f97316)!important}
.notice{background:#fff7ed;border:1px solid #fed7aa;border-radius:22px;padding:16px;color:#92400e;font-weight:800;line-height:1.55;margin-top:14px}
.msg{text-align:center;margin-top:16px;font-size:19px;font-weight:900}
@media(max-width:760px){.grid{grid-template-columns:1fr}.nav a{flex:1 1 42%;text-align:center}.topbar{justify-content:center}}
.admin-card{background:white;border-radius:24px;padding:18px;box-shadow:0 10px 22px rgba(0,0,0,.1);margin-bottom:14px}.admin-card h2{color:#001d4a}.meta{line-height:1.7;font-weight:700}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.thumb{width:140px;height:90px;object-fit:cover;border-radius:14px;margin:8px}</style></head>
<body><div class="wrap"><header class="topbar"><div class="logo"><div class="logo-badge">🐾</div><span>Admin Oppdrettere</span></div><nav class="nav"><a href="oppdrettere-live.html">🐶 Oppdrettere</a><a href="index.html">🏠 Forside</a></nav></header>
<section class="hero"><h1>🔐 Admin Oppdrettere 4.0</h1><p>Godkjenn, avvis og verifiser oppdretterprofiler.</p></section>
<div class="card"><button class="orange" onclick="loadAdmin('venter')">🟡 Venter</button> <button class="green" onclick="loadAdmin('godkjent')">✅ Godkjent</button> <button class="red" onclick="loadAdmin('avvist')">❌ Avvist</button></div>
<div id="msg" class="msg">Laster...</div><div id="list"></div></div>
<script>

const SUPABASE_URL = "SETT_INN_SUPABASE_URL_HER";
const SUPABASE_ANON_KEY = "SETT_INN_SUPABASE_ANON_KEY_HER";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const BUCKET = "breeder-images";

async function loadAdmin(status){
 list.innerHTML=""; msg.textContent="Laster "+status+"...";
 const {data,error}=await supabase.from("breeders").select("*").eq("status",status).order("created_at",{ascending:false});
 if(error){msg.textContent="Feil: "+error.message;return;}
 if(!data.length){msg.textContent="Ingen med status: "+status;return;}
 msg.textContent="";
 data.forEach(b=>{
  const imgs=[b.logo_url,b.cover_url,...(b.image_urls||[])].filter(Boolean).map(u=>`<img class="thumb" src="${u}">`).join("");
  const div=document.createElement("div"); div.className="admin-card";
  div.innerHTML=`<h2>🐶 ${b.kennel_name}</h2><div class="meta">Status: ${b.status}<br>Rase: ${b.breed||""}<br>Eier: ${b.owner_name||""}<br>Sted: ${b.municipality||""} / ${b.county||""}<br>Kontakt: ${b.email||""} ${b.phone||""}<br>Kennel/registrering: ${b.kennel_registration||""}<br>Pakke: ${b.package_type||"basis"}<br>Planlagt kull: ${b.planned_litter||""}<br>Helse: ${b.health_tests||""}<br>Om: ${b.about||""}</div><div>${imgs}</div><div class="actions"><button class="green" onclick="approve('${b.id}')">✅ Godkjenn/verifiser</button><button class="red" onclick="rejectBreeder('${b.id}')">❌ Avvis</button><button class="orange" onclick="waiting('${b.id}')">🟡 Sett venter</button></div>`;
  list.appendChild(div);
 });
}
async function approve(id){const {error}=await supabase.from("breeders").update({status:"godkjent",verified:true,approved_at:new Date().toISOString()}).eq("id",id); if(error)alert(error.message); else loadAdmin("venter");}
async function rejectBreeder(id){const {error}=await supabase.from("breeders").update({status:"avvist",verified:false}).eq("id",id); if(error)alert(error.message); else loadAdmin("venter");}
async function waiting(id){const {error}=await supabase.from("breeders").update({status:"venter",verified:false}).eq("id",id); if(error)alert(error.message); else loadAdmin("venter");}
loadAdmin("venter");
</script></body></html>
