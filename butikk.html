
<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rediger butikk</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  padding:20px;
  background:#eaf4ff;
  font-family:Arial,sans-serif;
  color:#111827;
}

.container{
  max-width:850px;
  margin:auto;
}

.card{
  background:white;
  border-radius:24px;
  padding:24px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
}

h1{
  margin-top:0;
}

label{
  display:block;
  margin-top:18px;
  margin-bottom:6px;
  font-weight:bold;
}

input,
textarea{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #cbd5e1;
  font-size:16px;
  box-sizing:border-box;
}

textarea{
  min-height:120px;
  resize:vertical;
}

.preview{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:18px;
  margin-top:10px;
  background:#f1f5f9;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:12px;
  margin-top:15px;
}

.gallery img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:16px;
}

button{
  margin-top:24px;
  border:none;
  background:#2563eb;
  color:white;
  padding:16px 24px;
  border-radius:16px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.status{
  margin-top:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>✏️ Rediger butikk</h1>

<div id="status" class="status">Laster butikk ...</div>

<label>Logo</label>
<img id="logoPreview" class="preview">

<input type="file" id="logoInput">

<label>Butikknavn</label>
<input type="text" id="name">

<label>Beskrivelse</label>
<textarea id="description"></textarea>

<label>Telefon</label>
<input type="text" id="phone">

<label>Facebook / Nettside</label>
<input type="text" id="website">

<label>🎥 Reel-link</label>
<input type="text" id="reel">

<label>Last opp bilder</label>
<input type="file" id="galleryInput" multiple>

<div id="gallery" class="gallery"></div>

<button onclick="saveShop()">💾 Lagre Endringer</button>

</div>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://kxudiviidwwwclbzgdyx.supabase.co",
  "sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
);

const params = new URLSearchParams(window.location.search);
const businessId = params.get("id");

let currentData = {};
let galleryUrls = [];

function setStatus(text,color="black"){
  const el = document.getElementById("status");
  el.textContent = text;
  el.style.color = color;
}

async function loadShop(){

  if(!businessId){
    setStatus("Mangler butikk-ID","red");
    return;
  }

  const { data,error } = await supabaseClient
    .from("businesses")
    .select("*")
    .eq("id",businessId)
    .single();

  if(error || !data){
    console.log(error);
    setStatus("Fant ikke butikk","red");
    return;
  }

  currentData = data;

  document.getElementById("name").value =
    data.name || "";

  document.getElementById("description").value =
    data.description || "";

  document.getElementById("phone").value =
    data.phone || "";

  document.getElementById("website").value =
    data.website || "";

  document.getElementById("reel").value =
    data.reel_url || "";

  document.getElementById("logoPreview").src =
    data.logo_url || "";

  try{
    galleryUrls = data.gallery_urls || [];

    if(typeof galleryUrls === "string"){
      galleryUrls = JSON.parse(galleryUrls);
    }

  }catch{
    galleryUrls = [];
  }

  renderGallery();

  setStatus("✅ Klar");
}

function renderGallery(){

  const gallery = document.getElementById("gallery");

  gallery.innerHTML =
    galleryUrls.map(url =>
      `<img src="${url}">`
    ).join("");
}

async function uploadImage(file,path){

  const fileName =
    Date.now() + "-" + file.name;

  const fullPath =
    path + "/" + fileName;

  const { error } =
    await supabaseClient.storage
      .from("business-images")
      .upload(fullPath,file);

  if(error){
    console.log(error);
    return null;
  }

  const { data } =
    supabaseClient.storage
      .from("business-images")
      .getPublicUrl(fullPath);

  return data.publicUrl;
}

document.getElementById("logoInput")
.addEventListener("change", async(e)=>{

  const file = e.target.files[0];
  if(!file) return;

  setStatus("Laster opp logo ...");

  const url =
    await uploadImage(file,"logos");

  if(url){
    currentData.logo_url = url;
    document.getElementById("logoPreview").src = url;
    setStatus("✅ Logo lastet opp","green");
  }
});

document.getElementById("galleryInput")
.addEventListener("change", async(e)=>{

  const files = [...e.target.files];

  if(files.length === 0) return;

  setStatus("Laster opp bilder ...");

  for(const file of files){

    const url =
      await uploadImage(file,"gallery");

    if(url){
      galleryUrls.push(url);
    }
  }

  renderGallery();

  setStatus("✅ Bilder lastet opp","green");
});

async function saveShop(){

  setStatus("Lagrer ...");

  const updateData = {

    name:
      document.getElementById("name").value,

    description:
      document.getElementById("description").value,

    phone:
      document.getElementById("phone").value,

    website:
      document.getElementById("website").value,

    reel_url:
      document.getElementById("reel").value,

    logo_url:
      currentData.logo_url || "",

    gallery_urls:
      galleryUrls
  };

  const { error } =
    await supabaseClient
      .from("businesses")
      .update(updateData)
      .eq("id",businessId);

  if(error){
    console.log(error);
    setStatus("❌ Feil ved lagring","red");
    return;
  }

  setStatus("✅ Endringer lagret","green");
}

loadShop();
</script>

</body>
</html>
