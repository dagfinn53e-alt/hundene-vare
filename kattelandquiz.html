
<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 Katteland Quiz</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#fce7f3,#fdf2f8);
text-align:center;
color:#7a284f;
}

.container{
max-width:950px;
margin:20px auto;
padding:20px;
}

h1{
margin-bottom:20px;
}

.stats{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.stat{
flex:1;
background:white;
padding:15px;
border-radius:18px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.quiz-box{
background:white;
padding:25px;
border-radius:28px;
box-shadow:0 8px 20px rgba(0,0,0,.12);
}

#catImage{
width:100%;
max-height:260px;
object-fit:contain;
background:white;
border-radius:20px;
margin-bottom:20px;
}

#breed{
font-size:34px;
font-weight:bold;
margin-bottom:10px;
}

.question{
font-size:24px;
margin-bottom:20px;
}

.answer-btn{
display:block;
width:100%;
margin:12px 0;
padding:20px;
border:none;
border-radius:18px;
background:#fbcfe8;
font-size:24px;
font-weight:bold;
cursor:pointer;
transition:.2s;
color:#7a284f;
}

.answer-btn:hover{
background:#f9a8d4;
}

.correct{
background:#10b981 !important;
color:white;
}

.wrong{
background:#ef4444 !important;
color:white;
}

#nextBtn{
display:none;
margin-top:20px;
padding:18px 35px;
border:none;
border-radius:18px;
background:#db2777;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.back button{
margin-top:30px;
padding:16px 30px;
border:none;
border-radius:18px;
background:#7a284f;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>🐱 Hvilket land kommer disse kattene fra?</h1>

<div class="stats">
<div class="stat">🏆 Poeng: <span id="score">0</span></div>
<div class="stat">❤️ Liv: <span id="lives">3</span></div>
<div class="stat">❓ Spørsmål: <span id="questionNumber">1</span></div>
</div>

<div class="quiz-box">

<img id="catImage">

<div id="breed"></div>

<div class="question">
Hvor kommer denne katterasen fra?
</div>

<div id="answers"></div>

<button id="nextBtn" onclick="nextQuestion()">
Neste ➜
</button>

</div>

<div class="back">
<button onclick="location.href='hundespill.html'">
⬅️ Tilbake til spill
</button>
</div>

</div>

<script>

const questions = [

{
breed:"Maine Coon",
image:"bilder/maine-coon.jpg",
answers:["USA","Canada","England"],
correct:"USA"
},

{
breed:"Siameser",
image:"bilder/siameser.jpg,
answers:["Thailand","Japan","Kina"],
correct:"Thailand"
},

{
breed:"Perser",
image:"bilder/perser.jpg",
answers:["Iran","Tyrkia","India"],
correct:"Iran"
},

{
breed:"Bengal",
image:"bilder/bengal.jpg",
answers:["USA","India","Thailand"],
correct:"USA"
},

{
breed:"Norsk Skogkatt",
image:"bilder/norsk-skogkatt.png",
answers:["Norge","Sverige","Finland"],
correct:"Norge"
},

{
breed:"Ragdoll",
image:"bilder/ragdoll.png",
answers:["USA","Canada","Australia"],
correct:"USA"
},

{
breed:"Sphynx",
image:"bilder/sphynx.png",
answers:["Canada","Egypt","USA"],
correct:"Canada"
},

{
breed:"British Shorthair",
image:"bilder/british-shorthair.png",
answers:["England","Skottland","Irland"],
correct:"England"
},

{
breed:"Russian Blue",
image:"bilder/russian-blue.png",
answers:["Russland","Polen","Finland"],
correct:"Russland"
},

{
breed:"Abyssiner",
image:"bilder/abyssiner.png",
answers:["Etiopia","Egypt","Marokko"],
correct:"Etiopia"
},

{
breed:"Scottish Fold",
image:"bilder/scottish-fold.png",
answers:["Skottland","Irland","Wales"],
correct:"Skottland"
},

{
breed:"Sibirsk Katt",
image:"bilder/sibirsk-katt.png",
answers:["Russland","Sverige","Norge"],
correct:"Russland"
}

];

let currentQuestion = 0;
let score = 0;
let lives = 3;

function loadQuestion(){

const q = questions[currentQuestion];

document.getElementById("catImage").src = q.image;

document.getElementById("breed").innerHTML = q.breed;

document.getElementById("questionNumber").innerHTML =
(currentQuestion + 1) + "/" + questions.length;

const answers = document.getElementById("answers");

answers.innerHTML = "";

q.answers.forEach(answer => {

const btn = document.createElement("button");

btn.className = "answer-btn";

btn.innerHTML = answer;

btn.onclick = () => checkAnswer(btn,answer);

answers.appendChild(btn);

});

document.getElementById("nextBtn").style.display = "none";

}

function checkAnswer(button,answer){

const q = questions[currentQuestion];

const buttons =
document.querySelectorAll(".answer-btn");

buttons.forEach(btn => {

btn.disabled = true;

if(btn.innerHTML === q.correct){

btn.classList.add("correct");

}

});

if(answer === q.correct){

score += 10;

}else{

lives--;

button.classList.add("wrong");

}

document.getElementById("score").innerHTML = score;

document.getElementById("lives").innerHTML = lives;

if(lives <= 0){

alert("😅 Game Over! Du må starte på nytt.");

location.reload();

return;

}

document.getElementById("nextBtn").style.display =
"inline-block";

}

function nextQuestion(){

currentQuestion++;

if(currentQuestion >= questions.length){

alert("🏆 Gratulerer! Du fullførte Katteland Quiz!");

location.reload();

return;

}

loadQuestion();

}

loadQuestion();

</script>

</body>
</html>
