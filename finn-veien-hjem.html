<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🐕 Finn veien hjem</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eef6ff;
  text-align:center;
  color:#123c73;
}

h1{
  margin-top:20px;
}

#maze{
  width:max-content;
  margin:20px auto;
  display:grid;
  gap:4px;
}

.cell{
  width:55px;
  height:55px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  font-size:28px;
  font-weight:bold;
}

.wall{
  background:#123c73;
}

.path{
  background:white;
}

.player{
  background:#10b981;
  color:white;
}

.goal{
  background:#f59e0b;
  color:white;
}

.controls{
  margin-top:20px;
}

.controls button{
  width:90px;
  height:55px;
  margin:5px;
  border:none;
  border-radius:14px;
  background:#2563eb;
  color:white;
  font-size:22px;
  font-weight:bold;
}

#level{
  font-size:24px;
  font-weight:bold;
  margin-top:10px;
}

.back{
  display:inline-block;
  margin-top:20px;
  color:#2563eb;
  font-weight:bold;
  text-decoration:none;
}

</style>
</head>

<body>

<h1>🐕 Finn veien hjem</h1>

<div id="level">
Nivå 1
</div>

<p>Hjelp hunden hjem 🏠</p>

<div id="maze"></div>

<div class="controls">

<div>
<button onclick="move(-1,0)">⬆️</button>
</div>

<div>
<button onclick="move(0,-1)">⬅️</button>
<button onclick="move(0,1)">➡️</button>
</div>

<div>
<button onclick="move(1,0)">⬇️</button>
</div>

</div>

<a class="back" href="hundespill.html">
← Tilbake til spill
</a>

<script>

const levels = [

[
["P",".","#",".","🏠"],
["#",".","#",".","#"],
[".",".",".",".","#"],
[".","#","#",".","."],
[".",".",".",".","."]
],

[
["P","#",".",".","."],
[".","#",".","#","."],
[".",".",".","#","."],
["#","#",".",".","."],
[".","#","#","#","🏠"]
],

[
["P",".","#","#","."],
["#",".",".","#","."],
["#","#",".","#","."],
[".",".",".",".","."],
["#","#","#","#","🏠"]
]

];

let currentLevel = 0;

let playerRow = 0;
let playerCol = 0;

function loadLevel(){

  playerRow = 0;
  playerCol = 0;

  draw();

  document.getElementById("level").innerHTML =
  "Nivå " + (currentLevel + 1);

}

function draw(){

  const map = levels[currentLevel];

  const maze = document.getElementById("maze");

  maze.innerHTML="";

  maze.style.gridTemplateColumns =
  `repeat(${map[0].length},55px)`;

  for(let r=0;r<map.length;r++){

    for(let c=0;c<map[r].length;c++){

      const cell =
      document.createElement("div");

      cell.classList.add("cell");

      const value = map[r][c];

      if(r===playerRow && c===playerCol){

        cell.classList.add("player");

        cell.innerHTML="🐶";

      }else if(value==="#"){

        cell.classList.add("wall");

      }else if(value==="🏠"){

        cell.classList.add("goal");

        cell.innerHTML="🏠";

      }else{

        cell.classList.add("path");

      }

      maze.appendChild(cell);

    }

  }

}

function move(dr,dc){

  const map = levels[currentLevel];

  const newRow = playerRow + dr;
  const newCol = playerCol + dc;

  if(
    newRow < 0 ||
    newRow >= map.length ||
    newCol < 0 ||
    newCol >= map[0].length
  ){
    return;
  }

  if(map[newRow][newCol]==="#"){
    return;
  }

  playerRow = newRow;
  playerCol = newCol;

  if(map[playerRow][playerCol]==="🏠"){

    if(currentLevel < levels.length - 1){

      setTimeout(()=>{

        alert("🎉 Neste nivå!");

        currentLevel++;

        loadLevel();

      },100);

    }else{

      setTimeout(()=>{

        alert("🏆 Du klarte alle nivåene!");

      },100);

    }

  }

  draw();

}

loadLevel();

</script>

</body>
</html>
