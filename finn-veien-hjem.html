<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🐕 Finn veien hjem</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#eef6ff;
  text-align:center;
  color:#123c73;
}

h1{
  margin-top:20px;
}

#maze{
  width:320px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(5,60px);
  gap:4px;
}

.cell{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  font-size:28px;
  font-weight:bold;
}

.wall{
  background:#123c73;
}

.path{
  background:white;
}

.player{
  background:#10b981;
  color:white;
}

.goal{
  background:#f59e0b;
  color:white;
}

.controls{
  margin-top:20px;
}

.controls button{
  width:90px;
  height:50px;
  margin:5px;
  border:none;
  border-radius:14px;
  background:#2563eb;
  color:white;
  font-size:20px;
  font-weight:bold;
}

.back{
  display:inline-block;
  margin-top:20px;
  color:#2563eb;
  font-weight:bold;
  text-decoration:none;
}

</style>
</head>

<body>

<h1>🐕 Finn veien hjem</h1>

<p>Hjelp hunden hjem 🏠</p>

<div id="maze"></div>

<div class="controls">

<div>
<button onclick="move(-1,0)">⬆️</button>
</div>

<div>
<button onclick="move(0,-1)">⬅️</button>
<button onclick="move(0,1)">➡️</button>
</div>

<div>
<button onclick="move(1,0)">⬇️</button>
</div>

</div>

<a class="back" href="hundespill.html">
← Tilbake til spill
</a>

<script>

const map = [

["P",".","#",".","🏠"],
["#",".","#",".","#"],
[".",".",".",".","#"],
[".","#","#",".","."],
[".",".",".",".","."]

];

let playerRow = 0;
let playerCol = 0;

function draw(){

  const maze = document.getElementById("maze");

  maze.innerHTML="";

  for(let r=0;r<5;r++){

    for(let c=0;c<5;c++){

      const cell = document.createElement("div");

      cell.classList.add("cell");

      const value = map[r][c];

      if(r===playerRow && c===playerCol){

        cell.classList.add("player");
        cell.innerHTML="🐶";

      }else if(value==="#"){

        cell.classList.add("wall");

      }else if(value==="🏠"){

        cell.classList.add("goal");
        cell.innerHTML="🏠";

      }else{

        cell.classList.add("path");

      }

      maze.appendChild(cell);

    }

  }

}

function move(dr,dc){

  const newRow = playerRow + dr;
  const newCol = playerCol + dc;

  if(
    newRow < 0 ||
    newRow >= 5 ||
    newCol < 0 ||
    newCol >= 5
  ){
    return;
  }

  if(map[newRow][newCol]==="#"){
    return;
  }

  playerRow = newRow;
  playerCol = newCol;

  if(map[playerRow][playerCol]==="🏠"){

    setTimeout(()=>{
      alert("🎉 Hunden fant veien hjem!");
    },100);

  }

  draw();

}

draw();

</script>

</body>
</html>
