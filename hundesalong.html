<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶 Hundesalong LIVE</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(
  to bottom,
  #fce7f3,
  #dbeafe
  );
  overflow:hidden;
  text-align:center;
}

#game{
  position:relative;
  width:100vw;
  height:100vh;
}

#salon{
  position:absolute;
  bottom:0;
  width:100%;
  height:260px;
  background:#f9a8d4;
  border-top-left-radius:40px;
  border-top-right-radius:40px;
}

#dog{
  position:absolute;
  left:50%;
  top:45%;
  transform:translate(-50%,-50%);
  font-size:180px;
  transition:0.3s;
  z-index:5;
}

.dirty{
  filter:
  grayscale(.7)
  brightness(.7);
}

.clean{
  filter:
  brightness(1.15);
}

.happy{
  transform:
  translate(-50%,-50%)
  scale(1.08);
}

#bubbleLayer{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.bubble{
  position:absolute;
  font-size:35px;
  animation:floatUp 2s linear forwards;
}

@keyframes floatUp{

0%{
opacity:1;
transform:translateY(0);
}

100%{
opacity:0;
transform:translateY(-160px);
}

}

.toolBox{
  position:absolute;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:14px;
  z-index:10;
}

.tool{
  width:90px;
  height:90px;
  border-radius:22px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(0,0,0,.18);
  transition:0.2s;
}

.tool:hover{
  transform:scale(1.08);
}

#hud{
  position:absolute;
  top:20px;
  left:20px;
  background:rgba(255,255,255,.92);
  padding:18px;
  border-radius:20px;
  font-weight:bold;
  text-align:left;
  min-width:220px;
  z-index:10;
}

#message{
  margin-top:10px;
  line-height:1.5;
}

.scoreFloat{
  position:absolute;
  color:#10b981;
  font-weight:bold;
  font-size:28px;
  animation:scoreUp 1.2s linear forwards;
  pointer-events:none;
}

@keyframes scoreUp{

0%{
opacity:1;
transform:translateY(0);
}

100%{
opacity:0;
transform:translateY(-80px);
}

}

#accessory{
  position:absolute;
  left:50%;
  top:28%;
  transform:translateX(-50%);
  font-size:70px;
  z-index:8;
}

</style>
</head>

<body>

<div id="game">

<div id="hud">

⭐ Poeng:
<span id="score">0</span>

<br><br>

🧼 Renhet:
<span id="clean">0</span>%

<br><br>

✂️ Stil:
<span id="style">0</span>%

<div id="message">

Velkommen til LIVE-salongen 🐶

</div>

</div>

<div id="bubbleLayer"></div>

<div id="accessory"></div>

<div id="dog" class="dirty">
🐶
</div>

<div id="salon"></div>

<div class="toolBox">

<div class="tool"
onclick="useTool('wash')">
🧽
</div>

<div class="tool"
onclick="useTool('rinse')">
🚿
</div>

<div class="tool"
onclick="useTool('cut')">
✂️
</div>

<div class="tool"
onclick="useTool('brush')">
🪮
</div>

<div class="tool"
onclick="useTool('bow')">
🎀
</div>

<div class="tool"
onclick="finishDog()">
📸
</div>

</div>

</div>

<script>

let score=0;

let clean=0;

let style=0;

let bow=false;

function update(){

document.getElementById(
"score"
).innerHTML=score;

document.getElementById(
"clean"
).innerHTML=clean;

document.getElementById(
"style"
).innerHTML=style;

const dog=
document.getElementById(
"dog"
);

dog.className="";

if(clean<60){

dog.classList.add(
"dirty"
);

}else{

dog.classList.add(
"clean"
);

}

if(style>60){

dog.classList.add(
"happy"
);

}

document.getElementById(
"accessory"
).innerHTML=
bow ? "🎀" : "";

}

function message(text){

document.getElementById(
"message"
).innerHTML=text;

}

function createBubble(){

const bubble=
document.createElement("div");

bubble.className="bubble";

bubble.innerHTML="🫧";

bubble.style.left=
Math.random()*
window.innerWidth+"px";

bubble.style.top=
Math.random()*
window.innerHeight+"px";

document.getElementById(
"bubbleLayer"
).appendChild(bubble);

setTimeout(()=>{

bubble.remove();

},2000);

}

function scoreEffect(points){

const fx=
document.createElement("div");

fx.className="scoreFloat";

fx.innerHTML=
"+"+points;

fx.style.left=
(window.innerWidth/2)+"px";

fx.style.top=
(window.innerHeight/2)+"px";

document.body.appendChild(fx);

setTimeout(()=>{

fx.remove();

},1200);

}

function useTool(tool){

if(tool==="wash"){

clean+=20;

score+=10;

message(
"🧽 Hunden vaskes!"
);

for(let i=0;i<12;i++){

setTimeout(
createBubble,
i*100
);

}

scoreEffect(10);

}

if(tool==="rinse"){

clean+=20;

score+=10;

message(
"🚿 Skylte hunden ren!"
);

for(let i=0;i<10;i++){

setTimeout(
createBubble,
i*80
);

}

scoreEffect(10);

}

if(tool==="cut"){

style+=25;

score+=15;

message(
"✂️ Pelsen klippes!"
);

document.getElementById(
"dog"
).style.transform=
"translate(-50%,-50%) rotate(2deg)";

setTimeout(()=>{

document.getElementById(
"dog"
).style.transform=
"translate(-50%,-50%)";

},300);

scoreEffect(15);

}

if(tool==="brush"){

style+=18;

clean+=10;

score+=12;

message(
"🪮 Pelsen blir myk og fin!"
);

scoreEffect(12);

}

if(tool==="bow"){

if(style<40){

message(
"🎀 Stell pelsen litt først."
);

return;

}

bow=true;

style+=20;

score+=20;

message(
"🎀 Hunden fikk pynt!"
);

scoreEffect(20);

}

if(clean>100)
clean=100;

if(style>100)
style=100;

update();

}

function finishDog(){

let result=
"🙂 Fin innsats!";

if(clean>=90 && style>=90){

result=
"🏆 WOW! Perfekt salonghund!";

score+=50;

scoreEffect(50);

}else if(clean>=70 && style>=70){

result=
"⭐ Kjempefint resultat!";

score+=25;

scoreEffect(25);

}

message(
result+
"<br><br>📸 Bilde tatt!"
);

update();

}

update();

</script>

</body>
</html>
