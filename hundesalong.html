<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶 Hundesalong LIVE PRO</title>

<style>

body{
  margin:0;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:linear-gradient(
  to bottom,
  #fbcfe8,
  #dbeafe
  );
}

#game{
  position:relative;
  width:100vw;
  height:100vh;
}

#salon{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

#dogContainer{
  position:relative;
  width:520px;
  height:520px;
}

#dog{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:30px;
  box-shadow:0 12px 30px rgba(0,0,0,.25);
  transition:0.3s;
}

.dirty{
  filter:
  brightness(.7)
  grayscale(.4);
}

.clean{
  filter:
  brightness(1.08);
}

#foamLayer{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.foam{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  background:rgba(255,255,255,.8);
  box-shadow:
  0 0 10px rgba(255,255,255,.8);
  animation:foamFade 2s forwards;
}

@keyframes foamFade{

0%{
opacity:1;
transform:scale(1);
}

100%{
opacity:0;
transform:scale(1.8);
}

}

#toolbar{
  position:absolute;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:16px;
  background:rgba(255,255,255,.9);
  padding:15px;
  border-radius:24px;
  box-shadow:0 8px 20px rgba(0,0,0,.2);
}

.tool{
  width:90px;
  height:90px;
  border-radius:22px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  cursor:pointer;
  transition:0.2s;
}

.tool:hover{
  transform:scale(1.08);
}

.activeTool{
  background:#2563eb;
  color:white;
}

#hud{
  position:absolute;
  top:20px;
  left:20px;
  background:rgba(255,255,255,.92);
  padding:18px;
  border-radius:22px;
  font-weight:bold;
  min-width:230px;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
}

#message{
  margin-top:12px;
  line-height:1.5;
}

#bow{
  position:absolute;
  top:45px;
  left:50%;
  transform:translateX(-50%);
  font-size:90px;
  display:none;
}

.scoreFx{
  position:absolute;
  color:#10b981;
  font-size:34px;
  font-weight:bold;
  animation:scoreFloat 1.2s forwards;
  pointer-events:none;
}

@keyframes scoreFloat{

0%{
opacity:1;
transform:translateY(0);
}

100%{
opacity:0;
transform:translateY(-100px);
}

}

</style>
</head>

<body>

<div id="game">

<div id="hud">

⭐ Poeng:
<span id="score">0</span>

<br><br>

🧼 Renhet:
<span id="clean">0</span>%

<br><br>

✂️ Stil:
<span id="style">0</span>%

<div id="message">

Velkommen til LIVE hundesalong 🐶

</div>

</div>

<div id="salon">

<div id="dogContainer">

<img
id="dog"
class="dirty"
src="file_00000000c9c071f4bf47f05725e1c888"
>

<div id="foamLayer"></div>

<div id="bow">
🎀
</div>

</div>

</div>

<div id="toolbar">

<div class="tool"
onclick="selectTool('wash')">
🧽
</div>

<div class="tool"
onclick="selectTool('rinse')">
🚿
</div>

<div class="tool"
onclick="selectTool('brush')">
🪮
</div>

<div class="tool"
onclick="selectTool('cut')">
✂️
</div>

<div class="tool"
onclick="selectTool('bow')">
🎀
</div>

<div class="tool"
onclick="finishDog()">
📸
</div>

</div>

</div>

<script>

let currentTool="";

let score=0;

let clean=0;

let style=0;

const dog=
document.getElementById(
"dog"
);

function update(){

document.getElementById(
"score"
).innerHTML=score;

document.getElementById(
"clean"
).innerHTML=clean;

document.getElementById(
"style"
).innerHTML=style;

if(clean<60){

dog.classList.add("dirty");
dog.classList.remove("clean");

}else{

dog.classList.remove("dirty");
dog.classList.add("clean");

}

}

function message(text){

document.getElementById(
"message"
).innerHTML=text;

}

function selectTool(tool){

currentTool=tool;

document.querySelectorAll(
".tool"
).forEach(t=>{

t.classList.remove(
"activeTool"
);

});

event.target.classList.add(
"activeTool"
);

message(
"🎮 Aktivt verktøy valgt."
);

}

document.getElementById(
"dogContainer"
).addEventListener(
"mousemove",
e=>{

if(currentTool==="wash"){

createFoam(e);

clean+=0.15;

score+=0.05;

message(
"🧽 Vasker hunden..."
);

}

if(currentTool==="rinse"){

clean+=0.1;

score+=0.03;

message(
"🚿 Skyller pelsen..."
);

}

if(currentTool==="brush"){

style+=0.1;

score+=0.04;

dog.style.transform=
"scale(1.02)";

message(
"🪮 Børster pelsen..."
);

}

if(currentTool==="cut"){

style+=0.18;

score+=0.08;

dog.style.transform=
"scale(1.01) rotate(1deg)";

message(
"✂️ Klipper pelsen..."
);

}

if(currentTool==="bow"){

if(style>40){

document.getElementById(
"bow"
).style.display="block";

style+=0.05;

score+=0.03;

message(
"🎀 Hunden pyntes!"
);

}

}

if(clean>100)
clean=100;

if(style>100)
style=100;

update();

});

function createFoam(e){

const foam=
document.createElement("div");

foam.className="foam";

foam.style.left=
e.offsetX-20+"px";

foam.style.top=
e.offsetY-20+"px";

document.getElementById(
"foamLayer"
).appendChild(foam);

setTimeout(()=>{

foam.remove();

},2000);

}

function finishDog(){

let result=
"🙂 Fin innsats!";

if(clean>85 && style>85){

result=
"🏆 WOW! Perfekt salonghund!";

score+=50;

createScoreFx(50);

}else if(clean>65 && style>65){

result=
"⭐ Kjempefint resultat!";

score+=25;

createScoreFx(25);

}

message(
result+
"<br><br>📸 Bilde lagret!"
);

update();

}

function createScoreFx(points){

const fx=
document.createElement("div");

fx.className="scoreFx";

fx.innerHTML=
"+"+points;

fx.style.left=
(window.innerWidth/2)+"px";

fx.style.top=
(window.innerHeight/2)+"px";

document.body.appendChild(fx);

setTimeout(()=>{

fx.remove();

},1200);

}

update();

</script>

</body>
</html>
