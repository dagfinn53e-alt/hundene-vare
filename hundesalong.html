```html
<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶 Hundesalong LIVE PRO</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:linear-gradient(to bottom,#fbcfe8,#dbeafe);
}

#game{
  position:relative;
  width:100vw;
  height:100vh;
}

#hud{
  position:absolute;
  top:20px;
  left:20px;
  background:rgba(255,255,255,.95);
  padding:18px;
  border-radius:20px;
  z-index:20;
  min-width:220px;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
}

#message{
  margin-top:12px;
  line-height:1.5;
}

#salon{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

#dogContainer{
  position:relative;
  width:520px;
  height:520px;
}

#dog{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:30px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  transition:.2s;
}

.dirty{
  filter:brightness(.65) grayscale(.35);
}

.clean{
  filter:brightness(1.1);
}

#foamLayer{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.foam{
  position:absolute;
  width:55px;
  height:55px;
  border-radius:50%;
  background:rgba(255,255,255,.85);
  animation:fadeBubble 1.5s linear forwards;
}

@keyframes fadeBubble{
  0%{
    opacity:1;
    transform:scale(1);
  }
  100%{
    opacity:0;
    transform:scale(1.8);
  }
}

#bow{
  position:absolute;
  top:45px;
  left:50%;
  transform:translateX(-50%);
  font-size:80px;
  display:none;
}

#toolbar{
  position:absolute;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:15px;
  background:rgba(255,255,255,.92);
  padding:15px;
  border-radius:24px;
  z-index:20;
  box-shadow:0 8px 20px rgba(0,0,0,.2);
}

.tool{
  width:85px;
  height:85px;
  background:white;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  cursor:pointer;
  transition:.2s;
}

.tool:hover{
  transform:scale(1.08);
}

.active{
  background:#2563eb;
  color:white;
}

</style>
</head>
<body>

<div id="game">

<div id="hud">
⭐ Poeng: <span id="score">0</span>
<br><br>
🧼 Renhet: <span id="clean">0</span>%
<br><br>
✂️ Stil: <span id="style">0</span>%

<div id="message">
Velg et verktøy og dra musa over hunden 🐶
</div>
</div>

<div id="salon">

<div id="dogContainer">

<img
id="dog"
class="dirty"
src="bilder/bichon.png"
>

<div id="foamLayer"></div>

<div id="bow">🎀</div>

</div>

</div>

<div id="toolbar">

<div class="tool" data-tool="wash">🧽</div>
<div class="tool" data-tool="rinse">🚿</div>
<div class="tool" data-tool="brush">🪮</div>
<div class="tool" data-tool="cut">✂️</div>
<div class="tool" data-tool="bow">🎀</div>
<div class="tool" id="finishBtn">📸</div>

</div>

</div>

<script>

let currentTool="";
let clean=0;
let style=0;
let score=0;

const dog=document.getElementById("dog");
const dogContainer=document.getElementById("dogContainer");
const foamLayer=document.getElementById("foamLayer");

function updateStats(){

  document.getElementById("score").innerHTML=Math.floor(score);
  document.getElementById("clean").innerHTML=Math.floor(clean);
  document.getElementById("style").innerHTML=Math.floor(style);

  if(clean >= 60){
    dog.classList.remove("dirty");
    dog.classList.add("clean");
  }else{
    dog.classList.add("dirty");
    dog.classList.remove("clean");
  }

}

function setMessage(text){
  document.getElementById("message").innerHTML=text;
}

function createFoam(x,y){

  const foam=document.createElement("div");
  foam.className="foam";

  foam.style.left=x+"px";
  foam.style.top=y+"px";

  foamLayer.appendChild(foam);

  setTimeout(()=>{
    foam.remove();
  },1500);

}

const tools=document.querySelectorAll(".tool[data-tool]");

tools.forEach(tool=>{

  tool.addEventListener("click",()=>{

    tools.forEach(t=>t.classList.remove("active"));

    tool.classList.add("active");

    currentTool=tool.dataset.tool;

    setMessage("Aktivt verktøy: "+currentTool);

  });

});

dogContainer.addEventListener("mousemove",(e)=>{

  if(currentTool === "") return;

  const rect=dogContainer.getBoundingClientRect();

  const x=e.clientX-rect.left;
  const y=e.clientY-rect.top;

  if(currentTool === "wash"){

    createFoam(x,y);

    clean += 0.25;
    score += 0.1;

    setMessage("🧽 Vasker hunden...");

  }

  if(currentTool === "rinse"){

    clean += 0.15;
    score += 0.05;

    setMessage("🚿 Skyller pelsen...");

  }

  if(currentTool === "brush"){

    style += 0.15;
    clean += 0.05;
    score += 0.08;

    dog.style.transform="scale(1.02)";

    setTimeout(()=>{
      dog.style.transform="scale(1)";
    },100);

    setMessage("🪮 Børster pelsen...");

  }

  if(currentTool === "cut"){

    style += 0.25;
    score += 0.12;

    dog.style.transform="rotate(1deg) scale(1.01)";

    setTimeout(()=>{
      dog.style.transform="scale(1)";
    },100);

    setMessage("✂️ Klipper pelsen...");

  }

  if(currentTool === "bow"){

    if(style > 35){

      document.getElementById("bow").style.display="block";

      style += 0.03;
      score += 0.03;

      setMessage("🎀 Pynter hunden...");

    }else{

      setMessage("✂️ Børst og klipp litt mer først.");

    }

  }

  if(clean > 100) clean=100;
  if(style > 100) style=100;

  updateStats();

});

document.getElementById("finishBtn").addEventListener("click",()=>{

  let text="🙂 Fin innsats!";

  if(clean > 85 && style > 85){

    text="🏆 WOW! Perfekt salonghund!";
    score += 50;

  }else if(clean > 60 && style > 60){

    text="⭐ Kjempefint resultat!";
    score += 25;

  }

  updateStats();

  setMessage(text + "<br><br>📸 Bilde tatt!");

});

updateStats();

</script>

</body>
</html>
```
