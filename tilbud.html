<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ukens tilbud</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f4f8ff;
      color:#0f172a;
    }
    .wrap{
      max-width:700px;
      margin:0 auto;
      padding:24px 16px 40px;
    }
    .top{
      text-align:center;
      margin-bottom:20px;
    }
    .top h1{
      margin:0 0 8px 0;
      color:#2563eb;
      font-size:32px;
    }
    .top p{
      margin:0;
      color:#64748b;
    }
    .offer-box{
      max-width:380px;
      margin:24px auto;
      background:#fff;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 10px 24px rgba(15,23,42,.10);
      border:1px solid #dbeafe;
    }
    .offer-label{
      background:#2563eb;
      color:#fff;
      text-align:center;
      font-weight:700;
      font-size:13px;
      padding:8px 10px;
    }
    .offer-box img{
      width:100%;
      height:220px;
      object-fit:cover;
      display:block;
    }
    .offer-content{
      padding:14px;
      text-align:center;
    }
    .offer-content h2{
      margin:0 0 8px 0;
      font-size:22px;
    }
    .offer-text{
      margin:0 0 8px 0;
      font-size:16px;
    }
    .offer-date{
      color:#64748b;
      font-size:13px;
      margin-bottom:12px;
    }
    .offer-btn{
      display:inline-block;
      text-decoration:none;
      background:#2563eb;
      color:#fff;
      padding:10px 16px;
      border-radius:999px;
      font-weight:700;
      font-size:14px;
    }
    .note{
      max-width:500px;
      margin:20px auto 0;
      background:#fff;
      border:1px solid #dbeafe;
      border-radius:14px;
      padding:14px;
      color:#475569;
      font-size:14px;
      line-height:1.5;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Ukens tilbud</h1>
      <p>Trygg testside – påvirker ikke hovedappen</p>
    </div>

    <div class="offer-box">
      <div class="offer-label">🐾 Ukens tilbud</div>

      <img src="https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?auto=format&fit=crop&w=1200&q=80" alt="Ukens tilbud">

      <div class="offer-content">
        <h2>Zoobutikken Karmøy</h2>
        <div class="offer-text">-20% på hundefôr</div>
        <div class="offer-date">Gjelder 10. april – 20. april</div>
        <a href="#" class="offer-btn">Se tilbud</a>
      </div>
    </div>

    <div class="note">
      Her kan du senere bare bytte:
      butikknavn, tilbudstekst, dato og bilde.
      Denne siden er kun en test og endrer ikke noe på forsiden din.
    </div>
  </div>
</body>
</html>
