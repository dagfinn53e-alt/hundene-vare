<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏡 Kennelen ULTRA</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#dcfce7,#bbf7d0);
text-align:center;
overflow:hidden;
color:#14532d;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
position:relative;
z-index:2;
}

h1{
font-size:52px;
margin-top:10px;
text-shadow:0 0 15px #22c55e;
}

.stats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.stat{
background:white;
padding:14px 20px;
border-radius:18px;
font-size:20px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

#message{
font-size:30px;
font-weight:bold;
color:#15803d;
margin:20px;
min-height:40px;
transition:.3s;
}

.comboText{
animation:comboPop .6s;
color:#f59e0b !important;
}

@keyframes comboPop{
0%{transform:scale(.5);}
50%{transform:scale(1.5);}
100%{transform:scale(1);}
}

#gameBoard{
display:grid;
gap:15px;
justify-content:center;
margin-top:20px;
}

.card{
width:105px;
height:105px;
perspective:1000px;
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:scale(1.06);
}

.inner{
position:relative;
width:100%;
height:100%;
transition:transform .6s;
transform-style:preserve-3d;
}

.card.flipped .inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:22px;
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
box-shadow:0 6px 14px rgba(0,0,0,.18);
}

.front{
background:linear-gradient(135deg,#16a34a,#4ade80);
color:white;
}

.back{
background:white;
transform:rotateY(180deg);
}

.correct .back{
box-shadow:0 0 35px #22c55e;
animation:kennelGlow .8s infinite alternate;
}

@keyframes kennelGlow{
from{
transform:rotateY(180deg) scale(1);
}
to{
transform:rotateY(180deg) scale(1.1);
}
}

.wrong{
animation:shake .25s 2;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

/* HUNDER */

.dog{
position:fixed;
font-size:30px;
opacity:.14;
animation:dogFloat 14s linear infinite;
pointer-events:none;
}

@keyframes dogFloat{
from{
transform:translateY(110vh);
}
to{
transform:translateY(-120vh);
}
}

/* FLASH */

.flash{
position:fixed;
inset:0;
background:white;
opacity:0;
pointer-events:none;
z-index:9999;
}

.flash.active{
animation:flashScreen .6s;
}

@keyframes flashScreen{
0%{opacity:.8;}
100%{opacity:0;}
}

/* KONFETTI */

.confetti{
position:fixed;
width:12px;
height:12px;
top:-20px;
animation:fall linear forwards;
z-index:999;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}

#winBox{
display:none;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,.18);
max-width:500px;
margin:30px auto;
animation:winPop .7s;
}

@keyframes winPop{
0%{
transform:scale(.4);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

#winBox h2{
font-size:44px;
color:#16a34a;
}

button{
margin-top:20px;
padding:16px 28px;
border:none;
border-radius:18px;
background:#16a34a;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.backBtn{
background:#14532d;
}
@media(max-width:700px){

h1{
font-size:30px;
}

.stats{
gap:8px;
}

.stat{
font-size:15px;
padding:10px 12px;
}

#message{
font-size:20px;
margin:15px;
}

#gameBoard{
gap:10px !important;
}

.card{
width:85px !important;
height:85px !important;
}

.front,
.back{
font-size:34px !important;
}

button{
font-size:16px;
padding:12px 18px;
}

#winBox{
width:90%;
padding:20px;
}

}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<div class="dog" style="left:10%;">🐶</div>
<div class="dog" style="left:35%;animation-delay:3s;">🐾</div>
<div class="dog" style="left:60%;animation-delay:5s;">🦴</div>
<div class="dog" style="left:85%;animation-delay:8s;">🐕</div>

<div class="container">

<h1>🏡 Kennelen ULTRA</h1>

<div class="stats">

<div class="stat">
🗺️ Nivå:
<span id="level">1</span>
</div>

<div class="stat">
⭐ Poeng:
<span id="score">0</span>
</div>

<div class="stat">
🔥 Combo:
<span id="combo">0</span>
</div>

<div class="stat">
⏱️ Tid:
<span id="time">0</span>
</div>

</div>

<div id="message">
🐶 Finn kennelkortene!
</div>

<div id="gameBoard"></div>

<div id="winBox">

<h2>🏆 LEVEL COMPLETE!</h2>

<div style="font-size:60px;">
🐶🏡🐾
</div>

<p id="finalScore"></p>

<button onclick="nextLevel()">
➡️ Neste nivå
</button>

</div>

<button class="backBtn"
onclick="location.href='memorymap.html'">

⬅️ Tilbake til kart

</button>

</div>

<script>

/* LYDER */

const flipSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"
);

const correctSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"
);

const wrongSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"
);

const winSound = new Audio(
"https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"
);

/* SYMBOLER */

const allSymbols=[
"🐶","🐕","🦴","🐾","🏡",
"🦮","🐕‍🦺","🎾","🛖","🐩"
];

let level=1;
let cards=[];
let flipped=[];
let matched=0;
let score=0;
let combo=0;
let timer=0;
let interval;
let lock=false;

function startLevel(){

clearInterval(interval);

let pairs=4+(level-1)*2;

if(pairs>10){
pairs=10;
}

let selected=
allSymbols.slice(0,pairs);

cards=[...selected,...selected];

cards.sort(()=>Math.random()-0.5);

flipped=[];
matched=0;
combo=0;
timer=0;
lock=false;

updateStats();

document.getElementById(
"winBox"
).style.display="none";

const board=
document.getElementById(
"gameBoard"
);

board.innerHTML="";

let columns=4;

if(cards.length>=20){
columns=5;
}

board.style.gridTemplateColumns=
`repeat(${columns},105px)`;

cards.forEach(symbol=>{

const card=
document.createElement("div");

card.className="card";

card.dataset.symbol=symbol;

card.innerHTML=`

<div class="inner">

<div class="front">
🏡
</div>

<div class="back">
${symbol}
</div>

</div>

`;

card.onclick=
()=>flipCard(card);

board.appendChild(card);

});

interval=setInterval(()=>{

timer++;

document.getElementById(
"time"
).innerHTML=timer;

},1000);

}

function flipCard(card){

if(lock)return;

if(flipped.length>=2)return;

if(card.classList.contains("flipped"))return;

if(card.classList.contains("correct"))return;

card.classList.add("flipped");

flipSound.currentTime=0;
flipSound.play();

flipped.push(card);

if(flipped.length===2){

checkMatch();

}

}

function checkMatch(){

lock=true;

const a=flipped[0];
const b=flipped[1];

if(a.dataset.symbol===b.dataset.symbol){

a.classList.add("correct");
b.classList.add("correct");

matched+=2;

combo++;

score+=12+(combo*4);

correctSound.currentTime=0;
correctSound.play();

const msg=
document.getElementById(
"message"
);

msg.innerHTML=
"🐾 KENNELPAR FUNNET!";

if(combo>=3){

msg.innerHTML=
"🔥 SUPER COMBO x"+combo;

msg.classList.add(
"comboText"
);

setTimeout(()=>{

msg.classList.remove(
"comboText"
);

},600);

}

flipped=[];

lock=false;

updateStats();

if(matched===cards.length){

winLevel();

}

}else{

combo=0;

score=Math.max(0,score-3);

wrongSound.currentTime=0;
wrongSound.play();

a.classList.add("wrong");
b.classList.add("wrong");

document.getElementById(
"message"
).innerHTML=
"❌ Feil kennelkort";

updateStats();

setTimeout(()=>{

a.classList.remove(
"flipped",
"wrong"
);

b.classList.remove(
"flipped",
"wrong"
);

flipped=[];

lock=false;

},850);

}

}

function updateStats(){

document.getElementById("level").innerHTML=level;
document.getElementById("score").innerHTML=score;
document.getElementById("combo").innerHTML=combo;
document.getElementById("time").innerHTML=timer;

}

function flashScreen(){

const flash=
document.getElementById(
"flash"
);

flash.classList.add(
"active"
);

setTimeout(()=>{

flash.classList.remove(
"active"
);

},600);

}

function createConfetti(){

for(let i=0;i<80;i++){

const conf=
document.createElement("div");

conf.className="confetti";

conf.style.left=
Math.random()*100+"vw";

conf.style.background=
`hsl(${Math.random()*360},
100%,50%)`;

conf.style.animationDuration=
(3+Math.random()*3)+"s";

document.body.appendChild(conf);

setTimeout(()=>{

conf.remove();

},6000);

}

}

function winLevel(){

clearInterval(interval);

winSound.currentTime=0;
winSound.play();

flashScreen();

createConfetti();

document.getElementById(
"winBox"
).style.display="block";

document.getElementById(
"finalScore"
).innerHTML=
`⭐ Poeng: ${score}<br>
⏱️ Tid: ${timer}s`;

document.getElementById(
"message"
).innerHTML=
"🏆 LEVEL COMPLETE!";

}

function nextLevel(){

level++;

if(level>5){

alert(
"🐶 Du fullførte hele Kennelen!"
);

level=1;
score=0;

}

startLevel();

}

startLevel();

</script>

</body>
</html>
