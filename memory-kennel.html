<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Adventure - Kennel</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #fff;
      text-align: center;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top, #ffd38a 0%, #b86b2d 38%, #3a1d0e 100%);
    }

    .paw-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.16;
      background-image:
        radial-gradient(circle, #fff 18%, transparent 20%),
        radial-gradient(circle, #fff 18%, transparent 20%);
      background-size: 90px 90px;
      background-position: 0 0, 45px 45px;
      animation: pawDrift 10s linear infinite;
    }

    @keyframes pawDrift {
      from { transform: translateY(0); }
      to { transform: translateY(90px); }
    }

    .game {
      position: relative;
      z-index: 2;
      width: min(96vw, 820px);
      margin: 0 auto;
      padding: 22px 12px 36px;
    }

    h1 {
      margin: 12px 0 4px;
      font-size: clamp(2rem, 8vw, 4.2rem);
      text-shadow:
        0 0 12px #ffe1aa,
        0 0 28px #ff8a3d;
    }

    .subtitle {
      margin: 0 0 14px;
      color: #fff0cf;
      font-size: 1rem;
      font-weight: bold;
    }

    .panel {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 16px auto;
      max-width: 560px;
    }

    .stat {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 18px;
      padding: 10px;
      box-shadow: 0 0 18px rgba(255,210,138,0.22);
      backdrop-filter: blur(6px);
    }

    .stat strong {
      display: block;
      font-size: 0.8rem;
      color: #ffe4b8;
    }

    .stat span {
      font-size: 1.3rem;
      font-weight: bold;
    }

    .controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0;
    }

    button, a.button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #ff8a3d, #8b4a1d);
      box-shadow: 0 0 20px rgba(255,180,100,0.45);
      text-decoration: none;
    }

    .sound-btn {
      background: linear-gradient(135deg, #22c55e, #0f8f45);
    }

    button:active, a.button:active {
      transform: scale(0.96);
    }

    .message {
      min-height: 34px;
      margin: 8px 0;
      font-size: 1.18rem;
      font-weight: bold;
      color: #fff1c2;
      text-shadow: 0 0 14px #ffb45d;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 18px auto;
      max-width: 640px;
    }

    .card {
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      display: grid;
      place-items: center;
      font-size: clamp(1.9rem, 9vw, 3.4rem);
      cursor: pointer;
      user-select: none;
      background:
        linear-gradient(145deg, #7a3f18, #2a1208);
      border: 2px solid rgba(255,255,255,0.25);
      box-shadow:
        0 8px 20px rgba(0,0,0,0.35),
        inset 0 0 16px rgba(255,255,255,0.06);
      transition: transform 0.25s, box-shadow 0.25s, background 0.25s;
    }

    .card:hover {
      box-shadow:
        0 0 22px rgba(255,220,160,0.7),
        0 0 36px rgba(255,130,60,0.4);
    }

    .card.flipped {
      background: linear-gradient(145deg, #fff1c2, #ffb45d);
      color: #2a1208;
      transform: rotateY(180deg) scale(1.04);
    }

    .card.matched {
      background: linear-gradient(145deg, #9cffb5, #ffd166);
      pointer-events: none;
      animation: dogMatch 0.6s ease;
    }

    @keyframes dogMatch {
      0% { transform: scale(1); }
      40% { transform: scale(1.18) rotate(4deg); }
      70% { transform: scale(1.08) rotate(-4deg); }
      100% { transform: scale(1); }
    }

    .ultra {
      animation: ultraBark 0.9s infinite alternate;
    }

    @keyframes ultraBark {
      from {
        filter: drop-shadow(0 0 5px #ffe1aa);
      }
      to {
        filter: drop-shadow(0 0 22px #ff8a3d);
      }
    }

    .confetti {
      position: fixed;
      top: -24px;
      width: 10px;
      height: 16px;
      pointer-events: none;
      z-index: 20;
      animation: fall 1.9s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(112vh) rotate(760deg);
        opacity: 0;
      }
    }

    .paw-pop {
      position: fixed;
      pointer-events: none;
      z-index: 30;
      font-size: 2rem;
      animation: pawPop 0.8s ease-out forwards;
    }

    @keyframes pawPop {
      from {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 1;
      }
      to {
        transform: translate(-50%, -120%) scale(1.8);
        opacity: 0;
      }
    }

    @media (max-width: 500px) {
      .board {
        gap: 8px;
      }

      .card {
        border-radius: 15px;
      }

      button, a.button {
        padding: 11px 15px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>
  <div class="paw-bg"></div>

  <main class="game">
    <h1 class="ultra">🐶 Memory Kennel</h1>
    <p class="subtitle">Finn alle hundevennene i kennelen!</p>

    <div class="panel">
      <div class="stat">
        <strong>Nivå</strong>
        <span id="level">1</span>
      </div>
      <div class="stat">
        <strong>Trekk</strong>
        <span id="moves">0</span>
      </div>
      <div class="stat">
        <strong>Combo</strong>
        <span id="combo">0</span>
      </div>
      <div class="stat">
        <strong>Par</strong>
        <span id="pairs">0</span>
      </div>
    </div>

    <div class="controls">
      <button onclick="restartGame()">🔄 Start på nytt</button>
      <button class="sound-btn" onclick="toggleSound()" id="soundBtn">🔊 Lyd på</button>
      <a class="button" href="memorymap.html">🗺️ Kart</a>
    </div>

    <div class="message" id="message">Snus deg frem til parene!</div>

    <section class="board" id="board"></section>
  </main>

  <script>
    const symbols = ["🐶", "🐕", "🦴", "🐾", "🏠", "🥎", "🦮", "🐕‍🦺"];

    let cards = [];
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;

    let level = 1;
    let moves = 0;
    let combo = 0;
    let pairs = 0;
    let soundOn = true;

    const board = document.getElementById("board");
    const levelEl = document.getElementById("level");
    const movesEl = document.getElementById("moves");
    const comboEl = document.getElementById("combo");
    const pairsEl = document.getElementById("pairs");
    const messageEl = document.getElementById("message");
    const soundBtn = document.getElementById("soundBtn");

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function playSound(type) {
      if (!soundOn) return;

      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === "flip") oscillator.frequency.value = 430;
      if (type === "match") oscillator.frequency.value = 740;
      if (type === "wrong") oscillator.frequency.value = 190;
      if (type === "win") oscillator.frequency.value = 980;

      oscillator.type = "sine";
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.24);

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.24);
    }

    function startGame() {
      board.innerHTML = "";
      firstCard = null;
      secondCard = null;
      lockBoard = false;
      moves = 0;
      combo = 0;
      pairs = 0;

      const pairCount = Math.min(4 + level, 8);
      const chosen = symbols.slice(0, pairCount);
      cards = shuffle([...chosen, ...chosen]);

      cards.forEach((symbol, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.symbol = symbol;
        card.dataset.index = index;
        card.textContent = "🐾";
        card.addEventListener("click", () => flipCard(card));
        board.appendChild(card);
      });

      updateStats();
      messageEl.textContent = "Snus deg frem til parene!";
    }

    function flipCard(card) {
      if (lockBoard) return;
      if (card.classList.contains("flipped")) return;
      if (card.classList.contains("matched")) return;

      playSound("flip");

      card.classList.add("flipped");
      card.textContent = card.dataset.symbol;

      if (!firstCard) {
        firstCard = card;
        return;
      }

      secondCard = card;
      moves++;
      updateStats();
      checkMatch();
    }

    function checkMatch() {
      const isMatch = firstCard.dataset.symbol === secondCard.dataset.symbol;

      if (isMatch) {
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        combo++;
        pairs++;

        playSound("match");
        pawPop(firstCard);
        pawPop(secondCard);

        if (combo >= 4) {
          messageEl.textContent = "🐕 ULTRA BJEFF-COMBO!";
        } else if (combo >= 2) {
          messageEl.textContent = "🔥 Super-snute combo!";
        } else {
          messageEl.textContent = "Bra! Du fant et hundepar!";
        }

        resetTurn();
        updateStats();

        if (pairs === Math.min(4 + level, 8)) {
          winLevel();
        }
      } else {
        lockBoard = true;
        combo = 0;
        messageEl.textContent = "Voff! Ikke par. Prøv igjen!";
        playSound("wrong");

        setTimeout(() => {
          firstCard.classList.remove("flipped");
          secondCard.classList.remove("flipped");
          firstCard.textContent = "🐾";
          secondCard.textContent = "🐾";
          resetTurn();
          updateStats();
        }, 780);
      }
    }

    function resetTurn() {
      firstCard = null;
      secondCard = null;
      lockBoard = false;
    }

    function winLevel() {
      playSound("win");
      confetti();
      messageEl.textContent = "🏆 Kennel-nivå fullført!";

      setTimeout(() => {
        level++;

        if (level > 5) {
          level = 5;
          messageEl.textContent = "🐶 Du er kennel-mester!";
          confetti();
        } else {
          startGame();
        }

        updateStats();
      }, 1800);
    }

    function restartGame() {
      startGame();
    }

    function toggleSound() {
      soundOn = !soundOn;
      soundBtn.textContent = soundOn ? "🔊 Lyd på" : "🔇 Lyd av";
    }

    function updateStats() {
      levelEl.textContent = level;
      movesEl.textContent = moves;
      comboEl.textContent = combo;
      pairsEl.textContent = pairs;
    }

    function confetti() {
      const colors = ["#ffe1aa", "#ffffff", "#ff8a3d", "#9cffb5", "#ffd166"];

      for (let i = 0; i < 80; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.55 + "s";
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);

        setTimeout(() => {
          piece.remove();
        }, 2400);
      }
    }

    function pawPop(card) {
      const rect = card.getBoundingClientRect();
      const paw = document.createElement("div");
      paw.className = "paw-pop";
      paw.textContent = "🐾";
      paw.style.left = rect.left + rect.width / 2 + "px";
      paw.style.top = rect.top + rect.height / 2 + "px";

      document.body.appendChild(paw);

      setTimeout(() => {
        paw.remove();
      }, 900);
    }

    startGame();
  </script>
</body>
</html>
