<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rediger butikk</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    margin:0;
    padding:30px;
    background:#eef4ff;
    font-family:Arial,sans-serif;
}

.box{
    max-width:850px;
    margin:auto;
    background:white;
    border-radius:24px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

h1{
    margin-top:0;
    font-size:38px;
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:8px;
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:14px;
    border-radius:14px;
    border:1px solid #d7d7d7;
    font-size:16px;
    box-sizing:border-box;
}

textarea{
    min-height:120px;
    resize:vertical;
}

button{
    margin-top:25px;
    background:#2563eb;
    color:white;
    border:none;
    padding:16px 24px;
    border-radius:14px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.preview{
    width:140px;
    height:140px;
    border-radius:22px;
    object-fit:cover;
    background:#f2f2f2;
    margin-bottom:10px;
}

.status{
    margin-top:18px;
    font-weight:bold;
    color:green;
}

</style>
</head>
<body>

<div class="box">

<h1>✏️ Rediger butikk</h1>

<div id="loading">Laster butikk...</div>

<div id="editor" style="display:none;">

<img id="logoPreview" class="preview">

<label>Logo URL</label>
<input id="logo">

<label>Butikknavn</label>
<input id="name">

<label>Beskrivelse</label>
<textarea id="description"></textarea>

<label>Telefon</label>
<input id="phone">

<label>Facebook / Nettside</label>
<input id="website">

<label>Bilde 1</label>
<input id="image1">

<label>Bilde 2</label>
<input id="image2">

<label>Bilde 3</label>
<input id="image3">

<button onclick="saveBusiness()">
💾 Lagre endringer
</button>

<div class="status" id="status"></div>

</div>

</div>

<script>

const SUPABASE_URL = "https://kxudiviidwwwclbzgdxy.supabase.co";
const SUPABASE_KEY = sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH

const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

const params = new URLSearchParams(window.location.search);

const id = params.get("id");
const edit = params.get("edit");

async function loadBusiness(){

    const { data, error } = await supabase
    .from("businesses")
    .select("*")
    .eq("id", id)
    .single();

    if(error || !data){
        document.getElementById("loading").innerHTML =
        "Fant ikke butikk";
        return;
    }

    if(edit !== data.edit_code){
        document.body.innerHTML =
        "<h1 style='font-family:Arial;padding:40px;'>Ingen tilgang</h1>";
        return;
    }

    document.getElementById("loading").style.display = "none";
    document.getElementById("editor").style.display = "block";

    document.getElementById("logo").value =
    data.logo || "";

    document.getElementById("name").value =
    data.name || "";

    document.getElementById("description").value =
    data.description || "";

    document.getElementById("phone").value =
    data.phone || "";

    document.getElementById("website").value =
    data.website || "";

    document.getElementById("image1").value =
    data.image1 || "";

    document.getElementById("image2").value =
    data.image2 || "";

    document.getElementById("image3").value =
    data.image3 || "";

    document.getElementById("logoPreview").src =
    data.logo || "";
}

loadBusiness();

async function saveBusiness(){

    const updates = {

        logo:
        document.getElementById("logo").value,

        name:
        document.getElementById("name").value,

        description:
        document.getElementById("description").value,

        phone:
        document.getElementById("phone").value,

        website:
        document.getElementById("website").value,

        image1:
        document.getElementById("image1").value,

        image2:
        document.getElementById("image2").value,

        image3:
        document.getElementById("image3").value
    };

    const { error } = await supabase
    .from("businesses")
    .update(updates)
    .eq("id", id);

    if(error){

        document.getElementById("status").innerHTML =
        "Feil ved lagring";

        return;
    }

    document.getElementById("status").innerHTML =
    "Endringer lagret 😍";

    document.getElementById("logoPreview").src =
    document.getElementById("logo").value;
}

</script>

</body>
</html>
