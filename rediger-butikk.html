<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rediger butikk</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  margin:0;
  padding:20px;
  background:#eef4ff;
  font-family:Arial,sans-serif;
}

.wrap{
  max-width:850px;
  margin:auto;
}

.card{
  background:white;
  border-radius:28px;
  padding:28px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
  margin-top:0;
}

label{
  display:block;
  margin-top:18px;
  margin-bottom:8px;
  font-weight:bold;
}

input,textarea{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #d6d6d6;
  box-sizing:border-box;
  font-size:16px;
}

textarea{
  min-height:120px;
  resize:vertical;
}

button{
  margin-top:24px;
  background:#2563eb;
  color:white;
  border:none;
  padding:16px 24px;
  border-radius:16px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

.status{
  margin-top:18px;
  font-weight:bold;
}

.logo-preview{
  width:140px;
  height:140px;
  object-fit:cover;
  border-radius:24px;
  background:#f1f5f9;
  display:block;
  margin-bottom:14px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  margin-top:14px;
}

.gallery img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:18px;
}

</style>
</head>

<body>

<div class="wrap">
<div class="card">

<h1>✏️ Rediger butikk</h1>
  <a id="backBtn"
style="
display:inline-block;
margin-bottom:20px;
text-decoration:none;
background:#e5e7eb;
padding:10px 16px;
border-radius:12px;
font-weight:bold;
color:#111;
">
← Tilbake til butikksiden
</a>

<div id="status" class="status">
Laster butikk...
</div>

<div id="editor" style="display:none;">

<h3>Logo</h3>

<img id="logoPreview" class="logo-preview">

<input type="file" id="logoFile" accept="image/*">

<label>Butikknavn</label>
<input id="name">

<label>Beskrivelse</label>
<textarea id="description"></textarea>

<label>Telefon</label>
<input id="phone">

<label>Facebook / Nettside</label>
<input id="website">

<label>🎥 Reel-link</label>
<input id="reel">

<h3>Bilder</h3>

<input type="file" id="galleryFiles" multiple accept="image/*">

<div id="gallery" class="gallery"></div>

<button onclick="saveShop()">
💾 Lagre endringer
</button>

</div>

</div>
</div>

<script>

const supabaseClient = window.supabase.createClient(
  "https://kxudiviidwwwclbzgdyx.supabase.co",
  "sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
);

const params = new URLSearchParams(window.location.search);

const id = params.get("id");
document.getElementById("backBtn").href =
"butikk.html?id=" + id + "&edit=TEST123";
let shop = null;
let galleryUrls = [];

function setStatus(text,color="black"){
  const s = document.getElementById("status");
  s.innerHTML = text;
  s.style.color = color;
}

function safeArray(value){

  if(!value) return [];

  if(Array.isArray(value)) return value;

  try{
    return JSON.parse(value);
  }catch{
    return [];
  }
}

async function uploadFile(file,folder){

  const fileName =
    Date.now() + "-" + file.name.replace(/\s/g,"_");

  const path = folder + "/" + fileName;

  const { error } = await supabaseClient.storage
    .from("story-images")
    .upload(path,file);

  if(error){
    throw error;
  }

  const { data } = supabaseClient.storage
    .from("story-images")
    .getPublicUrl(path);

  return data.publicUrl;
}

function renderGallery(){

  const gallery =
    document.getElementById("gallery");

  gallery.innerHTML = "";

  galleryUrls.forEach(url=>{

    const img = document.createElement("img");

    img.src = url;

    gallery.appendChild(img);
  });
}

async function loadShop(){

  const { data,error } = await supabaseClient
    .from("businesses")
    .select("*")
    .eq("id",id)
    .single();

  if(error || !data){

    setStatus(
      "Fant ikke butikk",
      "crimson"
    );

    return;
  }

  shop = data;

  document.getElementById("editor")
    .style.display = "block";

  document.getElementById("status")
    .style.display = "none";

  document.getElementById("name").value =
    data.name || "";

  document.getElementById("description").value =
    data.description || "";

  document.getElementById("phone").value =
    data.phone || "";

  document.getElementById("website").value =
    data.website || "";

  document.getElementById("reel").value =
    data.reel_url || "";

  document.getElementById("logoPreview").src =
    data.logo_url || "";

  galleryUrls = safeArray(data.gallery_urls);

  renderGallery();
}

async function saveShop(){

  try{

    setStatus("Lagrer ...","#2563eb");

    let logoUrl = shop.logo_url || "";

    const logoFile =
      document.getElementById("logoFile").files[0];

    if(logoFile){

      logoUrl = await uploadFile(
        logoFile,
        "butikk-logo"
      );
    }

    const files =
      document.getElementById("galleryFiles").files;

    if(files.length){

      for(let i=0;i<files.length;i++){

        const url = await uploadFile(
          files[i],
          "butikk-bilder"
        );

        galleryUrls.push(url);
      }
    }

    const updates = {

      name:
        document.getElementById("name").value,

      description:
        document.getElementById("description").value,

      phone:
        document.getElementById("phone").value,

      website:
        document.getElementById("website").value,

      reel_url:
        document.getElementById("reel").value,

      logo_url:
        logoUrl,

      gallery_urls:
        galleryUrls
    };

    const { error } = await supabaseClient
      .from("businesses")
      .update(updates)
      .eq("id",id);

    if(error){

      setStatus(
        "Feil ved lagring",
        "crimson"
      );

      console.log(error);

      return;
    }

    document.getElementById("logoPreview").src =
      logoUrl;

    renderGallery();

    setStatus(
      "✅ Endringer lagret",
      "green"
    );

  }catch(err){

    console.log(err);

    setStatus(
      "Feil: " + err.message,
      "crimson"
    );
  }
}

loadShop();

</script>

</body>
</html>
