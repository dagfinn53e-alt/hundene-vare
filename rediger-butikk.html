<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rediger butikk</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;background:#eef4ff;padding:20px;}
.card{max-width:700px;margin:auto;background:white;padding:25px;border-radius:24px;}
input,textarea{width:100%;padding:14px;margin:8px 0 16px;border-radius:12px;border:1px solid #ccc;}
button{padding:15px 22px;background:#2563eb;color:white;border:0;border-radius:14px;font-weight:bold;}
#status{font-weight:bold;margin:15px 0;color:#2563eb;}
</style>
</head>

<body>
<div class="card">
<h1>✏️ Rediger butikk</h1>

<div id="status">Laster butikk...</div>

<label>Butikknavn</label>
<input id="name">

<label>Beskrivelse</label>
<textarea id="description"></textarea>

<label>Telefon</label>
<input id="phone">

<label>Facebook / Nettside</label>
<input id="website">

<button onclick="saveShop()">💾 Lagre endringer</button>
</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://kxudiviidwwwclbzgdyx.supabase.co",
  "sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const edit = params.get("edit");

function statusText(text, color="black"){
  const el = document.getElementById("status");
  el.textContent = text;
  el.style.color = color;
}

if(edit !== "TEST123"){
  statusText("Ingen tilgang. Feil redigeringskode.", "crimson");
} else if(!id){
  statusText("Mangler butikk-ID i adressen.", "crimson");
} else {
  loadShop();
}

async function loadShop(){
  const { data, error } = await supabaseClient
    .from("businesses")
    .select("*")
    .eq("id", id)
    .single();

  if(error){
    statusText("Feil ved henting: " + error.message, "crimson");
    return;
  }

  document.getElementById("name").value = data.name || "";
  document.getElementById("description").value = data.description || "";
  document.getElementById("phone").value = data.phone || "";
  document.getElementById("website").value = data.website || "";

  statusText("Butikk hentet: " + data.name, "green");
}

async function saveShop(){
  const { error } = await supabaseClient
    .from("businesses")
    .update({
      name: document.getElementById("name").value,
      description: document.getElementById("description").value,
      phone: document.getElementById("phone").value,
      website: document.getElementById("website").value
    })
    .eq("id", id);

  if(error){
    statusText("Feil ved lagring: " + error.message, "crimson");
    return;
  }

  statusText("Endringer lagret 😊", "green");
  alert("Endringer lagret 😊");
}
</script>

</body>
</html>
