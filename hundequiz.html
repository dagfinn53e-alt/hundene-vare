<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❓ Hundequiz</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#eef6ff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.quiz-box{
  background:white;
  width:90%;
  max-width:500px;
  padding:30px;
  border-radius:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
}

h1{
  color:#123c73;
}

#question{
  font-size:24px;
  margin:25px 0;
  color:#123c73;
}

.answer-btn{
  display:block;
  width:100%;
  margin:10px 0;
  padding:15px;
  border:none;
  border-radius:15px;
  background:#2563eb;
  color:white;
  font-size:18px;
  cursor:pointer;
  transition:0.2s;
}

.answer-btn:hover{
  transform:scale(1.02);
}

#score{
  margin-top:20px;
  font-size:20px;
  font-weight:bold;
  color:#10b981;
}

.back{
  display:inline-block;
  margin-top:20px;
  text-decoration:none;
  color:#2563eb;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="quiz-box">

<h1>❓ Hundequiz</h1>

<div id="question"></div>

<div id="answers"></div>

<div id="score">Poeng: 0</div>

<a class="back" href="hundespill.html">
← Tilbake til spill
</a>

</div>

<script>

const quiz = [

{
  q:"Hva liker de fleste hunder best?",
  a:["Sjokolade","Tur og lek","Løk"],
  correct:1
},

{
  q:"Hva bør en hund alltid ha tilgang til?",
  a:["Rent vann","Brus","Kaffe"],
  correct:0
},

{
  q:"Hva betyr det ofte når hunden logrer?",
  a:["Den er glad eller spent","Den sover","Den kjører bil"],
  correct:0
},

{
  q:"Hva bruker hunden nesen mye til?",
  a:["Å lukte","Å skrive","Å tegne"],
  correct:0
},

{
  q:"Hva skal man gjøre før man klapper en ukjent hund?",
  a:["Spørre eieren","Rope høyt","Løpe mot den"],
  correct:0
},

{
  q:"Hvor mange bein har en vanlig hund?",
  a:["2","4","6"],
  correct:1
},

{
  q:"Hva gjør hunder ofte når de er glade?",
  a:["Logrer","Flyr","Sover i tre"],
  correct:0
},

{
  q:"Hva trenger hunder hver dag?",
  a:["Tur","Iskrem","Pizza"],
  correct:0
},

{
  q:"Hvilket dyr sier voff?",
  a:["Katt","Hund","Ku"],
  correct:1
},

{
  q:"Hva liker mange hunder å leke med?",
  a:["Ball","TV","Mobil"],
  correct:0
}

];

let current = 0;
let points = 0;

function showQuestion(){

  if(current >= quiz.length){

    document.getElementById("question").innerHTML =
    "🎉 Du er ferdig!";

    document.getElementById("answers").innerHTML = "";

    return;
  }

  const q = quiz[current];

  document.getElementById("question").innerHTML = q.q;

  const answersDiv = document.getElementById("answers");

  answersDiv.innerHTML = "";

  q.a.forEach((answer,index)=>{

    const btn = document.createElement("button");

    btn.className = "answer-btn";

    btn.innerHTML = answer;

    btn.onclick = ()=>checkAnswer(index);

    answersDiv.appendChild(btn);

  });

}

function checkAnswer(index){

  if(index === quiz[current].correct){

    points++;

    document.getElementById("score").innerHTML =
    "Poeng: " + points;

  }

  current++;

  showQuestion();

}

showQuestion();

</script>

</body>
</html>
