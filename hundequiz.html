<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❓ Hundequiz</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eef6ff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.quiz-box{
  background:white;
  width:90%;
  max-width:650px;
  padding:30px;
  border-radius:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.12);
  text-align:center;
}

h1{
  color:#123c73;
  margin-bottom:20px;
}

#question{
  font-size:26px;
  margin:25px 0;
  color:#123c73;
  font-weight:bold;
}

.answer-btn{
  display:block;
  width:100%;
  margin:12px 0;
  padding:16px;
  border:none;
  border-radius:18px;
  background:#2563eb;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.answer-btn:hover{
  background:#1d4ed8;
  transform:scale(1.02);
}

#score{
  margin-top:25px;
  font-size:24px;
  font-weight:bold;
  color:#10b981;
}

.back{
  display:inline-block;
  margin-top:25px;
  text-decoration:none;
  color:#2563eb;
  font-weight:bold;
  font-size:18px;
}

</style>
</head>

<body>

<div class="quiz-box">

<h1>❓ Hundequiz</h1>

<div id="question"></div>

<div id="answers"></div>

<div id="score">
Poeng: 0
</div>

<a class="back" href="hundespill.html">
← Tilbake til spill
</a>

</div>

<script>

const quiz = [

{
q:"Hva liker de fleste hunder best?",
a:["Sjokolade","Tur og lek","Løk"],
correct:1
},

{
q:"Hvor mange bein har en vanlig hund?",
a:["2","4","6"],
correct:1
},

{
q:"Hva sier en hund ofte?",
a:["Mjau","Voff","Mø"],
correct:1
},

{
q:"Hva trenger hunder hver dag?",
a:["Tur","Pizza","Brus"],
correct:0
},

{
q:"Hva bruker hunden nesen til?",
a:["Lukte","Synge","Tegne"],
correct:0
},

{
q:"Hvilket dyr er kjent som menneskets beste venn?",
a:["Hund","Ku","Fisk"],
correct:0
},

{
q:"Hva gjør en glad hund ofte?",
a:["Logrer","Flyr","Sover"],
correct:0
},

{
q:"Hva bør en hund alltid ha tilgang til?",
a:["Kaffe","Rent vann","Godteri"],
correct:1
},

{
q:"Hva liker mange hunder å leke med?",
a:["Ball","TV","Mobil"],
correct:0
},

{
q:"Hva bør man gjøre før man klapper en ukjent hund?",
a:["Spørre eieren","Løpe mot den","Rope høyt"],
correct:0
},

{
q:"Hvilken hunderase er veldig liten?",
a:["Chihuahua","Ulvehund","Newfoundland"],
correct:0
},

{
q:"Hvilken hunderase er kjent for å være stor og sterk?",
a:["Pomeranian","St. Bernard","Bichon Frise"],
correct:1
},

{
q:"Hva kan hunder lære?",
a:["Triks","Å kjøre bil","Å fly"],
correct:0
},

{
q:"Hva heter babyen til en hund?",
a:["Valp","Kalv","Kylling"],
correct:0
},

{
q:"Hva gjør hunder ofte når de er trøtte?",
a:["Sover","Danser","Kjører buss"],
correct:0
},

{
q:"Hvilken sans er veldig sterk hos hunder?",
a:["Luktesans","Smakssans","Syn"],
correct:0
},

{
q:"Hva bør hunder spise?",
a:["Hundemat","Sjokolade","Potetgull"],
correct:0
},

{
q:"Hva bruker mange hunder rundt halsen?",
a:["Halsbånd","Hjelm","Sko"],
correct:0
},

{
q:"Hva liker mange hunder å gjøre ute?",
a:["Gå tur","Kjøre traktor","Svømme i brus"],
correct:0
},

{
q:"Hvilket dyr logrer med halen?",
a:["Hund","Slange","Fugl"],
correct:0
},

{
q:"Hva gjør hunder ofte når noen kommer hjem?",
a:["Hilser","Gjemmer seg i skap","Spiller gitar"],
correct:0
},

{
q:"Hva kan en hund hente?",
a:["Ball","TV","Sofa"],
correct:0
},

{
q:"Hva trenger en valp mye av?",
a:["Omsorg","Kaffe","Mobil"],
correct:0
},

{
q:"Hva heter stedet hunder kan bo når eieren reiser bort?",
a:["Hundepensjonat","Skole","Bakeri"],
correct:0
},

{
q:"Hva er viktig for at hunder skal ha det bra?",
a:["Mosjon og kjærlighet","Bare godteri","Kun søvn"],
correct:0
}

];

let current = 0;
let points = 0;

function showQuestion(){

if(current >= quiz.length){

document.getElementById("question").innerHTML =
"🎉 Du er ferdig med quizzen!";

document.getElementById("answers").innerHTML =
`<button class="answer-btn" onclick="restartQuiz()">Start på nytt</button>`;

document.getElementById("score").innerHTML =
"Du fikk " + points + " poeng 🐶";

return;
}

const q = quiz[current];

document.getElementById("question").innerHTML = q.q;

const answersDiv = document.getElementById("answers");

answersDiv.innerHTML = "";

q.a.forEach((answer,index)=>{

const btn = document.createElement("button");

btn.className = "answer-btn";

btn.innerHTML = answer;

btn.onclick = ()=>checkAnswer(index);

answersDiv.appendChild(btn);

});

}

function checkAnswer(index){

if(index === quiz[current].correct){

points++;

alert("🎉 Riktig!");

}else{

alert("🙂 Feil!");

}

current++;

document.getElementById("score").innerHTML =
"Poeng: " + points;

showQuestion();

}

function restartQuiz(){

current = 0;
points = 0;

document.getElementById("score").innerHTML =
"Poeng: 0";

showQuestion();

}

showQuestion();

</script>

</body>
</html>
