function selectYear(year){
  selectedYear=year;
  updateChosen();
}

function selectCategory(category){
  selectedCategory=category;
  updateChosen();
}

function updateChosen(){
  document.getElementById("chosen").innerHTML=
  "Valgt: "+(selectedYear?selectedYear+"-tallet":"ingen tiår")+" / "+(selectedCategory||"ingen kategori");
}

function shuffleArray(array){
  let copy=[...array];
  for(let i=copy.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [copy[i],copy[j]]=[copy[j],copy[i]];
  }
  return copy;
}

function startQuiz(){
  if(!selectedYear || !selectedCategory){
    alert("Velg både tiår og kategori først.");
    return;
  }

  let key=selectedCategory==="Country" ? "Country" : selectedYear+"_"+selectedCategory;
  let pool=questions[key] || [];

  if(pool.length===0){
    alert("Denne kategorien har ikke spørsmål enda.");
    return;
  }

  activeQuestions=shuffleArray(pool).slice(0,10);
  currentQuestion=0;
  score=0;

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("result").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");

  showQuestion();
}

function showQuestion(){
  const q=activeQuestions[currentQuestion];

  let mixedAnswers=q.a.map((answer,index)=>{
    return {
      text:answer,
      isCorrect:index===q.correct
    };
  });

  mixedAnswers=shuffleArray(mixedAnswers);

  document.getElementById("question").innerText=q.q;
  document.getElementById("answers").innerHTML="";

  mixedAnswers.forEach((item)=>{
    const btn=document.createElement("button");
    btn.className="choice";
    btn.innerText=item.text;
    btn.onclick=()=>checkAnswer(item.isCorrect,btn);
    document.getElementById("answers").appendChild(btn);
  });

  document.getElementById("progress").innerText=
  "Spørsmål "+(currentQuestion+1)+" av "+activeQuestions.length;

  document.getElementById("score").innerText="Poeng: "+score;
}

function checkAnswer(isCorrect,btn){
  btn.blur();
  const buttons=document.querySelectorAll(".choice");
  buttons.forEach(b=>b.disabled=true);

  if(isCorrect){
    score++;
    btn.classList.add("correct");
  }else{
    btn.classList.add("wrong");

    buttons.forEach(b=>{
      if(b.onclick && b.innerText){
        const q=activeQuestions[currentQuestion];
        const riktigSvar=q.a[q.correct];
        if(b.innerText===riktigSvar){
          b.classList.add("correct");
        }
      }
    });
  }

  setTimeout(()=>{
    currentQuestion++;
    if(currentQuestion<activeQuestions.length){
      showQuestion();
    }else{
      showResult();
    }
  },1200);
}

function showResult(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("finalScore").innerText=
  "Du fikk "+score+" av "+activeQuestions.length+" riktige.";

  let medal="";
  if(score>=9) medal="🏆 Gullplate!";
  else if(score>=7) medal="🥈 Sølvplate!";
  else if(score>=5) medal="🥉 Bronseplate!";
  else medal="🎵 Prøv igjen!";

  document.getElementById("medal").innerText=medal;
}

function restart(){
  document.getElementById("result").classList.add("hidden");
  document.getElementById("setup").classList.remove("hidden");
}
