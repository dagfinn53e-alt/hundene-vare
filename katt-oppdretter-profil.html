<!DOCTYPE html><html lang="no"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Katteoppdretterprofil</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(#fdf2f8,#eef6ff,#fff7ed);color:#3b1f4f}.wrap{max-width:1150px;margin:auto;padding:14px 10px 60px}.top,.card{background:white;border:1px solid #fbcfe8;border-radius:26px;padding:18px;margin-bottom:14px;box-shadow:0 12px 28px #0001}.top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center}.logo{font-size:24px;font-weight:900;color:#be185d}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav a{background:#fdf2f8;color:#be185d;text-decoration:none;border:1px solid #fbcfe8;border-radius:999px;padding:10px 13px;font-weight:900}.hero{background:linear-gradient(135deg,#4a044e,#be185d,#7c3aed);color:white;border-radius:34px;padding:34px 18px;text-align:center;margin-bottom:14px}.avatar{width:120px;height:120px;border-radius:32px;background:#ffffff33;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:58px;overflow:hidden}.avatar img{width:100%;height:100%;object-fit:cover}.hero h1{font-size:clamp(2.1rem,7vw,4.1rem)}.hero p{font-weight:800;line-height:1.5;max-width:820px;margin:10px auto 0;white-space:pre-wrap}.layout{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}.card h2{font-size:28px;color:#9d174d;margin-bottom:8px}.card p{font-weight:700;color:#475569;line-height:1.6;white-space:pre-wrap}.info{background:#fdf2f8;border:1px solid #fbcfe8;border-radius:18px;padding:12px;margin-bottom:8px;font-weight:900;color:#831843}.info small{display:block;color:#64748b}.btn{display:flex;border-radius:999px;padding:13px;text-align:center;text-decoration:none;color:white;font-weight:900;background:linear-gradient(135deg,#be185d,#7c3aed);justify-content:center;margin-top:8px}.green{background:linear-gradient(135deg,#22c55e,#16a34a)}.dark{background:#111827}.empty{background:white;border:2px dashed #f9a8d4;border-radius:24px;padding:25px;text-align:center;font-weight:900;color:#831843;line-height:1.6}@media(max-width:760px){.layout{grid-template-columns:1fr}.top{justify-content:center}.logo{width:100%;text-align:center}.nav a{flex:1 1 42%;text-align:center;font-size:12px}}
</style></head><body><div class="wrap"><div class="top"><div class="logo">🐱 Katteoppdretterprofil</div><div class="nav"><a href="katt-oppdrettere.html">Oppdrettere</a><a href="katt-admin.html">Admin</a><a href="katt-oppdretterportal.html">Portal</a></div></div><div id="app"><div class="empty">Laster profil...</div></div></div>
<script>
const supabaseClient=window.supabase.createClient("https://kxudiviidwwwclbzgdyx.supabase.co","sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH");
function esc(v){return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
async function render(){const id=new URLSearchParams(location.search).get("id");if(!id){app.innerHTML='<div class="empty">Mangler ID.<br><br><a class="btn" href="katt-oppdrettere.html">Til oppdretterlisten</a></div>';return}const r=await supabaseClient.from("cat_breeders").select("*").eq("id",id).single();if(r.error||!r.data){app.innerHTML='<div class="empty">Fant ikke oppdretteren.<br><br><a class="btn" href="katt-oppdrettere.html">Til oppdretterlisten</a></div>';return}const b=r.data;document.title=b.name+" – Katteoppdretterprofil";app.innerHTML=`<section class="hero"><div class="avatar">${b.image_url?`<img src="${esc(b.image_url)}" alt="">`:"🐱"}</div><h1>${esc(b.name)}</h1><p>${esc(b.about||"Katteoppdretterprofil.")}</p></section><div class="layout"><main><section class="card"><h2>🐱 Om oppdrettet</h2><p>${esc(b.about||"Ingen beskrivelse lagt inn.")}</p></section><section class="card"><h2>❤️ Helse og oppfølging</h2><p>${esc(b.health||"Ikke oppgitt ennå.")}</p></section><section class="card"><h2>🐾 Aktive kattungekull</h2><p>Ingen godkjente kattungekull er koblet til denne oppdretteren ennå.</p></section></main><aside><section class="card"><h2>📋 Opplysninger</h2><div class="info"><small>Rase</small>${esc(b.breed||"Ikke oppgitt")}</div><div class="info"><small>Sted</small>${esc(b.place||b.area||"Ikke oppgitt")}</div><div class="info"><small>Status</small>${b.approved?"Godkjent":"Venter"}</div><div class="info"><small>Profil</small>${b.premium?"Premium":"Standard"}</div><a class="btn green" href="mailto:${esc(b.email||"")}">📧 Kontakt</a>${b.website?`<a class="btn" href="${esc(b.website)}" target="_blank">🌐 Nettside/Facebook</a>`:""}<a class="btn dark" href="katt-oppdrettere.html">🔎 Alle oppdrettere</a></section></aside></div>`}
render();
</script></body></html>
