<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Katteoppdretterprofil – Hundene våre</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:linear-gradient(180deg,#fdf2f8,#eef6ff,#fff7ed);color:#3b1f4f}
.wrap{max-width:1150px;margin:auto;padding:14px 10px 60px}.top,.card{background:#fff;border:1px solid #fbcfe8;border-radius:26px;padding:18px;margin-bottom:14px;box-shadow:0 12px 28px rgba(15,23,42,.08)}
.top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center}.logo{font-size:24px;font-weight:900;color:#be185d}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav a{background:#fdf2f8;color:#be185d;text-decoration:none;border:1px solid #fbcfe8;border-radius:999px;padding:10px 13px;font-weight:900}
.hero{background:linear-gradient(135deg,#4a044e,#be185d,#7c3aed);color:#fff;border-radius:34px;padding:34px 18px;text-align:center;margin-bottom:14px}.avatar{width:105px;height:105px;border-radius:32px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:58px}.hero h1{font-size:clamp(2.1rem,7vw,4.1rem)}.hero p{font-weight:800;line-height:1.5;max-width:820px;margin:10px auto 0;white-space:pre-wrap}
.layout{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}.card h2{font-size:28px;color:#9d174d;margin-bottom:8px}.card p{font-weight:700;color:#475569;line-height:1.6;white-space:pre-wrap}
.info{background:#fdf2f8;border:1px solid #fbcfe8;border-radius:18px;padding:12px;margin-bottom:8px;font-weight:900;color:#831843}.info small{display:block;color:#64748b}
.btn{display:flex;border-radius:999px;padding:13px;text-align:center;text-decoration:none;color:#fff;font-weight:900;background:linear-gradient(135deg,#be185d,#7c3aed);justify-content:center;margin-top:8px}.green{background:linear-gradient(135deg,#22c55e,#16a34a)}.dark{background:#111827}
.empty{background:#fff;border:2px dashed #f9a8d4;border-radius:24px;padding:25px;text-align:center;font-weight:900;color:#831843;line-height:1.6}
@media(max-width:760px){.layout{grid-template-columns:1fr}.top{justify-content:center}.logo{width:100%;text-align:center}.nav a{flex:1 1 42%;text-align:center;font-size:12px}}
</style>
</head><body><div class="wrap">
<div class="top"><div class="logo">🐱 Katteoppdretterprofil</div><div class="nav"><a href="katt-oppdrettere.html">Oppdrettere</a><a href="katt-admin-test.html">Admin Test</a><a href="katt-oppdretterportal.html">Portal</a></div></div>
<div id="app"></div></div>
<script>
const FALLBACK=[{id:101,type:"oppdretter",name:"Katteri Eksempel",breed:"Maine Coon",place:"Rogaland",email:"post@eksempel.no",status:"godkjent",premium:true,text:"Godkjent eksempeloppdretter. Denne vises hvis ingen testdata finnes."}];
function esc(v){return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function rows(){try{const s=localStorage.getItem("kattAdminTestRows");const d=s?JSON.parse(s):FALLBACK;return Array.isArray(d)&&d.length?d:FALLBACK}catch(e){return FALLBACK}}
function render(){
 const id=new URLSearchParams(location.search).get("id");
 const all=rows();
 const b=id?all.find(x=>String(x.id)===String(id)):all.find(x=>x.type==="oppdretter"&&x.status==="godkjent");
 if(!b){app.innerHTML='<div class="empty">Fant ikke oppdretteren.<br><br><a class="btn" href="katt-oppdrettere.html">Til oppdretterlisten</a></div>';return}
 document.title=b.name+" – Katteoppdretterprofil";
 app.innerHTML=`<section class="hero"><div class="avatar">🐱</div><h1>${esc(b.name)}</h1><p>${esc(b.text||"Katteoppdretterprofil.")}</p></section><div class="layout"><main><section class="card"><h2>🐱 Om oppdrettet</h2><p>${esc(b.text||"Ingen beskrivelse lagt inn.")}</p></section><section class="card"><h2>❤️ Helse og oppfølging</h2><p>Her kan oppdretteren senere vise helse, veterinærkontroll, vaksiner, ID-merking, stamtavle og tester.</p></section><section class="card"><h2>🐾 Aktive kattungekull</h2><p>Ingen godkjente kattungekull er koblet til denne oppdretteren ennå.</p></section></main><aside><section class="card"><h2>📋 Opplysninger</h2><div class="info"><small>Rase</small>${esc(b.breed||"Ikke oppgitt")}</div><div class="info"><small>Sted</small>${esc(b.place||"Ikke oppgitt")}</div><div class="info"><small>Status</small>${esc(b.status||"venter")}</div><div class="info"><small>Profil</small>${b.premium?"Premium":"Standard"}</div><a class="btn green" href="mailto:${esc(b.email||"")}">📧 Kontakt</a><a class="btn dark" href="katt-oppdrettere.html">🔎 Alle oppdrettere</a></section></aside></div>`;
}
render();
</script></body></html>
