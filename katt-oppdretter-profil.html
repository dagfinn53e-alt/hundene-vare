<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Katteoppdretterprofil – Hundene våre</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#be185d;
  --purple:#7c3aed;
  --dark:#3b1f4f;
  --muted:#64748b;
  --line:#fbcfe8;
  --soft:#fdf2f8;
}
body{
  font-family:Arial,sans-serif;
  color:var(--dark);
  min-height:100vh;
  background:
    radial-gradient(circle at 8% 6%,rgba(255,210,238,.55),transparent 30%),
    radial-gradient(circle at 92% 8%,rgba(190,225,255,.55),transparent 34%),
    linear-gradient(180deg,#fdf2f8,#eef6ff 48%,#fff7ed);
}
.wrap{max-width:1220px;margin:auto;padding:16px 10px 70px}
.top{
  display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
  background:white;border:1px solid var(--line);border-radius:28px;padding:14px 16px;
  box-shadow:0 14px 34px rgba(15,23,42,.10);margin-bottom:16px
}
.logo{font-size:24px;font-weight:900;color:var(--pink)}
.nav{display:flex;gap:8px;flex-wrap:wrap}
.nav a{
  background:var(--soft);color:var(--pink);text-decoration:none;border:1px solid var(--line);
  border-radius:999px;padding:10px 13px;font-weight:900;font-size:14px
}
.hero{
  background:
    radial-gradient(circle at 20% 20%,rgba(255,255,255,.35),transparent 25%),
    radial-gradient(circle at 88% 12%,rgba(255,214,230,.35),transparent 25%),
    linear-gradient(135deg,#4a044e,var(--pink) 48%,var(--purple));
  color:white;border-radius:46px;padding:42px 22px;text-align:center;
  box-shadow:0 28px 70px rgba(76,29,149,.28);margin-bottom:18px
}
.avatar{
  width:132px;height:132px;border-radius:42px;background:rgba(255,255,255,.18);
  border:2px solid rgba(255,255,255,.55);display:flex;align-items:center;justify-content:center;
  font-size:76px;margin:0 auto 16px;box-shadow:0 18px 34px rgba(0,0,0,.18)
}
.hero h1{font-size:clamp(2.4rem,7vw,4.8rem);line-height:1.05;margin-bottom:10px}
.hero p{font-size:18px;font-weight:700;line-height:1.55;color:#fff1f7;max-width:860px;margin:auto}
.badges{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:14px}
.badge{
  display:inline-flex;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.32);
  border-radius:999px;padding:9px 13px;font-weight:900;font-size:13px
}
.gold{background:linear-gradient(135deg,#fff7c2,#ffd166);color:#6b3a00;border-color:#f59e0b}
.layout{display:grid;grid-template-columns:1.25fr .75fr;gap:18px}
.card{
  background:white;border:1px solid var(--line);border-radius:32px;padding:22px;
  box-shadow:0 16px 34px rgba(15,23,42,.10);margin-bottom:18px
}
.card h2{font-size:30px;color:#9d174d;margin-bottom:10px}
.card p{color:#475569;font-weight:700;line-height:1.65;font-size:16px;white-space:pre-wrap}
.infoGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info{
  background:var(--soft);border:1px solid var(--line);border-radius:18px;
  padding:13px;font-weight:900;color:#831843;line-height:1.35
}
.info small{display:block;color:#64748b;font-size:12px;margin-bottom:4px}
.actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px}
.btn{
  display:flex;align-items:center;justify-content:center;text-align:center;text-decoration:none;
  color:white;font-weight:900;border-radius:999px;padding:14px 18px;
  background:linear-gradient(135deg,var(--pink),var(--purple))
}
.green{background:linear-gradient(135deg,#22c55e,#16a34a)}
.dark{background:#111827}
.orange{background:linear-gradient(135deg,#f97316,#db2777)}
.blue{background:linear-gradient(135deg,#0b5cff,#2563eb)}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pic{
  min-height:132px;background:linear-gradient(135deg,#fdf2f8,#eef6ff);
  border:1px solid var(--line);border-radius:18px;display:flex;align-items:center;justify-content:center;
  color:#be185d;font-size:34px;font-weight:900
}
.litterBox{
  background:linear-gradient(135deg,#fff,#fdf2f8);border:1px solid var(--line);
  border-radius:22px;padding:16px;margin-top:10px
}
.litterBox h3{color:#9d174d;margin-bottom:8px}
.empty{
  background:white;border:2px dashed #f9a8d4;border-radius:28px;padding:28px;
  text-align:center;color:#831843;font-weight:900;margin-bottom:18px
}
.footer{text-align:center;font-weight:900;color:#831843;margin-top:34px}
@media(max-width:900px){
  .layout{grid-template-columns:1fr}
}
@media(max-width:700px){
  .wrap{padding:9px 8px 50px}
  .top{justify-content:center}
  .logo{width:100%;text-align:center;font-size:20px}
  .nav{width:100%;justify-content:center}
  .nav a{flex:1 1 42%;text-align:center;font-size:12px;padding:9px 7px}
  .hero{border-radius:28px;padding:32px 14px}
  .avatar{width:104px;height:104px;border-radius:32px;font-size:58px}
  .card{padding:17px;border-radius:24px}
  .card h2{font-size:24px}
  .infoGrid,.gallery{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">

<div class="top">
  <div class="logo">🐱 Katteoppdretterprofil</div>
  <div class="nav">
    <a href="katt-oppdretterportal.html">🐱 Portal</a>
    <a href="katt-oppdrettere.html">🔎 Oppdrettere</a>
    <a href="katt-admin-test.html">🔐 Admin Test</a>
    <a href="kattungekull.html">🐾 Kull</a>
  </div>
</div>

<div id="app"></div>

<div class="footer">Hundenevåre.com – Katteoppdretterprofil Premium 🐱</div>
</div>

<script>
const DEFAULT_ROWS = [
  {id:101,type:"oppdretter",name:"Katteri Eksempel",breed:"Maine Coon",place:"Rogaland",email:"post@eksempel.no",status:"venter",premium:true,text:"Testregistrering for katteoppdretter. Skal kunne godkjennes, avvises, redigeres og slettes."},
  {id:102,type:"oppdretter",name:"Skogpus Eksempel",breed:"Norsk Skogkatt",place:"Vestland",email:"kontakt@skogpus.no",status:"godkjent",premium:false,text:"Godkjent eksempeloppdretter for test av visning og premium."},
  {id:103,type:"oppdretter",name:"Ragdollstua",breed:"Ragdoll",place:"Trøndelag",email:"hei@ragdoll.no",status:"avvist",premium:false,text:"Eksempel på avvist registrering."},
  {id:201,type:"kull",name:"Maine Coon-kull forventes",breed:"Maine Coon",place:"Rogaland",email:"post@eksempel.no",status:"venter",premium:false,text:"Planlagt kattungekull."},
  {id:202,type:"kull",name:"Norsk Skogkatt-kull",breed:"Norsk Skogkatt",place:"Vestland",email:"kontakt@skogpus.no",status:"godkjent",premium:false,text:"Eksempel på godkjent kattungekull."},
  {id:203,type:"kull",name:"Britisk Korthår-kull",breed:"Britisk Korthår",place:"Oslo",email:"britisk@example.no",status:"venter",premium:true,text:"Premium eksempel-kull."}
];

function esc(v){
  return String(v||"")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

function rows(){
  try{
    const saved=localStorage.getItem("kattAdminTestRows");
    return saved ? JSON.parse(saved) : DEFAULT_ROWS;
  }catch(e){
    return DEFAULT_ROWS;
  }
}

function getId(){
  const p=new URLSearchParams(location.search);
  return p.get("id");
}

function firstApprovedBreeder(all){
  return all.find(x=>x.type==="oppdretter" && x.status==="godkjent") || all.find(x=>x.type==="oppdretter");
}

function render(){
  const all=rows();
  const id=getId();
  let breeder = id ? all.find(x=>String(x.id)===String(id)) : firstApprovedBreeder(all);

  if(!breeder || breeder.type!=="oppdretter"){
    app.innerHTML = `
      <div class="empty">
        Fant ikke oppdretteren. Gå tilbake til katteoppdretterlisten og åpne profilen derfra.<br><br>
        <a class="btn" href="katt-oppdrettere.html" style="display:inline-flex;max-width:260px;margin:auto">Til oppdretterlisten</a>
      </div>
    `;
    return;
  }

  const litters = all.filter(x =>
    x.type==="kull" &&
    x.status==="godkjent" &&
    (
      String(x.email||"").toLowerCase() === String(breeder.email||"").toLowerCase() ||
      String(x.breed||"").toLowerCase() === String(breeder.breed||"").toLowerCase()
    )
  );

  document.title = breeder.name + " – Katteoppdretterprofil";

  app.innerHTML = `
    <section class="hero">
      <div class="avatar">🐱</div>
      <h1>${esc(breeder.name)}</h1>
      <p>${esc(breeder.text || "Katteoppdretterprofil på Hundenevåre.com.")}</p>
      <div class="badges">
        <span class="badge gold">🏆 Katteoppdretter</span>
        <span class="badge">🐱 ${esc(breeder.breed || "Rase ikke oppgitt")}</span>
        <span class="badge">📍 ${esc(breeder.place || "Sted ikke oppgitt")}</span>
        ${breeder.premium ? '<span class="badge gold">⭐ Premium</span>' : ''}
      </div>
    </section>

    <div class="layout">
      <main>
        <section class="card">
          <h2>🐱 Om oppdrettet</h2>
          <p>${esc(breeder.text || "Ingen beskrivelse lagt inn ennå.")}</p>
        </section>

        <section class="card">
          <h2>❤️ Helse og oppfølging</h2>
          <p>Her kan oppdretteren senere vise informasjon om helse, veterinærkontroll, vaksiner, ID-merking, stamtavle, tester og hvordan kattungene følges opp før levering.</p>
        </section>

        <section class="card">
          <h2>📸 Galleri</h2>
          <div class="gallery">
            <div class="pic">🐱</div>
            <div class="pic">🐾</div>
            <div class="pic">❤️</div>
          </div>
        </section>

        <section class="card">
          <h2>🐾 Aktive kattungekull</h2>
          ${
            litters.length
            ? litters.map(k=>`
              <div class="litterBox">
                <h3>${esc(k.name)}</h3>
                <p><b>Rase:</b> ${esc(k.breed)}<br><b>Sted:</b> ${esc(k.place)}<br>${esc(k.text)}</p>
                <a class="btn orange" href="kattungekull.html">Se kattungekull</a>
              </div>
            `).join("")
            : '<p>Ingen godkjente kattungekull er koblet til denne oppdretteren ennå.</p>'
          }
        </section>
      </main>

      <aside>
        <section class="card">
          <h2>📋 Opplysninger</h2>
          <div class="infoGrid">
            <div class="info"><small>Rase</small>${esc(breeder.breed || "Ikke oppgitt")}</div>
            <div class="info"><small>Sted</small>${esc(breeder.place || "Ikke oppgitt")}</div>
            <div class="info"><small>Status</small>${esc(breeder.status || "venter")}</div>
            <div class="info"><small>Profil</small>${breeder.premium ? "Premium" : "Standard"}</div>
          </div>
          <div class="actions">
            <a class="btn green" href="mailto:${esc(breeder.email || "")}">📧 Kontakt</a>
            <a class="btn blue" href="kattungekull.html">🐾 Kattungekull</a>
            <a class="btn dark" href="katt-oppdrettere.html">🔎 Alle oppdrettere</a>
          </div>
        </section>

        <section class="card">
          <h2>🔐 Testinfo</h2>
          <p>Denne profilen henter data fra samme testlager som Katt Admin Test. Senere kobler vi samme design til Supabase.</p>
        </section>
      </aside>
    </div>
  `;
}

render();
</script>
</body>
</html>
