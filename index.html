<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre</title>

<style>
body{font-family:Arial;margin:0;background:#f3f6fb}
.wrap{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:20px;margin-bottom:20px}
.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
button{padding:15px;border-radius:15px;border:none;background:#2563eb;color:#fff;font-weight:bold}
.hidden{display:none}
</style>

</head>
<body>

<div class="wrap">

<div id="home" class="card">
<h2>Hundene våre 🐶</h2>

<div class="menu-grid">
<button onclick="show('stavanger')">Stavanger</button>
<button onclick="show('haugalandet')">Haugalandet</button>
</div>
</div>

<div id="stavanger" class="card hidden">
<h3>Stavanger</h3>

<div class="menu-grid">
<button>Frisører</button>
<button>Zoo butikker</button>
<button>Hundepensjonat</button>
<button>Veterinærer</button>
</div>

<br>
<button onclick="show('home')">← Tilbake</button>
</div>

<div id="haugalandet" class="card hidden">
<h3>Haugalandet</h3>

<div class="menu-grid">
<button>Frisører</button>
<button>Zoo butikker</button>
<button>Hundepensjonat</button>
<button>Veterinærer</button>
</div>

<br>
<button onclick="show('home')">← Tilbake</button>
</div>

</div>

<script>
function show(page){
document.getElementById('home').classList.add('hidden')
document.getElementById('stavanger').classList.add('hidden')
document.getElementById('haugalandet').classList.add('hidden')

document.getElementById(page).classList.remove('hidden')
}
</script>

</body>
</html>
