<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hundene våre</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>Hundene våre 🐶</h1>

<h3>Logg inn</h3>
<input id="email" placeholder="E-post">
<input id="password" type="password" placeholder="Passord">
<button onclick="login()">Logg inn</button>

<h3>Ny fortelling</h3>
<input id="title" placeholder="Tittel">
<textarea id="text"></textarea>
<input type="file" id="imageFile">
<button onclick="save()">Lagre</button>

<div id="feed"></div>

<script>

const supabase = window.supabase.createClient(
"https://kxudiviidwwwclbzgdyx.supabase.co",
"sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
);

async function login(){
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;
await supabase.auth.signInWithPassword({email,password});
alert("innlogget");
}

async function save(){

const { data } = await supabase.auth.getUser();
const user = data.user;

if(!user){
alert("logg inn først");
return;
}

const title=document.getElementById("title").value;
const text=document.getElementById("text").value;

await supabase.from("stories").insert([{title,text}]);

alert("lagret");

load();
}

async function load(){
const {data}=await supabase.from("stories").select("*").order("id",{ascending:false});

document.getElementById("feed").innerHTML=data.map(s=>`
<div>
<h3>${s.title}</h3>
<p>${s.text}</p>
</div>
`).join("");
}

load();

</script>

</body>
</html>
