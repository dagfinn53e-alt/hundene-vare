<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #eef5ff;
}

.container {
  max-width: 600px;
  margin: 40px auto;
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="container">

<h1>Hundene våre 🐶</h1>

<input id="email" placeholder="E-post">
<input id="password" type="password" placeholder="Passord">

<button onclick="alert('KNAPP VIRKER')">Lag konto</button>
<button onclick="alert('LOGIN VIRKER')">Logg inn</button>

<hr>

<input id="title" placeholder="Tittel">
<textarea id="text" placeholder="Skriv om hunden..."></textarea>

<button onclick="save()">Lagre</button>

<div id="feed"></div>

</div>

<script>

<script>
const supabase = window.supabase.createClient(
  "https://kxudiviidwwwclbzgdyx.supabase.co",
  "sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
);

async function signup() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Skriv inn e-post og passord");
    return;
  }

  const { error } = await supabase.auth.signUp({ email, password });

  if (error) {
    alert("Feil: " + error.message);
    return;
  }

  alert("Konto opprettet");
}

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Skriv inn e-post og passord");
    return;
  }

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    alert("Feil: " + error.message);
    return;
  }

  alert("Innlogget");
}

async function save() {
  const { data: userData } = await supabase.auth.getUser();
  const user = userData.user;

  if (!user) {
    alert("Du må logge inn først");
    return;
  }

  const title = document.getElementById("title").value.trim();
  const text = document.getElementById("text").value.trim();

  if (!title || !text) {
    alert("Skriv inn tittel og tekst");
    return;
  }

  const { error } = await supabase.from("stories").insert([{
    user_id: user.id,
    author_email: user.email,
    title: title,
    dog: "",
    place: "",
    category: "Hverdag",
    text: text,
    image_url: ""
  }]);

  if (error) {
    alert("Feil: " + error.message);
    return;
  }

  alert("Lagret");
  load();
}

async function load() {
  const { data, error } = await supabase
    .from("stories")
    .select("*")
    .order("id", { ascending: false });

  if (error) {
    document.getElementById("feed").innerHTML = "Feil ved henting";
    return;
  }

  document.getElementById("feed").innerHTML = data.map(s => `
    <div style="background:#fff;padding:10px;margin-top:10px;border-radius:10px;">
      <h3>${s.title || ""}</h3>
      <p>${s.text || ""}</p>
    </div>
  `).join("");
}

load();
</script>
