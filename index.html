<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f4f8ff;
}

.top{
  background:#2563eb;
  color:white;
  padding:30px;
  text-align:center;
}

.stats{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:15px;
  flex-wrap:wrap;
}

.stat{
  background:white;
  color:#2563eb;
  padding:10px 15px;
  border-radius:10px;
}

.menu{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:20px;
}

.menu button{
  padding:15px;
  border:none;
  border-radius:10px;
  background:white;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* REKLAME */
.promo-box{
  max-width:320px;
  margin:20px auto;
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}

.promo-label{
  background:#2563eb;
  color:white;
  font-size:12px;
  padding:5px;
}

.promo-box img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.promo-content{
  padding:10px;
}

</style>
</head>

<body>

<div class="top">
  <h1>Hundene våre 🐾</h1>
  <p>Del bilder og opplevelser</p>

  <div class="stats">
    <div class="stat">Frisører</div>
    <div class="stat">Veterinærer</div>
    <div class="stat">Zoobutikker</div>
  </div>
</div>

<!-- REKLAME -->
<div class="promo-box">
  <div class="promo-label">Ukens tilbud</div>
  <img src="https://images.unsplash.com/photo-1601758003122-58b3d5d8e94b">
  <div class="promo-content">
    <strong>Zoobutikken Karmøy</strong>
    <div>-20% på hundefôr</div>
    <div style="font-size:12px;color:#666;">10–20 april</div>
  </div>
</div>

<div class="menu">
  <button>📸 Bilder</button>
  <button>📅 Aktiviteter</button>
  <button>✂️ Frisører</button>
  <button>🏥 Veterinær</button>
</div>

</body>
</html>
