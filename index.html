<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f5f9ff;
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:15px;
}

.hero{
  background:#2563eb;
  color:#fff;
  padding:25px;
  border-radius:20px;
}

.region-chip{
  background:#ffffff33;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  margin-right:8px;
  color:#fff;
  cursor:pointer;
}

.region-chip.active{
  background:#fff;
  color:#2563eb;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:20px;
  margin-top:15px;
}

.menu-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:15px;
}

.menu-btn{
  padding:15px;
  border-radius:15px;
  border:none;
  cursor:pointer;
  background:#e0e7ff;
  font-weight:bold;
}

.hidden{display:none;}
</style>
</head>

<body>
<div class="wrap">

<div class="hero">
<h1>Hundene våre 🐾</h1>

<button id="haugalandet" class="region-chip active" onclick="setRegion('Haugalandet')">Haugalandet</button>
<button id="stavanger" class="region-chip" onclick="setRegion('Stavanger')">Stavanger</button>

</div>

<div class="card">
<h2>Utforsk appen</h2>

<div class="menu-grid">
<button class="menu-btn" onclick="showType('Frisør')">✂️ Frisører</button>
<button class="menu-btn" onclick="showType('Zoo')">🐾 Zoo butikker</button>
<button class="menu-btn" onclick="showType('Veterinær')">🏥 Veterinærer</button>
<button class="menu-btn" onclick="toggleForm()">➕ Legg inn bedrift</button>
</div>
</div>

<div id="formBox" class="card hidden">
<h3>Registrer bedrift</h3>

<select id="type">
<option>Frisør</option>
<option>Zoo</option>
<option>Veterinær</option>
</select>

<select id="regionSelect">
<option>Haugalandet</option>
<option>Stavanger</option>
</select>

<input id="name" placeholder="Navn">
<input id="place" placeholder="Sted">
<textarea id="text" placeholder="Beskrivelse"></textarea>

<button onclick="save()">Lagre</button>
</div>

<div id="list"></div>

</div>

<script>
let currentRegion = "Haugalandet";
let currentType = "";

// Bytt region
function setRegion(r){
  currentRegion = r;

  document.getElementById("haugalandet").classList.remove("active");
  document.getElementById("stavanger").classList.remove("active");

  if(r==="Haugalandet") document.getElementById("haugalandet").classList.add("active");
  if(r==="Stavanger") document.getElementById("stavanger").classList.add("active");

  load();
}

// Vis kategori
function showType(type){
  currentType = type;
  load();
}

// Vis/skjul skjema
function toggleForm(){
  document.getElementById("formBox").classList.toggle("hidden");
}

// Lagre
function save(){
  let data = {
    name:document.getElementById("name").value,
    place:document.getElementById("place").value,
    text:document.getElementById("text").value,
    type:document.getElementById("type").value,
    region:document.getElementById("regionSelect").value
  };

  let list = JSON.parse(localStorage.getItem("biz")||"[]");
  list.push(data);
  localStorage.setItem("biz", JSON.stringify(list));

  alert("Lagret!");

  load();
}

// Last inn
function load(){
  let list = JSON.parse(localStorage.getItem("biz")||"[]");

  let html = "";

  list.forEach(b=>{
    if(b.region !== currentRegion) return;
    if(currentType && b.type !== currentType) return;

    html += `
    <div class="card">
      <h3>${b.name}</h3>
      <p>${b.place}</p>
      <p>${b.text}</p>
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

// Start
load();
</script>

</body>
</html>
