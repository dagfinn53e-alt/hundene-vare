<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #eef4fb;
  margin: 0;
}

/* TOPP */
.topbar {
  background: white;
  padding: 15px;
  border-radius: 20px;
  margin: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2d6cdf;
}

.nav button {
  background: #2d6cdf;
  color: white;
  border: none;
  padding: 10px 15px;
  margin-left: 5px;
  border-radius: 20px;
  cursor: pointer;
}

/* HERO */
.hero {
  margin: 10px;
  border-radius: 20px;
  padding: 30px;
  color: white;
  background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
              url('https://images.unsplash.com/photo-1518717758536-85ae29035b6d') center/cover;
}

.hero h1 {
  margin: 0;
}

/* UKENS KNAPP */
.ukens-btn {
  margin: 15px;
}

.ukens-btn button {
  background: #2d6cdf;
  color: white;
  padding: 15px;
  border: none;
  border-radius: 25px;
  width: 90%;
  font-size: 18px;
}

/* BANNER */
.banner {
  margin: 10px;
  background: white;
  border-radius: 20px;
  overflow: hidden;
}

.banner img {
  width: 100%;
  display: block;
}

.banner .content {
  padding: 10px;
}

.banner button {
  background: #2d6cdf;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 20px;
}

/* KATEGORIER */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin: 10px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
}
</style>
</head>

<body>

<!-- TOPP -->
<div class="topbar">
  <div class="logo">Hundene våre 🐶</div>
  <div class="nav">
    <button>Opprett konto / Logg inn</button>
    <button>Forside</button>
    <button>Admin</button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Hundene våre</h1>
  <p>Del hundebilder, historier og opplevelser.</p>
</div>

<!-- UKENS KNAPP -->
<div class="ukens-btn">
  <button>🐾 Se Ukens tilbud</button>
</div>

<!-- BANNER (HER KOMMER DITT TILBUD) -->
<div class="banner" id="banner">
  <img src="https://via.placeholder.com/800x200" id="bannerImg">
  <div class="content">
    <h3 id="bannerTitle">Ukens tilbud</h3>
    <p id="bannerStore">Din butikk</p>
    <button>Se nå</button>
  </div>
</div>

<!-- KATEGORIER -->
<div class="grid">
  <div class="card">Nyheter fra butikk</div>
  <div class="card">Turtips</div>
  <div class="card">Frisører</div>
  <div class="card">Zoobutikker</div>
  <div class="card">Veterinærer</div>
  <div class="card">Hundepensjonat</div>
  <div class="card">Hundeklubber</div>
  <div class="card">Bedrift</div>
</div>

<script>

*/
</script>

</body>
</html>
