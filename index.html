<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hundene våre</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef5ff;
      color: #111827;
    }
    .wrap {
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
      margin-bottom: 16px;
    }
    h1, h2 { margin-top: 0; text-align: center; }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin: 8px 0 12px 0;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
    }
    textarea { min-height: 120px; resize: vertical; }
    .btnrow {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #1d4ed8;
      color: white;
      cursor: pointer;
    }
    #status {
      margin-top: 12px;
      text-align: center;
      font-weight: bold;
    }
    .post {
      background: #f8fbff;
      border: 1px solid #dbeafe;
      border-radius: 12px;
      padding: 12px;
      margin-top: 10px;
    }
    .meta {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Hundene våre 🐶</h1>

      <input id="email" type="email" placeholder="E-post" />
      <input id="password" type="password" placeholder="Passord" />

      <div class="btnrow">
        <button type="button" onclick="signup()">Lag konto</button>
        <button type="button" onclick="login()">Logg inn</button>
      </div>

      <div id="status"></div>
    </div>

    <div class="card">
      <h2>Nytt innlegg</h2>
      <input id="title" placeholder="Tittel" />
      <input id="dog" placeholder="Hundens navn" />
      <input id="place" placeholder="Sted" />
      <textarea id="text" placeholder="Skriv om hunden..."></textarea>

      <div class="btnrow">
        <button type="button" onclick="savePost()">Lagre</button>
        <button type="button" onclick="loadPosts()">Oppdater innlegg</button>
      </div>
    </div>

    <div class="card">
      <h2>Innlegg</h2>
      <div id="feed">Laster ...</div>
    </div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      "https://kxudiviidwwwclbzgdyx.supabase.co",
      "sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
    );

    function setStatus(text, color = "black") {
      const el = document.getElementById("status");
      el.textContent = text;
      el.style.color = color;
    }

    async function signup() {
      setStatus("Oppretter konto ...");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        setStatus("Skriv inn e-post og passord.", "crimson");
        return;
      }

      const { error } = await supabase.auth.signUp({
        email: email,
        password: password
      });

      if (error) {
        setStatus("Feil: " + error.message, "crimson");
        return;
      }

      setStatus("Konto opprettet. Sjekk e-post hvis bekreftelse er på.", "green");
    }

    async function login() {
      setStatus("Logger inn ...");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        setStatus("Skriv inn e-post og passord.", "crimson");
        return;
      }

      const { error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        setStatus("Feil: " + error.message, "crimson");
        return;
      }

      setStatus("Innlogget.", "green");
    }

    async function savePost() {
      setStatus("Lagrer ...");

      const { data: userData } = await supabase.auth.getUser();
      const user = userData.user;

      if (!user) {
        setStatus("Du må logge inn først.", "crimson");
        return;
      }

      const title = document.getElementById("title").value.trim();
      const dog = document.getElementById("dog").value.trim();
      const place = document.getElementById("place").value.trim();
      const text = document.getElementById("text").value.trim();

      if (!title || !dog || !place || !text) {
        setStatus("Fyll inn tittel, hund, sted og tekst.", "crimson");
        return;
      }

      const { error } = await supabase.from("stories").insert([{
        user_id: user.id,
        author_email: user.email,
        title: title,
        dog: dog,
        place: place,
        category: "Hverdag",
        text: text,
        image_url: ""
      }]);

      if (error) {
        setStatus("Feil ved lagring: " + error.message, "crimson");
        return;
      }

      document.getElementById("title").value = "";
      document.getElementById("dog").value = "";
      document.getElementById("place").value = "";
      document.getElementById("text").value = "";

      setStatus("Lagret!", "green");
      loadPosts();
    }

    async function loadPosts() {
      const feed = document.getElementById("feed");
      feed.textContent = "Laster ...";

      const { data, error } = await supabase
        .from("stories")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        feed.textContent = "Feil ved henting: " + error.message;
        return;
      }

      if (!data || !data.length) {
        feed.textContent = "Ingen innlegg enda.";
        return;
      }

      feed.innerHTML = data.map(post => `
        <div class="post">
          <h3>${escapeHtml(post.title || "")}</h3>
          <div class="meta">${escapeHtml(post.dog || "")} · ${escapeHtml(post.place || "")}</div>
          <p>${escapeHtml(post.text || "")}</p>
        </div>
      `).join("");
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, function (m) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[m];
      });
    }

    load();
  </script>
</body>
</html>
