  
<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {margin:0;font-family:Arial;background:#eef5ff;}
.wrap{max-width:900px;margin:auto;padding:20px;}
.hero{background:#1d4ed8;color:#fff;padding:20px;border-radius:20px;}
.card{background:#fff;padding:15px;border-radius:15px;margin-top:15px;}
input,textarea{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:1px solid #ccc;}
button{margin-top:10px;padding:10px 15px;border:none;border-radius:10px;background:#1d4ed8;color:#fff;cursor:pointer;}
</style>
</head>

<body>

<div class="wrap">

<div class="hero">
<h1>Hundene våre 🐶</h1>
<p>Del turer og opplevelser med hunden din</p>
</div>

<div class="card">
<h3>Logg inn</h3>
<input id="email" placeholder="E-post">
<input id="password" type="password" placeholder="Passord">
<button onclick="login()">Logg inn</button>
</div>

<div class="card">
<h3>Ny fortelling</h3>
<input id="title" placeholder="Tittel">
<textarea id="text" placeholder="Skriv noe..."></textarea>
<input type="file" id="imageFile">
<button onclick="save()">Lagre</button>
</div>

<div id="feed"></div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://kxudiviidwwwclbzgdyx.supabase.co",
"sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
);

async function login(){
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;
await supabase.auth.signInWithPassword({email,password});
alert("Innlogget");
}

async function save(){

const {data:userData}=await supabase.auth.getUser();
if(!userData.user){alert("Logg inn først");return;}

const title=document.getElementById("title").value;
const text=document.getElementById("text").value;
const file=document.getElementById("imageFile").files[0];

let image_url="";

if(file){
const name=Date.now()+file.name;
await supabase.storage.from("story-images").upload(name,file);
image_url=supabase.storage.from("story-images").getPublicUrl(name).data.publicUrl;
}

await supabase.from("stories").insert([{title,text,image_url}]);

alert("Lagret!");
load();
}

async function load(){
const {data}=await supabase.from("stories").select("*").order("id",{ascending:false});
document.getElementById("feed").innerHTML=data.map(s=>`
<div class="card">
<h3>${s.title}</h3>
<p>${s.text}</p>
${s.image_url?`<img src="${s.image_url}" style="width:100%;margin-top:10px;">`:""}
</div>
`).join("");
}

load();

</script>

</body>
</html>
