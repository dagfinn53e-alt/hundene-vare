
<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;margin:0;background:#f4f7fb}
.wrap{max-width:900px;margin:auto;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px}
button{padding:10px;border:none;border-radius:8px;background:#2563eb;color:#fff}
input,textarea,select{width:100%;padding:10px;margin:5px 0}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">

<h2>Hundene våre 🐶</h2>

<button onclick="showPage('turtips')">🥾 Turtips</button>

<div id="page-turtips" class="card">
<h3>🥾 Turtips</h3>
<div id="turtipsList">Laster...</div>
</div>

<div class="card">
<h3>➕ Legg inn turtips</h3>
<input id="title" placeholder="Tittel">
<input id="place" placeholder="Sted">
<textarea id="description" placeholder="Beskrivelse"></textarea>
<input id="parking" placeholder="Parkering">
<input id="length" placeholder="Lengde">
<select id="difficulty">
<option>Lett</option>
<option>Middels</option>
<option>Krevende</option>
</select>
<input type="file" id="image">
<button onclick="saveTurtips()">Lagre turtips</button>
</div>

</div>

<script>
var supabase = window.supabase.createClient("https://kxudiviidwwwclbzgdyx.supabase.co","sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH");

function showPage(page){document.getElementById('page-turtips').classList.remove('hidden');loadTurtips();}

async function uploadImage(file){
if(!file) return "";
var name=Date.now()+"-"+file.name;
var {error}=await supabase.storage.from("story-images").upload("turtips/"+name,file);
if(error) return "";
return supabase.storage.from("story-images").getPublicUrl("turtips/"+name).data.publicUrl;
}

async function saveTurtips(){
var title=document.getElementById('title').value;
var place=document.getElementById('place').value;
var description=document.getElementById('description').value;
var parking=document.getElementById('parking').value;
var length=document.getElementById('length').value;
var difficulty=document.getElementById('difficulty').value;
var file=document.getElementById('image').files[0];

var image_url=await uploadImage(file);

await supabase.from('turtips').insert([{title,place,description,parking,length,difficulty,image_url}]);

alert('Lagret!');
loadTurtips();
}

async function loadTurtips(){
var {data}=await supabase.from('turtips').select('*').order('created_at',{ascending:false});
var html="";
(data||[]).forEach(t=>{
html+=`<div class="card">
<h4>${t.title}</h4>
<p>${t.place}</p>
<p>${t.description}</p>
<p>Parkering: ${t.parking}</p>
<p>Lengde: ${t.length}</p>
<p>${t.difficulty}</p>
${t.image_url?`<img src="${t.image_url}" style="width:100%">`:""}
</div>`;
});

document.getElementById('turtipsList').innerHTML=html||"Ingen turtips enda";
}

loadTurtips();
</script>
</body>
</html>
