
<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre</title>
<style>
body {font-family: Arial; margin:0; background:#f5f7fb;}

.hero {
  position:relative;
  border-radius:20px;
  overflow:hidden;
  margin:20px auto;
  max-width:1100px;
}

.hero img {
  width:100%;
  height:300px;
  object-fit:cover;
}

.hero::before {
  content:"";
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.45);
}

.hero-content {
  position:absolute;
  top:20px;
  left:20px;
  right:20px;
  color:white;
  max-width:800px;
}

.stats {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:10px;
  margin-top:15px;
}

.stat-box {
  background:rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding:10px;
  border-radius:14px;
  text-align:center;
}

.quick-actions {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:15px;
}

.quick-actions button {
  flex:1;
  background:white;
  border-radius:25px;
  padding:10px;
  border:none;
  font-weight:600;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

@media (min-width:900px){
  .stats {
    grid-template-columns: repeat(4,1fr);
  }
  .quick-actions {
    justify-content:center;
  }
  .quick-actions button {
    max-width:180px;
  }
}

</style>
</head>

<body>

<div class="hero">
<img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b">

<div class="hero-content">
<h1>Hundene våre 🐶</h1>
<p>Del bilder, historier og opplevelser</p>

<div class="stats">
<div class="stat-box">Innlegg<br><b>33</b></div>
<div class="stat-box">Medlemmer<br><b>10</b></div>
<div class="stat-box">Bilder<br><b>32</b></div>
<div class="stat-box">Kommentarer<br><b>12</b></div>
</div>

<div class="quick-actions">
<button>📸 Bilder</button>
<button>📅 Aktiviteter</button>
<button>✂️ Frisører</button>
<button>🏪 Butikker</button>
</div>

</div>
</div>

</body>
</html>
