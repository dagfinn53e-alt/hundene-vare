<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hundene våre</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
  body{font-family:Arial;margin:0;background:#f0f6ff}
  .wrap{max-width:1000px;margin:auto;padding:20px}
  .menu-btn{padding:12px;margin:5px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-weight:bold;cursor:pointer}
  .card{background:#fff;padding:15px;border-radius:15px;margin-top:15px}
  .hidden{display:none}
  </style>
</head>
<body>
<div class="wrap">

<h1>Hundene våre 🐶</h1>

<div>
<button class="menu-btn" onclick="showPage('home')">Forside</button>
<button class="menu-btn" onclick="showPage('stavanger')">📍 Stavanger</button>
</div>

<div id="page-home" class="card">
<h2>Velkommen</h2>
<p>Velg område</p>
</div>

<div id="page-stavanger" class="card hidden">
<h2>📍 Stavanger</h2>

<button class="menu-btn" onclick="loadStavanger('Frisør')">Frisører</button>
<button class="menu-btn" onclick="loadStavanger('Zoo butikk')">Zoo butikker</button>
<button class="menu-btn" onclick="loadStavanger('Hund pensjonat')">Hundepensjonat</button>
<button class="menu-btn" onclick="loadStavanger('Veterinær')">Veterinærer</button>

<div id="stavangerList"></div>
</div>

</div>

<script>
var supabase = window.supabase.createClient(
"https://kxudiviidwwwclbzgdyx.supabase.co",
"sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
);

function showPage(page){
document.getElementById("page-home").classList.add("hidden");
document.getElementById("page-stavanger").classList.add("hidden");
document.getElementById("page-"+page).classList.remove("hidden");
}

async function loadStavanger(type){
var target = document.getElementById("stavangerList");
target.innerHTML = "Laster...";

var result = await supabase
.from("businesses")
.select("*")
.eq("region","Stavanger")
.eq("type", type)
.eq("approved", true);

if(result.error){
target.innerHTML = result.error.message;
return;
}

var rows = result.data;

if(!rows.length){
target.innerHTML = "Ingen funnet";
return;
}

var html = "";
rows.forEach(function(b){
html += "<div class='card'><h3>"+b.name+"</h3><p>"+b.place+"</p></div>";
});

target.innerHTML = html;
}
</script>

</body>
</html>
