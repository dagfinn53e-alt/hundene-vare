<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre</title>

<style>
body{font-family:Arial;margin:0;background:#f5f9ff;}
.wrap{max-width:1000px;margin:auto;padding:15px;}
.hero{
  background:#2563eb;
  color:#fff;
  padding:25px;
  border-radius:20px;
}
.region-bar{
  margin-top:15px;
}
.region-chip{
  background:#ffffff33;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  margin-right:8px;
  color:#fff;
  cursor:pointer;
}
.region-chip.active{
  background:#fff;
  color:#2563eb;
}
.card{
  background:#fff;
  padding:15px;
  border-radius:20px;
  margin-top:15px;
}
button{
  padding:10px;
  border-radius:15px;
  border:none;
  background:#2563eb;
  color:#fff;
}
input,select,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
}
.hidden{display:none;}
</style>
</head>

<body>
<div class="wrap">

<div class="hero">
<h1>Hundene våre 🐾</h1>

<div class="region-bar">
<button id="r1" class="region-chip active" onclick="setRegion('Haugalandet')">Haugalandet</button>
<button id="r2" class="region-chip" onclick="setRegion('Stavanger')">Stavanger</button>
</div>

</div>

<div class="card">
<a href="tilbud.html">🐾 Se Ukens tilbud</a>
</div>

<div class="card">
<h3>🏪 Registrer bedrift</h3>

<select id="bizType">
<option>Zoo butikk</option>
<option>Frisør</option>
<option>Veterinær</option>
</select>

<select id="bizRegion">
<option>Haugalandet</option>
<option>Stavanger</option>
</select>

<input id="bizName" placeholder="Navn">
<input id="bizPlace" placeholder="Sted">
<textarea id="bizText" placeholder="Beskrivelse"></textarea>

<button onclick="save()">Lagre</button>
</div>
