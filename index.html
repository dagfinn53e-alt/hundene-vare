<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hundene våre</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Hundene våre 🐶</h2>

<input id="email" placeholder="E-post">
<input id="password" type="password" placeholder="Passord">
<button onclick="login()">Logg inn</button>

<hr>

<input id="title" placeholder="Tittel">
<textarea id="text" placeholder="Skriv om hunden..."></textarea>
<button onclick="save()">Lagre</button>

<div id="feed"></div>

<script>

const supabase = window.supabase.createClient(
"https://kxudiviidwwwclbzgdyx.supabase.co",
"sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
);

async function login(){
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

const {error}=await supabase.auth.signInWithPassword({email,password});

if(error){alert(error.message);return;}

alert("Innlogget");
}

async function save(){

const {data}=await supabase.auth.getUser();

if(!data.user){
alert("Du må logge inn først");
return;
}

const title=document.getElementById("title").value;
const text=document.getElementById("text").value;

const {error}=await supabase.from("stories").insert([{title,text}]);

if(error){
alert(error.message);
return;
}

alert("Lagret!");

load();
}

async function load(){
const {data}=await supabase.from("stories").select("*");

document.getElementById("feed").innerHTML=data.map(s=>`
<div>
<h3>${s.title}</h3>
<p>${s.text}</p>
</div>
`).join("");
}

load();

</script>

</body>
</html>
