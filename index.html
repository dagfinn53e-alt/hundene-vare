<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre</title>

<style>
body{font-family:Arial;margin:0;background:#f4f8ff}
.wrap{max-width:900px;margin:auto;padding:15px}

.hero{
background:#2563eb;
color:#fff;
padding:20px;
border-radius:20px;
}

.region-chip{
background:#ffffff33;
border:none;
padding:8px 12px;
border-radius:20px;
margin-right:5px;
color:#fff;
cursor:pointer;
}

.region-chip.active{
background:#fff;
color:#2563eb;
}

.card{
background:#fff;
padding:15px;
border-radius:20px;
margin-top:15px;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.menu button{
padding:15px;
border:none;
border-radius:15px;
font-weight:bold;
cursor:pointer;
}

.hidden{display:none}

input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:1px solid #ccc;
}

button.save{
background:#2563eb;
color:#fff;
padding:10px;
border:none;
border-radius:10px;
}

.biz{
border-bottom:1px solid #eee;
padding:10px 0;
}
</style>
</head>

<body>
<div class="wrap">

<div class="hero">
<h2>Hundene våre 🐾</h2>

<button class="region-chip active" onclick="setRegion('Haugalandet')" id="r1">Haugalandet</button>
<button class="region-chip" onclick="setRegion('Stavanger')" id="r2">Stavanger</button>
</div>

<div class="card">
<h3>Utforsk</h3>

<div class="menu">
<button onclick="show('frisor')">✂️ Frisører</button>
<button onclick="show('butikk')">🐾 Zoo butikker</button>
<button onclick="show('veterinar')">🏥 Veterinærer</button>
<button onclick="show('bedrift')">🏪 Legg inn bedrift</button>
</div>
</div>

<div id="content" class="card hidden"></div>

</div>

<script>

let region="Haugalandet";

function setRegion(r){
region=r;
document.getElementById("r1").classList.remove("active");
document.getElementById("r2").classList.remove("active");

if(r==="Haugalandet"){document.getElementById("r1").classList.add("active")}
if(r==="Stavanger"){document.getElementById("r2").classList.add("active")}

load();
}

function show(type){
let c=document.getElementById("content");
c.classList.remove("hidden");

if(type==="bedrift"){
c.innerHTML=`
<h3>Legg inn bedrift</h3>

<select id="type">
<option>Frisør</option>
<option>Zoo butikk</option>
<option>Veterinær</option>
</select>

<select id="region">
<option>Haugalandet</option>
<option>Stavanger</option>
</select>

<input id="name" placeholder="Navn">
<input id="place" placeholder="Sted">
<textarea id="text" placeholder="Beskrivelse"></textarea>

<button class="save" onclick="save()">Lagre</button>
`;
return;
}

load(type);
}

function save(){
let data={
type:document.getElementById("type").value,
region:document.getElementById("region").value,
name:document.getElementById("name").value,
place:document.getElementById("place").value,
text:document.getElementById("text").value
};

let list=JSON.parse(localStorage.getItem("biz")||"[]");
list.push(data);
localStorage.setItem("biz",JSON.stringify(list));

alert("Lagret!");
show(data.type);
}

function load(filter){
let list=JSON.parse(localStorage.getItem("biz")||"[]");

let html="<h3>Resultater</h3>";

list.forEach(b=>{
if(b.region!==region) return;
if(filter && b.type!==filterName(filter)) return;

html+=`
<div class="biz">
<b>${b.name}</b><br>
${b.place}<br>
${b.text}
</div>
`;
});

document.getElementById("content").innerHTML=html;
}

function filterName(f){
if(f==="frisor") return "Frisør";
if(f==="butikk") return "Zoo butikk";
if(f==="veterinar") return "Veterinær";
}

</script>

</body>
</html>
