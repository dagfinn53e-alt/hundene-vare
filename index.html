<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f8ff}
.wrap{max-width:1000px;margin:auto;padding:15px}

/* HEADER */
.topbar{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:10px;border-radius:20px;margin-bottom:15px}
.brand{font-weight:800;font-size:20px}
button{padding:10px;border-radius:20px;border:none;background:#2563eb;color:#fff;cursor:pointer}

/* HERO */
.hero{
background:url("https://images.unsplash.com/photo-1517849845537-4d257902454a?auto=format&fit=crop&w=1200&q=80") center/cover;
padding:40px;border-radius:25px;color:#fff;margin-bottom:15px
}

/* BANNER */
.banner{
border-radius:20px;
padding:20px;
background:#2563eb;
color:#fff;
margin-bottom:10px;
cursor:pointer
}

/* LOKALE BOKSER */
.local-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px
}

.local-box{
background:#fff;
border-radius:18px;
padding:12px;
font-size:13px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.05)
}

/* KNAPPER */
.menu-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px
}

.menu-btn{
background:#e8f0ff;
padding:15px;
border-radius:15px;
font-weight:700;
cursor:pointer;
text-align:center
}
</style>
</head>

<body>
<div class="wrap">

<!-- HEADER -->
<div class="topbar">
<div class="brand">Hundene våre 🐶</div>
<div>
<button onclick="showPage('business')">Bedrift</button>
</div>
</div>

<!-- FORSIDE -->
<div id="home">

<div class="hero">
<h1>Hundene våre</h1>
<p>Del opplevelser, finn butikker og tilbud</p>
</div>

<!-- UKENS TILBUD -->
<div class="banner" onclick="showPage('weekly')">
<b>🐾 Ukens tilbud</b><br>
Klikk for å se
</div>

<!-- LOKALE BOKSER -->
<div class="local-grid">
<div class="local-box" onclick="loadLocal('Haugalandet')">
<b>Haugalandet</b><br>
Nyeste tilbud
</div>

<div class="local-box" onclick="loadLocal('Stavanger')">
<b>Stavanger</b><br>
Nyeste tilbud
</div>

<div class="local-box" onclick="loadLocal('Stord')">
<b>Stord</b><br>
Nyeste tilbud
</div>
</div>

<!-- MENY -->
<div class="menu-grid">
<div class="menu-btn">Nyheter</div>
<div class="menu-btn">Turtips</div>
<div class="menu-btn">Veterinærer</div>
<div class="menu-btn">Frisører</div>
<div class="menu-btn">Zoo butikker</div>
<div class="menu-btn">Hundeklubber</div>
</div>

</div>

<!-- BEDRIFT SIDE -->
<div id="business" style="display:none">

<h2>Bedrift</h2>

<button onclick="inviteShop()">
📩 Inviter butikk
</button>

<p style="margin-top:15px;">
Inviter butikker til å bli med i appen og få kunder.
</p>

</div>

</div>

<script>

function showPage(page){
document.getElementById("home").style.display="none"
document.getElementById("business").style.display="none"

document.getElementById(page).style.display="block"
}

/* INVITER BUTIKK */
function inviteShop(){

const text = `Hei 👋

Vi har laget en lokal app for hundeeiere 🐶

Her kan butikker:
• Legge ut tilbud
• Vise seg frem lokalt
• Få nye kunder

Det er helt GRATIS å bli med.

Vil du være med?`

navigator.clipboard.writeText(text)

alert("Invitasjon kopiert 👍")
}

/* LOKALE BOKSER */
function loadLocal(area){
alert("Viser tilbud for: " + area)
}

</script>

</body>
</html>
