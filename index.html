   <!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hundene våre</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#eef5ff; color:#111827; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 20px; }
    .hero {
      background: linear-gradient(135deg,#1d4ed8,#3b82f6);
      color: white; padding: 24px; border-radius: 22px; margin-bottom: 18px;
    }
    .card {
      background: white; border-radius: 18px; padding: 18px; margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
    }
    h1,h2,h3 { margin-top: 0; }
    input, textarea, select {
      width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px;
      margin-top: 8px; margin-bottom: 12px; box-sizing: border-box;
    }
    textarea { min-height: 110px; resize: vertical; }
    button {
      background:#1d4ed8; color:white; border:none; border-radius:12px;
      padding:12px 16px; cursor:pointer; margin-right:8px;
    }
    button.alt { background:white; color:#1d4ed8; border:1px solid #bfdbfe; }
    .status { margin-top: 12px; font-size: 14px; }
    .story img { width:100%; border-radius: 14px; margin-top: 10px; }
    .meta { color:#64748b; font-size:14px; margin-bottom:10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Hundene våre 🐶</h1>
      <p>Møteplassen for hundeglade på Vestlandet</p>
      <p>Del turer, bilder og opplevelser med hunden din. Se hva andre gjør i nærområdet.</p>
      <button onclick="document.getElementById('feed').scrollIntoView({behavior:'smooth'})">Se innlegg</button>
      <button class="alt" onclick="document.getElementById('loginCard').scrollIntoView({behavior:'smooth'})">Logg inn</button>
    </div>

    <div class="card" id="loginCard">
      <h2>Logg inn</h2>
      <input id="email" type="email" placeholder="E-post">
      <input id="password" type="password" placeholder="Passord">
      <button onclick="login()">Logg inn</button>
      <div class="status" id="loginStatus"></div>
    </div>

    <div class="card">
      <h2>Ny fortelling</h2>
      <input id="title" placeholder="Tittel">
      <input id="dog" placeholder="Hundens navn">
      <input id="place" placeholder="Sted">
      <select id="category">
        <option>Tur</option>
        <option>Utstilling</option>
        <option>Hverdag</option>
      </select>
      <textarea id="text" placeholder="Skriv noe..."></textarea>
      <input id="imageFile" type="file" accept="image/*">
      <button onclick="saveStory()">Lagre</button>
      <div class="status" id="saveStatus"></div>
    </div>

    <div id="feed"></div>
  </div>

<script>
const supabase = window.supabase.createClient(
  "https://kxudiviidwwwclbzgdyx.supabase.co",
  "sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
);

function setText(id, text, color="") {
  const el = document.getElementById(id);
  el.textContent = text;
  el.style.color = color;
}

async function login() {
  setText("loginStatus", "Logger inn ...");
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    setText("loginStatus", "Feil: " + error.message, "crimson");
    return;
  }

  setText("loginStatus", "Innlogget.", "green");
  loadStories();
}

async function saveStory() {
  setText("saveStatus", "Lagrer ...");
  const { data: userData } = await supabase.auth.getUser();
  const user = userData.user;

  if (!user) {
    setText("saveStatus", "Du må logge inn først.", "crimson");
    return;
  }

  const title = document.getElementById("title").value.trim();
  const dog = document.getElementById("dog").value.trim();
  const place = document.getElementById("place").value.trim();
  const category = document.getElementById("category").value;
  const text = document.getElementById("text").value.trim();
  const file = document.getElementById("imageFile").files[0];

  if (!title || !dog || !place || !text) {
    setText("saveStatus", "Fyll inn tittel, hund, sted og tekst.", "crimson");
    return;
  }

  let image_url = "";

  if (file) {
    const fileName = user.id + "/" + Date.now() + "-" + file.name;
    const upload = await supabase.storage.from("story-images").upload(fileName, file);

    if (upload.error) {
      setText("saveStatus", "Feil bilde: " + upload.error.message, "crimson");
      return;
    }

    image_url = supabase.storage.from("story-images").getPublicUrl(fileName).data.publicUrl;
  }

  const insert = await supabase.from("stories").insert([{
    user_id: user.id,
    author_email: user.email,
    title: title,
    dog: dog,
    place: place,
    category: category,
    text: text,
    image_url: image_url
  }]);

  if (insert.error) {
    setText("saveStatus", "Feil lagring: " + insert.error.message, "crimson");
    return;
  }

  document.getElementById("title").value = "";
  document.getElementById("dog").value = "";
  document.getElementById("place").value = "";
  document.getElementById("text").value = "";
  document.getElementById("imageFile").value = "";
  setText("saveStatus", "Lagret!", "green");
  loadStories();
}

async function loadStories() {
  const feed = document.getElementById("feed");
  feed.innerHTML = '<div class="card">Laster innlegg ...</div>';

  const { data, error } = await supabase
    .from("stories")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    feed.innerHTML = '<div class="card">Feil ved henting: ' + error.message + '</div>';
    return;
  }

  if (!data || !data.length) {
    feed.innerHTML = '<div class="card">Ingen innlegg enda.</div>';
    return;
  }

  feed.innerHTML = data.map(s => `
    <div class="card story">
      <h3>${escapeHtml(s.title || "")}</h3>
      <div class="meta">${escapeHtml(s.dog || "")} · ${escapeHtml(s.place || "")} · ${escapeHtml(s.category || "")}</div>
      <p>${escapeHtml(s.text || "")}</p>
      ${s.image_url ? `<img src="${s.image_url}" alt="">` : ""}
    </div>
  `).join("");
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, function(m) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
  });
}

loadStories();
</script>
</body>
</html>
