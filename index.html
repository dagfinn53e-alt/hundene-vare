<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #eef4ff;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
}

.menu {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
}

.menu button {
    padding: 12px 18px;
    border-radius: 999px;
    border: none;
    background: #2563eb;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.section {
    display: none;
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.section.active {
    display: block;
}
</style>

</head>

<body>

<div class="container">
    <h1>Hundene våre 🐶</h1>

    <div class="menu">
        <button onclick="showSection('shops')">🐾 Zoo butikker</button>
        <button onclick="showSection('groomers')">✂️ Frisører</button>
        <button onclick="showSection('vets')">🏥 Veterinærer</button>
        <button onclick="showSection('pensjonat')">🐶 Pensjonat</button>
    </div>

    <div id="shops" class="section active">
        <h2>🐾 Zoo butikker</h2>
        <p>Her kommer butikker...</p>
    </div>

    <div id="groomers" class="section">
        <h2>✂️ Frisører</h2>
        <p>Her kommer frisører...</p>
    </div>

    <div id="vets" class="section">
        <h2>🏥 Veterinærer</h2>
        <p>Her kommer veterinærer...</p>
    </div>

    <div id="pensjonat" class="section">
        <h2>🐶 Hundepensjonat</h2>
        <p>Her kommer pensjonat...</p>
    </div>

</div>

<script>
function showSection(id) {
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
