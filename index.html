<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f8ff;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.hero {
  background:#2563eb;
  color:white;
  padding:30px;
  border-radius:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:20px;
  margin-top:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

img {
  width:100%;
  border-radius:15px;
}

.button {
  display:inline-block;
  margin-top:10px;
  padding:10px 15px;
  background:#2563eb;
  color:white;
  border-radius:999px;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <h1>Hundene våre 🐾</h1>
    <p>Del bilder og opplevelser med hunden din</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?auto=format&fit=crop&w=1200&q=80">

    <h3>Velkommen 🐶</h3>

    <p>
      Her kan du dele bilder og historier om hunden din.
    </p>
  </div>

</div>

</body>
</html>
