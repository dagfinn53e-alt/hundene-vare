<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f7ff;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:white;
  border-bottom:1px solid #ddd;
}

.brand{
  font-weight:bold;
  font-size:20px;
}

button{
  border:none;
  padding:10px 14px;
  border-radius:20px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

/* CARD */
.card{
  background:white;
  margin:20px;
  padding:20px;
  border-radius:20px;
}

/* PRO MENU */
.menu-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-top:15px;
}

.menu-btn{
  background:#eef4ff;
  border-radius:18px;
  padding:15px;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.menu-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 16px rgba(0,0,0,0.1);
}

.menu-btn span{
  display:block;
  margin-top:5px;
  font-size:14px;
}

/* COLORS */
.groom{background:#f3e8ff;}
.shop{background:#ecfdf5;}
.vet{background:#fff1f2;}
.business{background:#fff7ed;}
.club{background:#f1f5f9;}
.activity{background:#e0f2fe;}

.sub{
  color:#666;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">Hundene våre 🐶</div>
  <div>
    <button onclick="showPage('auth')">Logg inn</button>
    <button onclick="goHome()">Forside</button>
    <button onclick="showPage('admin')">Admin</button>
  </div>
</div>

<div class="card">
  <a href="tilbud.html">🐾 Se Ukens tilbud</a>

  <h2>Utforsk appen</h2>
  <div class="sub">Søk etter sted, f.eks: Stavanger, Haugesund eller Stord</div>

  <div class="menu-grid">

    <div class="menu-btn" onclick="showPage('stories')">
      📸
      <span>Bilder</span>
    </div>

    <div class="menu-btn activity" onclick="showPage('activities')">
      📅
      <span>Aktiviteter</span>
    </div>

    <div class="menu-btn groom" onclick="showPage('groomers')">
      ✂️
      <span>Frisører</span>
    </div>

    <div class="menu-btn shop" onclick="showPage('shops')">
      🐾
      <span>Butikker</span>
    </div>

    <div class="menu-btn shop" onclick="showPage('pensjonat')">
      🐶
      <span>Pensjonat</span>
    </div>

    <div class="menu-btn vet" onclick="showPage('vets')">
      🏥
      <span>Veterinær</span>
    </div>

    <div class="menu-btn business" onclick="showPage('business')">
      🏪
      <span>Bedrift</span>
    </div>

    <div class="menu-btn club" onclick="showPage('hundeklubber')">
      🐕
      <span>Hundeklubber</span>
    </div>

  </div>
</div>

<script>
function showPage(name){
  alert("Side: " + name);
}

function goHome(){
  location.reload();
}
</script>

</body>
</html>
