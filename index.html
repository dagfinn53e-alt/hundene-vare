<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#eef5ff; text-align:center; }
.container { max-width:600px; margin:40px auto; }
input, textarea { width:100%; padding:10px; margin-top:10px; }
button { margin-top:10px; padding:10px; cursor:pointer; }
</style>

</head>
<body>

<div class="container">

<h1>Hundene våre 🐶</h1>

<input id="email" placeholder="E-post">
<input id="password" type="password" placeholder="Passord">

<button onclick="signup()">Lag konto</button>
<button onclick="login()">Logg inn</button>

<hr>

<input id="title" placeholder="Tittel">
<textarea id="text" placeholder="Skriv om hunden..."></textarea>

<button onclick="save()">Lagre</button>

<div id="feed"></div>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://kxudiviidwwwclbzgdyx.supabase.co",
  "sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
);

async function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  alert("Signup starter");

  const { error } = await supabase.auth.signUp({ email, password });

  if(error){
    alert("Feil: " + error.message);
    return;
  }

  alert("Konto opprettet");
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  alert("Login starter");

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    alert("Feil: " + error.message);
    return;
  }

  alert("Innlogget");
}

async function save(){

  alert("Save starter");

  const { data } = await supabase.auth.getUser();

  if(!data.user){
    alert("Du må logge inn først");
    return;
  }

  const title = document.getElementById("title").value;
  const text = document.getElementById("text").value;

  const { error } = await supabase.from("stories").insert([{
    user_id: data.user.id,
    author_email: data.user.email,
    title: title,
    dog: "Test",
    place: "Test",
    category: "Hverdag",
    text: text,
    image_url: ""
  }]);

  if(error){
    alert("Feil: " + error.message);
    return;
  }

  alert("Lagret!");
  load();
}

async function load(){
  const { data } = await supabase.from("stories").select("*");

  document.getElementById("feed").innerHTML =
    data.map(s => `
      <div style="background:#fff;padding:10px;margin-top:10px;border-radius:10px;">
        <h3>${s.title}</h3>
        <p>${s.text}</p>
      </div>
    `).join("");
}

load();

</script>

</body>
</html>
