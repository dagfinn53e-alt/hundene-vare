<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Hundene våre 🐶</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background:#eef5ff;
  padding:20px;
}

.box {
  max-width:600px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:15px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
}

button {
  padding:10px;
  background:#2563eb;
  color:white;
  border:none;
  margin-top:10px;
  cursor:pointer;
}

.post {
  background:#fff;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>Hundene våre 🐶</h2>

<input id="email" placeholder="E-post">
<input id="password" type="password" placeholder="Passord">

<button onclick="signup()">Lag konto</button>
<button onclick="login()">Logg inn</button>

<hr>

<h3>Nytt innlegg</h3>

<input id="title" placeholder="Tittel">
<input id="dog" placeholder="Hundens navn">
<input id="place" placeholder="Sted">
<textarea id="text" placeholder="Skriv om hunden..."></textarea>

<button onclick="save()">Lagre</button>

<hr>

<h3>Innlegg</h3>
<div id="feed"></div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://kxudiviidwwwclbzgdyx.supabase.co",
"sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
);

async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email: email,
    password: password
  });

  if (error) {
    alert("Feil: " + error.message);
  } else {
    alert("Konto opprettet!");
  }
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email: email,
    password: password
  });

  if (error) {
    alert("Feil: " + error.message);
  } else {
    alert("Innlogget!");
    loadPosts();
  }
}

async function save() {
  const { data: userData } = await supabase.auth.getUser();

  if (!userData.user) {
    alert("Du må logge inn først");
    return;
  }

  const title = document.getElementById("title").value;
  const dog = document.getElementById("dog").value;
  const place = document.getElementById("place").value;
  const text = document.getElementById("text").value;

  const { error } = await supabase.from("stories").insert([
    {
      title: title,
      dog: dog,
      text: text,
      place: place,
      author_email: userData.user.email
    }
  ]);

  if (error) {
    alert("Feil: " + error.message);
  } else {
    alert("Lagret!");
    loadPosts();
  }
}

async function loadPosts() {
  const { data } = await supabase.from("stories").select("*");

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach(p => {
    feed.innerHTML += `
      <div class="post">
        <h4>${p.title}</h4>
        <p>${p.dog} - ${p.place}</p>
        <p>${p.text}</p>
      </div>
    `;
  });
}

loadPosts();

</script>

</body>
</html>
