<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hundene våre</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f8ff;
}

.topbar{
  background:#ffffff;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.page{
  display:none;
  padding:20px;
}

.page.active{
  display:block;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}
</style>
</head>

<body>

<div class="topbar">
  <div><b>Hundene våre 🐶</b></div>
  <div>
    <button onclick="showPage('home')">Forside</button>
    <button onclick="showPage('auth')">Logg inn</button>
    <button onclick="showPage('admin')">Admin</button>
  </div>
</div>

<div id="page-home" class="page active">
  <h2>Forside</h2>

  <div class="card">
    <button onclick="showPage('groomers')">Frisører</button>
    <button onclick="showPage('shops')">Butikker</button>
  </div>

  <div class="card">
    <button onclick="showPage('activities')">Tilbuder</button>
    <button onclick="showPage('hundeklubber')">Hundeklubber / Aktiviteter</button>
  </div>
</div>

<div id="page-auth" class="page">
  <h2>Opprett konto / Logg inn</h2>
  <button onclick="showPage('home')">← Tilbake</button>
</div>

<div id="page-admin" class="page">
  <h2>Admin</h2>
  <button onclick="showPage('home')">← Tilbake</button>
</div>

<div id="page-groomers" class="page">
  <h2>Frisører</h2>
  <button onclick="showPage('home')">← Tilbake</button>
</div>

<div id="page-shops" class="page">
  <h2>Butikker</h2>
  <button onclick="showPage('home')">← Tilbake</button>
</div>

<div id="page-activities" class="page">
  <h2>Tilbuder</h2>
  <button onclick="showPage('home')">← Tilbake</button>
</div>

<div id="page-hundeklubber" class="page">
  <h2>Hundeklubber / Aktiviteter</h2>
  <button onclick="showPage('home')">← Tilbake</button>
</div>

<script>
function showPage(name){
  var pages = document.querySelectorAll('.page');
  pages.forEach(p => p.classList.remove('active'));

  var active = document.getElementById('page-' + name);
  if(active) active.classList.add('active');

  window.scrollTo(0,0);
}
</script>

</body>
</html>
