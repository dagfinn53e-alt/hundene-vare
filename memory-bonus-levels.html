<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Bonusbanen LEVELS</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:
linear-gradient(to bottom,#fef3c7,#fde68a);
text-align:center;
overflow-x:hidden;
color:#92400e;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{
font-size:48px;
margin-top:10px;
}

.stats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.stat{
background:white;
padding:14px 20px;
border-radius:18px;
font-size:20px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

#message{
font-size:28px;
font-weight:bold;
color:#d97706;
margin:20px;
min-height:40px;
}

#gameBoard{
display:grid;
gap:15px;
justify-content:center;
margin-top:20px;
}

/* CARD */

.card{
width:110px;
height:110px;
perspective:1000px;
cursor:pointer;
transition:.2s;
animation:pop .4s;
}

@keyframes pop{
from{
transform:scale(.3);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.card:hover{
transform:scale(1.05);
}

.inner{
position:relative;
width:100%;
height:100%;
transition:transform .6s;
transform-style:preserve-3d;
}

.card.flipped .inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:22px;
display:flex;
align-items:center;
justify-content:center;
font-size:54px;
box-shadow:0 6px 14px rgba(0,0,0,.18);
}

.front{
background:
linear-gradient(
135deg,
#f59e0b,
#fcd34d
);
color:white;
}

.back{
background:white;
transform:rotateY(180deg);
}

.correct .back{
box-shadow:
0 0 35px gold;
animation:goldGlow .8s infinite alternate;
}

@keyframes goldGlow{
from{
transform:rotateY(180deg) scale(1);
}
to{
transform:rotateY(180deg) scale(1.08);
}
}

.wrong{
animation:shake .25s 2;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

/* WIN */

#winBox{
display:none;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,.18);
max-width:500px;
margin:30px auto;
}

#winBox h2{
font-size:42px;
color:#d97706;
}

button{
margin-top:20px;
padding:16px 28px;
border:none;
border-radius:18px;
background:#f59e0b;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.backBtn{
background:#123c73;
}

</style>
</head>

<body>

<div class="container">

<h1>🎁 Bonusbanen LEVELS</h1>

<div class="stats">

<div class="stat">
🗺️ Nivå:
<span id="level">1</span>
</div>

<div class="stat">
⭐ Poeng:
<span id="score">0</span>
</div>

<div class="stat">
🔥 Combo:
<span id="combo">0</span>
</div>

<div class="stat">
⏱️ Tid:
<span id="time">0</span>
</div>

</div>

<div id="message">

🎁 Finn bonuskort!

</div>

<div id="gameBoard"></div>

<div id="winBox">

<h2>🏆 Nivå fullført!</h2>

<div style="font-size:50px;">
⭐⭐⭐
</div>

<p id="finalScore"></p>

<button onclick="nextLevel()">

➡️ Neste nivå

</button>

</div>

<button class="backBtn"
onclick="location.href='memorymap.html'">

⬅️ Tilbake til kart

</button>

</div>

<script>

const allSymbols=[

"🎁",
"⭐",
"💎",
"🪙",
"🎉",
"👑",
"💰",
"✨",
"🎈",
"🍀"

];

let level=1;
let cards=[];
let flipped=[];
let matched=0;
let score=0;
let combo=0;
let timer=0;
let interval;
let lock=false;

function startLevel(){

clearInterval(interval);

let pairs=4+(level-1)*2;

if(pairs>10) pairs=10;

let selected=
allSymbols.slice(0,pairs);

cards=[...selected,...selected];

cards.sort(()=>Math.random()-0.5);

flipped=[];
matched=0;
combo=0;
timer=0;
lock=false;

updateStats();

document.getElementById(
"winBox"
).style.display="none";

document.getElementById(
"message"
).innerHTML=
"🎁 Finn bonuskort!";

const board=
document.getElementById(
"gameBoard"
);

board.innerHTML="";

let columns=4;

if(cards.length>=16)
columns=4;

if(cards.length>=20)
columns=5;

board.style.gridTemplateColumns=
`repeat(${columns},110px)`;

cards.forEach(symbol=>{

const card=
document.createElement("div");

card.className="card";

card.dataset.symbol=symbol;

card.innerHTML=`

<div class="inner">

<div class="front">
🎁
</div>

<div class="back">
${symbol}
</div>

</div>

`;

card.onclick=
()=>flipCard(card);

board.appendChild(card);

});

interval=setInterval(()=>{

timer++;

document.getElementById(
"time"
).innerHTML=timer;

},1000);

}

function flipCard(card){

if(lock)return;

if(flipped.length>=2)return;

if(card.classList.contains(
"flipped"
)) return;

if(card.classList.contains(
"correct"
)) return;

card.classList.add(
"flipped"
);

flipped.push(card);

if(flipped.length===2){

checkMatch();

}

}

function checkMatch(){

lock=true;

const a=flipped[0];
const b=flipped[1];

if(
a.dataset.symbol===
b.dataset.symbol
){

a.classList.add(
"correct"
);

b.classList.add(
"correct"
);

matched+=2;

combo++;

score+=10+(combo*3);

document.getElementById(
"message"
).innerHTML=
"✨ Bonus-par funnet!";

flipped=[];

lock=false;

updateStats();

if(
matched===cards.length
){

winLevel();

}

}else{

combo=0;

score=Math.max(
0,
score-3
);

a.classList.add(
"wrong"
);

b.classList.add(
"wrong"
);

document.getElementById(
"message"
).innerHTML=
"❌ Feil par";

updateStats();

setTimeout(()=>{

a.classList.remove(
"flipped",
"wrong"
);

b.classList.remove(
"flipped",
"wrong"
);

flipped=[];

lock=false;

},900);

}

}

function updateStats(){

document.getElementById(
"level"
).innerHTML=level;

document.getElementById(
"score"
).innerHTML=score;

document.getElementById(
"combo"
).innerHTML=combo;

document.getElementById(
"time"
).innerHTML=timer;

}

function winLevel(){

clearInterval(interval);

document.getElementById(
"winBox"
).style.display=
"block";

document.getElementById(
"finalScore"
).innerHTML=
`⭐ Poeng: ${score}<br>
⏱️ Tid: ${timer}s`;

document.getElementById(
"message"
).innerHTML=
"🏆 Nivå "+level+" fullført!";

}

function nextLevel(){

level++;

if(level>5){

alert(
"🏆 Du fullførte hele Bonusbanen!"
);

level=1;

score=0;

}

startLevel();

}

startLevel();

</script>

</body>
</html>
