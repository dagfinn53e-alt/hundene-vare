<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Adventure - Bonus Levels</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top, #ffffff 0%, #ff4fd8 18%, #4820c9 48%, #050013 100%);
    }

    .bonus-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.35), transparent 18%),
        radial-gradient(circle at 80% 25%, rgba(255,255,100,0.3), transparent 18%),
        radial-gradient(circle at 40% 80%, rgba(0,255,220,0.24), transparent 22%);
      animation: bgPulse 5s infinite alternate;
    }

    @keyframes bgPulse {
      from { transform: scale(1); opacity: 0.65; }
      to { transform: scale(1.08); opacity: 1; }
    }

    .game {
      position: relative;
      z-index: 2;
      width: min(96vw, 850px);
      margin: 0 auto;
      padding: 22px 12px 38px;
    }

    h1 {
      margin: 12px 0 4px;
      font-size: clamp(2rem, 8vw, 4.3rem);
      text-shadow:
        0 0 12px #fff,
        0 0 28px #ffef5c,
        0 0 42px #00ffe0;
    }

    .subtitle {
      margin: 0 0 14px;
      color: #fff7b8;
      font-size: 1rem;
      font-weight: bold;
    }

    .panel {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 16px auto;
      max-width: 590px;
    }

    .stat {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.32);
      border-radius: 18px;
      padding: 10px;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
      backdrop-filter: blur(7px);
    }

    .stat strong {
      display: block;
      font-size: 0.8rem;
      color: #fff7b8;
    }

    .stat span {
      font-size: 1.3rem;
      font-weight: bold;
    }

    .controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0;
    }

    button, a.button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #ff4fd8, #4820c9);
      box-shadow: 0 0 22px rgba(255,79,216,0.5);
      text-decoration: none;
    }

    .sound-btn {
      background: linear-gradient(135deg, #00d084, #00a8ff);
    }

    button:active, a.button:active {
      transform: scale(0.96);
    }

    .message {
      min-height: 34px;
      margin: 8px 0;
      font-size: 1.18rem;
      font-weight: bold;
      color: #fff7b8;
      text-shadow: 0 0 14px #ffef5c;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 18px auto;
      max-width: 660px;
    }

    .card {
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      display: grid;
      place-items: center;
      font-size: clamp(1.9rem, 9vw, 3.4rem);
      cursor: pointer;
      user-select: none;
      background: linear-gradient(145deg, #250065, #050013);
      border: 2px solid rgba(255,255,255,0.25);
      box-shadow:
        0 8px 20px rgba(0,0,0,0.35),
        inset 0 0 18px rgba(255,255,255,0.06);
      transition: transform 0.25s, box-shadow 0.25s, background 0.25s;
    }

    .card:hover {
      box-shadow:
        0 0 24px rgba(255,239,92,0.7),
        0 0 44px rgba(0,255,224,0.35);
    }

    .card.flipped {
      background: linear-gradient(145deg, #fff7b8, #00ffe0);
      color: #180030;
      transform: rotateY(180deg) scale(1.04);
    }

    .card.matched {
      background: linear-gradient(145deg, #00ff9d, #ffef5c, #ff4fd8);
      pointer-events: none;
      animation: bonusMatch 0.62s ease;
    }

    @keyframes bonusMatch {
      0% { transform: scale(1); }
      35% { transform: scale(1.23) rotate(5deg); }
      70% { transform: scale(1.08) rotate(-5deg); }
      100% { transform: scale(1); }
    }

    .ultra {
      animation: ultraBonus 0.75s infinite alternate;
    }

    @keyframes ultraBonus {
      from {
        filter: drop-shadow(0 0 6px #ffffff);
      }
      to {
        filter:
          drop-shadow(0 0 18px #ffef5c)
          drop-shadow(0 0 30px #00ffe0);
      }
    }

    .confetti {
      position: fixed;
      top: -24px;
      width: 10px;
      height: 16px;
      pointer-events: none;
      z-index: 20;
      animation: fall 1.85s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(112vh) rotate(780deg);
        opacity: 0;
      }
    }

    .spark {
      position: fixed;
      pointer-events: none;
      z-index: 30;
      font-size: 2rem;
      animation: sparkPop 0.85s ease-out forwards;
    }

    @keyframes sparkPop {
      from {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 1;
      }
      to {
        transform: translate(-50%, -135%) scale(1.9);
        opacity: 0;
      }
    }

    @media (max-width: 500px) {
      .board {
        gap: 8px;
      }

      .card {
        border-radius: 15px;
      }

      button, a.button {
        padding: 11px 15px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>
  <div class="bonus-bg"></div>

  <main class="game">
    <h1 class="ultra">🎁 Bonus Levels</h1>
    <p class="subtitle">Ekstra raske bonusbaner med ULTRA-combo!</p>

    <div class="panel">
      <div class="stat">
        <strong>Bonusnivå</strong>
        <span id="level">1</span>
      </div>
      <div class="stat">
        <strong>Trekk</strong>
        <span id="moves">0</span>
      </div>
      <div class="stat">
        <strong>Combo</strong>
        <span id="combo">0</span>
      </div>
      <div class="stat">
        <strong>Poeng</strong>
        <span id="score">0</span>
      </div>
    </div>

    <div class="controls">
      <button onclick="restartGame()">🔄 Start på nytt</button>
      <button class="sound-btn" onclick="toggleSound()" id="soundBtn">🔊 Lyd på</button>
      <a class="button" href="memorymap.html">🗺️ Kart</a>
    </div>

    <div class="message" id="message">Finn bonusparene!</div>

    <section class="board" id="board"></section>
  </main>

  <script>
    const symbols = ["🎁", "💎", "⚡", "🌈", "🚀", "🔥", "⭐", "🪄"];

    let cards = [];
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;

    let level = 1;
    let moves = 0;
    let combo = 0;
    let pairs = 0;
    let score = 0;
    let soundOn = true;

    const board = document.getElementById("board");
    const levelEl = document.getElementById("level");
    const movesEl = document.getElementById("moves");
    const comboEl = document.getElementById("combo");
    const scoreEl = document.getElementById("score");
    const messageEl = document.getElementById("message");
    const soundBtn = document.getElementById("soundBtn");

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function playSound(type) {
      if (!soundOn) return;

      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === "flip") oscillator.frequency.value = 520;
      if (type === "match") oscillator.frequency.value = 880;
      if (type === "wrong") oscillator.frequency.value = 160;
      if (type === "win") oscillator.frequency.value = 1200;

      oscillator.type = "sine";
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.23);

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.23);
    }

    function startGame() {
      board.innerHTML = "";
      firstCard = null;
      secondCard = null;
      lockBoard = false;
      moves = 0;
      combo = 0;
      pairs = 0;

      const pairCount = Math.min(4 + level, 8);
      const chosen = symbols.slice(0, pairCount);
      cards = shuffle([...chosen, ...chosen]);

      cards.forEach((symbol, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.symbol = symbol;
        card.dataset.index = index;
        card.textContent = "❔";
        card.addEventListener("click", () => flipCard(card));
        board.appendChild(card);
      });

      updateStats();
      messageEl.textContent = "Finn bonusparene!";
    }

    function flipCard(card) {
      if (lockBoard) return;
      if (card.classList.contains("flipped")) return;
      if (card.classList.contains("matched")) return;

      playSound("flip");

      card.classList.add("flipped");
      card.textContent = card.dataset.symbol;

      if (!firstCard) {
        firstCard = card;
        return;
      }

      secondCard = card;
      moves++;
      updateStats();
      checkMatch();
    }

    function checkMatch() {
      const isMatch = firstCard.dataset.symbol === secondCard.dataset.symbol;

      if (isMatch) {
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        combo++;
        pairs++;

        const bonusPoints = 100 + combo * 25;
        score += bonusPoints;

        playSound("match");
        sparkPop(firstCard);
        sparkPop(secondCard);

        if (combo >= 5) {
          messageEl.textContent = "💥 MEGA ULTRA BONUS COMBO!";
        } else if (combo >= 3) {
          messageEl.textContent = "⚡ ULTRA bonus-combo!";
        } else if (combo >= 2) {
          messageEl.textContent = "🔥 Bonus-combo!";
        } else {
          messageEl.textContent = "+" + bonusPoints + " poeng!";
        }

        resetTurn();
        updateStats();

        if (pairs === Math.min(4 + level, 8)) {
          winLevel();
        }
      } else {
        lockBoard = true;
        combo = 0;
        messageEl.textContent = "Bom! Combo nullstilt.";
        playSound("wrong");

        setTimeout(() => {
          firstCard.classList.remove("flipped");
          secondCard.classList.remove("flipped");
          firstCard.textContent = "❔";
          secondCard.textContent = "❔";
          resetTurn();
          updateStats();
        }, 720);
      }
    }

    function resetTurn() {
      firstCard = null;
      secondCard = null;
      lockBoard = false;
    }

    function winLevel() {
      playSound("win");
      confetti();
      messageEl.textContent = "🎁 Bonusnivå fullført!";

      setTimeout(() => {
        level++;

        if (level > 5) {
          level = 5;
          messageEl.textContent = "🏆 Du fullførte alle bonusnivåene!";
          confetti();
        } else {
          startGame();
        }

        updateStats();
      }, 1700);
    }

    function restartGame() {
      score = 0;
      level = 1;
      startGame();
    }

    function toggleSound() {
      soundOn = !soundOn;
      soundBtn.textContent = soundOn ? "🔊 Lyd på" : "🔇 Lyd av";
    }

    function updateStats() {
      levelEl.textContent = level;
      movesEl.textContent = moves;
      comboEl.textContent = combo;
      scoreEl.textContent = score;
    }

    function confetti() {
      const colors = ["#ffffff", "#ffef5c", "#00ffe0", "#ff4fd8", "#00ff9d"];

      for (let i = 0; i < 95; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.55 + "s";
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);

        setTimeout(() => {
          piece.remove();
        }, 2400);
      }
    }

    function sparkPop(card) {
      const rect = card.getBoundingClientRect();
      const spark = document.createElement("div");
      spark.className = "spark";
      spark.textContent = combo >= 3 ? "⚡" : "✨";
      spark.style.left = rect.left + rect.width / 2 + "px";
      spark.style.top = rect.top + rect.height / 2 + "px";

      document.body.appendChild(spark);

      setTimeout(() => {
        spark.remove();
      }, 900);
    }

    startGame();
  </script>
</body>
</html>
