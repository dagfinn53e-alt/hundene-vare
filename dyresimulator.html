<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶🐱 Dyresimulator KIDS DELUXE</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#dbeafe,#fce7f3);
text-align:center;
overflow-x:hidden;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

h1{
font-size:42px;
color:#7a284f;
margin-bottom:10px;
}

.subtitle{
font-size:20px;
margin-bottom:25px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
margin-bottom:25px;
}

.stat{
background:white;
padding:18px;
border-radius:22px;
font-size:20px;
font-weight:bold;
box-shadow:0 5px 12px rgba(0,0,0,.12);
}

.pet-box{
position:relative;
background:white;
padding:25px;
border-radius:30px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
overflow:hidden;
}

.pet-box img{
width:320px;
max-width:90%;
border-radius:25px;
transition:.3s;
}

.bounce{
animation:bounce .6s;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

#effect{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:80px;
pointer-events:none;
animation:pop .8s;
}

@keyframes pop{
0%{
opacity:0;
transform:translateX(-50%) scale(.3);
}
50%{
opacity:1;
transform:translateX(-50%) scale(1.2);
}
100%{
opacity:0;
transform:translateX(-50%) scale(.6);
}
}

#moodText{
font-size:26px;
font-weight:bold;
margin-top:18px;
min-height:40px;
color:#db2777;
}

.buttons{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:18px;
margin-top:25px;
}

.buttons button{
padding:18px;
border:none;
border-radius:24px;
font-size:22px;
font-weight:bold;
cursor:pointer;
color:white;
transition:.2s;
box-shadow:0 5px 12px rgba(0,0,0,.12);
}

.buttons button:hover{
transform:scale(1.04);
}

.feed{background:#f59e0b;}
.play{background:#10b981;}
.sleep{background:#6366f1;}
.wash{background:#0ea5e9;}
.love{background:#ec4899;}

select{
padding:14px 20px;
font-size:18px;
border-radius:16px;
border:none;
font-weight:bold;
margin-bottom:20px;
}

.back{
margin-top:30px;
}

.back button{
background:#7a284f;
color:white;
padding:16px 28px;
border:none;
border-radius:20px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#coins{
color:#f59e0b;
}

</style>
</head>

<body>

<div class="container">

<h1>🐶🐱 Dyresimulator KIDS DELUXE</h1>

<div class="subtitle">
Lek med ditt virtuelle kjæledyr 🎮
</div>

<select id="petSelect" onchange="changePet()">

<option value="dog">
🐶 Hund
</option>

<option value="cat">
🐱 Katt
</option>

</select>

<div class="stats">

<div class="stat">
❤️ Humør:
<span id="mood">80</span>
</div>

<div class="stat">
⚡ Energi:
<span id="energy">70</span>
</div>

<div class="stat">
🍖 Mat:
<span id="food">75</span>
</div>

<div class="stat">
🏆 Level:
<span id="level">1</span>
</div>

<div class="stat">
🪙 Mynter:
<span id="coins">0</span>
</div>

</div>

<div class="pet-box">

<div id="effect"></div>

<img id="petImage"
src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=800&auto=format&fit=crop">

<div id="moodText">
😊 Dyret har det kjempebra!
</div>

</div>

<div class="buttons">

<button class="feed"
onclick="feedPet()">

🍖 Gi Mat

</button>

<button class="play"
onclick="playPet()">

🎾 Lek

</button>

<button class="sleep"
onclick="sleepPet()">

😴 Sov

</button>

<button class="wash"
onclick="washPet()">

🛁 Vask

</button>

<button class="love"
onclick="lovePet()">

❤️ Kos

</button>

</div>

<div class="back">

<button onclick="location.href='hundespill.html'">
⬅️ Tilbake til spill
</button>

</div>

</div>

<script>

let mood=80;
let energy=70;
let food=75;
let level=1;
let coins=0;

function updateStats(){

document.getElementById("mood").innerHTML=mood;
document.getElementById("energy").innerHTML=energy;
document.getElementById("food").innerHTML=food;
document.getElementById("level").innerHTML=level;
document.getElementById("coins").innerHTML=coins;

checkMood();

}

function animatePet(){

const pet=
document.getElementById(
"petImage"
);

pet.classList.add("bounce");

setTimeout(()=>{

pet.classList.remove(
"bounce"
);

},600);

}

function showEffect(icon){

const effect=
document.getElementById(
"effect"
);

effect.innerHTML=icon;

effect.style.animation="none";

void effect.offsetWidth;

effect.style.animation=
"pop .8s";

}

function randomText(){

const texts=[

"🐶 Dyret elsker deg!",
"🐱 Spinn spinn!",
"⭐ Bonus!",
"🎉 Så gøy!",
"❤️ Bestevenn!",
"🍖 Nam nam!",
"🎾 Wohoo!"

];

return texts[
Math.floor(
Math.random()*texts.length
)
];

}

function levelUp(){

if(mood>=100){

level++;

coins+=25;

mood=80;

document.getElementById(
"moodText"
).innerHTML=
"🏆 LEVEL UP!";

}

}

function feedPet(){

food+=12;
mood+=6;
coins+=3;

if(food>100)food=100;
if(mood>100)mood=100;

animatePet();

showEffect("🍖");

document.getElementById(
"moodText"
).innerHTML=randomText();

levelUp();

updateStats();

}

function playPet(){

mood+=12;
energy-=10;
food-=5;
coins+=5;

if(mood>100)mood=100;
if(energy<0)energy=0;
if(food<0)food=0;

animatePet();

showEffect("🎾");

document.getElementById(
"moodText"
).innerHTML=randomText();

levelUp();

updateStats();

}

function sleepPet(){

energy+=20;
coins+=2;

if(energy>100)energy=100;

showEffect("😴");

document.getElementById(
"moodText"
).innerHTML=
"😴 Zzzzz...";

updateStats();

}

function washPet(){

mood+=8;
coins+=4;

if(mood>100)mood=100;

animatePet();

showEffect("🛁");

document.getElementById(
"moodText"
).innerHTML=
"🫧 Så ren og fin!";

levelUp();

updateStats();

}

function lovePet(){

mood+=15;
coins+=5;

if(mood>100)mood=100;

animatePet();

showEffect("❤️");

document.getElementById(
"moodText"
).innerHTML=
"🥰 Dyret elsker kos!";

levelUp();

updateStats();

}

function checkMood(){

if(food<25){

document.getElementById(
"moodText"
).innerHTML=
"🍖 Dyret er sultent!";

}

if(energy<25){

document.getElementById(
"moodText"
).innerHTML=
"😴 Dyret er slitent!";

}

if(mood<25){

document.getElementById(
"moodText"
).innerHTML=
"😢 Dyret er trist!";

}

}

function changePet(){

const pet=
document.getElementById(
"petSelect"
).value;

const image=
document.getElementById(
"petImage"
);

if(pet==="dog"){

image.src=
"https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=800&auto=format&fit=crop";

}else{

image.src=
"https://images.unsplash.com/photo-1519052537078-e6302a4968d4?q=80&w=800&auto=format&fit=crop";

}

}

setInterval(()=>{

food-=1;
energy-=1;

if(food<0)food=0;
if(energy<0)energy=0;

updateStats();

},10000);

updateStats();

</script>

</body>
</html>
