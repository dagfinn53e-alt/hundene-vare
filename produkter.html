<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produkter – Hundene våre</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#f5f7fb}
.container{padding:15px;max-width:900px;margin:auto}
.card{background:white;padding:15px;border-radius:16px;margin-bottom:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
.product{background:white;border-radius:16px;padding:15px;margin-bottom:15px}
.price{color:#e11d48;font-weight:bold}
.btn{padding:10px 15px;border:none;border-radius:10px;margin-top:10px;cursor:pointer}
.btn-green{background:#16a34a;color:white}
.btn-red{background:#dc2626;color:white}
</style>
</head>

<body>
<div class="container">

<h2>🛍️ Produkter</h2>
<div id="products"></div>

<h2>➕ Legg inn produkt</h2>
<div class="card">
<input id="title" placeholder="Produktnavn"><br><br>
<input id="price" placeholder="Pris / tilbud"><br><br>
<textarea id="shops" placeholder="Selges hos"></textarea><br><br>
<button class="btn btn-green" onclick="save()">Lagre</button>
</div>

<h2>🛠️ Admin</h2>
<div id="admin"></div>

</div>

<script>
const supabase = window.supabase.createClient(
"https://kxudiviidwwwclbzgdyx.supabase.co",
"sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
);

async function load(){
let {data} = await supabase.from("products").select("*").order("created_at",{ascending:false});

let pHTML="";
let aHTML="";

data.forEach(p=>{
if(p.approved){
pHTML+=`
<div class="product">
<h3>${p.title}</h3>
<div class="price">${p.price_text}</div>
<div>${p.shops_text}</div>
<button class="btn btn-red" onclick="del('${p.id}')">Slett</button>
</div>`;
}

aHTML+=`
<div class="card">
<strong>${p.title}</strong> (${p.approved?"Godkjent":"Venter"})
<br>
${!p.approved?`<button class="btn btn-green" onclick="approve('${p.id}')">Godkjenn</button>`:""}
<button class="btn btn-red" onclick="del('${p.id}')">Slett</button>
</div>`;
});

document.getElementById("products").innerHTML=pHTML;
document.getElementById("admin").innerHTML=aHTML;
}

async function save(){
let title=document.getElementById("title").value;
let price=document.getElementById("price").value;
let shops=document.getElementById("shops").value;

await supabase.from("products").insert([{
title:title,
price_text:price,
shops_text:shops,
approved:false
}]);

load();
}

async function approve(id){
await supabase.from("products").update({approved:true}).eq("id",id);
load();
}

async function del(id){
if(confirm("Slette?")){
await supabase.from("products").delete().eq("id",id);
load();
}
}

load();
</script>

</body>
</html>
