<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏡 Kennel Builder PRO</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#bde0fe,#d8f3dc);
text-align:center;
color:#123c73;
overflow-x:hidden;
}

h1{
font-size:42px;
margin:15px 0;
}

.helpBox{
background:white;
padding:18px;
border-radius:22px;
max-width:850px;
margin:15px auto;
font-size:22px;
font-weight:bold;
line-height:1.5;
box-shadow:0 5px 14px rgba(0,0,0,.15);
}

#buildArea{
position:relative;
width:92vw;
max-width:900px;
height:520px;
margin:20px auto;
background:#9be7a5;
border:6px dashed #2563eb;
border-radius:25px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.18);
}

.tools{
display:flex;
justify-content:center;
gap:14px;
flex-wrap:wrap;
margin:20px auto;
max-width:1000px;
}

.tool{
width:120px;
height:95px;
border:none;
border-radius:20px;
font-size:20px;
font-weight:bold;
cursor:grab;
color:white;
box-shadow:0 5px 12px rgba(0,0,0,.18);
}

.houseBtn{background:#c0392b;}
.treeBtn{background:#15803d;}
.fenceBtn{background:#8b5a2b;}
.dogBtn{background:#f59e0b;}
.boneBtn{background:#6366f1;}
.clearBtn{
background:#dc2626;
cursor:pointer;
}

.item{
position:absolute;
user-select:none;
cursor:move;
}

.house{
width:150px;
height:115px;
background:#c0392b;
border:5px solid #922b21;
border-radius:8px;
}

.house:before{
content:"";
position:absolute;
top:-75px;
left:-15px;
width:0;
height:0;
border-left:90px solid transparent;
border-right:90px solid transparent;
border-bottom:75px solid #8b4513;
}

.house:after{
content:"🚪";
position:absolute;
bottom:5px;
left:55px;
font-size:42px;
}

.tree{
font-size:60px;
}

.dog{
font-size:58px;
}

.bone{
font-size:48px;
}

.fence{
width:80px;
height:38px;
background:repeating-linear-gradient(
90deg,
#8b5a2b,
#8b5a2b 12px,
#6b3f1d 12px,
#6b3f1d 24px
);
border:3px solid #5a3215;
border-radius:8px;
}

#message{
font-size:26px;
font-weight:bold;
color:#db2777;
margin:18px;
min-height:35px;
}

.back button{
margin:20px;
padding:16px 28px;
border:none;
border-radius:18px;
background:#2563eb;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🏡 Kennel Builder PRO</h1>

<div class="helpBox">
🖱️ Dra delene inn i området<br>
🌳 Du kan bruke mange trær<br>
🐕 Du kan plassere flere hunder<br>
🪵 Bygg gjerde rundt hele kennelen<br>
🏡 Lag din egen hundekennel!
</div>

<div class="tools">

<button class="tool houseBtn" draggable="true" data-type="house">
🏠 Kennelhus
</button>

<button class="tool treeBtn" draggable="true" data-type="tree">
🌳 Tre
</button>

<button class="tool fenceBtn" draggable="true" data-type="fence">
🪵 Gjerde
</button>

<button class="tool dogBtn" draggable="true" data-type="dog">
🐕 Hund
</button>

<button class="tool boneBtn" draggable="true" data-type="bone">
🦴 Lekeplass
</button>

<button class="tool clearBtn" onclick="clearArea()">
🧹 Rydd
</button>

</div>

<div id="buildArea"></div>

<div id="message">
Dra byggedeler inn i kennelområdet 🙂
</div>

<div class="back">
<button onclick="location.href='hundespill.html'">
⬅️ Tilbake til spill
</button>
</div>

<script>
const buildArea=document.getElementById("buildArea");
let draggedType="";

document.querySelectorAll(".tool[draggable='true']").forEach(tool=>{
tool.addEventListener("dragstart",e=>{
draggedType=tool.dataset.type;
});
});

buildArea.addEventListener("dragover",e=>{
e.preventDefault();
});

buildArea.addEventListener("drop",e=>{
e.preventDefault();

const rect=buildArea.getBoundingClientRect();
const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

createItem(draggedType,x,y);
});

function createItem(type,x,y){
const item=document.createElement("div");
item.classList.add("item");

if(type==="house"){
item.classList.add("house");
item.style.width="150px";
item.style.height="115px";
}

if(type==="tree"){
item.classList.add("tree");
item.innerHTML="🌳";
}

if(type==="dog"){
item.classList.add("dog");
item.innerHTML="🐕";
}

if(type==="bone"){
item.classList.add("bone");
item.innerHTML="🦴";
}

if(type==="fence"){
item.classList.add("fence");
}

item.style.left=(x-40)+"px";
item.style.top=(y-40)+"px";

item.onmousedown=function(e){
let shiftX=e.clientX-item.getBoundingClientRect().left;
let shiftY=e.clientY-item.getBoundingClientRect().top;

function moveAt(pageX,pageY){
const rect=buildArea.getBoundingClientRect();
item.style.left=(pageX-rect.left-shiftX)+"px";
item.style.top=(pageY-rect.top-shiftY)+"px";
}

function onMouseMove(e){
moveAt(e.pageX,e.pageY);
}

document.addEventListener("mousemove",onMouseMove);

item.onmouseup=function(){
document.removeEventListener("mousemove",onMouseMove);
item.onmouseup=null;
};
};

item.ondragstart=function(){
return false;
};

buildArea.appendChild(item);

document.getElementById("message").innerHTML=
"✅ Del plassert! Fortsett å bygge kennelen 🏡";
}

function clearArea(){
buildArea.innerHTML="";
document.getElementById("message").innerHTML=
"🧹 Området er ryddet. Bygg på nytt!";
}
</script>

</body>
</html>
