<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oppdrettere – Hundene våre</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;color:#123c73;min-height:100vh;background:radial-gradient(circle at 8% 6%,rgba(255,220,130,.45),transparent 28%),radial-gradient(circle at 92% 8%,rgba(126,200,255,.45),transparent 33%),linear-gradient(180deg,#dbeafe,#eef6ff 48%,#fff7ed)}
.wrap{max-width:1180px;margin:auto;padding:14px 10px 60px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:rgba(255,255,255,.95);border-radius:25px;padding:13px 15px;box-shadow:0 12px 28px rgba(0,45,110,.12);margin-bottom:15px}
.logo{font-size:23px;font-weight:900;color:#004cff}
.nav{display:flex;gap:8px;flex-wrap:wrap}
.nav a{text-decoration:none;background:#eaf2ff;color:#004cff;border:1px solid #b8ddff;border-radius:999px;padding:10px 13px;font-weight:900;font-size:14px}
.hero{background:linear-gradient(135deg,#1f8fff,#004cff,#7c3aed);color:white;border-radius:34px;padding:36px 18px;text-align:center;box-shadow:0 20px 45px rgba(0,45,110,.24);margin-bottom:18px}
.hero h1{font-size:clamp(2.3rem,7vw,4.5rem);line-height:1.05;margin-bottom:10px;text-shadow:0 0 12px rgba(255,255,255,.65)}
.hero p{font-size:clamp(1rem,2.6vw,1.25rem);font-weight:700;color:#eef6ff}
.search-card{background:white;border-radius:26px;padding:18px;box-shadow:0 12px 26px rgba(0,0,0,.10);margin-bottom:18px}
.search-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr auto;gap:12px;align-items:end}
label{display:block;font-weight:900;margin-bottom:5px;color:#123c73}
input{width:100%;padding:13px 14px;border:1px solid #cfe3ff;border-radius:14px;font-size:16px}
button{border:none;border-radius:999px;padding:14px 20px;background:linear-gradient(135deg,#1f8fff,#004cff);color:white;font-size:16px;font-weight:900;cursor:pointer}
.msg{margin-top:12px;text-align:center;font-size:18px;font-weight:900;color:#123c73}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.bcard{background:white;border-radius:30px;overflow:hidden;box-shadow:0 16px 34px rgba(0,0,0,.14);transition:.2s}
.bcard:hover{transform:translateY(-5px)}
.photo{height:250px;background:linear-gradient(135deg,#1f8fff,#004cff);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:white;font-size:85px}
.content{padding:20px}
.content h2{color:#001d4a;font-size:28px;margin-bottom:8px}
.verify{display:inline-block;background:#fef3c7;color:#92400e;border:1px solid #f59e0b;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:900;margin:4px 0 10px}
.tags{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0}
.tag{background:#eaf2ff;color:#004cff;border:1px solid #b8ddff;border-radius:999px;padding:7px 10px;font-size:13px;font-weight:900}
.about{color:#334155;font-weight:700;line-height:1.55;margin:12px 0}
.info{background:#f8fbff;border-radius:18px;padding:13px;line-height:1.65;font-weight:800;color:#123c73;margin:12px 0}
.gallery{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.gallery img{width:82px;height:62px;object-fit:cover;border-radius:12px;border:2px solid #eaf2ff}
.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:13px}
.btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border-radius:999px;padding:12px 16px;color:white;background:linear-gradient(135deg,#1f8fff,#004cff);font-weight:900;flex:1;min-width:120px}
.btn.green{background:linear-gradient(135deg,#22c55e,#16a34a)}
.empty{background:white;border-radius:26px;padding:24px;text-align:center;font-weight:900;color:#334155;box-shadow:0 12px 26px rgba(0,0,0,.10)}
@media(max-width:1000px){.cards{grid-template-columns:1fr 1fr}.search-grid{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.wrap{padding:9px 8px 45px}.topbar{justify-content:center;border-radius:22px}.logo{width:100%;text-align:center;font-size:20px}.nav{justify-content:center;width:100%}.nav a{flex:1 1 42%;text-align:center;font-size:12px;padding:9px 7px}.hero{border-radius:26px;padding:28px 13px}.search-grid{grid-template-columns:1fr}.cards{grid-template-columns:1fr}.photo{height:230px}.content h2{font-size:25px}}
</style>
</head>
<body>
<div class="wrap">
<header class="topbar">
  <div class="logo">🐶 Hundene våre – Oppdrettere</div>
  <nav class="nav">
    <a href="index.html">🏠 Forside</a>
    <a href="oppdretterportal.html">🐶 Portal</a>
    <a href="registrer-oppdretter.html">➕ Registrer</a>
    <a href="admin-oppdrettere.html">🔐 Admin</a>
  </nav>
</header>
<section class="hero">
  <h1>Finn oppdrettere</h1>
  <p>Godkjente oppdrettere på Hundenevåre.com</p>
</section>
<section class="search-card">
  <div class="search-grid">
    <div><label>Søk</label><input id="search" placeholder="Kennel, rase eller sted"></div>
    <div><label>Rase</label><input id="breed" placeholder="F.eks. Puddel"></div>
    <div><label>Område</label><input id="area" placeholder="F.eks. Rogaland"></div>
    <button onclick="load()">🔎 Søk</button>
  </div>
  <div id="msg" class="msg">Laster...</div>
</section>
<section class="cards" id="cards"></section>
</div>
<script>
const SUPABASE_URL="https://kxudiviidwwwclbzgdyx.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH";
const client=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

function cleanText(v, fallback="Ikke oppgitt"){
  return v && String(v).trim() ? String(v).trim() : fallback;
}

async function load(){
  cards.innerHTML="";
  msg.textContent="Laster oppdrettere...";
  let q=client.from("breeders").select("*").eq("status","godkjent").order("created_at",{ascending:false});
  if(breed.value.trim()) q=q.ilike("breed","%"+breed.value.trim()+"%");
  if(area.value.trim()) q=q.ilike("area","%"+area.value.trim()+"%");
  const r=await q;
  if(r.error){msg.textContent="Feil: "+r.error.message;return;}
  let list=r.data||[];
  const s=search.value.toLowerCase().trim();
  if(s){
    list=list.filter(b=>(b.kennel_name||"").toLowerCase().includes(s)||(b.breed||"").toLowerCase().includes(s)||(b.area||"").toLowerCase().includes(s)||(b.municipality||"").toLowerCase().includes(s));
  }
  if(!list.length){
    msg.textContent="";
    cards.innerHTML='<div class="empty">Ingen godkjente oppdrettere funnet ennå.</div>';
    return;
  }
  msg.textContent="Fant "+list.length+" godkjent oppdretter(e).";
  list.forEach(b=>{
    const mainPhoto=b.logo_url||(b.image_urls&&b.image_urls.length?b.image_urls[0]:"");
    const photoStyle=mainPhoto?'style="background-image:url(\''+mainPhoto+'\')"':"";
    const gallery=(b.image_urls||[]).filter(Boolean).slice(0,4).map(u=>'<img src="'+u+'" alt="Bilde">').join("");
    const contactEmail=b.email?'mailto:'+b.email:'#';
    const webLink=b.website||b.facebook||'#';
    const div=document.createElement("article");
    div.className="bcard";
    div.innerHTML=
      '<div class="photo" '+photoStyle+'>'+(mainPhoto?"":"🐶")+'</div>'+
      '<div class="content">'+
      '<h2>'+cleanText(b.kennel_name,"Oppdretter")+'</h2>'+
      (b.founder?'<div class="verify">🏅 Grunnlegger av Oppdretterportalen</div>':'')+
      '<div class="tags"><span class="tag">'+cleanText(b.breed,"Rase")+'</span><span class="tag">'+cleanText(b.area,"Norge")+'</span><span class="tag">'+cleanText(b.puppies_available,"Info")+'</span></div>'+
      '<p class="about">'+cleanText(b.about,"Denne oppdretteren er godkjent og publisert på Hundenevåre.com.")+'</p>'+
      '<div class="info">📍 '+cleanText(b.municipality,"")+' '+cleanText(b.area,"")+'<br>🐾 Planlagt kull: '+cleanText(b.planned_litter)+'<br>🩺 Helse: '+cleanText(b.health_tests)+'<br>📦 Pakke: '+cleanText(b.package_type,"")+'</div>'+
      (gallery?'<div class="gallery">'+gallery+'</div>':'')+
      '<div class="actions"><a class="btn green" href="'+contactEmail+'">📩 Kontakt</a><a class="btn" href="'+webLink+'">🌐 Mer info</a></div>'+
      '</div>';
    cards.appendChild(div);
  });
}

document.getElementById("search").addEventListener("input", load);
document.getElementById("breed").addEventListener("input", load);
document.getElementById("area").addEventListener("input", load);
load();
</script>
</body>
</html>
