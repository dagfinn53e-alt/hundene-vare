<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oppdretterprofil – Hundene våre</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(180deg,#dbeafe,#fff7ed);color:#123c73;margin:0}
.wrap{max-width:1050px;margin:auto;padding:22px 14px 70px}
.hero{border-radius:34px;padding:34px;text-align:center;color:white;background:linear-gradient(145deg,#1f8fff,#004cff,#7c3aed);box-shadow:0 18px 40px rgba(0,0,0,.18)}
.hero h1{font-size:44px;margin:0 0 10px}
.card{background:white;border-radius:28px;padding:22px;box-shadow:0 14px 28px rgba(0,0,0,.12);margin-top:18px;line-height:1.7;font-weight:700}
.verify{display:inline-block;background:#dcfce7;color:#166534;border-radius:999px;padding:8px 12px;font-weight:900;margin-top:12px}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}.box{background:#f8fbff;border-radius:20px;padding:16px}
a.btn{display:inline-block;text-decoration:none;border-radius:999px;padding:13px 18px;background:#2563eb;color:white;font-weight:900;margin:8px}
@media(max-width:700px){.grid{grid-template-columns:1fr}.hero h1{font-size:32px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero"><h1 id="title">🐶 Oppdretterprofil</h1><p id="sub"></p><div id="verified"></div></div>
  <div class="card" id="content">Laster profil...</div>
</div>
<script>

const SUPABASE_URL = "SETT_INN_SUPABASE_URL_HER";
const SUPABASE_ANON_KEY = "SETT_INN_SUPABASE_ANON_KEY_HER";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);


const params = new URLSearchParams(location.search);
const id = params.get("id");

function contactLink(b){
  if(b.email) return "mailto:" + b.email;
  if(b.website) return b.website;
  if(b.facebook) return b.facebook;
  return "#";
}

async function loadProfile(){
  if(!id){content.textContent="Mangler profil-ID.";return;}
  const {data,error} = await supabase.from("breeders").select("*").eq("id",id).eq("status","godkjent").single();
  if(error || !data){content.textContent="Fant ikke godkjent profil.";return;}
  title.textContent = "🐶 " + data.kennel_name;
  sub.textContent = (data.breed || "") + " • " + (data.municipality || data.area || data.county || "");
  verified.innerHTML = data.verified ? '<div class="verify">⭐ Verifisert profil hos Hundenevåre</div>' : "";

  content.innerHTML = `
    <h2>Om kennelen</h2>
    <p>${data.about || "Ingen beskrivelse ennå."}</p>
    <div class="grid">
      <div class="box"><h3>🐾 Planlagte kull</h3>${data.planned_litter || "Ikke oppgitt"}</div>
      <div class="box"><h3>❤️ Ledige valper</h3>${data.puppies_available || "Ikke oppgitt"}</div>
      <div class="box"><h3>🩺 Helse</h3>${data.health_tests || "Ikke oppgitt"}</div>
    </div>
    <p><strong>📍 Sted:</strong> ${data.municipality || ""} ${data.area || ""} ${data.county || ""}</p>
    <p><strong>Kontakt:</strong></p>
    <a class="btn" href="${contactLink(data)}">📩 Kontakt oppdretter</a>
    <a class="btn" href="oppdrettere.html">⬅️ Tilbake</a>
  `;
}
loadProfile();
</script>
</body>
</html>
