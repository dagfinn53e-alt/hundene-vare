<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐕 Hundelabyrint PRO</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#111827;
  color:white;
  text-align:center;
}

.container{
  max-width:1100px;
  margin:20px auto;
  padding:20px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  margin-bottom:20px;
}

.stat{
  background:#1f2937;
  padding:14px;
  border-radius:16px;
  font-weight:bold;
}

#maze{
  display:grid;
  gap:3px;
  justify-content:center;
  margin-top:20px;
}

.cell{
  width:48px;
  height:48px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  transition:.2s;
}

.wall{
  background:#374151;
}

.path{
  background:#1e293b;
}

.player{
  background:#10b981;
}

.goal{
  background:#f59e0b;
}

.key{
  background:#2563eb;
}

.door{
  background:#dc2626;
}

.guard{
  background:#7c3aed;
}

.teleport{
  background:#06b6d4;
}

.hidden{
  background:black;
}

.controls{
  margin-top:20px;
}

button{
  padding:14px;
  margin:6px;
  border:none;
  border-radius:14px;
  font-size:20px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#1d4ed8;
}

.back{
  display:inline-block;
  margin-top:20px;
  color:#60a5fa;
  text-decoration:none;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🐕 Hundelabyrint PRO</h1>

<div class="stats">

<div class="stat">
🗝️ Nøkkel:
<span id="hasKey">Nei</span>
</div>

<div class="stat">
❤️ Liv:
<span id="lives">3</span>
</div>

<div class="stat">
🏆 Nivå:
<span id="level">1</span>
</div>

</div>

<div id="maze"></div>

<div class="controls">

<div>
<button onclick="move(-1,0)">⬆️</button>
</div>

<div>
<button onclick="move(0,-1)">⬅️</button>
<button onclick="move(0,1)">➡️</button>
</div>

<div>
<button onclick="move(1,0)">⬇️</button>
</div>

</div>

<a class="back" href="hundespill.html">
← Tilbake til spill
</a>

</div>

<script>

const mazeData=[

["#","#","#","#","#","#","#","#","#","#"],
["#","P",".",".",".",".",".","G",".","#"],
["#",".","#","#","#","#",".","#",".","#"],
["#",".",".","K",".","#",".","#",".","#"],
["#","#",".","#",".","#",".","#",".","#"],
["#",".",".","#",".",".",".","#",".","#"],
["#",".","#","#","#","#",".","#",".","#"],
["#",".",".",".","T",".",".","#","D","#"],
["#","G","#","#","#","#",".",".","H","#"],
["#","#","#","#","#","#","#","#","#","#"]

];

let playerRow=1;
let playerCol=1;

let hasKey=false;

let lives=3;

let level=1;

let guards=[

{row:1,col:7,dir:1},
{row:8,col:1,dir:-1}

];

function drawMaze(){

const maze=
document.getElementById(
"maze"
);

maze.innerHTML="";

maze.style.gridTemplateColumns=
`repeat(${mazeData[0].length},48px)`;

for(let r=0;r<mazeData.length;r++){

for(let c=0;c<mazeData[r].length;c++){

const cell=
document.createElement("div");

cell.classList.add("cell");

const value=
mazeData[r][c];

const distance=
Math.abs(playerRow-r)+
Math.abs(playerCol-c);

if(distance>3){

cell.classList.add("hidden");

maze.appendChild(cell);

continue;

}

if(r===playerRow && c===playerCol){

cell.classList.add("player");

cell.innerHTML="🐶";

maze.appendChild(cell);

continue;

}

if(value==="#"){

cell.classList.add("wall");

}

if(value==="."){

cell.classList.add("path");

}

if(value==="H"){

cell.classList.add("goal");

cell.innerHTML="🏠";

}

if(value==="K"){

cell.classList.add("key");

cell.innerHTML="🗝️";

}

if(value==="D"){

cell.classList.add("door");

cell.innerHTML="🚪";

}

if(value==="T"){

cell.classList.add("teleport");

cell.innerHTML="🌀";

}

if(value==="G"){

cell.classList.add("guard");

cell.innerHTML="🐺";

}

maze.appendChild(cell);

}

}

updateStats();

}

function updateStats(){

document.getElementById(
"hasKey"
).innerHTML=
hasKey ? "Ja" : "Nei";

document.getElementById(
"lives"
).innerHTML=lives;

document.getElementById(
"level"
).innerHTML=level;

}

function move(dr,dc){

const newRow=
playerRow+dr;

const newCol=
playerCol+dc;

const target=
mazeData[newRow][newCol];

if(target==="#")
return;

if(target==="D" && !hasKey){

alert(
"🚪 Du trenger nøkkel!"
);

return;

}

playerRow=newRow;
playerCol=newCol;

if(target==="K"){

hasKey=true;

mazeData[newRow][newCol]=".";

alert(
"🗝️ Du fant nøkkelen!"
);

}

if(target==="T"){

playerRow=1;
playerCol=8;

alert(
"🌀 TELEPORT!"
);

}

if(target==="G"){

lives--;

alert(
"🐺 Vakthund tok deg!"
);

if(lives<=0){

alert(
"😅 Game Over!"
);

location.reload();

}

}

if(target==="H"){

alert(
"🏆 Du fant veien hjem!"
);

level++;

}

moveGuards();

drawMaze();

}

function moveGuards(){

guards.forEach(g=>{

mazeData[g.row][g.col]=".";

g.col+=g.dir;

if(
mazeData[g.row][g.col]==="#"
){

g.dir*=-1;

g.col+=g.dir*2;

}

mazeData[g.row][g.col]="G";

if(
g.row===playerRow &&
g.col===playerCol
){

lives--;

alert(
"🐺 Vakthund traff deg!"
);

}

});

}

drawMaze();

</script>

</body>
</html>
