<p>3 minutter – 4×4 brett – nye spørsmål hver runde.</p>

<div id="start"><button onclick="startGame()">🐱 Start spill</button></div>

<div id="game" class="hidden">
<h3 id="timer">03:00</h3>
<h3 id="score">Poeng: 0</h3>
<div class="q" id="question"></div><br>
<div class="board" id="board"></div>
</div>

<script>
const items=[
["Kattedo","Hvor går katten på toalettet innendørs?"],
["Kattesand","Hva fylles i kattedoen?"],
["Kattemat","Hva spiser katten til daglig?"],
["Vannskål","Hva drikker katten vann fra?"],
["Matskål","Hva serveres maten i?"],
["Kattebur","Hva brukes ved transport til veterinær?"],
["Klorestativ","Hva kan katten klore på i stedet for møbler?"],
["Katteleke","Hva brukes til lek og aktivisering?"],
["Børste","Hva brukes til pelsstell?"],
["Kam","Hva kan brukes mot floker i pelsen?"],
["Katteseng","Hva kan katten sove i?"],
["Halsbånd","Hva kan ha ID-brikke på seg?"],
["ID-brikke","Hva kan hjelpe hvis katten blir borte?"],
["Kattegress","Hva kan katten tygge på innendørs?"],
["Godbiter","Hva brukes ofte som belønning?"],
["Klotang","Hva brukes til å klippe klør?"],
["Transportveske","Hva kan brukes til korte reiser?"],
["Refleks","Hva gjør katten mer synlig i mørket?"],
["Aktivitetsleke","Hva gir katten hjernetrim?"],
["Vannfontene","Hva kan få katten til å drikke mer vann?"]
];
let board=[],current,score=0,time=180,timer;
function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}
function startGame(){
document.getElementById('start').classList.add('hidden');
document.getElementById('game').classList.remove('hidden');
board=shuffle(items).slice(0,16);
render();
nextQ();
timer=setInterval(()=>{time--;let m=Math.floor(time/60),s=time%60;timerEl.innerText=String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');if(time<=0){clearInterval(timer);alert("Tiden er ute! Poeng: "+score)}},1000)
}
function render(){
boardEl.innerHTML='';
board.forEach(i=>{let d=document.createElement('div');d.className='cell';d.textContent=i[0];d.onclick=()=>pick(i,d);boardEl.appendChild(d);})
}
function nextQ(){if(board.length===0)return;current=board[Math.floor(Math.random()*board.length)];question.innerText=current[1];}
function pick(i,d){if(i[0]===current[0]){d.classList.add('ok');score++;scoreEl.innerText='Poeng: '+score;board=board.filter(x=>x!==i);setTimeout(()=>{render();nextQ();},500)}else{d.classList.add('bad');setTimeout(()=>d.classList.remove('bad'),400)}}
const timerEl=document.getElementById('timer'),scoreEl=document.getElementById('score'),boardEl=document.getElementById('board'),question=document.getElementById('question');
</script></div></body></html>
