<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hva husker du? – Katteutstyr MASTER</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(135deg,#eefbf3,#eef6ff);text-align:center}
.wrap{max-width:1100px;margin:auto;padding:20px}
.partner,.result{background:#fff;border-radius:20px;padding:20px;margin-bottom:20px}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.cell{background:#fff;padding:14px;border-radius:14px;cursor:pointer;font-weight:bold;min-height:60px;display:flex;align-items:center;justify-content:center}
.ok{background:#22c55e;color:#fff}
.bad{background:#ef4444;color:#fff}
.q{background:#2563eb;color:#fff;padding:20px;border-radius:18px;margin-bottom:15px}
.hidden{display:none}
button{padding:12px 20px;border:none;border-radius:999px;background:#16a34a;color:#fff;font-weight:bold}
h1{color:#0f172a}
</style>
</head>
<body>
<div class="wrap">
<h1>🐱 Hva husker du? – Katteutstyr MASTER</h1>

<div class="partner">
<h2>🏪 Stavanger Dyrebutikk</h2>
<p>Kunnskapspartner for Katteutstyr MASTER</p>
<a href="butikk.html?id=e6f7d1ed-0aa6-4ded-807e-662421a63bda"><button>Besøk sponsor</button></a>
</div>

<div id="game">
<h2 id="timer">03:00</h2>
<h3 id="score">Poeng: 0</h3>
<div class="q" id="question"></div>
<div class="board" id="board"></div>
</div>

<div id="result" class="result hidden"></div>

<script>
const items=[
["Kattedo","Hvor går katten på toalettet?"],
["Kattesand","Hva fylles i kattedoen?"],
["Kattemat","Hva spiser katten daglig?"],
["Vannskål","Hva drikker katten av?"],
["Matskål","Hva serveres maten i?"],
["Kattebur","Hva brukes ved transport?"],
["Klorestativ","Hva beskytter møblene?"],
["Katteleke","Hva brukes til lek?"],
["Børste","Hva brukes til pelsstell?"],
["Kam","Hva brukes mot floker?"],
["Katteseng","Hva kan katten sove i?"],
["Halsbånd","Hva kan ha ID-brikke?"],
["ID-brikke","Hva hjelper hvis katten blir borte?"],
["Kattegress","Hva kan katten tygge på?"],
["Godbiter","Hva brukes som belønning?"],
["Klotang","Hva brukes til klør?"],
["Transportveske","Hva brukes på korte reiser?"],
["Refleks","Hva gjør katten synlig i mørket?"],
["Aktivitetsleke","Hva gir hjernetrim?"],
["Vannfontene","Hva kan få katten til å drikke mer?"],
["Sele","Hva brukes på trygg tur ute?"],
["GPS-sporer","Hva kan vise hvor katten er?"],
["Pelssjampo","Hva brukes ved vask?"],
["Matbeholder","Hva oppbevarer tørrfôr?"],
["Varmematte","Hva holder katten varm?"]
];

let score=0,time=180,current;
let board=items.sort(()=>Math.random()-0.5).slice(0,16);

function drawBoard(){
 const b=document.getElementById("board");
 b.innerHTML="";
 board.forEach(item=>{
   const d=document.createElement("div");
   d.className="cell";
   d.textContent=item[0];
   d.onclick=()=>pick(item,d);
   b.appendChild(d);
 });
}

function nextQuestion(){
 if(board.length===0){finish();return;}
 current=board[Math.floor(Math.random()*board.length)];
 document.getElementById("question").textContent=current[1];
}

function pick(item,cell){
 if(item[0]===current[0]){
   cell.classList.add("ok");
   score++;
   document.getElementById("score").textContent="Poeng: "+score;
   board=board.filter(x=>x!==item);
   setTimeout(()=>{drawBoard();nextQuestion();},500);
 }else{
   cell.classList.add("bad");
   setTimeout(()=>cell.classList.remove("bad"),500);
 }
}

function finish(){
 clearInterval(timer);
 let rank="🐾 Kattevenn";
 if(score>=10) rank="⭐ Katteutstyr-Ekspert";
 if(score>=16) rank="👑 Katteutstyr-Mester";
 document.getElementById("game").classList.add("hidden");
 document.getElementById("result").classList.remove("hidden");
 document.getElementById("result").innerHTML=`<h1>${rank}</h1><h2>Poeng: ${score}</h2><button onclick="location.reload()">Spill igjen</button>`;
}

drawBoard();
nextQuestion();

const timer=setInterval(()=>{
 time--;
 let m=Math.floor(time/60),s=time%60;
 document.getElementById("timer").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
 if(time<=0) finish();
},1000);
</script>
</div>
</body>
</html>
