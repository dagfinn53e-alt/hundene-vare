<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🐶 Hvilken hund passer deg?</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eef6ff;
  color:#123c73;
  text-align:center;
}

.container{
  max-width:750px;
  margin:30px auto;
  background:white;
  padding:30px;
  border-radius:25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

h1{
  margin-bottom:10px;
}

#question{
  font-size:28px;
  font-weight:bold;
  margin:30px 0;
}

.answer-btn{
  display:block;
  width:100%;
  margin:12px 0;
  padding:18px;
  border:none;
  border-radius:18px;
  background:#2563eb;
  color:white;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.answer-btn:hover{
  background:#1d4ed8;
  transform:scale(1.02);
}

#result{
  margin-top:30px;
  font-size:24px;
  line-height:1.6;
  font-weight:bold;
  color:#10b981;
}

.back{
  display:inline-block;
  margin-top:25px;
  color:#2563eb;
  text-decoration:none;
  font-weight:bold;
  font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<h1>🐶 Hvilken hund passer deg?</h1>

<div id="question"></div>

<div id="answers"></div>

<div id="result"></div>

<a class="back" href="hundespill.html">
← Tilbake til spill
</a>

</div>

<script>

const questions = [

{
q:"Bor dere i leilighet eller hus?",
answers:[
{ text:"Leilighet", type:"small" },
{ text:"Hus", type:"large" }
]
},

{
q:"Har dere små barn?",
answers:[
{ text:"Ja", type:"family" },
{ text:"Nei", type:"active" }
]
},

{
q:"Jobber begge voksne i huset?",
answers:[
{ text:"Ja", type:"alone" },
{ text:"Nei", type:"social" }
]
},

{
q:"Blir hunden alene hjemme lenge?",
answers:[
{ text:"Ja", type:"alone" },
{ text:"Nei", type:"social" }
]
},

{
q:"Liker dere lange turer?",
answers:[
{ text:"Ja", type:"active" },
{ text:"Nei", type:"calm" }
]
},

{
q:"Vil dere ha stor eller liten hund?",
answers:[
{ text:"Stor hund", type:"large" },
{ text:"Liten hund", type:"small" }
]
},

{
q:"Hvor mye pelsstell ønsker dere?",
answers:[
{ text:"Lite", type:"easy" },
{ text:"Masse pels 😄", type:"fluffy" }
]
},

{
q:"Reiser dere ofte på ferie?",
answers:[
{ text:"Ja", type:"easy" },
{ text:"Nei", type:"active" }
]
},

{
q:"Har dere god plass til hund?",
answers:[
{ text:"Ja", type:"large" },
{ text:"Litt begrenset", type:"small" }
]
},

{
q:"Vil dere ha en rolig eller energisk hund?",
answers:[
{ text:"Rolig", type:"calm" },
{ text:"Energisk", type:"active" }
]
}

];

let current = 0;

const score = {
small:0,
large:0,
active:0,
calm:0,
easy:0,
fluffy:0,
family:0,
alone:0,
social:0
};

function showQuestion(){

if(current >= questions.length){

showResult();

return;

}

const q = questions[current];

document.getElementById("question").innerHTML = q.q;

document.getElementById("answers").innerHTML =
q.answers.map(answer =>

`<button class="answer-btn"
onclick="choose('${answer.type}')">
${answer.text}
</button>`

).join("");

}

function choose(type){

score[type]++;

current++;

showQuestion();

}

function showResult(){

let dogs = [];

if(score.family >= 2){

dogs.push("🐶 Golden Retriever");
dogs.push("🐶 Cavalier King Charles Spaniel");

}

if(score.small >= 3){

dogs.push("🐾 Pomeranian");
dogs.push("🐾 Chihuahua");

}

if(score.large >= 3){

dogs.push("🐕 Dobermann");
dogs.push("🐕 Newfoundland");

}

if(score.active >= 2){

dogs.push("🐕 Boxer");
dogs.push("🐕 Rhodesian Ridgeback");

}

if(score.calm >= 2){

dogs.push("☁️ Bichon Frise");
dogs.push("☁️ Lhasa Apso");

}

if(score.fluffy >= 2){

dogs.push("🐩 Puddel");
dogs.push("🐩 Langhåret Collie");

}

if(score.easy >= 2){

dogs.push("🐶 Boston Terrier");
dogs.push("🐶 Schnauzer");

}

if(dogs.length === 0){

dogs.push("🐶 Golden Retriever");

}

document.getElementById("question").innerHTML =
"🎉 Disse hundene kan passe dere:";

document.getElementById("answers").innerHTML = "";

document.getElementById("result").innerHTML =
dogs.join("<br>");

}

showQuestion();

</script>

</body>
</html>
