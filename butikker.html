<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Se Butikker - Hundene våre</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Arial,sans-serif;
      color:#0f172a;
      background:
        radial-gradient(circle at top left, rgba(96,165,250,.18) 0%, transparent 30%),
        linear-gradient(180deg,#dbe7f5 0%,#f8fbff 100%);
      min-height:100vh;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:18px 14px 60px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
      padding:14px 16px;
      border:1px solid #cfe0ff;
      border-radius:24px;
      background:rgba(255,255,255,.92);
      box-shadow:0 12px 30px rgba(15,23,42,.08);
      position:sticky;
      top:8px;
      z-index:20;
    }

    .brand{
      font-size:22px;
      font-weight:900;
      color:#1d4ed8;
    }

    .topbar a{
      text-decoration:none;
      background:#eaf2ff;
      color:#1d4ed8;
      border:1px solid #bfd7ff;
      padding:11px 16px;
      border-radius:999px;
      font-weight:900;
    }

    .hero{
      background:
        linear-gradient(rgba(0,0,0,.42),rgba(0,0,0,.42)),
        url('https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=1400&auto=format&fit=crop')
        center/cover no-repeat;
      color:white;
      border-radius:30px;
      padding:34px;
      margin-bottom:18px;
      box-shadow:0 18px 42px rgba(15,23,42,.18);
    }

    .hero h1{
      font-size:42px;
      margin-bottom:8px;
    }

    .hero p{
      max-width:650px;
      line-height:1.6;
      font-size:16px;
    }

    .filters{
      background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
      border:1px solid #dbeafe;
      border-radius:28px;
      padding:18px;
      margin-bottom:18px;
      box-shadow:0 14px 34px rgba(30,64,175,.10);
    }

    .filter-grid{
      display:grid;
      grid-template-columns:2fr 1fr 1fr;
      gap:12px;
    }

    input,select{
      width:100%;
      padding:14px 15px;
      border:1px solid #cbdcf5;
      border-radius:18px;
      font-size:15px;
      background:white;
    }

    input:focus,
    select:focus{
      outline:none;
      border-color:#60a5fa;
      box-shadow:0 0 0 4px rgba(96,165,250,.18);
    }

    .status{
      margin-top:12px;
      color:#64748b;
      font-weight:800;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:18px;
    }

    .biz-card{
      background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
      border:1px solid #cfe0ff;
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 16px 36px rgba(30,64,175,.10);
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .biz-card:hover{
      transform:translateY(-2px);
      box-shadow:0 22px 44px rgba(30,64,175,.15);
    }

    .biz-image{
      height:170px;
      background:#eef4ff;
      display:flex;
      align-items:center;
      justify-content:center;
      border-bottom:1px solid #dbeafe;
    }

    .biz-image img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      padding:12px;
      background:white;
    }

    .biz-placeholder{
      font-size:52px;
    }

    .biz-content{
      padding:18px;
    }

    .biz-title{
      font-size:24px;
      font-weight:900;
      color:#0f172a;
      margin-bottom:6px;
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      background:#eaf2ff;
      color:#1d4ed8;
      border:1px solid #bfd7ff;
    }

    .biz-text{
      color:#334155;
      line-height:1.55;
      font-size:15px;
      margin-bottom:14px;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      justify-content:center;
      align-items:center;
      text-decoration:none;
      border-radius:999px;
      padding:11px 15px;
      font-weight:900;
      background:#2563eb;
      color:white;
      border:1px solid #2563eb;
      flex:1;
      min-width:130px;
    }

    .btn.alt{
      background:#eaf2ff;
      color:#1d4ed8;
      border-color:#bfd7ff;
    }

    .empty{
      background:white;
      border:2px dashed #93c5fd;
      border-radius:28px;
      padding:28px;
      text-align:center;
      color:#64748b;
      grid-column:1 / -1;
    }

    @media(max-width:760px){
      .hero{
        padding:24px;
        border-radius:24px;
      }

      .hero h1{
        font-size:32px;
      }

      .filter-grid{
        grid-template-columns:1fr;
      }

      .grid{
        grid-template-columns:1fr;
      }

      .actions{
        flex-direction:column;
      }

      .btn{
        width:100%;
      }
    }
  
/* --- STEG 22A: OMRÅDEKNAPPER PÅ BUTIKKER.HTML --- */

.area-picker{
  margin-bottom:16px;
  padding:16px;
  border-radius:24px;
  background:#f8fbff;
  border:1px solid #dbeafe;
}

.area-picker-title{
  font-weight:900;
  color:#1d4ed8;
  margin-bottom:10px;
  font-size:16px;
}

.area-buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.area-btn{
  border:none;
  border-radius:18px;
  padding:13px 10px;
  background:#eef4ff;
  color:#1d4ed8;
  border:1px solid #bfd7ff;
  font-weight:900;
  cursor:pointer;
}

.area-btn.active{
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:white;
  border-color:#2563eb;
}

.area-start{
  margin-top:14px;
  background:#ffffff;
  border:2px dashed #93c5fd;
  color:#1d4ed8;
  border-radius:22px;
  padding:24px;
  text-align:center;
  font-weight:900;
  grid-column:1 / -1;
}

#regionFilter{
  display:none;
}

@media(max-width:760px){
  .area-buttons{
    grid-template-columns:1fr 1fr;
  }
}

</style>
</head>

<body>

  <div class="wrap">

    <div class="topbar">
      <div class="brand">🐶 Hundene våre</div>

      <a href="index.html">← Forside</a>
    </div>

    <div class="hero">
      <h1>🏪 Se Butikker</h1>
      <p>
        Finn butikker og tjenester for hund og katt. Søk på navn,
        velg område eller filtrer på kategori.
      </p>
    </div>

    <div class="filters">

      <div class="area-picker">
        <div class="area-picker-title">📍 Velg område</div>

        <div class="area-buttons">
          <button class="area-btn" data-area="Haugalandet" onclick="chooseArea('Haugalandet')">Haugalandet</button>
          <button class="area-btn" data-area="Stavanger" onclick="chooseArea('Stavanger')">Stavanger</button>
          <button class="area-btn" data-area="Bergen" onclick="chooseArea('Bergen')">Bergen</button>
          <button class="area-btn" data-area="Stord" onclick="chooseArea('Stord')">Stord</button>
        </div>
      </div>

      <div class="filter-grid">
        <input id="searchInput" placeholder="Søk på navn, sted eller tekst">

        <select id="regionFilter">
          <option value="">Alle områder</option>
          <option value="Haugalandet">Haugalandet</option>
          <option value="Stavanger">Stavanger</option>
          <option value="Bergen">Bergen</option>
          <option value="Stord">Stord</option>
        </select>

        <select id="typeFilter">
          <option value="">Alle kategorier</option>
          <option value="Zoo butikk">Zoo butikk</option>
          <option value="Frisør">Frisør</option>
          <option value="Veterinær">Veterinær</option>
          <option value="Hundepensjonat">Hundepensjonat</option>
          <option value="Hundeklubb">Hundeklubb</option>
          <option value="Kafé">Kafé</option>
        </select>
      </div>

      <div id="status" class="status">Laster butikker ...</div>
    </div>

    <div id="businessGrid" class="grid"></div>

  </div>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://kxudiviidwwwclbzgdyx.supabase.co",
      "sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
    );

    let allBusinesses = [];

    const grid = document.getElementById("businessGrid");
    const statusEl = document.getElementById("status");
    const searchInput = document.getElementById("searchInput");
    const regionFilter = document.getElementById("regionFilter");
    const typeFilter = document.getElementById("typeFilter");

    function safeText(value){
      return String(value || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function getImage(b){
      return b.logo_url || b.image_url || b.logo || b.image || b.main_image || b.photo || b.mainImage || "";
    }

    function getName(b){
      return b.name || b.title || b.bizName || "Uten navn";
    }

    function getRegion(b){
      return b.region || b.area || b.city || b.place || "";
    }

    function getType(b){
      return b.type || b.category || b.bizType || "";
    }

    function getDescription(b){
      return b.text || b.description || b.bizText || "";
    }

    function getWebsite(b){
      return b.website || b.url || b.facebook || b.bizWebsite || "";
    }

    function getPhone(b){
      return b.phone || b.telephone || b.bizPhone || "";
    }

    function normalizeUrl(url){
      if(!url) return "";
      if(url.startsWith("http://") || url.startsWith("https://")) return url;
      return "https://" + url;
    }

    async function loadBusinesses(){
      statusEl.textContent = "Laster butikker ...";

      try{
        let query = supabaseClient
          .from("businesses")
          .select("*");

        const { data, error } = await query;

        if(error){
          statusEl.textContent = "Kunne ikke laste butikker.";
          grid.innerHTML = '<div class="empty">Noe gikk galt ved lasting av butikker.</div>';
          return;
        }

        allBusinesses = data || [];
        renderBusinesses();

      }catch(e){
        statusEl.textContent = "Kunne ikke laste butikker.";
        grid.innerHTML = '<div class="empty">Noe gikk galt ved lasting av butikker.</div>';
      }
    }

    function renderBusinesses(){
      const search = searchInput.value.trim().toLowerCase();
      const region = regionFilter.value;
      const type = typeFilter.value;

      updateAreaCounts();

      if(!region){
        statusEl.textContent = "Velg område";
        grid.innerHTML = '<div class="area-start">📍 Velg område for å se butikker</div>';
        return;
      }

      let list = allBusinesses.filter(b => {
        const name = getName(b).toLowerCase();
        const bRegion = getRegion(b);
        const bType = getType(b);
        const desc = getDescription(b).toLowerCase();
        const place = String(b.place || b.city || "").toLowerCase();

        const matchesSearch =
          !search ||
          name.includes(search) ||
          desc.includes(search) ||
          place.includes(search) ||
          bRegion.toLowerCase().includes(search);

        const matchesRegion =
          bRegion === region;

        const matchesType =
          !type || bType === type;

        return matchesSearch && matchesRegion && matchesType;
      });

      statusEl.textContent = region + ": " + list.length + " butikk(er) funnet";

      if(list.length === 0){
        grid.innerHTML = '<div class="empty">Ingen butikker funnet i valgt område.</div>';
        return;
      }

      grid.innerHTML = list.map(b => {
        const id = b.id || "";
        const name = safeText(getName(b));
        const region = safeText(getRegion(b));
        const type = safeText(getType(b));
        const desc = safeText(getDescription(b));
        const img = getImage(b);
        const website = normalizeUrl(getWebsite(b));
        const phone = getPhone(b);

        return `
          <div class="biz-card">
            <div class="biz-image">
              ${img ? `<img src="${img}" alt="${name}">` : `<div class="biz-placeholder">🏪</div>`}
            </div>

            <div class="biz-content">
              <div class="biz-title">${name}</div>

              <div class="chips">
                ${region ? `<span class="chip">📍 ${region}</span>` : ""}
                ${type ? `<span class="chip">🏷️ ${type}</span>` : ""}
              </div>

              ${desc ? `<div class="biz-text">${desc}</div>` : `<div class="biz-text">Ingen beskrivelse lagt inn ennå.</div>`}

              <div class="actions">
                ${id ? `<a class="btn" href="butikk.html?id=${id}">Se butikk</a>` : ""}
                ${phone ? `<a class="btn alt" href="tel:${phone}">Ring</a>` : ""}
                ${website ? `<a class="btn alt" href="${website}" target="_blank">Nettside</a>` : ""}
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function chooseArea(area){
      regionFilter.value = area;

      document.querySelectorAll(".area-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.area === area);
      });

      renderBusinesses();
    }

    function updateAreaCounts(){
      const counts = {
        Haugalandet:0,
        Stavanger:0,
        Bergen:0,
        Stord:0
      };

      allBusinesses.forEach(b => {
        const region = getRegion(b);
        if(counts[region] !== undefined){
          counts[region]++;
        }
      });

      document.querySelectorAll(".area-btn").forEach(btn => {
        const area = btn.dataset.area;
        if(counts[area] !== undefined){
          btn.textContent = area + " (" + counts[area] + ")";
        }
      });
    }

    searchInput.addEventListener("input", renderBusinesses);
    regionFilter.addEventListener("change", renderBusinesses);
    typeFilter.addEventListener("change", renderBusinesses);

    loadBusinesses();
  </script>

</body>
</html>
