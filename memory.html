<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Memory Arcade DELUXE</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:
linear-gradient(to bottom,#dbeafe,#eef6ff);
text-align:center;
overflow-x:hidden;
color:#123c73;
}

h1{
font-size:48px;
margin-top:20px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.topbar{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

select,button{
padding:14px 20px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,.12);
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

.stats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:25px;
}

.stat{
background:white;
padding:14px 20px;
border-radius:18px;
font-size:20px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,.12);
min-width:140px;
}

#gameBoard{
display:grid;
gap:15px;
justify-content:center;
margin-top:20px;
}

/* MEMORY CARD */

.card{
width:110px;
height:110px;
perspective:1000px;
cursor:pointer;
}

.inner{
position:relative;
width:100%;
height:100%;
transition:transform .6s;
transform-style:preserve-3d;
}

.card.flipped .inner{
transform:rotateY(180deg);
}

.front,
.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:54px;
font-weight:bold;
box-shadow:0 6px 14px rgba(0,0,0,.18);
}

.front{
background:
linear-gradient(
135deg,
#2563eb,
#60a5fa
);
color:white;
}

.back{
background:white;
transform:rotateY(180deg);
}

.card:hover{
transform:scale(1.05);
}

.correct .back{
box-shadow:
0 0 25px #22c55e,
0 0 45px #22c55e;
}

.wrong{
animation:shake .25s 2;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

/* WIN BOX */

#winBox{
display:none;
margin-top:30px;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,.18);
max-width:500px;
margin-left:auto;
margin-right:auto;
}

#winBox h2{
font-size:42px;
margin:10px;
color:#db2777;
}

#stars{
font-size:48px;
margin:15px;
}

.backBtn{
margin-top:20px;
padding:16px 28px;
border:none;
border-radius:18px;
background:#123c73;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>🧠 Memory Arcade DELUXE</h1>

<div class="topbar">

<select id="themeSelect">

<option value="dogs">
🐶 Hunde-memory
</option>

<option value="cats">
🐱 Katte-memory
</option>

<option value="forest">
🌲 Skog-memory
</option>

<option value="food">
🦴 Godbit-memory
</option>

</select>

<select id="difficultySelect">

<option value="8">
🙂 Lett
</option>

<option value="12">
😎 Medium
</option>

<option value="16">
🔥 Vanskelig
</option>

<option value="20">
👑 Ekspert
</option>

</select>

<button onclick="startGame()">

🚀 Start spill

</button>

</div>

<div class="stats">

<div class="stat">
⭐ Poeng:
<span id="score">0</span>
</div>

<div class="stat">
🔥 Combo:
<span id="combo">0</span>
</div>

<div class="stat">
⏱️ Tid:
<span id="time">0</span>
</div>

<div class="stat">
🏆 Highscore:
<span id="highscore">0</span>
</div>

</div>

<div id="gameBoard"></div>

<div id="winBox">

<h2>🎉 DU VANT!</h2>

<div id="stars">
⭐⭐⭐
</div>

<p id="finalScore"></p>

<button onclick="startGame()">

🔄 Spill igjen

</button>

</div>

<br>

<button class="backBtn"
onclick="location.href='hundespill.html'">

⬅️ Tilbake til spill

</button>

</div>

<script>

const themes={

dogs:["🐶","🐕","🦮","🐩","🐕‍🦺","🐾"],

cats:["🐱","🐈","😺","😸","🐾","😻"],

forest:["🌲","🌳","🍄","🦊","🐿️","🍁"],

food:["🦴","🍖","🥩","🍗","🧀","🥓"]

};

let cards=[];
let flipped=[];
let matched=0;
let score=0;
let combo=0;
let timer=0;
let interval;

function startGame(){

clearInterval(interval);

document.getElementById(
"winBox"
).style.display="none";

score=0;
combo=0;
matched=0;
timer=0;

updateStats();

const difficulty=
parseInt(
document.getElementById(
"difficultySelect"
).value
);

const theme=
document.getElementById(
"themeSelect"
).value;

let selected=
themes[theme]
.slice(0,difficulty/2);

cards=[...selected,...selected];

cards.sort(()=>Math.random()-0.5);

const board=
document.getElementById(
"gameBoard"
);

board.innerHTML="";

let columns=4;

if(difficulty===16)
columns=4;

if(difficulty===20)
columns=5;

board.style.gridTemplateColumns=
`repeat(${columns},110px)`;

cards.forEach((emoji,index)=>{

const card=
document.createElement("div");

card.className="card";

card.dataset.emoji=emoji;

card.innerHTML=`

<div class="inner">

<div class="front">
❓
</div>

<div class="back">
${emoji}
</div>

</div>

`;

card.onclick=
()=>flipCard(card);

board.appendChild(card);

});

interval=setInterval(()=>{

timer++;

document.getElementById(
"time"
).innerHTML=timer;

},1000);

}

function flipCard(card){

if(
flipped.length>=2 ||
card.classList.contains(
"flipped"
)
) return;

card.classList.add(
"flipped"
);

flipped.push(card);

if(flipped.length===2){

checkMatch();

}

}

function checkMatch(){

const [a,b]=flipped;

if(
a.dataset.emoji===
b.dataset.emoji
){

a.classList.add(
"correct"
);

b.classList.add(
"correct"
);

matched+=2;

combo++;

score+=10+(combo*2);

flipped=[];

updateStats();

if(
matched===cards.length
){

winGame();

}

}else{

combo=0;

score=Math.max(
0,
score-2
);

a.classList.add(
"wrong"
);

b.classList.add(
"wrong"
);

updateStats();

setTimeout(()=>{

a.classList.remove(
"flipped"
);

b.classList.remove(
"flipped"
);

a.classList.remove(
"wrong"
);

b.classList.remove(
"wrong"
);

flipped=[];

},900);

}

}

function updateStats(){

document.getElementById(
"score"
).innerHTML=score;

document.getElementById(
"combo"
).innerHTML=combo;

document.getElementById(
"time"
).innerHTML=timer;

let high=
localStorage.getItem(
"memoryHighscore"
)||0;

if(score>high){

localStorage.setItem(
"memoryHighscore",
score
);

high=score;

}

document.getElementById(
"highscore"
).innerHTML=high;

}

function winGame(){

clearInterval(interval);

document.getElementById(
"winBox"
).style.display="block";

document.getElementById(
"finalScore"
).innerHTML=
`⭐ Poeng: ${score}<br>⏱️ Tid: ${timer}s`;

}

startGame();

</script>

</body>
</html>
