<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Hundememory</title>

<style>
body{margin:0;font-family:Arial;background:#eef6ff;color:#123c73;text-align:center}
.box{max-width:950px;margin:20px auto;padding:15px}
h1{margin-bottom:8px}
.levels{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:18px 0}
.levels button,.restart{background:#2563eb;color:white;border:none;padding:12px 18px;border-radius:999px;font-weight:bold;cursor:pointer}
.info{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin:15px 0;font-weight:bold}
.badge{background:white;padding:10px 16px;border-radius:999px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.grid{display:grid;gap:10px;margin-top:20px}
.card{height:105px;background:#2563eb;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:42px;cursor:pointer;box-shadow:0 8px 18px rgba(0,0,0,.15)}
.card.open{background:white}
.card.done{background:#d1fae5;cursor:default}
.back{display:inline-block;margin-top:18px;color:#2563eb;font-weight:bold;text-decoration:none}
@media(max-width:650px){.card{height:72px;font-size:30px}.grid{gap:7px}}
</style>
</head>

<body>
<div class="box">
<h1>🧠 Hundememory</h1>
<p>Velg vanskelighetsgrad 🐶</p>

<div class="levels">
<button onclick="startGame(4)">Lett</button>
<button onclick="startGame(6)">Middels</button>
<button onclick="startGame(8)">Vanskelig</button>
<button onclick="startGame(10)">Ekspert</button>
</div>

<div class="info">
<div class="badge">⏱️ Tid: <span id="time">0</span>s</div>
<div class="badge">🎯 Trekk: <span id="moves">0</span></div>
<div class="badge">✅ Par: <span id="pairs">0</span>/<span id="totalPairs">0</span></div>
</div>

<div id="grid" class="grid"></div>

<button class="restart" onclick="startGame(currentPairs)">Start på nytt</button>
<br>
<a class="back" href="hundespill.html">← Tilbake til spill</a>
</div>

<script>
const symbols=["🐶","🐕","🦮","🐕‍🦺","🦴","🐾","🍖","🏠","🎾","🐩"];
let first=null, second=null, lock=false;
let moves=0, pairs=0, currentPairs=4, seconds=0, timer=null;

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function startTimer(){
  clearInterval(timer);
  seconds=0;
  document.getElementById("time").textContent=0;
  timer=setInterval(()=>{
    seconds++;
    document.getElementById("time").textContent=seconds;
  },1000);
}

function startGame(pairCount){
  currentPairs=pairCount;
  first=null; second=null; lock=false;
  moves=0; pairs=0;

  document.getElementById("moves").textContent=0;
  document.getElementById("pairs").textContent=0;
  document.getElementById("totalPairs").textContent=pairCount;

  const grid=document.getElementById("grid");
  grid.innerHTML="";

  let cols=4;
  if(pairCount>=10) cols=5;
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;

  const selected=symbols.slice(0,pairCount);
  const cards=shuffle([...selected,...selected]);

  cards.forEach(value=>{
    const div=document.createElement("div");
    div.className="card";
    div.dataset.value=value;
    div.textContent="❓";
    div.onclick=()=>flip(div);
    grid.appendChild(div);
  });

  startTimer();
}

function flip(card){
  if(lock || card.classList.contains("open") || card.classList.contains("done")) return;

  card.classList.add("open");
  card.textContent=card.dataset.value;

  if(!first){
    first=card;
    return;
  }

  second=card;
  moves++;
  document.getElementById("moves").textContent=moves;

  if(first.dataset.value===second.dataset.value){
    first.classList.add("done");
    second.classList.add("done");
    first=null; second=null;
    pairs++;
    document.getElementById("pairs").textContent=pairs;

    if(pairs===currentPairs){
      clearInterval(timer);
      setTimeout(()=>{
        alert("🎉 Du klarte nivået på "+seconds+" sekunder og "+moves+" trekk!");
      },200);
    }
  }else{
    lock=true;
    setTimeout(()=>{
      first.classList.remove("open");
      second.classList.remove("open");
      first.textContent="❓";
      second.textContent="❓";
      first=null; second=null; lock=false;
    },800);
  }
}

startGame(4);
</script>
</body>
</html>
