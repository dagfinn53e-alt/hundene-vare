<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Memory Arcade</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eef6ff;
  color:#123c73;
  text-align:center;
  transition:0.4s;
}

.darkMode{
  background:#111827;
  color:white;
}

.container{
  max-width:1200px;
  margin:20px auto;
  background:white;
  padding:25px;
  border-radius:25px;
  box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.darkMode .container{
  background:#1f2937;
}

h1{
  margin-bottom:10px;
}

select,button{
  padding:14px;
  margin:10px;
  border:none;
  border-radius:14px;
  font-size:18px;
  font-weight:bold;
}

button{
  background:#2563eb;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  margin:20px 0;
}

.stat{
  background:#f1f5ff;
  padding:14px;
  border-radius:18px;
  font-weight:bold;
}

.darkMode .stat{
  background:#374151;
}

#gameBoard{
  display:grid;
  gap:10px;
  justify-content:center;
  margin-top:25px;
}

.card{
  width:90px;
  height:90px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:38px;
  cursor:pointer;
  user-select:none;
  transition:0.3s;
  background:#2563eb;
  color:white;
}

.card.flipped{
  background:white;
  color:#111827;
  transform:rotateY(180deg);
}

.darkMode .card.flipped{
  background:#374151;
  color:white;
}

.card.matched{
  background:#10b981;
  color:white;
}

.back{
  display:inline-block;
  margin-top:25px;
  text-decoration:none;
  color:#2563eb;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🧠 Memory Arcade</h1>

<select id="theme">

<option value="dogs">
🐶 Hunde-memory
</option>

<option value="puppies">
🐾 Valpe-memory
</option>

<option value="show">
🏆 Hundeshow-memory
</option>

<option value="treats">
🦴 Godbit-memory
</option>

<option value="forest">
🌲 Skog-memory
</option>

<option value="vet">
🚑 Veterinær-memory
</option>

</select>

<select id="difficulty">

<option value="12">
🙂 Lett
</option>

<option value="16">
😎 Medium
</option>

<option value="20">
🔥 Vanskelig
</option>

<option value="24">
🌙 Expert
</option>

</select>

<button onclick="startGame()">
🚀 Start spill
</button>

<div class="stats">

<div class="stat">
⭐ Poeng: <span id="score">0</span>
</div>

<div class="stat">
🔥 Combo: <span id="combo">0</span>
</div>

<div class="stat">
⏱️ Tid: <span id="time">60</span>
</div>

<div class="stat">
🏆 Highscore: <span id="highscore">0</span>
</div>

<div class="stat">
🧠 Tema: <span id="themeText">
Hunde-memory
</span>
</div>

</div>

<div id="gameBoard"></div>

<a class="back" href="hundespill.html">
← Tilbake til spill
</a>

</div>

<script>

const themes={

dogs:[
"🐶","🐕","🦮","🐩",
"🐕‍🦺","🐾","🦴","🎾",
"🐺","🐕","🐩","🦮"
],

puppies:[
"🐶","🍼","🧸","🎀",
"🐾","🦴","🎾","❤️",
"🥎","🐕","🐩","🐾"
],

show:[
"🏆","🎀","✨","🐩",
"👑","📸","⭐","🎉",
"🐶","🎖️","🥇","🎗️"
],

treats:[
"🦴","🍖","🥩","🧀",
"🍗","🥓","🍼","🎾",
"🐶","🥎","🍪","❤️"
],

forest:[
"🌲","🍂","🦊","🐺",
"🍄","🌳","🪵","🌧️",
"🐾","🦴","🌙","🔥"
],

vet:[
"🚑","💉","🩺","💊",
"🩹","🐶","❤️","🧴",
"🧠","⚕️","🏥","🩻"
]

};

let cards=[];

let flipped=[];

let matched=0;

let score=0;

let combo=0;

let timeLeft=60;

let timer=null;

function startGame(){

clearInterval(timer);

document.body.classList.remove(
"darkMode"
);

const totalCards=
parseInt(
document.getElementById(
"difficulty"
).value
);

const theme=
document.getElementById(
"theme"
).value;

document.getElementById(
"themeText"
).innerHTML=
document.getElementById(
"theme"
).selectedOptions[0].text;

cards=[];

const selected=
themes[theme];

for(let i=0;i<totalCards/2;i++){

cards.push(selected[i]);
cards.push(selected[i]);

}

shuffle(cards);

matched=0;
score=0;
combo=0;

timeLeft=
totalCards===24
? 45
: 60;

document.getElementById(
"score"
).innerHTML=score;

document.getElementById(
"combo"
).innerHTML=combo;

document.getElementById(
"time"
).innerHTML=timeLeft;

if(totalCards===24){

document.body.classList.add(
"darkMode"
);

}

createBoard();

timer=setInterval(
updateTimer,
1000
);

}

function createBoard(){

const board=
document.getElementById(
"gameBoard"
);

board.innerHTML="";

const total=
cards.length;

const cols=
Math.ceil(
Math.sqrt(total)
);

board.style.gridTemplateColumns=
`repeat(${cols},90px)`;

cards.forEach((symbol,index)=>{

const card=
document.createElement("div");

card.className="card";

card.dataset.value=symbol;

card.innerHTML="❓";

card.onclick=
()=>flipCard(card);

board.appendChild(card);

});

}

function flipCard(card){

if(
card.classList.contains(
"flipped"
)
||
card.classList.contains(
"matched"
)
||
flipped.length>=2
){
return;
}

card.classList.add(
"flipped"
);

card.innerHTML=
card.dataset.value;

flipped.push(card);

if(flipped.length===2){

checkMatch();

}

}

function checkMatch(){

const[a,b]=flipped;

if(
a.dataset.value===
b.dataset.value
){

a.classList.add(
"matched"
);

b.classList.add(
"matched"
);

matched+=2;

combo++;

const bonus=
10+(combo*2);

score+=bonus;

document.getElementById(
"score"
).innerHTML=score;

document.getElementById(
"combo"
).innerHTML=combo;

flipped=[];

if(matched===cards.length){

clearInterval(timer);

saveHighscore();

setTimeout(()=>{

alert(
"🏆 Gratulerer! Du vant med "+
score+
" poeng!"
);

},300);

}

}else{

combo=0;

document.getElementById(
"combo"
).innerHTML=combo;

setTimeout(()=>{

a.classList.remove(
"flipped"
);

b.classList.remove(
"flipped"
);

a.innerHTML="❓";
b.innerHTML="❓";

flipped=[];

},700);

}

}

function updateTimer(){

timeLeft--;

document.getElementById(
"time"
).innerHTML=timeLeft;

if(timeLeft<=0){

clearInterval(timer);

alert(
"⏱️ Tiden er ute!"
);

}

}

function saveHighscore(){

const best=
localStorage.getItem(
"memoryArcadeBest"
)||0;

if(score>best){

localStorage.setItem(
"memoryArcadeBest",
score
);

}

document.getElementById(
"highscore"
).innerHTML=
localStorage.getItem(
"memoryArcadeBest"
)||0;

}

function shuffle(array){

for(
let i=array.length-1;
i>0;
i--
){

const j=
Math.floor(
Math.random()*(i+1)
);

[array[i],array[j]]=
[array[j],array[i]];

}

}

document.getElementById(
"highscore"
).innerHTML=
localStorage.getItem(
"memoryArcadeBest"
)||0;

</script>

</body>
</html>
