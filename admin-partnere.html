<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Partnere – Hundene våre</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial,sans-serif;
  color:#123c73;
  min-height:100vh;
  background:linear-gradient(180deg,#dbeafe,#eef6ff,#fff7ed);
}
.wrap{max-width:1120px;margin:auto;padding:16px 10px 70px}
.top{
  display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
  background:white;border:1px solid #bfd7ff;border-radius:26px;padding:14px 16px;
  box-shadow:0 14px 34px rgba(15,23,42,.10);margin-bottom:16px
}
.logo{font-size:23px;font-weight:900;color:#004cff}
.nav{display:flex;gap:8px;flex-wrap:wrap}
.nav a{
  background:#eaf2ff;color:#004cff;text-decoration:none;border:1px solid #b8ddff;
  border-radius:999px;padding:10px 13px;font-weight:900;font-size:14px
}
.hero{
  background:linear-gradient(135deg,#061b55,#004cff,#7c3aed);
  color:white;border-radius:32px;padding:30px 18px;text-align:center;
  box-shadow:0 24px 56px rgba(0,45,110,.28);margin-bottom:16px
}
.hero h1{font-size:clamp(2rem,6vw,4rem);margin-bottom:8px}
.hero p{font-weight:700;color:#eef6ff;line-height:1.5}
.controls{
  background:white;border:1px solid #dbeafe;border-radius:24px;padding:14px;
  box-shadow:0 12px 28px rgba(15,23,42,.08);margin-bottom:16px;
  display:flex;gap:10px;flex-wrap:wrap;align-items:center
}
button,.btn{
  border:none;border-radius:999px;padding:12px 16px;color:white;
  background:linear-gradient(135deg,#1f8fff,#004cff);
  font-size:15px;font-weight:900;cursor:pointer;text-decoration:none;
  display:inline-flex;align-items:center;justify-content:center
}
.green{background:linear-gradient(135deg,#22c55e,#16a34a)}
.red{background:linear-gradient(135deg,#ef4444,#b91c1c)}
.orange{background:linear-gradient(135deg,#ff8a3d,#f59e0b)}
.dark{background:#111827}
select,input{
  padding:12px 14px;border:1px solid #bfd7ff;border-radius:999px;
  font-weight:800;color:#123c73;background:white;min-width:180px
}
.msg{text-align:center;font-size:17px;font-weight:900;margin:14px 0;color:#334155}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.card{
  background:white;border:1px solid #dbeafe;border-radius:26px;padding:18px;
  box-shadow:0 14px 30px rgba(15,23,42,.10)
}
.card h2{font-size:24px;color:#001d4a;margin-bottom:7px}
.meta{line-height:1.65;color:#334155;font-weight:700;font-size:15px}
.chip{
  display:inline-block;background:#eaf2ff;color:#004cff;border:1px solid #b8ddff;
  border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;margin:4px 4px 8px 0
}
.thumb{
  width:100%;max-height:210px;object-fit:cover;border-radius:18px;border:1px solid #dbeafe;margin:10px 0
}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px}
.actions button,.actions a{flex:1;min-width:125px;text-align:center}
.empty{
  grid-column:1/-1;background:white;border:2px dashed #93c5fd;border-radius:26px;
  padding:28px;text-align:center;color:#64748b;font-weight:900
}
.small{font-size:12px;color:#64748b;margin-top:8px;font-weight:700}
@media(max-width:800px){
  .grid{grid-template-columns:1fr}
  .top{justify-content:center}
  .logo{width:100%;text-align:center}
  .nav{justify-content:center;width:100%}
  .nav a{flex:1 1 42%;text-align:center;font-size:12px}
  .controls{display:grid;grid-template-columns:1fr}
  select,input,button,.btn{width:100%}
}
</style>
</head>
<body>
<div class="wrap">

<div class="top">
  <div class="logo">🔐 Admin Partnere</div>
  <div class="nav">
    <a href="index.html">🏠 Forside</a>
    <a href="samarbeidspartnere.html">🤝 Partnere</a>
    <a href="butikk-profil-skjema.html">📝 Skjema</a>
    <a href="admin.html">🔧 Gammel Admin</a>
  </div>
</div>

<section class="hero">
  <h1>Admin Partnere</h1>
  <p>Godkjenn samarbeidspartnere, sponsorer og Facebook-sider som er sendt inn via skjema.</p>
</section>

<div class="controls">
  <select id="filter" onchange="render()">
    <option value="venter">🟡 Venter</option>
    <option value="godkjent">✅ Godkjente</option>
    <option value="avvist">❌ Avviste</option>
    <option value="alle">📋 Alle</option>
  </select>
  <input id="search" oninput="render()" placeholder="Søk navn, type eller sted">
  <button onclick="loadData()">🔄 Oppdater</button>
</div>

<div id="msg" class="msg">Laster...</div>
<div id="list" class="grid"></div>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://kxudiviidwwwclbzgdyx.supabase.co",
  "sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
);

let rows=[];

function esc(v){
  return String(v || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function val(o, keys, fallback=""){
  for(const k of keys){
    if(o && o[k] !== undefined && o[k] !== null && String(o[k]).trim()) return String(o[k]).trim();
  }
  return fallback;
}
function nameOf(o){return val(o,["name","title","bizName","company","business_name"],"Uten navn")}
function typeOf(o){return val(o,["type","category","bizType","business_type"],"Ukjent")}
function descOf(o){return val(o,["text","description","bizText","about"],"")}
function regionOf(o){return val(o,["region","area","city","place","municipality"],"")}
function imageOf(o){return val(o,["logo_url","image_url","logo","image","main_image","photo","mainImage"],"")}
function siteOf(o){return val(o,["website","url","facebook","bizWebsite"],"")}
function mailOf(o){return val(o,["email","epost","mail"],"")}
function phoneOf(o){return val(o,["phone","telefon","mobile"],"")}
function normUrl(url){
  if(!url) return "";
  return String(url).startsWith("http") ? String(url) : "https://" + String(url);
}
function statusOf(o){
  const s=String(o.status || "").toLowerCase();
  if(o.approved === true || s==="godkjent") return "godkjent";
  if(s==="avvist") return "avvist";
  return "venter";
}
function isPartner(o){
  const t=typeOf(o).toLowerCase();
  return t.includes("samarbeid") || t.includes("partner") || t.includes("sponsor") || t.includes("facebook") || t.includes("kampanje");
}

async function loadData(){
  msg.textContent="Laster fra databasen...";
  list.innerHTML="";
  try{
    const {data,error}=await supabaseClient
      .from("businesses")
      .select("*")
      .order("created_at",{ascending:false});
    if(error){
      msg.textContent="Feil ved lasting: " + error.message;
      return;
    }
    rows=(data || []).filter(isPartner);
    render();
  }catch(e){
    msg.textContent="Feil: " + e.message;
  }
}

function render(){
  const f=document.getElementById("filter").value;
  const q=document.getElementById("search").value.toLowerCase().trim();
  let data=rows.slice();

  if(f!=="alle") data=data.filter(x=>statusOf(x)===f);
  if(q){
    data=data.filter(x=>
      nameOf(x).toLowerCase().includes(q) ||
      typeOf(x).toLowerCase().includes(q) ||
      regionOf(x).toLowerCase().includes(q)
    );
  }

  msg.textContent=data.length+" funnet";

  if(!data.length){
    list.innerHTML='<div class="empty">Ingen funnet.</div>';
    return;
  }

  list.innerHTML=data.map(o=>{
    const img=imageOf(o);
    const url=normUrl(siteOf(o));
    const st=statusOf(o);
    return `
      <div class="card">
        <h2>${esc(nameOf(o))}</h2>
        <span class="chip">🤝 ${esc(typeOf(o))}</span>
        <span class="chip">${st==="godkjent"?"✅":st==="avvist"?"❌":"🟡"} ${esc(st)}</span>
        ${regionOf(o)?`<span class="chip">📍 ${esc(regionOf(o))}</span>`:""}
        ${img?`<img class="thumb" src="${esc(img)}" alt="">`:""}
        <div class="meta">
          <b>Beskrivelse:</b><br>${esc(descOf(o)) || "Ingen beskrivelse"}<br><br>
          <b>E-post:</b> ${esc(mailOf(o)) || "Ikke oppgitt"}<br>
          <b>Telefon:</b> ${esc(phoneOf(o)) || "Ikke oppgitt"}<br>
          <b>Nettside/Facebook:</b><br>${url ? esc(url) : "Ikke oppgitt"}<br>
          <div class="small">ID: ${esc(o.id)}</div>
        </div>
        <div class="actions">
          ${url?`<a class="btn dark" href="${esc(url)}" target="_blank">🌐 Åpne</a>`:""}
          <button class="green" onclick="approve('${o.id}')">✅ Godkjenn</button>
          <button class="red" onclick="rejectRow('${o.id}')">❌ Avvis</button>
        </div>
      </div>
    `;
  }).join("");
}

async function approve(id){
  if(!confirm("Godkjenne denne?")) return;
  const {error}=await supabaseClient.from("businesses").update({
    approved:true,
    status:"godkjent"
  }).eq("id",id);
  if(error){alert("Kunne ikke godkjenne: "+error.message);return;}
  await loadData();
}

async function rejectRow(id){
  if(!confirm("Avvise denne?")) return;
  const {error}=await supabaseClient.from("businesses").update({
    approved:false,
    status:"avvist"
  }).eq("id",id);
  if(error){alert("Kunne ikke avvise: "+error.message);return;}
  await loadData();
}

loadData();
</script>
</body>
</html>
