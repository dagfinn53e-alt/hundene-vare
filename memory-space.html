<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Space</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #315cff, #050018);
      color: white;
      text-align: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 48px;
      margin-top: 30px;
      text-shadow: 0 0 20px #7df9ff;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      max-width: 500px;
      margin: 20px auto;
      padding: 0 15px;
    }

    .stat {
      background: rgba(255,255,255,0.15);
      border-radius: 15px;
      padding: 12px;
      font-weight: bold;
    }

    .buttons {
      margin: 15px;
    }

    button {
      border: none;
      border-radius: 25px;
      padding: 12px 18px;
      margin: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #00bfff, #7b5cff);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 560px;
      margin: 25px auto;
      padding: 0 12px;
    }

    .card {
      aspect-ratio: 1 / 1;
      background: #12003d;
      border: 2px solid #8be9ff;
      border-radius: 15px;
      display: grid;
      place-items: center;
      font-size: 40px;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(139,233,255,0.4);
    }

    .card.flipped,
    .card.matched {
      background: #8be9ff;
      color: #050018;
    }

    .message {
      font-size: 22px;
      font-weight: bold;
      color: #fff59d;
      min-height: 30px;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 34px;
      }

      .card {
        font-size: 30px;
      }
    }
  </style>
</head>

<body>
<h2>TEST 123</h2>
  <h1>🚀 Memory Space</h1>
  <p>Finn rom-parene!</p>

  <div class="stats">
    <div class="stat">Nivå: <span id="level">1</span></div>
    <div class="stat">Trekk: <span id="moves">0</span></div>
    <div class="stat">Combo: <span id="combo">0</span></div>
    <div class="stat">Poeng: <span id="score">0</span></div>
  </div>

  <div class="buttons">
    <button onclick="restartGame()">🔄 Start på nytt</button>
    <button onclick="toggleSound()" id="soundBtn">🔊 Lyd på</button>
    <button onclick="goToMap()">🗺️ Kart</button>
  </div>

  <div class="message" id="message">Klar?</div>

  <div class="board" id="board"></div>

  <script>
    const symbols = ["🚀", "🪐", "👽", "🌌", "⭐", "☄️", "🛰️", "🌙"];

    let cards = [];
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;

    let level = 1;
    let moves = 0;
    let combo = 0;
    let score = 0;
    let pairs = 0;
    let soundOn = true;

    const board = document.getElementById("board");
    const levelEl = document.getElementById("level");
    const movesEl = document.getElementById("moves");
    const comboEl = document.getElementById("combo");
    const scoreEl = document.getElementById("score");
    const messageEl = document.getElementById("message");
    const soundBtn = document.getElementById("soundBtn");

    function goToMap() {
      window.location.href = "memorymap.html";
    }

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function startGame() {
      board.innerHTML = "";
      firstCard = null;
      secondCard = null;
      lockBoard = false;
      moves = 0;
      combo = 0;
      pairs = 0;

      const pairCount = Math.min(4 + level, 8);
      const chosen = symbols.slice(0, pairCount);
      cards = shuffle([...chosen, ...chosen]);

      cards.forEach(symbol => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.symbol = symbol;
        card.textContent = "🛸";
        card.onclick = () => flipCard(card);
        board.appendChild(card);
      });

      updateStats();
      messageEl.textContent = "Finn rom-parene!";
    }

    function flipCard(card) {
      if (lockBoard) return;
      if (card.classList.contains("flipped")) return;
      if (card.classList.contains("matched")) return;

      card.classList.add("flipped");
      card.textContent = card.dataset.symbol;

      if (!firstCard) {
        firstCard = card;
        return;
      }

      secondCard = card;
      moves++;
      checkMatch();
      updateStats();
    }

    function checkMatch() {
      if (firstCard.dataset.symbol === secondCard.dataset.symbol) {
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        combo++;
        pairs++;
        score += 100 + combo * 20;

        messageEl.textContent = combo >= 3 ? "⚡ ULTRA SPACE COMBO!" : "🚀 Match!";

        resetTurn();
        updateStats();

        if (pairs === Math.min(4 + level, 8)) {
          setTimeout(winLevel, 700);
        }
      } else {
        lockBoard = true;
        combo = 0;
        messageEl.textContent = "Ingen match!";

        setTimeout(() => {
          firstCard.classList.remove("flipped");
          secondCard.classList.remove("flipped");
          firstCard.textContent = "🛸";
          secondCard.textContent = "🛸";
          resetTurn();
          updateStats();
        }, 700);
      }
    }

    function resetTurn() {
      firstCard = null;
      secondCard = null;
      lockBoard = false;
    }

    function winLevel() {
      level++;

      if (level > 5) {
        level = 5;
        messageEl.textContent = "🏆 Du vant Memory Space!";
      } else {
        messageEl.textContent = "🌟 Neste nivå!";
        setTimeout(startGame, 600);
      }

      updateStats();
    }

    function restartGame() {
      level = 1;
      score = 0;
      startGame();
    }

    function toggleSound() {
      soundOn = !soundOn;
      soundBtn.textContent = soundOn ? "🔊 Lyd på" : "🔇 Lyd av";
    }

    function updateStats() {
      levelEl.textContent = level;
      movesEl.textContent = moves;
      comboEl.textContent = combo;
      scoreEl.textContent = score;
    }

    startGame();
  </script>

</body>
</html>
