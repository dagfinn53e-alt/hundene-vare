<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Adventure - Space</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background:
        radial-gradient(circle at top, #3b6cff 0%, #12042b 40%, #02010a 100%);
    }

    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(#8be9ff 1px, transparent 1px),
        radial-gradient(#ffffff 1px, transparent 1px);
      background-size: 80px 80px, 140px 140px, 220px 220px;
      animation: twinkle 5s infinite alternate;
      opacity: 0.7;
    }

    @keyframes twinkle {
      from { opacity: 0.35; }
      to { opacity: 1; }
    }

    .planet {
      position: fixed;
      top: 30px;
      right: 24px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(145deg, #ff8cff, #7b5cff);
      box-shadow: 0 0 35px #9fdcff;
      z-index: 1;
    }

    .planet::before {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.35);
      transform: rotate(25deg);
    }

    .game {
      position: relative;
      z-index: 2;
      width: min(96vw, 850px);
      margin: 0 auto;
      padding: 22px 12px 38px;
    }

    h1 {
      margin: 12px 0 4px;
      font-size: clamp(2rem, 8vw, 4.4rem);
      text-shadow:
        0 0 12px #8be9ff,
        0 0 30px #7b5cff;
    }

    .subtitle {
      margin: 0 0 14px;
      color: #dff6ff;
      font-weight: bold;
    }

    .panel {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 600px;
      margin: 16px auto;
    }

    .stat {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 18px;
      padding: 10px;
      box-shadow: 0 0 18px rgba(139,233,255,0.2);
      backdrop-filter: blur(5px);
    }

    .stat strong {
      display: block;
      font-size: 0.8rem;
      color: #bfefff;
    }

    .stat span {
      font-size: 1.3rem;
      font-weight: bold;
    }

    .controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0;
    }

    button, a.button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #7b5cff, #00bfff);
      box-shadow: 0 0 20px rgba(120,180,255,0.45);
      text-decoration: none;
    }

    .sound-btn {
      background: linear-gradient(135deg, #00d084, #00a8ff);
    }

    button:active, a.button:active {
      transform: scale(0.96);
    }

    .message {
      min-height: 34px;
      margin: 8px 0;
      font-size: 1.18rem;
      font-weight: bold;
      color: #fff8b8;
      text-shadow: 0 0 12px #fff8b8;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 18px auto;
      max-width: 660px;
    }

    .card {
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      display: grid;
      place-items: center;
      font-size: clamp(2rem, 9vw, 3.5rem);
      cursor: pointer;
      user-select: none;
      background: linear-gradient(145deg, #1a0b44, #03010f);
      border: 2px solid rgba(255,255,255,0.22);
      box-shadow:
        0 8px 20px rgba(0,0,0,0.35),
        inset 0 0 16px rgba(255,255,255,0.05);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .card:hover {
      box-shadow:
        0 0 24px rgba(139,233,255,0.7),
        0 0 42px rgba(123,92,255,0.35);
    }

    .card.flipped {
      background: linear-gradient(145deg, #ffffff, #8be9ff);
      color: #14042a;
      transform: rotateY(180deg) scale(1.04);
    }

    .card.matched {
      background: linear-gradient(145deg, #00ffc8, #ffe066);
      pointer-events: none;
      animation: matchPulse 0.6s ease;
    }

    @keyframes matchPulse {
      0% { transform: scale(1); }
      40% { transform: scale(1.2) rotate(4deg); }
      100% { transform: scale(1); }
    }

    .ultra {
      animation: ultraGlow 0.8s infinite alternate;
    }

    @keyframes ultraGlow {
      from {
        filter: drop-shadow(0 0 6px #8be9ff);
      }
      to {
        filter:
          drop-shadow(0 0 18px #7b5cff)
          drop-shadow(0 0 28px #8be9ff);
      }
    }

    .confetti {
      position: fixed;
      top: -20px;
      width: 10px;
      height: 16px;
      pointer-events: none;
      z-index: 30;
      animation: fall 1.9s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    .spark {
      position: fixed;
      pointer-events: none;
      z-index: 40;
      font-size: 2rem;
      animation: sparkMove 0.9s ease-out forwards;
    }

    @keyframes sparkMove {
      from {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 1;
      }
      to {
        transform: translate(-50%, -140%) scale(2);
        opacity: 0;
      }
    }

    @media (max-width: 500px) {
      .board {
        gap: 8px;
      }

      .card {
        border-radius: 15px;
      }

      .planet {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>

<body>
  <div class="stars"></div>
  <div class="planet"></div>

  <main class="game">
    <h1 class="ultra">🚀 Memory Space</h1>
    <p class="subtitle">Utforsk galaksen og finn rom-parene!</p>

    <div class="panel">
      <div class="stat">
        <strong>Nivå</strong>
        <span id="level">1</span>
      </div>

      <div class="stat">
        <strong>Trekk</strong>
        <span id="moves">0</span>
      </div>

      <div class="stat">
        <strong>Combo</strong>
        <span id="combo">0</span>
      </div>

      <div class="stat">
        <strong>Poeng</strong>
        <span id="score">0</span>
      </div>
    </div>

    <div class="controls">
      <button onclick="restartGame()">🔄 Start på nytt</button>

      <button class="sound-btn" onclick="toggleSound()" id="soundBtn">
        🔊 Lyd på
      </button>

      <a class="button" href="memorymap.html">🗺️ Kart</a>
    </div>

    <div class="message" id="message">
      Finn rom-parene!
    </div>

    <section class="board" id="board"></section>
  </main>

  <script>
    const symbols = ["🚀", "🪐", "👽", "🌌", "🌙", "⭐", "☄️", "🛰️"];

    let cards = [];
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;

    let level = 1;
    let moves = 0;
    let combo = 0;
    let pairs = 0;
    let score = 0;
    let soundOn = true;

    const board = document.getElementById("board");
    const levelEl = document.getElementById("level");
    const movesEl = document.getElementById("moves");
    const comboEl = document.getElementById("combo");
    const scoreEl = document.getElementById("score");
    const messageEl = document.getElementById("message");
    const soundBtn = document.getElementById("soundBtn");

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function playSound(type) {
      if (!soundOn) return;

      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === "flip") oscillator.frequency.value = 500;
      if (type === "match") oscillator.frequency.value = 860;
      if (type === "wrong") oscillator.frequency.value = 180;
      if (type === "win") oscillator.frequency.value = 1200;

      oscillator.type = "sine";

      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.25);
    }
