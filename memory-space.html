<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Startside - Memory Adventure</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Arial,sans-serif;

      min-height:100vh;

      display:flex;
      align-items:center;
      justify-content:center;

      background:
        linear-gradient(180deg,#4f7cff 0%,#12052d 100%);

      padding:20px;
    }

    .card{

      width:min(92vw,420px);

      background:
        linear-gradient(180deg,#101a52,#1d2d85);

      border-radius:30px;

      padding:35px 25px;

      text-align:center;

      box-shadow:
        0 0 30px rgba(0,0,0,0.3);
    }

    h1{
      color:white;

      font-size:clamp(2rem,8vw,3.5rem);

      margin-bottom:18px;

      line-height:1.1;
    }

    p{
      color:#d8e7ff;

      font-size:1.1rem;

      line-height:1.5;

      margin-bottom:30px;
    }

    .start-btn{

      display:inline-flex;

      align-items:center;
      justify-content:center;

      width:90px;
      height:90px;

      border-radius:50%;

      text-decoration:none;

      font-size:2.5rem;

      background:
        linear-gradient(145deg,#00bfff,#004cff);

      color:white;

      box-shadow:
        0 0 25px rgba(0,191,255,0.6);

      transition:
        transform 0.2s,
        box-shadow 0.2s;
    }

    .start-btn:hover{
      transform:scale(1.08);

      box-shadow:
        0 0 35px rgba(0,191,255,0.9);
    }

    .start-btn:active{
      transform:scale(0.94);
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>
      🗺️ Memory Adventure MAP
    </h1>

    <p>
      Alle memoryspill samlet i én stor eventyr-verden
    </p>

    <!-- DENNE GÅR TIL KARTET -->

    <a class="start-btn" href="memorymap.html">
      ➡️
    </a>

  </div>

</body>
</html>
