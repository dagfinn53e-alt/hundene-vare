<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧱 Byggeverden LEVELS</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#c7e9ff,#eef6ff);
text-align:center;
overflow-x:hidden;
color:#123c73;
}

h1{
margin-top:15px;
font-size:42px;
}

.helpBox{
background:white;
padding:20px;
border-radius:22px;
max-width:760px;
margin:20px auto;
font-size:24px;
font-weight:bold;
line-height:1.7;
box-shadow:0 5px 14px rgba(0,0,0,.15);
}

.stats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.stat{
background:white;
padding:14px 22px;
border-radius:18px;
font-weight:bold;
font-size:20px;
box-shadow:0 4px 10px rgba(0,0,0,.12);
}

#game{
display:flex;
justify-content:center;
align-items:flex-start;
gap:40px;
margin-top:20px;
flex-wrap:wrap;
}

.panel{
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 6px 18px rgba(0,0,0,.15);
}

.panel h2{
margin-top:0;
}

/* MODELL */

.house{
position:relative;
width:240px;
height:240px;
margin:auto;
margin-top:20px;
}

.roof{
position:absolute;
top:0;
left:20px;
width:0;
height:0;
border-left:100px solid transparent;
border-right:100px solid transparent;
border-bottom:90px solid #8b4513;
}

.walls{
position:absolute;
top:90px;
left:40px;
width:160px;
height:120px;
background:#c0392b;
border:5px solid #922b21;
}

.door{
position:absolute;
bottom:0;
left:55px;
width:45px;
height:70px;
background:#6e2c00;
}

.window{
position:absolute;
top:20px;
right:20px;
width:40px;
height:40px;
background:#85c1e9;
border:4px solid white;
}

.window2{
position:absolute;
top:20px;
left:20px;
width:40px;
height:40px;
background:#85c1e9;
border:4px solid white;
}

.tree{
position:absolute;
bottom:0;
right:-70px;
font-size:60px;
}

/* BYGGEFELT */

#buildArea{
position:relative;
width:360px;
height:360px;
background:#dbeafe;
border-radius:20px;
border:6px dashed #60a5fa;
overflow:hidden;
}

/* DELER */

.parts{
display:flex;
justify-content:center;
gap:20px;
margin-top:25px;
flex-wrap:wrap;
}

.part{
width:110px;
height:110px;
border-radius:18px;
cursor:grab;
box-shadow:0 5px 12px rgba(0,0,0,.18);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
color:white;
user-select:none;
}

.roofPart{background:#8b4513;}
.wallPart{background:#c0392b;}
.doorPart{background:#6e2c00;}
.windowPart{background:#5dade2;}
.treePart{background:#15803d;}

.build-piece{
position:absolute;
}

#message{
margin-top:20px;
font-size:28px;
font-weight:bold;
color:#db2777;
min-height:40px;
}

#nextBtn,
#restartBtn{
margin-top:20px;
padding:16px 30px;
border:none;
border-radius:18px;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

#nextBtn{
display:none;
background:#10b981;
}

#restartBtn{
background:#f59e0b;
}

.back button{
margin-top:20px;
padding:16px 28px;
border:none;
border-radius:18px;
background:#2563eb;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🧱 Byggeverden LEVELS</h1>

<div class="helpBox">

🧱 SLIK SPILLER DU

👀 Se på modellen

🖱️ Dra byggedelene inn i byggefeltet

🏠 Bygg huset riktig

⭐ Fullfør nivåene og bli mesterbygger!

</div>

<div class="stats">

<div class="stat">
🏗️ Nivå:
<span id="levelText">1</span>
</div>

<div class="stat">
⭐ Poeng:
<span id="score">0</span>
</div>

</div>

<div id="game">

<div class="panel">

<h2 id="modelTitle">
🐶 Hundehus
</h2>

<div class="house" id="modelHouse">

<div class="roof"></div>

<div class="walls">

<div class="door"></div>

<div class="window"></div>

</div>

</div>

</div>

<div class="panel">

<h2>🧱 Bygg her</h2>

<div id="buildArea"></div>

</div>

</div>

<div class="parts">

<div class="part roofPart"
draggable="true"
data-type="roof">
🏠 TAK
</div>

<div class="part wallPart"
draggable="true"
data-type="walls">
🧱 VEGG
</div>

<div class="part doorPart"
draggable="true"
data-type="door">
🚪 DØR
</div>

<div class="part windowPart"
draggable="true"
data-type="window">
🪟 VINDU
</div>

<div class="part treePart"
draggable="true"
data-type="tree">
🌳 TRE
</div>

</div>

<div id="message">
Dra delene inn i byggefeltet 🙂
</div>

<button id="nextBtn"
onclick="nextLevel()">
➡️ Neste nivå
</button>

<br>

<button id="restartBtn"
onclick="location.reload()">
🔄 Spill igjen
</button>

<div class="back">

<button onclick="location.href='hundespill.html'">
⬅️ Tilbake til spill
</button>

</div>

<script>

const levels=[

{
title:"🐶 Hundehus",
parts:["roof","walls","door","window"]
},

{
title:"🐱 Kattehus",
parts:["roof","walls","door","window","tree"]
},

{
title:"🏠 Familiehus",
parts:["roof","walls","door","window","tree","window2"]
}

];

let currentLevel=0;
let score=0;

const buildArea=
document.getElementById(
"buildArea"
);

let completed={};

function loadLevel(){

completed={};

buildArea.innerHTML="";

document.getElementById(
"nextBtn"
).style.display="none";

document.getElementById(
"levelText"
).innerHTML=
currentLevel+1;

document.getElementById(
"modelTitle"
).innerHTML=
levels[currentLevel].title;

document.getElementById(
"message"
).innerHTML=
"Dra delene inn i byggefeltet 🙂";

const model=
document.getElementById(
"modelHouse"
);

if(currentLevel===0){

model.innerHTML=`

<div class="roof"></div>

<div class="walls">

<div class="door"></div>

<div class="window"></div>

</div>

`;

}

if(currentLevel===1){

model.innerHTML=`

<div class="roof"></div>

<div class="walls">

<div class="door"></div>

<div class="window"></div>

</div>

<div class="tree">🌳</div>

`;

}

if(currentLevel===2){

model.innerHTML=`

<div class="roof"></div>

<div class="walls">

<div class="door"></div>

<div class="window"></div>

<div class="window2"></div>

</div>

<div class="tree">🌳</div>

`;

}

}

document.querySelectorAll(
".part"
).forEach(part=>{

part.addEventListener(
"dragstart",
e=>{

e.dataTransfer.setData(
"text",
part.dataset.type
);

});

});

buildArea.addEventListener(
"dragover",
e=>{

e.preventDefault();

});

buildArea.addEventListener(
"drop",
e=>{

e.preventDefault();

const type=
e.dataTransfer.getData(
"text"
);

if(completed[type]) return;

createPiece(type);

completed[type]=true;

checkComplete();

});

function createPiece(type){

const piece=
document.createElement(
"div"
);

piece.className=
"build-piece";

if(type==="roof"){

piece.style.top="50px";
piece.style.left="70px";
piece.style.width="0";
piece.style.height="0";
piece.style.borderLeft=
"100px solid transparent";
piece.style.borderRight=
"100px solid transparent";
piece.style.borderBottom=
"90px solid #8b4513";

}

if(type==="walls"){

piece.style.top="140px";
piece.style.left="90px";
piece.style.width="160px";
piece.style.height="120px";
piece.style.background="#c0392b";
piece.style.border=
"5px solid #922b21";

}

if(type==="door"){

piece.style.top="190px";
piece.style.left="145px";
piece.style.width="45px";
piece.style.height="70px";
piece.style.background="#6e2c00";

}

if(type==="window"){

piece.style.top="160px";
piece.style.left="210px";
piece.style.width="40px";
piece.style.height="40px";
piece.style.background="#85c1e9";
piece.style.border=
"4px solid white";

}

if(type==="window2"){

piece.style.top="160px";
piece.style.left="105px";
piece.style.width="40px";
piece.style.height="40px";
piece.style.background="#85c1e9";
piece.style.border=
"4px solid white";

}

if(type==="tree"){

piece.innerHTML="🌳";
piece.style.fontSize="60px";
piece.style.top="220px";
piece.style.left="280px";

}

buildArea.appendChild(
piece
);

score+=10;

document.getElementById(
"score"
).innerHTML=score;

document.getElementById(
"message"
).innerHTML=
"✅ Bra jobbet!";

}

function checkComplete(){

const needed=
levels[currentLevel].parts;

let done=true;

needed.forEach(part=>{

if(!completed[part]){

done=false;

}

});

if(done){

document.getElementById(
"message"
).innerHTML=
"🏆 Bygget er ferdig!";

document.getElementById(
"nextBtn"
).style.display=
"inline-block";

}

}

function nextLevel(){

currentLevel++;

if(
currentLevel>=levels.length
){

alert(
"🏆 Gratulerer! Du fullførte Byggeverden LEVELS!"
);

location.reload();

return;

}

loadLevel();

}

loadLevel();

</script>

</body>
</html>
