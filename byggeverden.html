<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧱 Byggeverden</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#eef6ff;
text-align:center;
color:#123c73;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

h1{
font-size:40px;
}

.stats{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:20px;
}

.stat{
background:white;
padding:14px 20px;
border-radius:18px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,.12);
}

#buildArea{
display:grid;
grid-template-columns:repeat(8,55px);
grid-template-rows:repeat(6,55px);
gap:4px;
justify-content:center;
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
margin:auto;
width:max-content;
}

.cell{
width:55px;
height:55px;
background:#dbeafe;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
}

.cell.correct{
background:#86efac;
}

.cell.wrong{
background:#fca5a5;
}

.tools{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
margin-top:25px;
}

.tool{
padding:18px 24px;
border:none;
border-radius:18px;
font-size:28px;
font-weight:bold;
cursor:pointer;
background:#2563eb;
color:white;
}

.tool.active{
background:#10b981;
}

#message{
font-size:24px;
font-weight:bold;
color:#db2777;
margin-top:20px;
min-height:40px;
}

button{
cursor:pointer;
}

#nextBtn{
display:none;
margin-top:20px;
padding:16px 30px;
border:none;
border-radius:18px;
background:#f59e0b;
color:white;
font-size:22px;
font-weight:bold;
}

.back button{
margin-top:25px;
padding:16px 30px;
border:none;
border-radius:18px;
background:#123c73;
color:white;
font-size:20px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🧱 Byggeverden</h1>

<div class="stats">
<div class="stat">🏗️ Nivå: <span id="levelText">1</span></div>
<div class="stat">⭐ Poeng: <span id="score">0</span></div>
<div class="stat">🧱 Plassert: <span id="placed">0</span></div>
</div>

<h2 id="buildName">🐶 Lite hundehus</h2>

<div id="buildArea"></div>

<div class="tools">
<button class="tool" onclick="selectTool('🧱', this)">🧱 Vegg</button>
<button class="tool" onclick="selectTool('🔺', this)">🔺 Tak</button>
<button class="tool" onclick="selectTool('🚪', this)">🚪 Dør</button>
<button class="tool" onclick="selectTool('🪟', this)">🪟 Vindu</button>
<button class="tool" onclick="selectTool('🌳', this)">🌳 Tre</button>
</div>

<div id="message">Velg en kloss og bygg modellen 🧱</div>

<button id="nextBtn" onclick="nextLevel()">Neste nivå ➜</button>

<div class="back">
<button onclick="location.href='hundespill.html'">⬅️ Tilbake til spill</button>
</div>

</div>

<script>
const levels=[
{
name:"🐶 Lite hundehus",
plan:[
"........",
"...🔺🔺...",
"..🧱🧱🧱..",
"..🧱🚪🧱..",
"..🧱🧱🧱..",
"........"
]
},
{
name:"🐱 Kattehus",
plan:[
"..🔺🔺🔺...",
".🧱🧱🧱🧱..",
".🧱🪟🚪🧱..",
".🧱🧱🧱🧱..",
"...🌳....",
"........"
]
},
{
name:"🏠 Lite hus",
plan:[
"..🔺🔺🔺🔺..",
".🧱🧱🧱🧱🧱.",
".🧱🪟🧱🚪🧱.",
".🧱🧱🧱🧱🧱.",
"🌳......🌳",
"........"
]
},
{
name:"🐶 Stor kennel",
plan:[
".🔺🔺🔺🔺🔺.",
"🧱🧱🧱🧱🧱🧱",
"🧱🚪🧱🪟🧱🧱",
"🧱🧱🧱🧱🧱🧱",
"🌳......🌳",
"........"
]
}
];

let currentLevel=0;
let selectedTool="";
let score=0;
let placed=0;
let completed=0;

function loadLevel(){
placed=0;
completed=0;

document.getElementById("levelText").innerHTML=currentLevel+1;
document.getElementById("buildName").innerHTML=levels[currentLevel].name;
document.getElementById("placed").innerHTML=placed;
document.getElementById("nextBtn").style.display="none";
document.getElementById("message").innerHTML="Velg en kloss og bygg modellen 🧱";

const area=document.getElementById("buildArea");
area.innerHTML="";

const plan=levels[currentLevel].plan;

for(let r=0;r<6;r++){
for(let c=0;c<8;c++){
const cell=document.createElement("div");
cell.className="cell";
cell.dataset.row=r;
cell.dataset.col=c;
cell.dataset.correct=plan[r][c];
cell.onclick=()=>placeBlock(cell);
area.appendChild(cell);
}
}
}

function selectTool(tool,button){
selectedTool=tool;

document.querySelectorAll(".tool").forEach(btn=>{
btn.classList.remove("active");
});

button.classList.add("active");

document.getElementById("message").innerHTML=
"Valgt kloss: "+tool;
}

function placeBlock(cell){
if(selectedTool===""){
document.getElementById("message").innerHTML="Velg en kloss først 🙂";
return;
}

if(cell.innerHTML!=="") return;

const correct=cell.dataset.correct;

if(correct==="." || correct!==selectedTool){
cell.innerHTML=selectedTool;
cell.classList.add("wrong");
score-=2;
document.getElementById("message").innerHTML="❌ Feil kloss der!";
}else{
cell.innerHTML=selectedTool;
cell.classList.add("correct");
score+=10;
placed++;
completed++;
document.getElementById("message").innerHTML="✅ Riktig plassert!";
}

document.getElementById("score").innerHTML=score;
document.getElementById("placed").innerHTML=placed;

checkComplete();
}

function checkComplete(){
let needed=0;
const plan=levels[currentLevel].plan;

for(let r=0;r<6;r++){
for(let c=0;c<8;c++){
if(plan[r][c]!=="."){
needed++;
}
}
}

if(completed>=needed){
document.getElementById("message").innerHTML=
"🏆 Bygget er ferdig!";
document.getElementById("nextBtn").style.display="inline-block";
}
}

function nextLevel(){
currentLevel++;

if(currentLevel>=levels.length){
alert("🏆 Gratulerer! Du fullførte Byggeverden!");
location.reload();
return;
}

loadLevel();
}

loadLevel();
</script>

</body>
</html>
