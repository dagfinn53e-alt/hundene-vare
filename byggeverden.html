<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶 Hundehus Builder DELUXE</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#c7e9ff,#eef6ff);
text-align:center;
overflow-x:hidden;
color:#123c73;
}

h1{
margin-top:15px;
font-size:42px;
}

.helpBox{
background:white;
padding:20px;
border-radius:22px;
max-width:760px;
margin:20px auto;
font-size:24px;
font-weight:bold;
line-height:1.7;
color:#123c73;
box-shadow:0 5px 14px rgba(0,0,0,.15);
}

#game{
display:flex;
justify-content:center;
align-items:flex-start;
gap:40px;
margin-top:20px;
flex-wrap:wrap;
}

.panel{
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 6px 18px rgba(0,0,0,.15);
}

.panel h2{
margin-top:0;
}

/* MODELL */

.house{
position:relative;
width:220px;
height:220px;
margin:auto;
margin-top:20px;
}

.roof{
position:absolute;
top:0;
left:20px;
width:0;
height:0;
border-left:90px solid transparent;
border-right:90px solid transparent;
border-bottom:90px solid #8b4513;
}

.walls{
position:absolute;
top:90px;
left:40px;
width:140px;
height:110px;
background:#c0392b;
border:5px solid #922b21;
}

.door{
position:absolute;
bottom:0;
left:50px;
width:40px;
height:65px;
background:#6e2c00;
}

.window{
position:absolute;
top:20px;
right:20px;
width:35px;
height:35px;
background:#85c1e9;
border:4px solid white;
}

/* BYGGEFELT */

#buildArea{
position:relative;
width:320px;
height:320px;
background:#dbeafe;
border-radius:20px;
border:6px dashed #60a5fa;
overflow:hidden;
}

/* DELER */

.parts{
display:flex;
justify-content:center;
gap:20px;
margin-top:25px;
flex-wrap:wrap;
}

.part{
width:110px;
height:110px;
border-radius:18px;
cursor:grab;
box-shadow:0 5px 12px rgba(0,0,0,.18);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
color:white;
user-select:none;
}

.roofPart{
background:#8b4513;
}

.wallPart{
background:#c0392b;
}

.doorPart{
background:#6e2c00;
}

.windowPart{
background:#5dade2;
}

.build-piece{
position:absolute;
}

#message{
margin-top:20px;
font-size:28px;
font-weight:bold;
color:#db2777;
min-height:40px;
}

#nextBtn{
display:none;
margin-top:20px;
padding:16px 30px;
border:none;
border-radius:18px;
background:#10b981;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

#restartBtn{
margin-top:20px;
padding:16px 30px;
border:none;
border-radius:18px;
background:#f59e0b;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.back button{
margin-top:20px;
padding:16px 28px;
border:none;
border-radius:18px;
background:#2563eb;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🐶 Hundehus Builder DELUXE</h1>

<div class="helpBox">

🧱 SLIK SPILLER DU

👀 Se på modellen til venstre

🖱️ Dra byggedelene inn i byggefeltet

🏠 Bygg huset slik modellen viser

⭐ Når alt er riktig blir bygget ferdig!

🙂 Lykke til bygger!

</div>

<div id="game">

<!-- MODELL -->

<div class="panel">

<h2>🏠 Modell</h2>

<div class="house">

<div class="roof"></div>

<div class="walls">

<div class="door"></div>

<div class="window"></div>

</div>

</div>

</div>

<!-- BYGG -->

<div class="panel">

<h2>🧱 Bygg her</h2>

<div id="buildArea"></div>

</div>

</div>

<!-- DELER -->

<div class="parts">

<div class="part roofPart"
draggable="true"
data-type="roof">

🏠 TAK

</div>

<div class="part wallPart"
draggable="true"
data-type="walls">

🧱 VEGG

</div>

<div class="part doorPart"
draggable="true"
data-type="door">

🚪 DØR

</div>

<div class="part windowPart"
draggable="true"
data-type="window">

🪟 VINDU

</div>

</div>

<div id="message">

Dra delene inn i byggefeltet 🙂

</div>

<button id="nextBtn">

🏆 Ferdig!

</button>

<br>

<button id="restartBtn"
onclick="location.reload()">

🔄 Spill igjen

</button>

<div class="back">

<button onclick="location.href='hundespill.html'">

⬅️ Tilbake til spill

</button>

</div>

<script>

const buildArea=
document.getElementById(
"buildArea"
);

let completed={

roof:false,
walls:false,
door:false,
window:false

};

document.querySelectorAll(
".part"
).forEach(part=>{

part.addEventListener(
"dragstart",
e=>{

e.dataTransfer.setData(
"text",
part.dataset.type
);

});

});

buildArea.addEventListener(
"dragover",
e=>{

e.preventDefault();

});

buildArea.addEventListener(
"drop",
e=>{

e.preventDefault();

const type=
e.dataTransfer.getData(
"text"
);

if(completed[type]) return;

createPiece(type);

completed[type]=true;

checkComplete();

});

function createPiece(type){

const piece=
document.createElement("div");

piece.className=
"build-piece";

if(type==="roof"){

piece.style.top="40px";
piece.style.left="60px";
piece.style.width="0";
piece.style.height="0";
piece.style.borderLeft=
"90px solid transparent";

piece.style.borderRight=
"90px solid transparent";

piece.style.borderBottom=
"90px solid #8b4513";

}

if(type==="walls"){

piece.style.top="130px";
piece.style.left="80px";
piece.style.width="140px";
piece.style.height="110px";
piece.style.background="#c0392b";
piece.style.border=
"5px solid #922b21";

}

if(type==="door"){

piece.style.top="180px";
piece.style.left="130px";
piece.style.width="40px";
piece.style.height="65px";
piece.style.background="#6e2c00";

}

if(type==="window"){

piece.style.top="150px";
piece.style.left="185px";
piece.style.width="35px";
piece.style.height="35px";
piece.style.background="#85c1e9";
piece.style.border=
"4px solid white";

}

buildArea.appendChild(
piece
);

document.getElementById(
"message"
).innerHTML=
"✅ Bra jobbet!";

}

function checkComplete(){

if(

completed.roof &&
completed.walls &&
completed.door &&
completed.window

){

document.getElementById(
"message"
).innerHTML=
"🏆 Hundehuset er ferdig!";

document.getElementById(
"nextBtn"
).style.display=
"inline-block";

}

}

</script>

</body>
</html>
