<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🐶 Gjett hunderasen</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#eef6ff;
  text-align:center;
  color:#123c73;
}

.box{
  max-width:700px;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:24px;
  box-shadow:0 10px 25px rgba(0,0,0,.12);
}

img{
  width:100%;
  max-width:400px;
  border-radius:20px;
  margin:20px 0;
  object-fit:cover;
}

button{
  display:block;
  width:100%;
  margin:12px 0;
  padding:16px;
  border:none;
  border-radius:16px;
  background:#2563eb;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

.back{
  display:inline-block;
  margin-top:20px;
  color:#2563eb;
  font-weight:bold;
  text-decoration:none;
}

#score{
  margin-top:20px;
  font-size:22px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="box">

<h1>🐶 Gjett hunderasen</h1>

<h2 id="question">
Hvilken hunderase er dette?
</h2>

<img id="dogImage" src="">

<div id="answers"></div>

<div id="score">
Poeng: 0
</div>

<a class="back" href="hundespill.html">
← Tilbake til spill
</a>

</div>

<script>

const dogs = [

{
name:"Golden Retriever",
image:"bilder/golden.png"
},

{
name:"Pomeranian",
image:"bilder/pomeranian.png"
},

{
name:"Bichon Frise",
image:"bilder/bichon.png"
},

{
name:"Dobermann",
image:"bilder/dobermann.png"
},
name:"Collie",
image:"bilder/collie.png"
{
name:"Puddel",
image:"bilder/puddel.png"

},
name:"Chihuahua",
image:"bilder/chihuahua.png"
{
name:"Boxer",
image:"bilder/boxer.png"
},

{
name:"Chihuahua",
image:"bilder/pomeranian.png"
},

{
name:"Newfoundland",
image:"bilder/golden.png"
},

{
name:"St. Bernard",
image:"bilder/golden.png"
},

{
name:"Tervueren",
image:"bilder/dobermann.png"
},

{
name:"Boxer",
image:"bilder/dobermann.png"
},

{
name:"Cavalier King Charles Spaniel",
image:"bilder/bichon.png"
},

{
name:"Mops",
image:"bilder/pomeranian.png"
},

{
name:"Boston Terrier",
image:"bilder/dobermann.png"
},

{
name:"Løwchen",
image:"bilder/bichon.png"
},

{
name:"Rhodesian Ridgeback",
image:"bilder/dobermann.png"
},

{
name:"Schnauzer",
image:"bilder/bichon.png"
},

{
name:"Irsk Ulvehund",
image:"bilder/golden.png"
},

{
name:"Lhasa Apso",
image:"bilder/bichon.png"
}

];

let current = 0;
let score = 0;

function shuffle(array){

  for(let i = array.length - 1; i > 0; i--){

    const j = Math.floor(Math.random() * (i + 1));

    [array[i], array[j]] = [array[j], array[i]];
  }

  return array;
}

function showDog(){

  if(current >= dogs.length){

    document.getElementById("question").innerHTML =
      "🎉 Ferdig!";

    document.getElementById("dogImage").style.display="none";

    document.getElementById("answers").innerHTML =
      '<button onclick="restart()">Start på nytt</button>';

    document.getElementById("score").innerHTML =
      "Du fikk " + score + " poeng 🐾";

    return;
  }

  const dog = dogs[current];

  document.getElementById("dogImage").src = dog.image;

  let wrong1 =
    dogs[Math.floor(Math.random()*dogs.length)].name;

  let wrong2 =
    dogs[Math.floor(Math.random()*dogs.length)].name;

  while(wrong1 === dog.name){
    wrong1 =
    dogs[Math.floor(Math.random()*dogs.length)].name;
  }

  while(
    wrong2 === dog.name ||
    wrong2 === wrong1
  ){
    wrong2 =
    dogs[Math.floor(Math.random()*dogs.length)].name;
  }

  let answers = shuffle([
    dog.name,
    wrong1,
    wrong2
  ]);

  document.getElementById("answers").innerHTML =
    answers.map(answer =>
      `<button onclick="guess('${answer}')">${answer}</button>`
    ).join("");

}

function guess(answer){

  if(answer === dogs[current].name){

    score++;

    alert("Riktig 🎉");

  }else{

    alert("Feil 🙂");

  }

  current++;

  document.getElementById("score").innerHTML =
    "Poeng: " + score;

  showDog();

}

function restart(){

  current = 0;
  score = 0;

  document.getElementById("dogImage").style.display="block";

  showDog();

}

showDog();

</script>

</body>
</html>
