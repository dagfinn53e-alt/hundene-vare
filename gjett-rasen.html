
<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🐶 Gjett hunderasen</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eef6ff;
  text-align:center;
  color:#123c73;
}

.container{
  max-width:750px;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

h1{
  margin-bottom:10px;
}

#dogImage{
  width:100%;
  max-width:450px;
  border-radius:22px;
  margin:20px 0;
  object-fit:cover;
}

.answer-btn{
  display:block;
  width:100%;
  margin:12px 0;
  padding:16px;
  border:none;
  border-radius:18px;
  background:#2563eb;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.answer-btn:hover{
  background:#1d4ed8;
  transform:scale(1.02);
}

#score{
  margin-top:20px;
  font-size:24px;
  font-weight:bold;
  color:#10b981;
}

.back-btn{
  display:inline-block;
  margin-top:25px;
  text-decoration:none;
  color:#2563eb;
  font-weight:bold;
  font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<h1>🐶 Gjett hunderasen</h1>

<h2 id="question">
Hvilken hunderase er dette?
</h2>

<img id="dogImage" src="">

<div id="answers"></div>

<div id="score">
Poeng: 0
</div>

<a class="back-btn" href="hundespill.html">
← Tilbake til spill
</a>

</div>

<script>

const dogs = [

{
name:"Golden Retriever",
image:"bilder/golden.png"
},

{
name:"Pomeranian",
image:"bilder/pomeranian.png"
},

{
name:"Bichon Frise",
image:"bilder/bichon.png"
},

{
name:"Dobermann",
image:"bilder/dobermann.png"
},

{
name:"Langhåret Collie",
image:"bilder/collie.png"
},

{
name:"Puddel",
image:"bilder/puddel.png"
},

{
name:"Chihuahua",
image:"bilder/chihuahua.png"
},

{
name:"Boxer",
image:"bilder/boxer.png"
},

{
name:"Newfoundland",
image:"bilder/newfoundland.png"
},

{
name:"St. Bernard",
image:"bilder/st-bernard.png"
},

{
name:"Tervueren",
image:"bilder/tervueren.png"
},

{
name:"Schnauzer",
image:"bilder/schnauzer.png"
},

{
name:"Boston Terrier",
image:"bilder/boston-terrier.png"
},

{
name:"Lhasa Apso",
image:"bilder/lhasa-apso.png"
},

{
name:"Rhodesian Ridgeback",
image:"bilder/ridgeback.png"
},

{
name:"Irsk Ulvehund",
image:"bilder/irsk-ulvehund.png"
},

{
name:"Mops",
image:"bilder/mops.png"
},

{
name:"Cavalier King Charles Spaniel",
image:"bilder/cavalier.png"
},

{
name:"Løwchen",
image:"bilder/lowchen.png"
},

{
name:"Bichon Frise",
image:"bilder/bichon2.png"
}

];

let current = 0;
let score = 0;

function shuffle(array){

  for(let i = array.length - 1; i > 0; i--){

    const j = Math.floor(Math.random() * (i + 1));

    [array[i], array[j]] = [array[j], array[i]];
  }

  return array;
}

function getWrongAnswers(correctName){

  let names = dogs
    .map(d => d.name)
    .filter(name => name !== correctName);

  shuffle(names);

  return names.slice(0,2);
}

function showDog(){

  if(current >= dogs.length){

    document.getElementById("question").innerHTML =
    "🎉 Du er ferdig!";

    document.getElementById("dogImage").style.display =
    "none";

    document.getElementById("answers").innerHTML =
    `<button class="answer-btn" onclick="restartGame()">Start på nytt</button>`;

    document.getElementById("score").innerHTML =
    "Sluttpoeng: " + score + " 🐾";

    return;
  }

  const dog = dogs[current];

  document.getElementById("dogImage").src =
  dog.image;

  const wrongAnswers =
  getWrongAnswers(dog.name);

  let answers = [
    dog.name,
    wrongAnswers[0],
    wrongAnswers[1]
  ];

  shuffle(answers);

  document.getElementById("answers").innerHTML =
  answers.map(answer =>
    `<button class="answer-btn" onclick="guess('${answer}')">${answer}</button>`
  ).join("");

}

function guess(answer){

  if(answer === dogs[current].name){

    score++;

    alert("🎉 Riktig!");

  }else{

    alert("🙂 Feil!");

  }

  current++;

  document.getElementById("score").innerHTML =
  "Poeng: " + score;

  showDog();

}

function restartGame(){

  current = 0;
  score = 0;

  document.getElementById("dogImage").style.display =
  "block";

  document.getElementById("score").innerHTML =
  "Poeng: 0";

  showDog();

}

showDog();

</script>

</body>
</html>
