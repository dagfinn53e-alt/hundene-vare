<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrer butikk</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{font-family:Arial,sans-serif;background:#f4f8ff;margin:0;padding:20px;color:#0f172a;}
    .container{max-width:760px;margin:auto;background:white;padding:25px;border-radius:25px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
    h1{text-align:center;color:#1e3a8a;margin-top:0;}
    .sub{text-align:center;color:#64748b;line-height:1.5;margin-bottom:22px;}
    .form-group{margin-bottom:18px;}
    label{display:block;margin-bottom:8px;font-weight:bold;}
    input,textarea,select{width:100%;padding:14px;border-radius:14px;border:1px solid #cbd5e1;font-size:15px;box-sizing:border-box;background:white;}
    textarea{min-height:120px;resize:vertical;}
    button{width:100%;padding:16px;border:none;border-radius:16px;background:#2563eb;color:white;font-size:17px;font-weight:bold;cursor:pointer;}
    button:hover{background:#1d4ed8;}
    .back{display:inline-block;margin-bottom:18px;text-decoration:none;background:#eaf2ff;color:#1d4ed8;padding:12px 18px;border-radius:999px;font-weight:bold;border:1px solid #bfd7ff;}
    .status{margin-top:16px;font-weight:bold;text-align:center;min-height:24px;}
  </style>
</head>

<body>

<div class="container">

  <a class="back" href="index.html">← Tilbake til appen</a>

  <h1>🐶 Registrer butikk</h1>

  <p class="sub">
    Fyll inn informasjon om butikken. Når du trykker lagre, blir butikken sendt til godkjenning.
  </p>

  <div class="form-group">
    <label>Butikknavn</label>
    <input type="text" id="shopName" placeholder="Skriv butikknavn">
  </div>

  <div class="form-group">
    <label>Type</label>
    <select id="shopType">
      <option>Hundepensjonat</option>
      <option>Frisør</option>
      <option>Veterinær</option>
      <option>Zoo butikk</option>
      <option>Kafé</option>
      <option>Hundeklubb</option>
    </select>
  </div>

  <div class="form-group">
    <label>Område</label>
    <select id="shopRegion">
      <option value="Haugalandet">Haugalandet</option>
      <option value="Stavanger">Stavanger</option>
      <option value="Stord">Stord</option>
    </select>
  </div>

  <div class="form-group">
    <label>Adresse</label>
    <input type="text" id="shopAddress" placeholder="Adresse">
  </div>

  <div class="form-group">
    <label>Telefon</label>
    <input type="text" id="shopPhone" placeholder="Telefonnummer">
  </div>

  <div class="form-group">
    <label>Facebook / Nettside</label>
    <input type="text" id="shopFacebook" placeholder="Facebook-link eller nettside">
  </div>

  <div class="form-group">
    <label>Beskrivelse</label>
    <textarea id="shopDescription" placeholder="Beskrivelse av butikken"></textarea>
  </div>

  <button type="button" onclick="saveShop()">
    Lagre butikk
  </button>

  <div id="status" class="status">Klar.</div>

</div>

<script>
  const supabaseClient = window.supabase.createClient(
    "https://kxudiviidwwwclbzgdyx.supabase.co",
    "sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
  );

  function setStatus(text, color){
    const el = document.getElementById("status");
    el.textContent = text;
    el.style.color = color || "black";
  }

  window.saveShop = async function(){
    alert("Knappen virker - nå prøver vi å lagre");

    const name = document.getElementById("shopName").value.trim();
    const type = document.getElementById("shopType").value;
    const region = document.getElementById("shopRegion").value;
    const address = document.getElementById("shopAddress").value.trim();
    const phone = document.getElementById("shopPhone").value.trim();
    const facebook = document.getElementById("shopFacebook").value.trim();
    const description = document.getElementById("shopDescription").value.trim();

    if(!name){
      setStatus("Skriv inn butikknavn.", "crimson");
      alert("Skriv inn butikknavn.");
      return;
    }

    setStatus("Lagrer butikk ...", "#1d4ed8");

    const { error } = await supabaseClient
      .from("businesses")
      .insert([{
        name: name,
        type: type,
        region: region,
        place: address,
        phone: phone,
        website: facebook,
        description: description,
        approved: false
      }]);

    if(error){
      setStatus("Feil: " + error.message, "crimson");
      alert("Feil: " + error.message);
      return;
    }

    setStatus("Butikken er sendt til godkjenning 😊", "green");
    alert("Butikken er sendt til godkjenning 😊");
  }
</script>

</body>
</html>
