<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registrer butikk</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f8ff;
    margin:0;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#1e3a8a;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input,
textarea,
select{
    width:100%;
    padding:14px;
    border-radius:14px;
    border:1px solid #cbd5e1;
    font-size:15px;
}

textarea{
    min-height:120px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:#2563eb;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

</style>
</head>
<script>

const supabase = window.supabase.createClient(
  "https://kxudiviidwwwclbzgdyx.supabase.co",
  "sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH"
);
async function saveShop() {

  const name =
    document.getElementById("shopName").value;

  const type =
    document.getElementById("shopType").value;

  const address =
    document.getElementById("shopAddress").value;

  const phone =
    document.getElementById("shopPhone").value;

  const facebook =
    document.getElementById("shopFacebook").value;

  const description =
    document.getElementById("shopDescription").value;

  const logoFile =
    document.getElementById("logoUpload").files[0];

  const imageFiles =
    document.getElementById("imageUpload").files;

  if (!name || !description) {
    alert("Skriv inn navn og beskrivelse");
    return;
  }

  let logoUrl = "";

  if (logoFile) {

    const logoName =
      Date.now() + "-" + logoFile.name;

    const { error: logoError } =
      await supabase.storage
      .from("story-images")
      .upload("butikk-logo/" + logoName, logoFile);

    if (!logoError) {

      logoUrl =
        supabase.storage
        .from("story-images")
        .getPublicUrl("butikk-logo/" + logoName)
        .data.publicUrl;
    }
  }

  let galleryUrls = [];

  for (let i = 0; i < imageFiles.length; i++) {

    const file = imageFiles[i];

    const fileName =
      Date.now() + "-" + file.name;

    const { error } =
      await supabase.storage
      .from("story-images")
      .upload("butikk-bilder/" + fileName, file);

    if (!error) {

      const publicUrl =
        supabase.storage
        .from("story-images")
        .getPublicUrl("butikk-bilder/" + fileName)
        .data.publicUrl;

      galleryUrls.push(publicUrl);
    }
  }

  const { error } =
    await supabase
    .from("businesses")
    .insert([{
      name: name,
      type: type,
      place: address,
      phone: phone,
      website: facebook,
      description: description,
      logo_url: logoUrl,
      gallery_urls: galleryUrls,
      approved: false
    }]);

  if (error) {
    alert("Feil: " + error.message);
    return;
  }

  alert("Butikken er sendt til godkjenning 😊");

}
</script>
<body>

<div class="container">

<h1>🐶 Registrer butikk</h1>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<div class="form-group">
<label>Butikknavn</label>
<input type="text"
       id="shopName"
       placeholder="Skriv butikknavn">
</div>

<div class="form-group">
<label>Type</label>

<select id="shopType">
<option>Hundepensjonat</option>
<option>Frisør</option>
<option>Veterinær</option>
<option>Zoo butikk</option>
<option>Kafé</option>
</select>
</div>

<div class="form-group">
<label>Adresse</label>
<input type="text"
       id="shopAddress"
       placeholder="Adresse">
</div>

<div class="form-group">
<label>Telefon</label>
<input type="text"
       id="shopPhone"
       placeholder="Telefonnummer">
</div>

<div class="form-group">
<label>Facebook / Nettside</label>
<input type="text"
       id="shopFacebook"
       placeholder="Facebook-link">
</div>

<div class="form-group">
<label>Beskrivelse</label>
<textarea id="shopDescription"
placeholder="Beskrivelse av butikken"></textarea>
</div>

<div class="form-group">
<label>Logo</label>
<input type="file"
       id="logoUpload"
       accept="image/*">
</div>

<div class="form-group">
<label>Bilder</label>
<input type="file"
       id="imageUpload"
       accept="image/*"
       multiple>
</div>

<button type="button" onclick="saveShop()">
Lagre butikk
</button>

</div>

</body>
</html>
