<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Se Arrangementer - Hundene våre</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;color:#0f172a;background:radial-gradient(circle at top left, rgba(96,165,250,.18) 0%, transparent 30%),linear-gradient(180deg,#dbe7f5 0%,#f8fbff 100%);min-height:100vh}
    .wrap{max-width:1100px;margin:0 auto;padding:18px 14px 60px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px;padding:14px 16px;border:1px solid #cfe0ff;border-radius:24px;background:rgba(255,255,255,.92);box-shadow:0 12px 30px rgba(15,23,42,.08);position:sticky;top:8px;z-index:20}
    .brand{font-size:22px;font-weight:900;color:#1d4ed8}
    .topbar a{text-decoration:none;background:#eaf2ff;color:#1d4ed8;border:1px solid #bfd7ff;padding:11px 16px;border-radius:999px;font-weight:900}
    .hero{background:linear-gradient(rgba(0,0,0,.42),rgba(0,0,0,.42)),url('https://images.unsplash.com/photo-1551730459-92db2a308d6a?q=80&w=1400&auto=format&fit=crop') center/cover no-repeat;color:white;border-radius:30px;padding:34px;margin-bottom:18px;box-shadow:0 18px 42px rgba(15,23,42,.18)}
    .hero h1{font-size:42px;margin-bottom:8px}
    .hero p{max-width:650px;line-height:1.6;font-size:16px}
    .filters{background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);border:1px solid #dbeafe;border-radius:28px;padding:18px;margin-bottom:18px;box-shadow:0 14px 34px rgba(30,64,175,.10)}
    .area-picker{margin-bottom:16px;padding:16px;border-radius:24px;background:#f8fbff;border:1px solid #dbeafe}
    .area-picker-title{font-weight:900;color:#1d4ed8;margin-bottom:10px;font-size:16px}
    .area-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .area-btn{border:none;border-radius:18px;padding:13px 10px;background:#eef4ff;color:#1d4ed8;border:1px solid #bfd7ff;font-weight:900;cursor:pointer}
    .area-btn.active{background:linear-gradient(135deg,#2563eb,#7c3aed);color:white;border-color:#2563eb}
    .filter-grid{display:grid;grid-template-columns:2fr 1fr;gap:12px}
    input,select{width:100%;padding:14px 15px;border:1px solid #cbdcf5;border-radius:18px;font-size:15px;background:white}
    input:focus,select:focus{outline:none;border-color:#60a5fa;box-shadow:0 0 0 4px rgba(96,165,250,.18)}
    .status{margin-top:12px;color:#64748b;font-weight:800}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
    .event-card{background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);border:1px solid #cfe0ff;border-radius:28px;overflow:hidden;box-shadow:0 16px 36px rgba(30,64,175,.10);transition:transform .18s ease, box-shadow .18s ease}
    .event-card:hover{transform:translateY(-2px);box-shadow:0 22px 44px rgba(30,64,175,.15)}
    .event-image{height:190px;background:#eef4ff;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #dbeafe;cursor:zoom-in}
    .event-image img{max-width:100%;max-height:100%;object-fit:contain;padding:12px;background:white}
    .event-placeholder{font-size:52px}
    .event-content{padding:18px}
    .event-title{font-size:24px;font-weight:900;color:#0f172a;margin-bottom:6px}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .chip{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:900;background:#eaf2ff;color:#1d4ed8;border:1px solid #bfd7ff}
    .event-text{color:#334155;line-height:1.55;font-size:15px;margin-bottom:14px;white-space:pre-wrap}
    .empty{background:white;border:2px dashed #93c5fd;border-radius:28px;padding:28px;text-align:center;color:#64748b;grid-column:1 / -1;font-weight:900}
    #posterModal{position:fixed;inset:0;background:rgba(15,23,42,.82);display:none;align-items:center;justify-content:center;padding:20px;z-index:99999}
    #posterModal.open{display:flex}
    #posterModal img{max-width:94vw;max-height:88vh;object-fit:contain;border-radius:18px;background:#fff;padding:10px}
    #posterModal button{position:absolute;top:16px;right:18px;width:44px;height:44px;border-radius:999px;border:none;background:#fff;color:#111827;font-size:24px;font-weight:900}
    @media(max-width:760px){.hero{padding:24px;border-radius:24px}.hero h1{font-size:32px}.area-buttons{grid-template-columns:1fr 1fr}.filter-grid{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.event-image{height:170px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">🐶 Hundene våre</div>
      <a href="index.html">← Forside</a>
    </div>
    <div class="hero">
      <h1>📅 Se Arrangementer</h1>
      <p>Finn kurs og utstillinger for hund og katt. Velg område først, og søk videre etter type eller navn.</p>
    </div>
    <div class="filters">
      <div class="area-picker">
        <div class="area-picker-title">📍 Velg område</div>
        <div class="area-buttons">
          <button class="area-btn" data-area="Haugalandet" onclick="chooseArea('Haugalandet')">Haugalandet</button>
          <button class="area-btn" data-area="Stavanger" onclick="chooseArea('Stavanger')">Stavanger</button>
          <button class="area-btn" data-area="Bergen" onclick="chooseArea('Bergen')">Bergen</button>
          <button class="area-btn" data-area="Stord" onclick="chooseArea('Stord')">Stord</button>
        </div>
      </div>
      <div class="filter-grid">
        <input id="searchInput" placeholder="Søk på navn, sted eller tekst">
        <select id="typeFilter">
          <option value="">Alle typer</option>
          <option value="Utstilling">Utstilling</option>
          <option value="Kurs">Kurs</option>
        </select>
      </div>
      <div id="status" class="status">Velg område</div>
    </div>
    <div id="eventsGrid" class="grid"><div class="empty">📍 Velg område for å se arrangementer</div></div>
  </div>
  <div id="posterModal" onclick="closePosterModal(event)">
    <button type="button" onclick="closePosterModal(event)">×</button>
    <img id="posterModalImg" src="" alt="Plakat">
  </div>
  <script>
    const supabaseClient = window.supabase.createClient("https://kxudiviidwwwclbzgdyx.supabase.co","sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH");
    let allEvents = [];
    let selectedArea = "";
    const grid = document.getElementById("eventsGrid");
    const statusEl = document.getElementById("status");
    const searchInput = document.getElementById("searchInput");
    const typeFilter = document.getElementById("typeFilter");

    function safeText(value){return String(value || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
    function formatDate(dateString){if(!dateString)return "";const p=String(dateString).split("-");if(p.length!==3)return dateString;return p[2]+"."+p[1]+"."+p[0];}
    function getDateText(e){const f=formatDate(e.date_from);const t=formatDate(e.date_to);if(!f)return "";if(!t||t===f)return f;return f+" – "+t;}
    function openPosterModal(src){const modal=document.getElementById("posterModal");const img=document.getElementById("posterModalImg");if(!modal||!img||!src)return;img.src=src;modal.classList.add("open");}
    function closePosterModal(event){if(event)event.stopPropagation();const modal=document.getElementById("posterModal");const img=document.getElementById("posterModalImg");if(modal)modal.classList.remove("open");if(img)img.src="";}

    async function loadEvents(){
      statusEl.textContent = "Laster arrangementer ...";
      try{
        const { data, error } = await supabaseClient.from("events").select("*").eq("approved", true).order("date_from", { ascending:true });
        if(error){statusEl.textContent="Kunne ikke laste arrangementer.";grid.innerHTML='<div class="empty">Noe gikk galt ved lasting av arrangementer.</div>';return;}
        allEvents = data || [];
        updateAreaCounts();
        renderEvents();
      }catch(e){
        statusEl.textContent="Kunne ikke laste arrangementer.";
        grid.innerHTML='<div class="empty">Noe gikk galt ved lasting av arrangementer.</div>';
      }
    }

    function chooseArea(area){
      selectedArea = area;
      document.querySelectorAll(".area-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.area === area));
      renderEvents();
    }

    function updateAreaCounts(){
      const counts = {Haugalandet:0,Stavanger:0,Bergen:0,Stord:0};
      allEvents.forEach(e => {const area=e.area||""; if(counts[area] !== undefined) counts[area]++;});
      document.querySelectorAll(".area-btn").forEach(btn => {const area=btn.dataset.area; if(counts[area] !== undefined) btn.textContent = area + " (" + counts[area] + ")";});
    }

    function renderEvents(){
      const search = searchInput.value.trim().toLowerCase();
      const type = typeFilter.value;
      updateAreaCounts();

      if(!selectedArea){
        statusEl.textContent = "Velg område";
        grid.innerHTML = '<div class="empty">📍 Velg område for å se arrangementer</div>';
        return;
      }

      let list = allEvents.filter(e => {
        const title = String(e.title || "").toLowerCase();
        const area = e.area || "";
        const eventType = e.event_type || "";
        const desc = String(e.description || "").toLowerCase();
        const place = String(e.place || "").toLowerCase();
        const matchesSearch = !search || title.includes(search) || desc.includes(search) || place.includes(search) || eventType.toLowerCase().includes(search);
        const matchesArea = area === selectedArea;
        const matchesType = !type || eventType === type;
        return matchesSearch && matchesArea && matchesType;
      });

      statusEl.textContent = selectedArea + ": " + list.length + " arrangement(er) funnet";

      if(list.length === 0){
        grid.innerHTML = '<div class="empty">Ingen arrangementer funnet i valgt område.</div>';
        return;
      }

      grid.innerHTML = list.map(e => {
        const title = safeText(e.title || "Arrangement");
        const type = safeText(e.event_type || "");
        const area = safeText(e.area || "");
        const place = safeText(e.place || "");
        const desc = safeText(e.description || "");
        const poster = e.poster_url || "";
        const icon = e.event_type === "Kurs" ? "🎓" : "🏆";
        const dateText = safeText(getDateText(e));
        return `
          <div class="event-card">
            <div class="event-image" ${poster ? `onclick="openPosterModal('${poster}')"` : ""}>
              ${poster ? `<img src="${poster}" alt="${title}">` : `<div class="event-placeholder">${icon}</div>`}
            </div>
            <div class="event-content">
              <div class="event-title">${title}</div>
              <div class="chips">
                ${type ? `<span class="chip">🏷️ ${type}</span>` : ""}
                ${area ? `<span class="chip">📍 ${area}</span>` : ""}
                ${dateText ? `<span class="chip">📅 ${dateText}</span>` : ""}
              </div>
              ${place ? `<div class="event-text"><strong>Sted:</strong> ${place}</div>` : ""}
              ${desc ? `<div class="event-text">${desc}</div>` : ""}
            </div>
          </div>
        `;
      }).join("");
    }

    searchInput.addEventListener("input", renderEvents);
    typeFilter.addEventListener("change", renderEvents);
    loadEvents();
  </script>
</body>
</html>
