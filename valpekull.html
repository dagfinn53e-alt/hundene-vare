<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valpegalleri Premium 1.0 – Hundene våre</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial,sans-serif;
  color:#123c73;
  min-height:100vh;
  background:
    radial-gradient(circle at 7% 5%,rgba(255,220,130,.62),transparent 30%),
    radial-gradient(circle at 94% 6%,rgba(126,200,255,.54),transparent 34%),
    linear-gradient(180deg,#dbeafe,#eef6ff 48%,#fff7ed);
}
.wrap{max-width:1280px;margin:auto;padding:16px 10px 75px}
.top{
  display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
  background:rgba(255,255,255,.96);border:1px solid #bfd7ff;border-radius:30px;
  padding:14px 17px;box-shadow:0 16px 38px rgba(15,23,42,.11);margin-bottom:16px
}
.logo{font-size:25px;font-weight:900;color:#004cff}
.nav{display:flex;gap:8px;flex-wrap:wrap}
.nav a{
  background:#eaf2ff;color:#004cff;text-decoration:none;border:1px solid #b8ddff;
  border-radius:999px;padding:10px 14px;font-weight:900;font-size:14px
}
.hero{
  background:
    radial-gradient(circle at 20% 20%,rgba(255,255,255,.38),transparent 25%),
    radial-gradient(circle at 88% 12%,rgba(255,214,120,.34),transparent 25%),
    linear-gradient(135deg,#061b55,#004cff 45%,#7c3aed);
  color:white;border-radius:50px;padding:52px 22px;text-align:center;
  box-shadow:0 30px 76px rgba(0,45,110,.34);margin-bottom:20px;overflow:hidden
}
.badges{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:15px}
.badge{
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.32);
  border-radius:999px;padding:10px 14px;font-weight:900;font-size:13px
}
.gold{background:linear-gradient(135deg,#fff7c2,#ffd166);color:#6b3a00;border-color:#f59e0b}
.hero h1{font-size:clamp(2.8rem,7vw,5.5rem);line-height:1.02;margin-bottom:12px;text-shadow:0 0 16px rgba(255,255,255,.70)}
.hero p{font-size:clamp(1rem,2.5vw,1.3rem);font-weight:700;line-height:1.55;color:#eef6ff;max-width:900px;margin:auto}
.search{
  background:rgba(255,255,255,.96);border-radius:32px;padding:22px;
  box-shadow:0 18px 38px rgba(15,23,42,.13);border:1px solid #dbeafe;margin-bottom:26px
}
.grid{display:grid;grid-template-columns:1.3fr 1fr 1fr auto;gap:13px;align-items:end}
label{display:block;font-weight:900;margin-bottom:6px;color:#001d4a}
input{
  width:100%;padding:14px 15px;border:1px solid #cfe3ff;border-radius:16px;
  font-size:16px;background:#f8fbff
}
button{
  border:none;border-radius:999px;padding:15px 22px;background:linear-gradient(135deg,#1f8fff,#004cff);
  color:white;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 10px 22px rgba(0,76,255,.22)
}
.msg{text-align:center;font-size:19px;font-weight:900;margin-top:13px;color:#001d4a}
.cards{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:30px;
  align-items:start
}
.card{
  background:rgba(255,255,255,.98);
  border-radius:42px;
  overflow:hidden;
  box-shadow:0 24px 58px rgba(15,23,42,.16);
  border:1px solid #dbeafe;
  transform:translateZ(0)
}
.cover{
  height:390px;
  background:linear-gradient(135deg,#0b5cff,#1f8fff,#7c3aed);
  display:flex;align-items:center;justify-content:center;color:white;font-size:110px;overflow:hidden;
  border-bottom:1px solid #dbeafe
}
.cover img{width:100%;height:100%;object-fit:cover}
.content{padding:28px}
.content h2{
  font-size:clamp(2rem,4.5vw,3rem);
  color:#001d4a;margin-bottom:12px;line-height:1.05
}
.tag{
  display:inline-block;background:#eaf2ff;color:#004cff;border:1px solid #b8ddff;
  border-radius:999px;padding:9px 12px;font-size:14px;font-weight:900;margin:4px
}
.content p{
  font-size:17px!important;
  line-height:1.65!important;
  margin-top:16px!important;
  margin-bottom:8px!important;
  color:#334155!important
}
.infoGrid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-top:18px
}
.info{
  background:linear-gradient(180deg,#ffffff,#f8fbff);
  border:1px solid #dbeafe;
  border-radius:22px;
  padding:15px 10px;
  font-weight:900;
  line-height:1.45;
  text-align:center;
  box-shadow:0 8px 18px rgba(30,64,175,.07)
}
.info b{color:#001d4a}
.btn{
  display:inline-flex;align-items:center;justify-content:center;text-decoration:none;
  border-radius:999px;padding:15px 22px;color:white;background:linear-gradient(135deg,#22c55e,#16a34a);
  font-weight:900;margin-top:20px;min-width:190px;box-shadow:0 10px 24px rgba(22,163,74,.22)
}
.footer{text-align:center;font-weight:900;color:#14346d;margin-top:38px}
@media(max-width:1050px){.cards{grid-template-columns:1fr}.grid{grid-template-columns:1fr 1fr}.infoGrid{grid-template-columns:1fr 1fr}.cover{height:340px}}
@media(max-width:700px){
  .wrap{padding:9px 8px 55px}
  .top{justify-content:center;border-radius:24px}
  .logo{width:100%;text-align:center;font-size:20px}
  .nav{width:100%;justify-content:center}
  .nav a{flex:1 1 42%;text-align:center;font-size:12px;padding:9px 7px}
  .hero{border-radius:30px;padding:34px 14px}
  .search{padding:17px;border-radius:26px}
  .grid,.infoGrid{grid-template-columns:1fr}
  .cards{gap:20px}
  .card{border-radius:30px}
  .cover{height:260px;font-size:82px}
  .content{padding:20px}
  .btn{width:100%}
}

.thumbRow{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:12px}
.thumbRow img{width:100%;height:72px;object-fit:cover;border-radius:14px;border:2px solid #dbeafe;cursor:pointer;opacity:.88}
.thumbRow img:hover{opacity:1;border-color:#004cff}
.photoCount{display:inline-block;margin-top:10px;background:#fff7ed;color:#92400e;border:1px solid #fed7aa;border-radius:999px;padding:7px 10px;font-weight:900;font-size:13px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.84);display:none;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal img{max-width:95vw;max-height:90vh;border-radius:18px}
@media(max-width:700px){.thumbRow{grid-template-columns:repeat(3,1fr)}.thumbRow img{height:90px}}

</style>
</head>
<body>
<div class="wrap">
<div class="top">
  <div class="logo">🐾 Valpegalleri Premium 1.0</div>
  <div class="nav">
    <a href="index.html">🏠 Forside</a>
    <a href="oppdretterportal.html">🐶 Portal</a>
    <a href="registrer-valpekull.html">➕ Registrer kull</a>
    <a href="admin-valpekull.html">🔐 Admin</a>
  </div>
</div>
<section class="hero">
  <div class="badges">
    <span class="badge gold">🏆 Premium valpekull</span>
    <span class="badge">✅ Godkjente kull</span>
    <span class="badge">🏡 Koblet til kennel</span>
  </div>
  <h1>Valpekull</h1>
  <p>Godkjente valpekull med større bildegalleri fra oppdrettere på Hundenevåre.com.</p>
</section>
<section class="search">
  <div class="grid">
    <div><label>Søk</label><input id="search" placeholder="Kennel, rase eller sted"></div>
    <div><label>Rase</label><input id="breed"></div>
    <div><label>Område</label><input id="area"></div>
    <button onclick="load()">🔎 Søk</button>
  </div>
  <div id="msg" class="msg">Laster...</div>
</section>
<section class="cards" id="cards"></section>
<div class="footer">Hundenevåre.com – Valpekull Premium 🐶</div>
</div>
<div class="modal" id="galleryModal" onclick="this.style.display='none'"><img id="galleryModalImg"></div>
<script>
const client=window.supabase.createClient("https://kxudiviidwwwclbzgdyx.supabase.co","sb_publishable_EaSgrgWqXKnaRRRkKparWA_ZmmRG8QH");

function t(v,f="Ikke oppgitt"){return v&&String(v).trim()?String(v).trim():f}

function getImages(v){
  if(Array.isArray(v)) return v.filter(Boolean);
  if(!v) return [];
  if(typeof v==="string"){
    try{
      const parsed=JSON.parse(v);
      if(Array.isArray(parsed)) return parsed.filter(Boolean);
    }catch(e){}
    return v.split(",").map(x=>x.trim()).filter(Boolean);
  }
  return [];
}

function openGalleryImage(url){
  document.getElementById("galleryModalImg").src=url;
  document.getElementById("galleryModal").style.display="flex";
}

function setMainImage(cardId,url){
  const img=document.getElementById("main-"+cardId);
  if(img) img.src=url;
}

async function load(){
  cards.innerHTML="";
  msg.textContent="Laster valpekull...";
  let q=client.from("puppy_litters").select("*").eq("status","godkjent").order("created_at",{ascending:false});
  if(breed.value.trim()) q=q.ilike("breed","%"+breed.value.trim()+"%");
  if(area.value.trim()) q=q.ilike("area","%"+area.value.trim()+"%");
  const r=await q;
  if(r.error){msg.textContent="Feil: "+r.error.message;return}
  let data=r.data||[];
  const s=search.value.toLowerCase().trim();
  if(s)data=data.filter(x=>(x.kennel_name||"").toLowerCase().includes(s)||(x.breed||"").toLowerCase().includes(s)||(x.area||"").toLowerCase().includes(s)||(x.municipality||"").toLowerCase().includes(s));
  if(!data.length){msg.textContent="Ingen godkjente valpekull funnet.";return}
  msg.textContent="Fant "+data.length+" valpekull.";
  data.forEach((x,i)=>{
    const images=getImages(x.image_urls);
    const main=images[0]||"";
    const kennelLink=x.breeder_id ? 'kennel.html?id='+x.breeder_id : 'kennel.html';
    const cardId="kull"+i;
    const thumbs=images.map((u,n)=>'<img src="'+u+'" onclick="setMainImage(\''+cardId+'\',\''+u+'\')" title="Bilde '+(n+1)+'">').join("");
    const el=document.createElement("article");
    el.className="card";
    el.innerHTML=
      '<div class="cover">'+(main?'<img id="main-'+cardId+'" src="'+main+'" onclick="openGalleryImage(this.src)">':'🐶')+'</div>'+
      '<div class="content">'+
        '<h2>'+t(x.title,x.kennel_name)+'</h2>'+
        '<span class="tag">🐾 '+t(x.breed)+'</span>'+
        '<span class="tag">📍 '+t(x.municipality,"")+' '+t(x.area,"")+'</span>'+
        '<span class="tag">💚 Ledige: '+t(x.available_count,0)+'</span>'+
        (images.length?'<div class="photoCount">📷 '+images.length+' bilde(r) i galleriet</div>':'')+
        (thumbs?'<div class="thumbRow">'+thumbs+'</div>':'')+
        '<p style="margin-top:12px;color:#334155;font-weight:700;line-height:1.5">'+t(x.about,"")+'</p>'+
        '<div class="infoGrid">'+
          '<div class="info">🏡 <b>Kennel</b><br>'+t(x.kennel_name)+'</div>'+
          '<div class="info">🎒 <b>Leveringsklar</b><br>'+t(x.ready_date)+'</div>'+
          '<div class="info">👦 <b>Hanner</b><br>'+t(x.males,0)+'</div>'+
          '<div class="info">👧 <b>Tisper</b><br>'+t(x.females,0)+'</div>'+
        '</div>'+
        '<a class="btn" href="'+kennelLink+'">🏡 Se kennel</a>'+
      '</div>';
    cards.appendChild(el);
  });
}
search.addEventListener("input",load);breed.addEventListener("input",load);area.addEventListener("input",load);load();
</script>
</body>
</html>
