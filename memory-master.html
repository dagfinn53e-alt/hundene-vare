<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Adventure - Master</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top, #ffe27a 0%, #43206d 35%, #080313 100%);
    }

    .aura {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 230, 120, 0.28), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(160, 90, 255, 0.25), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(0, 220, 255, 0.18), transparent 30%);
      animation: auraMove 6s infinite alternate;
      z-index: 0;
    }

    @keyframes auraMove {
      from { transform: scale(1); opacity: 0.7; }
      to { transform: scale(1.08); opacity: 1; }
    }

    .game {
      position: relative;
      z-index: 2;
      width: min(96vw, 820px);
      margin: 0 auto;
      padding: 22px 12px 36px;
    }

    h1 {
      margin: 12px 0 4px;
      font-size: clamp(2rem, 8vw, 4.2rem);
      text-shadow:
        0 0 12px #fff1a8,
        0 0 28px #b678ff;
    }

    .subtitle {
      margin: 0 0 14px;
      color: #fff3c4;
      font-size: 1rem;
      font-weight: bold;
    }

    .panel {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 16px auto;
      max-width: 560px;
    }

    .stat {
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 18px;
      padding: 10px;
      box-shadow: 0 0 18px rgba(255,230,120,0.18);
      backdrop-filter: blur(6px);
    }

    .stat strong {
      display: block;
      font-size: 0.8rem;
      color: #ffeaa5;
    }

    .stat span {
      font-size: 1.3rem;
      font-weight: bold;
    }

    .controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0;
    }

    button, a.button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #ffb300, #8e4dff);
      box-shadow: 0 0 20px rgba(255,210,90,0.42);
      text-decoration: none;
    }

    .sound-btn {
      background: linear-gradient(135deg, #00c6ff, #7d2cff);
    }

    button:active, a.button:active {
      transform: scale(0.96);
    }

    .message {
      min-height: 34px;
      margin: 8px 0;
      font-size: 1.18rem;
      font-weight: bold;
      color: #fff1a8;
      text-shadow: 0 0 14px #ffdc6b;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 18px auto;
      max-width: 640px;
    }

    .card {
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: clamp(1.9rem, 9vw, 3.4rem);
      cursor: pointer;
      user-select: none;
      background: linear-gradient(145deg, #1b0d3a, #080313);
      border: 2px solid rgba(255,255,255,0.22);
      box-shadow:
        0 8px 20px rgba(0,0,0,0.35),
        inset 0 0 16px rgba(255,255,255,0.05);
      transition: transform 0.25s, box-shadow 0.25s, background 0.25s;
    }

    .card:hover {
      box-shadow:
        0 0 22px rgba(255,230,120,0.65),
        0 0 36px rgba(160,90,255,0.35);
    }

    .card.flipped {
      background: linear-gradient(145deg, #fff2a7, #b678ff);
      color: #160525;
      transform: rotateY(180deg) scale(1.04);
    }

    .card.matched {
      background: linear-gradient(145deg, #00f5c8, #ffe066);
      pointer-events: none;
      animation: masterMatch 0.6s ease;
    }

    @keyframes masterMatch {
      0% { transform: scale(1); }
      45% { transform: scale(1.2) rotate(-5deg); }
      100% { transform: scale(1); }
    }

    .ultra {
      animation: ultraGlow 0.8s infinite alternate;
    }

    @keyframes ultraGlow {
      from {
        filter: drop-shadow(0 0 6px #ffe066);
      }
      to {
        filter: drop-shadow(0 0 22px #b678ff);
      }
    }

    .confetti {
      position: fixed;
      top: -24px;
      width: 10px;
      height: 16px;
      pointer-events: none;
      z-index: 20;
      animation: fall 1.9s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(112vh) rotate(760deg);
        opacity: 0;
      }
    }

    @media (max-width: 500px) {
      .board {
        gap: 8px;
      }

      .card {
        border-radius: 14px;
      }

      button, a.button {
        padding: 11px 15px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>
  <div class="aura"></div>

  <main class="game">
    <h1 class="ultra">👑 Memory Master</h1>
    <p class="subtitle">Mesterbanen for ekte memory-helter!</p>

    <div class="panel">
      <div class="stat">
        <strong>Nivå</strong>
        <span id="level">1</span>
      </div>
      <div class="stat">
        <strong>Trekk</strong>
        <span id="moves">0</span>
      </div>
      <div class="stat">
        <strong>Combo</strong>
        <span id="combo">0</span>
      </div>
      <div class="stat">
        <strong>Par</strong>
        <span id="pairs">0</span>
      </div>
    </div>

    <div class="controls">
      <button onclick="restartGame()">🔄 Start på nytt</button>
      <button class="sound-btn" onclick="toggleSound()" id="soundBtn">🔊 Lyd på</button>
      <a class="button" href="memorymap.html">🗺️ Kart</a>
    </div>

    <div class="message" id="message">Finn alle mester-parene!</div>

    <section class="board" id="board"></section>
  </main>

  <script>
    const symbols = ["👑", "💎", "⚔️", "🛡️", "🔥", "🌟", "🐉", "🏆"];

    let cards = [];
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;

    let level = 1;
    let moves = 0;
    let combo = 0;
    let pairs = 0;
    let soundOn = true;

    const board = document.getElementById("board");
    const levelEl = document.getElementById("level");
    const movesEl = document.getElementById("moves");
    const comboEl = document.getElementById("combo");
    const pairsEl = document.getElementById("pairs");
    const messageEl = document.getElementById("message");
    const soundBtn = document.getElementById("soundBtn");

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function playSound(type) {
      if (!soundOn) return;

      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === "flip") oscillator.frequency.value = 480;
      if (type === "match") oscillator.frequency.value = 820;
      if (type === "wrong") oscillator.frequency.value = 170;
      if (type === "win") oscillator.frequency.value = 1100;

      oscillator.type = "sine";
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.25);
    }

    function startGame() {
      board.innerHTML = "";
      firstCard = null;
      secondCard = null;
      lockBoard = false;
      moves = 0;
      combo = 0;
      pairs = 0;

      const pairCount = Math.min(5 + level, 8);
      const chosen = symbols.slice(0, pairCount);
      cards = shuffle([...chosen, ...chosen]);

      cards.forEach((symbol, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.symbol = symbol;
        card.dataset.index = index;
        card.textContent = "❖";
        card.addEventListener("click", () => flipCard(card));
        board.appendChild(card);
      });

      updateStats();
      messageEl.textContent = "Finn alle mester-parene!";
    }

    function flipCard(card) {
      if (lockBoard) return;
      if (card.classList.contains("flipped")) return;
      if (card.classList.contains("matched")) return;

      playSound("flip");

      card.classList.add("flipped");
      card.textContent = card.dataset.symbol;

      if (!firstCard) {
        firstCard = card;
        return;
      }

      secondCard = card;
      moves++;
      updateStats();
      checkMatch();
    }

    function checkMatch() {
      const isMatch = firstCard.dataset.symbol === secondCard.dataset.symbol;

      if (isMatch) {
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        combo++;
        pairs++;

        playSound("match");
        blast(firstCard);
        blast(secondCard);

        if (combo >= 4) {
          messageEl.textContent = "⚡ MASTER ULTRA COMBO!";
        } else if (combo >= 2) {
          messageEl.textContent = "🔥 Sterk combo!";
        } else {
          messageEl.textContent = "Bra! Et mester-par!";
        }

        resetTurn();
        updateStats();

        if (pairs === Math.min(5 + level, 8)) {
          winLevel();
        }
      } else {
        lockBoard = true;
        combo = 0;
        messageEl.textContent = "Ikke par. Mesteren prøver igjen!";
        playSound("wrong");

        setTimeout(() => {
          firstCard.classList.remove("flipped");
          secondCard.classList.remove("flipped");
          firstCard.textContent = "❖";
          secondCard.textContent = "❖";
          resetTurn();
          updateStats();
        }, 800);
      }
    }

    function resetTurn() {
      firstCard = null;
      secondCard = null;
      lockBoard = false;
    }

    function winLevel() {
      playSound("win");
      confetti();
      messageEl.textContent = "🏆 Mester-nivå fullført!";

      setTimeout(() => {
        level++;

        if (level > 4) {
          level = 4;
          messageEl.textContent = "👑 Du er Memory Master!";
          confetti();
        } else {
          startGame();
        }

        updateStats();
      }, 1800);
    }

    function restartGame() {
      startGame();
    }

    function toggleSound() {
      soundOn = !soundOn;
      soundBtn.textContent = soundOn ? "🔊 Lyd på" : "🔇 Lyd av";
    }

    function updateStats() {
      levelEl.textContent = level;
      movesEl.textContent = moves;
      comboEl.textContent = combo;
      pairsEl.textContent = pairs;
    }

    function confetti() {
      const colors = ["#ffe066", "#ffffff", "#b678ff", "#00f5c8", "#ff7bd5"];

      for (let i = 0; i < 90; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.55 + "s";
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);

        setTimeout(() => {
          piece.remove();
        }, 2400);
      }
    }

    function blast(card) {
      card.style.boxShadow =
        "0 0 35px #ffe066, 0 0 65px #b678ff, 0 0 90px #00f5c8";

      setTimeout(() => {
        card.style.boxShadow = "";
      }, 520);
    }

    startGame();
  </script>
</body>
</html>
