<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Mesterbanen LEVELS</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:
linear-gradient(to bottom,#111827,#000000);
color:white;
text-align:center;
overflow-x:hidden;
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

h1{
font-size:52px;
margin-top:10px;
text-shadow:0 0 18px #ef4444;
}

.stats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.stat{
background:rgba(255,255,255,.08);
padding:14px 20px;
border-radius:18px;
font-size:20px;
font-weight:bold;
box-shadow:0 4px 12px rgba(0,0,0,.45);
}

#message{
font-size:28px;
font-weight:bold;
color:#fca5a5;
margin:20px;
min-height:40px;
}

#gameBoard{
display:grid;
gap:14px;
justify-content:center;
margin-top:20px;
}

.card{
width:100px;
height:100px;
perspective:1000px;
cursor:pointer;
transition:.15s;
}

.card:hover{
transform:scale(1.05);
}

.card.move{
animation:moveCard 2s infinite alternate;
}

@keyframes moveCard{
from{
transform:translateY(0px);
}
to{
transform:translateY(-5px);
}
}

.inner{
position:relative;
width:100%;
height:100%;
transition:transform .5s;
transform-style:preserve-3d;
}

.card.flipped .inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
box-shadow:0 0 18px rgba(239,68,68,.25);
}

.front{
background:
linear-gradient(
135deg,
#7f1d1d,
#dc2626
);
}

.back{
background:#fef2f2;
color:#111827;
transform:rotateY(180deg);
}

.correct .back{
box-shadow:
0 0 35px #ef4444;
animation:masterGlow .7s infinite alternate;
}

@keyframes masterGlow{
from{
transform:rotateY(180deg) scale(1);
}
to{
transform:rotateY(180deg) scale(1.08);
}
}

.wrong{
animation:shake .2s 2;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

.fire{
position:fixed;
font-size:34px;
opacity:.15;
animation:fireFloat 10s linear infinite;
pointer-events:none;
}

@keyframes fireFloat{
from{
transform:translateY(110vh);
}
to{
transform:translateY(-120vh);
}
}

#winBox{
display:none;
background:rgba(255,255,255,.08);
padding:30px;
border-radius:25px;
max-width:520px;
margin:30px auto;
box-shadow:0 8px 20px rgba(0,0,0,.45);
}

#winBox h2{
font-size:42px;
color:#fca5a5;
}

button{
margin-top:20px;
padding:16px 28px;
border:none;
border-radius:18px;
background:#dc2626;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.backBtn{
background:#111827;
border:2px solid #ef4444;
}

</style>
</head>

<body>

<div class="fire" style="left:10%;">🔥</div>
<div class="fire" style="left:35%;animation-delay:2s;">🔥</div>
<div class="fire" style="left:60%;animation-delay:5s;">🔥</div>
<div class="fire" style="left:85%;animation-delay:7s;">🔥</div>

<div class="container">

<h1>🔥 Mesterbanen LEVELS</h1>

<div class="stats">

<div class="stat">
🗺️ Nivå:
<span id="level">1</span>
</div>

<div class="stat">
⭐ Poeng:
<span id="score">0</span>
</div>

<div class="stat">
🔥 Combo:
<span id="combo">0</span>
</div>

<div class="stat">
⏱️ Tid:
<span id="time">0</span>
</div>

</div>

<div id="message">

🔥 Velkommen til Mesterbanen!

</div>

<div id="gameBoard"></div>

<div id="winBox">

<h2>🏆 Nivå fullført!</h2>

<div style="font-size:52px;">
👑🔥👑
</div>

<p id="finalScore"></p>

<button onclick="nextLevel()">

➡️ Neste nivå

</button>

</div>

<button class="backBtn"
onclick="location.href='memorymap.html'">

⬅️ Tilbake til kart

</button>

</div>

<script>

const allSymbols=[
"🔥","👑","💀","⚡","🧠",
"👹","☠️","🦂","🗡️","💎",
"🛡️","👁️"
];

let level=1;
let cards=[];
let flipped=[];
let matched=0;
let score=0;
let combo=0;
let timer=0;
let interval;
let lock=true;

function startLevel(){

clearInterval(interval);

let pairs=4+(level-1);

if(pairs>12){
pairs=12;
}

let selected=
allSymbols.slice(0,pairs);

cards=[...selected,...selected];

cards.sort(()=>Math.random()-0.5);

flipped=[];
matched=0;
combo=0;
timer=0;
lock=true;

updateStats();

document.getElementById(
"winBox"
).style.display="none";

document.getElementById(
"message"
).innerHTML=
"🔥 Husk kortene raskt!";

const board=
document.getElementById(
"gameBoard"
);

board.innerHTML="";

let columns=4;

if(cards.length>=18){
columns=5;
}

if(cards.length>=22){
columns=6;
}

board.style.gridTemplateColumns=
`repeat(${columns},100px)`;

cards.forEach(symbol=>{

const card=
document.createElement("div");

card.className=
"card flipped";

if(level>=5){
card.classList.add("move");
}

card.dataset.symbol=symbol;

card.innerHTML=`

<div class="inner">

<div class="front">
🔥
</div>

<div class="back">
${symbol}
</div>

</div>

`;

card.onclick=
()=>flipCard(card);

board.appendChild(card);

});

let hideTime=2200-(level*150);

if(hideTime<500){
hideTime=500;
}

setTimeout(()=>{

document.querySelectorAll(
".card"
).forEach(card=>{

card.classList.remove(
"flipped"
);

});

lock=false;

document.getElementById(
"message"
).innerHTML=
"👑 Finn alle mesterkortene!";

},hideTime);

interval=setInterval(()=>{

timer++;

document.getElementById(
"time"
).innerHTML=timer;

},1000);

}

function flipCard(card){

if(lock)return;

if(flipped.length>=2)return;

if(card.classList.contains(
"flipped"
)) return;

if(card.classList.contains(
"correct"
)) return;

card.classList.add(
"flipped"
);

flipped.push(card);

if(flipped.length===2){

checkMatch();

}

}

function checkMatch(){

lock=true;

const a=flipped[0];
const b=flipped[1];

if(
a.dataset.symbol===
b.dataset.symbol
){

a.classList.add(
"correct"
);

b.classList.add(
"correct"
);

matched+=2;

combo++;

score+=15+(combo*5);

document.getElementById(
"message"
).innerHTML=
"🔥 Mesterpar funnet!";

flipped=[];

lock=false;

updateStats();

if(
matched===cards.length
){

winLevel();

}

}else{

combo=0;

score=Math.max(
0,
score-5
);

a.classList.add(
"wrong"
);

b.classList.add(
"wrong"
);

document.getElementById(
"message"
).innerHTML=
"💀 Feil mesterkort";

updateStats();

setTimeout(()=>{

a.classList.remove(
"flipped",
"wrong"
);

b.classList.remove(
"flipped",
"wrong"
);

flipped=[];

lock=false;

},700);

}

}

function updateStats(){

document.getElementById(
"level"
).innerHTML=level;

document.getElementById(
"score"
).innerHTML=score;

document.getElementById(
"combo"
).innerHTML=combo;

document.getElementById(
"time"
).innerHTML=timer;

}

function winLevel(){

clearInterval(interval);

document.getElementById(
"winBox"
).style.display=
"block";

document.getElementById(
"finalScore"
).innerHTML=
`⭐ Poeng: ${score}<br>
⏱️ Tid: ${timer}s`;

document.getElementById(
"message"
).innerHTML=
"🏆 Mester-nivå "+level+" fullført!";

}

function nextLevel(){

level++;

if(level>10){

alert(
"👑 DU FULLFØRTE HELE MESTERBANEN!"
);

level=1;

score=0;

}

startLevel();

}

startLevel();

</script>

</body>
</html>
