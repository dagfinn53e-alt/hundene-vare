<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Memory Adventure - Space</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
    }

    body{
      font-family:Arial,sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      color:white;
      text-align:center;

      background:
        radial-gradient(circle at top,#4f7cff 0%,#14052d 40%,#02010b 100%);
    }

    .stars{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;

      background-image:
        radial-gradient(white 1px,transparent 1px),
        radial-gradient(#8be9ff 1px,transparent 1px),
        radial-gradient(#ffffff 1px,transparent 1px);

      background-size:
        80px 80px,
        140px 140px,
        220px 220px;

      opacity:0.7;

      animation:twinkle 5s infinite alternate;
    }

    @keyframes twinkle{
      from{opacity:0.35;}
      to{opacity:1;}
    }

    .planet{
      position:fixed;
      top:25px;
      right:25px;

      width:90px;
      height:90px;

      border-radius:50%;

      background:
        linear-gradient(145deg,#ff8cff,#7b5cff);

      box-shadow:
        0 0 35px #8be9ff;

      z-index:1;
    }

    .planet::before{
      content:"";

      position:absolute;
      inset:-10px;

      border-radius:50%;
      border:4px solid rgba(255,255,255,0.35);

      transform:rotate(25deg);
    }

    .game{
      position:relative;
      z-index:2;

      width:min(96vw,850px);

      margin:0 auto;

      padding:25px 12px 40px;
    }

    h1{
      margin-top:10px;

      font-size:clamp(2rem,8vw,4.4rem);

      text-shadow:
        0 0 12px #8be9ff,
        0 0 28px #7b5cff;
    }

    .subtitle{
      margin-top:10px;
      margin-bottom:22px;

      color:#dff6ff;

      font-size:1.1rem;
      font-weight:bold;
    }

    .panel{
      display:grid;
      grid-template-columns:repeat(2,1fr);

      gap:12px;

      max-width:650px;

      margin:0 auto 20px;
    }

    .stat{
      background:rgba(255,255,255,0.12);

      border:1px solid rgba(255,255,255,0.25);

      border-radius:20px;

      padding:14px;

      backdrop-filter:blur(5px);

      box-shadow:
        0 0 18px rgba(139,233,255,0.18);
    }

    .stat strong{
      display:block;

      margin-bottom:5px;

      color:#c9f6ff;

      font-size:0.9rem;
    }

    .stat span{
      font-size:1.6rem;
      font-weight:bold;
    }

    .controls{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;

      gap:12px;

      margin-bottom:18px;
    }

    button,
    .map-btn{
      border:none;

      border-radius:999px;

      padding:12px 20px;

      font-size:1rem;
      font-weight:bold;

      cursor:pointer;

      color:white;

      background:
        linear-gradient(135deg,#7b5cff,#00bfff);

      text-decoration:none;

      box-shadow:
        0 0 18px rgba(123,92,255,0.4);

      transition:
        transform 0.2s,
        box-shadow 0.2s;
    }

    button:hover,
    .map-btn:hover{
      transform:scale(1.05);

      box-shadow:
        0 0 28px rgba(0,191,255,0.7);
    }

    button:active,
    .map-btn:active{
      transform:scale(0.95);
    }

    .message{
      min-height:34px;

      margin-bottom:18px;

      color:#fff7a8;

      font-size:1.2rem;
      font-weight:bold;

      text-shadow:
        0 0 12px #fff7a8;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(4,1fr);

      gap:10px;

      max-width:680px;

      margin:0 auto;
    }

    .card{
      aspect-ratio:1/1;

      border-radius:20px;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:clamp(2rem,8vw,3.5rem);

      cursor:pointer;

      user-select:none;

      background:
        linear-gradient(145deg,#1b0a44,#03010f);

      border:2px solid rgba(255,255,255,0.22);

      box-shadow:
        0 8px 20px rgba(0,0,0,0.35);

      transition:
        transform 0.25s,
        background 0.25s,
        box-shadow 0.25s;
    }

    .card:hover{
      box-shadow:
        0 0 22px rgba(139,233,255,0.7),
        0 0 40px rgba(123,92,255,0.35);
    }

    .card.flipped{
      background:
        linear-gradient(145deg,#ffffff,#8be9ff);

      color:#12052d;

      transform:rotateY(180deg) scale(1.05);
    }

    .card.matched{
      background:
        linear-gradient(145deg,#00ffc8,#ffe066);

      pointer-events:none;

      animation:matchPulse 0.6s ease;
    }

    @keyframes matchPulse{
      0%{transform:scale(1);}
      50%{transform:scale(1.2) rotate(5deg);}
      100%{transform:scale(1);}
    }

    @media(max-width:600px){

      .board{
        gap:8px;
      }

      .card{
        border-radius:15px;
      }

      .planet{
        width:60px;
        height:60px;
      }
    }
  </style>
</head>

<body>

  <div class="stars"></div>

  <div class="planet"></div>

  <main class="game">

    <h1>🚀 Memory Space</h1>

    <div class="subtitle">
      Utforsk galaksen og finn rom-parene!
    </div>

    <div class="panel">

      <div class="stat">
        <strong>Nivå</strong>
        <span id="level">1</span>
      </div>

      <div class="stat">
        <strong>Trekk</strong>
        <span id="moves">0</span>
      </div>

      <div class="stat">
        <strong>Combo</strong>
        <span id="combo">0</span>
      </div>

      <div class="stat">
        <strong>Poeng</strong>
        <span id="score">0</span>
      </div>

    </div>

    <div class="controls">

      <button onclick="restartGame()">
        🔄 Start på nytt
      </button>

      <button onclick="toggleSound()" id="soundBtn">
        🔊 Lyd på
      </button>

      <!-- VIKTIG: DENNE GÅR TIL KARTET -->

      <a class="map-btn" href="./memorymap.html">
        🗺️ Kart
      </a>

    </div>

    <div class="message" id="message">
      Finn rom-parene!
    </div>

    <section class="board" id="board"></section>

  </main>

  <script>

    const symbols = [
      "🚀",
      "🪐",
      "👽",
      "🌌",
      "⭐",
      "☄️",
      "🛰️",
      "🌙"
    ];

    let cards = [];

    let firstCard = null;
    let secondCard = null;

    let lockBoard = false;

    let level = 1;
    let moves = 0;
    let combo = 0;
    let score = 0;
    let pairs = 0;

    let soundOn = true;

    const board = document.getElementById("board");

    const levelEl = document.getElementById("level");
    const movesEl = document.getElementById("moves");
    const comboEl = document.getElementById("combo");
    const scoreEl = document.getElementById("score");

    const messageEl = document.getElementById("message");

    const soundBtn = document.getElementById("soundBtn");

    function shuffle(array){
      return array.sort(() => Math.random() - 0.5);
    }

    function startGame(){

      board.innerHTML = "";

      firstCard = null;
      secondCard = null;

      lockBoard = false;

      moves = 0;
      combo = 0;
      pairs = 0;

      const pairCount =
        Math.min(4 + level, 8);

      const chosen =
        symbols.slice(0, pairCount);

      cards =
        shuffle([...chosen, ...chosen]);

      cards.forEach((symbol) => {

        const card =
          document.createElement("div");

        card.className = "card";

        card.dataset.symbol = symbol;

        card.textContent = "🛸";

        card.addEventListener(
          "click",
          () => flipCard(card)
        );

        board.appendChild(card);

      });

      updateStats();
    }

    function flipCard(card){

      if(lockBoard) return;

      if(card.classList.contains("flipped")) return;

      if(card.classList.contains("matched")) return;

      card.classList.add("flipped");

      card.textContent =
        card.dataset.symbol;

      if(!firstCard){

        firstCard = card;

        return;
      }

      secondCard = card;

      moves++;

      updateStats();

      checkMatch();
    }

    function checkMatch(){

      const isMatch =
        firstCard.dataset.symbol ===
        secondCard.dataset.symbol;

      if(isMatch){

        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        combo++;
        pairs++;

        score += 100;

        messageEl.textContent =
          "🚀 Match!";

        resetTurn();

        updateStats();

        if(pairs === Math.min(4 + level, 8)){

          winLevel();
        }

      }else{

        lockBoard = true;

        combo = 0;

        messageEl.textContent =
          "❌ Ingen match!";

        setTimeout(() => {

          firstCard.classList.remove("flipped");
          secondCard.classList.remove("flipped");

          firstCard.textContent = "🛸";
          secondCard.textContent = "🛸";

          resetTurn();

          updateStats();

        },700);
      }
    }

    function resetTurn(){

      firstCard = null;
      secondCard = null;

      lockBoard = false;
    }

    function winLevel(){

      messageEl.textContent =
        "🏆 Nivå fullført!";

      setTimeout(() => {

        level++;

        if(level > 5){

          level = 5;

          messageEl.textContent =
            "🌌 Du vant Space-eventyret!";

        }else{

          startGame();
        }

        updateStats();

      },1500);
    }

    function restartGame(){

      level = 1;
      score = 0;

      startGame();
    }

    function toggleSound(){

      soundOn = !soundOn;

      soundBtn.textContent =
        soundOn
          ? "🔊 Lyd på"
          : "🔇 Lyd av";
    }

    function updateStats(){

      levelEl.textContent = level;

      movesEl.textContent = moves;

      comboEl.textContent = combo;

      scoreEl.textContent = score;
    }

    startGame();

  </script>

</body>
</html>
