<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶🐱 Dyresimulator 2.0</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#c7e9ff,#ffe4f1);
overflow:hidden;
text-align:center;
}

h1{
margin-top:20px;
color:#7a284f;
}

.stats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:15px;
}

.stat{
background:white;
padding:12px 18px;
border-radius:18px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,.12);
}

#gameArea{
position:relative;
width:95vw;
max-width:1100px;
height:600px;
margin:auto;
background:linear-gradient(to bottom,#b9f6ca,#86efac);
border-radius:30px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

#pet{
position:absolute;
bottom:70px;
left:100px;
width:180px;
transition:all 2s linear;
z-index:10;
}

.object{
position:absolute;
bottom:60px;
width:120px;
}

#foodBowl{
right:80px;
display:none;
}

#ball{
right:220px;
display:none;
}

#bed{
right:380px;
display:none;
}

#bath{
right:540px;
display:none;
}

.effect{
position:absolute;
font-size:70px;
display:none;
animation:float 2s linear infinite;
z-index:20;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-80px);
opacity:0;
}
}

.buttons{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
max-width:1000px;
margin:20px auto;
padding:0 20px;
}

.buttons button{
padding:18px;
border:none;
border-radius:24px;
font-size:22px;
font-weight:bold;
cursor:pointer;
color:white;
transition:.2s;
}

.buttons button:hover{
transform:scale(1.05);
}

.feed{background:#f59e0b;}
.play{background:#10b981;}
.sleep{background:#6366f1;}
.wash{background:#0ea5e9;}
.love{background:#ec4899;}

#moodText{
font-size:28px;
font-weight:bold;
margin-top:15px;
color:#db2777;
min-height:40px;
}

.back{
margin-top:20px;
}

.back button{
padding:16px 28px;
border:none;
border-radius:20px;
font-size:18px;
font-weight:bold;
background:#7a284f;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🐶🐱 Dyresimulator 2.0</h1>

<div class="stats">

<div class="stat">
❤️ Humør:
<span id="mood">80</span>
</div>

<div class="stat">
⚡ Energi:
<span id="energy">70</span>
</div>

<div class="stat">
🍖 Mat:
<span id="food">75</span>
</div>

<div class="stat">
🏆 Level:
<span id="level">1</span>
</div>

</div>

<div id="gameArea">

<img id="pet"
src="https://cdn-icons-png.flaticon.com/512/616/616408.png">

<img id="foodBowl"
class="object"
src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">

<img id="ball"
class="object"
src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">

<img id="bed"
class="object"
src="https://cdn-icons-png.flaticon.com/512/2936/2936886.png">

<img id="bath"
class="object"
src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">

<div id="effect"
class="effect">
❤️
</div>

</div>

<div id="moodText">
😊 Dyret er glad!
</div>

<div class="buttons">

<button class="feed"
onclick="feedPet()">
🍖 Gi Mat
</button>

<button class="play"
onclick="playPet()">
🎾 Lek
</button>

<button class="sleep"
onclick="sleepPet()">
😴 Sov
</button>

<button class="wash"
onclick="washPet()">
🛁 Vask
</button>

<button class="love"
onclick="lovePet()">
❤️ Kos
</button>

</div>

<div class="back">

<button onclick="location.href='hundespill.html'">
⬅️ Tilbake til spill
</button>

</div>

<script>

let mood=80;
let energy=70;
let food=75;
let level=1;

const pet=
document.getElementById("pet");

function updateStats(){

document.getElementById(
"mood"
).innerHTML=mood;

document.getElementById(
"energy"
).innerHTML=energy;

document.getElementById(
"food"
).innerHTML=food;

document.getElementById(
"level"
).innerHTML=level;

}

function movePet(x){

pet.style.left=x+"px";

}

function showEffect(icon,x,y){

const effect=
document.getElementById(
"effect"
);

effect.innerHTML=icon;

effect.style.left=x+"px";

effect.style.top=y+"px";

effect.style.display="block";

setTimeout(()=>{

effect.style.display="none";

},1800);

}

function resetObjects(){

document.getElementById(
"foodBowl"
).style.display="none";

document.getElementById(
"ball"
).style.display="none";

document.getElementById(
"bed"
).style.display="none";

document.getElementById(
"bath"
).style.display="none";

}

function feedPet(){

resetObjects();

const bowl=
document.getElementById(
"foodBowl"
);

bowl.style.display="block";

movePet(760);

showEffect("🍖",780,180);

food+=10;
mood+=5;

if(food>100)food=100;
if(mood>100)mood=100;

document.getElementById(
"moodText"
).innerHTML=
"🐶 Nam nam!";

updateStats();

}

function playPet(){

resetObjects();

const ball=
document.getElementById(
"ball"
);

ball.style.display="block";

movePet(620);

showEffect("🎾",650,180);

mood+=10;
energy-=10;

if(mood>100)mood=100;
if(energy<0)energy=0;

document.getElementById(
"moodText"
).innerHTML=
"🎾 Wohoo!";

updateStats();

}

function sleepPet(){

resetObjects();

const bed=
document.getElementById(
"bed"
);

bed.style.display="block";

movePet(450);

showEffect("😴",500,170);

energy+=20;

if(energy>100)energy=100;

document.getElementById(
"moodText"
).innerHTML=
"😴 Zzzzz...";

updateStats();

}

function washPet(){

resetObjects();

const bath=
document.getElementById(
"bath"
);

bath.style.display="block";

movePet(280);

showEffect("🫧",330,180);

mood+=8;

if(mood>100)mood=100;

document.getElementById(
"moodText"
).innerHTML=
"🛁 Så ren!";

updateStats();

}

function lovePet(){

showEffect("❤️",200,140);

mood+=12;

if(mood>100)mood=100;

document.getElementById(
"moodText"
).innerHTML=
"🥰 Dyret elsker kos!";

updateStats();

}

setInterval(()=>{

food-=1;
energy-=1;

if(food<0)food=0;
if(energy<0)energy=0;

if(food<30){

document.getElementById(
"moodText"
).innerHTML=
"🍖 Dyret er sultent!";

}

if(energy<25){

document.getElementById(
"moodText"
).innerHTML=
"😴 Dyret er trøtt!";

}

updateStats();

},10000);

updateStats();

</script>

</body>
</html>
