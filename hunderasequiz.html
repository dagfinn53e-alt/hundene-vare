<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(to bottom,#dbeafe,#eef6ff);text-align:center;color:#123c73}
.container{max-width:950px;margin:20px auto;padding:20px}
h1{margin-bottom:20px;font-size:38px}.stats{display:flex;gap:15px;flex-wrap:wrap;margin-bottom:20px}.stat{flex:1;background:white;padding:15px;border-radius:18px;font-weight:bold;box-shadow:0 4px 10px rgba(0,0,0,.1)}
.quiz-box,.result-box{background:white;padding:25px;border-radius:28px;box-shadow:0 8px 20px rgba(0,0,0,.12)}
#dogImage{width:100%;max-height:260px;object-fit:contain;background:white;border-radius:20px;margin-bottom:20px}#breed{font-size:34px;font-weight:bold;margin-bottom:10px}.question{font-size:24px;margin-bottom:20px}
.answer-btn{display:block;width:100%;margin:12px 0;padding:20px;border:none;border-radius:18px;background:#dbeafe;font-size:24px;font-weight:bold;cursor:pointer;transition:.2s}.answer-btn:hover{background:#bfdbfe}.correct{background:#10b981!important;color:white}.wrong{background:#ef4444!important;color:white}
#nextBtn,#restartBtn{margin-top:20px;padding:18px 35px;border:none;border-radius:18px;background:#2563eb;color:white;font-size:22px;font-weight:bold;cursor:pointer}#nextBtn{display:none}.back button{margin-top:30px;padding:16px 30px;border:none;border-radius:18px;background:#123c73;color:white;font-size:20px;font-weight:bold;cursor:pointer}.hidden{display:none}.medal{font-size:34px;font-weight:900;margin-top:18px}.confetti{position:fixed;font-size:28px;pointer-events:none;animation:fall 3s linear forwards;z-index:9999}@keyframes fall{0%{transform:translateY(-50px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@media(max-width:700px){h1{font-size:30px}#breed{font-size:28px}.question{font-size:20px}.answer-btn{font-size:20px;padding:16px}}

.sponsor-box{
  background:white;
  border:1px solid #bfdbfe;
  border-radius:26px;
  padding:20px;
  margin:0 0 20px;
  box-shadow:0 8px 22px rgba(0,0,0,.12);
}
.sponsor-title{
  margin:0 0 12px;
  font-size:24px;
  color:#123c73;
}
.sponsor-logo{
  width:230px;
  max-width:90%;
  border-radius:18px;
  display:block;
  margin:8px auto 12px;
  box-shadow:0 8px 18px rgba(0,0,0,.12);
}
.sponsor-name{
  font-size:22px;
  font-weight:900;
  margin:8px 0 4px;
}
.sponsor-text{
  margin:0 0 14px;
  color:#475569;
  font-weight:700;
}
.sponsor-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:white;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  border-radius:999px;
  padding:13px 22px;
  font-weight:900;
  box-shadow:0 6px 16px rgba(15,23,42,.12);
}

</style>

const breedNames = questions.map(q => q.breed);

let quizQuestions=[],currentQuestion=0,score=0,correctCount=0;
function shuffleArray(array){const copy=[...array];for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]]}return copy}
function startQuiz(){quizQuestions=shuffleArray(questions);currentQuestion=0;score=0;correctCount=0;document.getElementById("score").textContent=score;document.getElementById("correctCount").textContent=correctCount;document.getElementById("quizBox").classList.remove("hidden");document.getElementById("resultBox").classList.add("hidden");loadQuestion()}
function loadQuestion(){
const q=quizQuestions[currentQuestion];
document.getElementById("dogImage").src=q.image;
document.getElementById("breed").textContent="";
document.getElementById("questionNumber").textContent=(currentQuestion+1)+"/"+quizQuestions.length;

const answers=document.getElementById("answers");
answers.innerHTML="";

let wrongAnswers = breedNames.filter(name => name !== q.correct);
wrongAnswers = shuffleArray(wrongAnswers).slice(0,3);
let answerOptions = shuffleArray([q.correct, ...wrongAnswers]);

answerOptions.forEach(answer=>{
const btn=document.createElement("button");
btn.className="answer-btn";
btn.textContent=answer;
btn.dataset.answer=answer;
btn.onclick=()=>checkAnswer(btn,answer);
answers.appendChild(btn);
});
document.getElementById("nextBtn").style.display="none";
}
function checkAnswer(button,answer){const q=quizQuestions[currentQuestion];const buttons=document.querySelectorAll(".answer-btn");buttons.forEach(btn=>{btn.disabled=true;if(btn.dataset.answer===q.correct){btn.classList.add("correct")}});if(answer===q.correct){score+=10;correctCount++}else{button.classList.add("wrong")}document.getElementById("score").textContent=score;document.getElementById("correctCount").textContent=correctCount;document.getElementById("nextBtn").style.display="inline-block"}
function nextQuestion(){currentQuestion++;if(currentQuestion>=quizQuestions.length){showResult();return}loadQuestion()}
function launchConfetti(){const emojis=['⭐','✨','🎉','🏆','🐶'];for(let i=0;i<45;i++){const el=document.createElement('div');el.className='confetti';el.innerText=emojis[Math.floor(Math.random()*emojis.length)];el.style.left=Math.random()*100+'vw';el.style.animationDelay=(Math.random()*0.6)+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),3500)}}
function showResult(){document.getElementById("quizBox").classList.add("hidden");document.getElementById("resultBox").classList.remove("hidden");const total=quizQuestions.length;const percent=correctCount/total;document.getElementById("finalScore").innerHTML="Du fikk <b>"+correctCount+"</b> av <b>"+total+"</b> riktige.<br>Poeng: <b>"+score+"</b>";let medal="";if(percent===1)medal="🏆 RASEMESTER! Alt riktig!";else if(percent>=0.85)medal="🥇 Gullpote!";else if(percent>=0.65)medal="🥈 Sølvpote!";else if(percent>=0.45)medal="🥉 Bronsepote!";else medal="🐾 Prøv igjen – neste runde går bedre!";document.getElementById("medal").textContent=medal;if(percent>=0.85){launchConfetti()}}
function restartQuiz(){startQuiz()}
startQuiz();
</script>
